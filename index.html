<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=2560, height=720">
  <title>Orbit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060a10;
      --surface: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --text: #c8d6e5;
      --text-bright: #e8f0f8;
      --dim: rgba(255,255,255,0.35);
      --accent: #00d9ff;
      --amber: #ffc857;
      --red: #ff5555;
      --green: #50fa7b;
      --font: "JetBrains Mono", "Fira Code", monospace;
    }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: var(--font); color: var(--text); -webkit-font-smoothing: antialiased; user-select: none; cursor: default; }
    body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px); }
    #app { position: relative; z-index: 1; width: 100vw; height: 100vh; display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; }
    .panel { height: 100vh; padding: 20px 16px; border-right: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
    .panel:last-child { border-right: none; }
    .panel-label { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
    .source-badge { display: inline-block; padding: 2px 8px; font-size: 9px; font-weight: 700; letter-spacing: 1.5px; border-radius: 10px; background: rgba(0,217,255,0.1); color: var(--accent); border: 1px solid rgba(0,217,255,0.2); text-transform: uppercase; }
    .clock-time { font-size: 64px; font-weight: 300; color: var(--text-bright); letter-spacing: 3px; line-height: 1; margin-bottom: 6px; text-shadow: 0 0 30px rgba(0,217,255,0.15); }
    .clock-date { font-size: 14px; font-weight: 500; letter-spacing: 2px; color: var(--dim); margin-bottom: 20px; }
    .weather-current { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
    .weather-icon { font-size: 32px; }
    .weather-temp { font-size: 36px; font-weight: 700; color: var(--text-bright); }
    .weather-desc { font-size: 12px; color: var(--text); margin-bottom: 4px; }
    .weather-summary { font-size: 11px; color: var(--dim); font-style: italic; margin-bottom: 12px; max-width: 100%; padding: 0 8px; }
    .weather-extra { font-size: 11px; color: var(--dim); margin-bottom: 12px; display: flex; gap: 12px; justify-content: center; }
    .weather-strip { display: flex; gap: 4px; width: 100%; padding: 0 4px; overflow-x: auto; justify-content: center; }
    .weather-day { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; padding: 4px 5px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); min-width: 48px; flex-shrink: 0; }
    .weather-day-name { font-weight: 600; color: var(--text); }
    .weather-day-icon { font-size: 14px; }
    .weather-day-temps { font-size: 9px; }
    .weather-hi { color: var(--amber); }
    .weather-lo { color: var(--accent); }
    .effect-name { font-size: 36px; font-weight: 700; margin-bottom: 6px; transition: color 2s ease; text-shadow: 0 0 30px currentColor; line-height: 1.1; max-width: 100%; word-wrap: break-word; }
    .effect-label { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); margin-bottom: 16px; }
    .brightness-wrap { width: 100%; padding: 0 12px; margin-bottom: 12px; }
    .brightness-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
    .brightness-fill { height: 100%; border-radius: 3px; transition: width .5s, background 2s; }
    .brightness-label { font-size: 14px; font-weight: 600; }
    .ha-toggle { padding: 6px 20px; font-size: 12px; font-weight: 700; letter-spacing: 1px; border: 2px solid var(--border); border-radius: 20px; background: transparent; color: var(--text); cursor: pointer; transition: all .2s; margin-bottom: 12px; font-family: var(--font); }
    .ha-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .ha-toggle.on { border-color: var(--green); color: var(--green); background: rgba(80,250,123,0.08); }
    .ha-toggle.off { border-color: var(--red); color: var(--red); background: rgba(255,85,85,0.08); }
    .fav-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; padding: 0 8px; width: 100%; justify-content: center; }
    .fav-pill { padding: 3px 8px; font-size: 10px; font-family: var(--font); border-radius: 10px; background: rgba(255,200,87,0.1); border: 1px solid rgba(255,200,87,0.3); color: var(--amber); cursor: pointer; transition: all .2s; white-space: nowrap; }
    .fav-pill:hover { background: rgba(255,200,87,0.2); }
    .effect-search { width: calc(100% - 16px); padding: 6px 10px; font-size: 11px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; margin-bottom: 4px; }
    .effect-search:focus { border-color: var(--accent); }
    .effect-list { width: 100%; max-height: 180px; overflow-y: auto; padding: 0 8px; }
    .effect-list::-webkit-scrollbar { width: 3px; }
    .effect-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .effect-option { padding: 5px 10px; font-size: 11px; cursor: pointer; border-radius: 4px; transition: background .15s; text-align: left; display: flex; align-items: center; gap: 6px; }
    .effect-option:hover { background: rgba(255,255,255,0.06); }
    .effect-option.active { background: rgba(0,217,255,0.12); color: var(--accent); font-weight: 600; }
    .effect-star { cursor: pointer; font-size: 12px; opacity: 0.3; transition: opacity .2s; }
    .effect-star.starred { opacity: 1; color: var(--amber); }
    .effect-star:hover { opacity: 0.8; }
    .light-card { width: 100%; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; }
    .light-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .light-name { font-size: 12px; font-weight: 600; flex: 1; text-align: left; color: var(--text); }
    .light-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: all .3s; }
    .light-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .light-toggle { padding: 3px 12px; font-size: 10px; font-weight: 700; border: 1px solid var(--border); border-radius: 12px; background: transparent; color: var(--text); cursor: pointer; font-family: var(--font); transition: all .2s; }
    .light-toggle:hover { border-color: var(--accent); }
    .light-toggle.on { border-color: var(--green); color: var(--green); }
    .light-toggle.off { border-color: var(--dim); color: var(--dim); }
    .light-brightness { width: 100%; }
    .light-brightness input { width: 100%; height: 3px; -webkit-appearance: none; appearance: none; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
    .light-brightness input::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .light-signalrgb-badge { font-size: 10px; color: var(--amber); display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
    .np-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
    .np-empty-icon { font-size: 40px; opacity: 0.12; }
    .np-empty-text { font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--dim); }
    .np-offline { color: var(--amber); font-size: 13px; letter-spacing: 1px; }
    .np-session-list { width: 100%; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; max-height: calc(100vh - 72px); padding: 0 2px; }
    .np-session-list::-webkit-scrollbar { width: 3px; }
    .np-session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .np-session { width: 100%; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; text-align: left; }
    .np-title { font-size: 14px; font-weight: 700; color: var(--text-bright); margin-bottom: 3px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .np-subtitle { font-size: 11px; color: var(--text); margin-bottom: 6px; }
    .np-progress-wrap { width: 100%; margin-bottom: 4px; }
    .np-progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .np-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 15s linear; }
    .np-time { font-size: 10px; color: var(--dim); margin-bottom: 4px; }
    .np-badge { display: inline-block; padding: 2px 8px; font-size: 9px; font-weight: 700; letter-spacing: 1px; border-radius: 10px; margin-right: 4px; }
    .np-badge-transcode { background: rgba(255,200,87,0.12); color: var(--amber); border: 1px solid rgba(255,200,87,0.2); }
    .np-badge-direct { background: rgba(80,250,123,0.12); color: var(--green); border: 1px solid rgba(80,250,123,0.2); }
    .np-meta { font-size: 10px; color: var(--dim); margin-top: 4px; }
    .np-streams-count { font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .sys-stats { width: 100%; display: flex; flex-direction: column; gap: 10px; padding: 0 8px; }
    .sys-row { display: flex; align-items: center; gap: 10px; }
    .sys-label { width: 34px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text); flex-shrink: 0; text-align: left; }
    .sys-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .sys-info { font-size: 10px; color: var(--text); text-align: left; min-height: 14px; }
    .sys-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
    .sys-bar-fill { height: 100%; border-radius: 3px; transition: width .5s; }
    .sys-value { width: 44px; font-size: 16px; font-weight: 700; font-family: var(--font); text-align: right; flex-shrink: 0; }
    .sys-c-green { color: var(--green); } .sys-b-green { background: var(--green); }
    .sys-c-amber { color: var(--amber); } .sys-b-amber { background: var(--amber); }
    .sys-c-red { color: var(--red); } .sys-b-red { background: var(--red); }
    .net-row { display: flex; align-items: center; gap: 10px; }
    .net-label { width: 34px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text); flex-shrink: 0; text-align: left; }
    .net-speeds { flex: 1; display: flex; gap: 14px; justify-content: center; }
    .net-speed { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .net-speed-label { font-size: 10px; color: var(--dim); }
    .net-speed-value { font-size: 14px; font-weight: 700; }
    .net-up { color: var(--green); } .net-down { color: var(--accent); }
    .sys-gear-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 12px; padding: 2px 4px; transition: color .2s; font-family: var(--font); }
    .sys-gear-btn:hover { color: var(--text); }
    .sys-picker-panel { width: 100%; padding: 8px 10px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; display: flex; flex-direction: column; gap: 6px; }
    .sys-picker-row { display: flex; align-items: center; gap: 6px; }
    .sys-picker-label { font-size: 10px; color: var(--dim); width: 70px; flex-shrink: 0; }
    .sys-picker-select { flex: 1; padding: 3px 6px; font-size: 10px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; color: var(--text); outline: none; }
    .sys-picker-toggle { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--text); cursor: pointer; }
    .sys-picker-toggle input { cursor: pointer; accent-color: var(--accent); }
    .media-section { width: 100%; padding: 8px; text-align: left; }
    .media-section-title { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
    .media-not-configured { font-size: 10px; color: var(--dim); font-style: italic; cursor: pointer; }
    .media-not-configured:hover { color: var(--accent); }
    .media-stat { font-size: 11px; color: var(--text); margin-bottom: 3px; }
    .media-stat-label { color: var(--dim); }
    .monitor-item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); width: 100%; }
    .monitor-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .monitor-dot.up { background: var(--green); box-shadow: 0 0 4px var(--green); }
    .monitor-dot.down { background: var(--red); box-shadow: 0 0 4px var(--red); }
    .monitor-dot.pending { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
    .monitor-name { font-size: 11px; color: var(--text); flex: 1; text-align: left; }
    .monitor-uptime { font-size: 10px; color: var(--dim); }
    .spotify-connect { padding: 10px 20px; font-size: 12px; font-weight: 700; font-family: var(--font); letter-spacing: 1px; border: 2px solid var(--green); border-radius: 20px; background: rgba(80,250,123,0.08); color: var(--green); cursor: pointer; transition: all .2s; }
    .spotify-connect:hover { background: rgba(80,250,123,0.15); }
    .spotify-track { font-size: 16px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; }
    .spotify-artist { font-size: 12px; color: var(--text); margin-bottom: 12px; }
    .spotify-controls { display: flex; gap: 16px; }
    .spotify-btn { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; transition: color .2s; }
    .spotify-btn:hover { color: var(--accent); }
    .link-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all .2s; width: 100%; margin-bottom: 6px; }
    .link-item:hover { border-color: var(--accent); background: rgba(0,217,255,0.04); }
    .link-icon { font-size: 18px; }
    .link-label { font-size: 12px; font-weight: 600; color: var(--text); }
    .jf-session { width: 100%; padding: 8px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; text-align: left; }
    .jf-title { font-size: 13px; font-weight: 700; color: var(--text-bright); }
    .jf-user { font-size: 10px; color: var(--dim); }
    .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); width: 48px; height: 80px; background: rgba(0,217,255,0.08); border: 1px solid rgba(0,217,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--accent); cursor: pointer; opacity: 0; transition: opacity 0.2s; z-index: 50; }
    .nav-arrow.visible { opacity: 1; }
    .nav-arrow.left { left: 8px; }
    .nav-arrow.right { right: 8px; }
    .page-dots { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 6px; z-index: 50; }
    .page-dots-row { display: flex; gap: 8px; }
    .page-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); transition: all 0.2s; cursor: pointer; }
    .page-dot.active { background: var(--accent); transform: scale(1.4); }
    .page-name-label { font-size: 9px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
    .settings-gear { position: fixed; top: 12px; right: 48px; background: transparent; border: none; color: rgba(255,255,255,0.2); font-size: 16px; cursor: pointer; z-index: 60; transition: color .2s, opacity .2s; font-family: var(--font); opacity: 0; }
    body:hover .settings-gear { opacity: 1; }
    .settings-gear:hover { color: rgba(255,255,255,0.7); }
    .settings-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; justify-content: flex-end; }
    .settings-panel { width: 420px; height: 100vh; overflow-y: auto; background: #0d1520; border-left: 1px solid var(--border); padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .settings-panel::-webkit-scrollbar { width: 4px; }
    .settings-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .settings-header { display: flex; align-items: center; justify-content: space-between; }
    .settings-title { font-size: 16px; font-weight: 700; color: var(--text-bright); letter-spacing: 2px; }
    .settings-close { background: none; border: none; color: var(--dim); font-size: 18px; cursor: pointer; font-family: var(--font); }
    .settings-close:hover { color: var(--text); }
    .settings-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
    .settings-tab { padding: 6px 14px; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; font-family: var(--font); border: 1px solid var(--border); border-radius: 6px; background: transparent; color: var(--dim); cursor: pointer; transition: all .2s; }
    .settings-tab.active { border-color: var(--accent); color: var(--accent); background: rgba(0,217,255,0.06); }
    .settings-section { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; margin-top: 8px; }
    .settings-input { width: 100%; padding: 8px 12px; font-size: 12px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; }
    .settings-input:focus { border-color: var(--accent); }
    .settings-textarea { width: 100%; padding: 8px 12px; font-size: 11px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; resize: vertical; min-height: 60px; }
    .settings-textarea:focus { border-color: var(--accent); }
    .settings-label { font-size: 11px; color: var(--dim); margin-bottom: 4px; letter-spacing: 1px; }
    .settings-save { padding: 10px 20px; background: var(--accent); color: var(--bg); font-family: var(--font); font-weight: 700; font-size: 12px; letter-spacing: 2px; border: none; border-radius: 6px; cursor: pointer; margin-top: 8px; transition: opacity .2s; }
    .settings-save:hover { opacity: 0.9; }
    .settings-saved-msg { font-size: 11px; color: var(--green); margin-top: 4px; }
    .settings-integration { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 6px; }
    .settings-integration-header { padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; font-size: 12px; font-weight: 600; color: var(--text); background: rgba(255,255,255,0.02); }
    .settings-integration-header:hover { background: rgba(255,255,255,0.04); }
    .settings-integration-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
    .settings-theme-colors { display: flex; gap: 8px; flex-wrap: wrap; }
    .settings-color-swatch { width: 36px; height: 36px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all .2s; }
    .settings-color-swatch.active { border-color: var(--text-bright); transform: scale(1.1); }
    .settings-version { font-size: 11px; color: var(--dim); }
    .settings-update-btn { padding: 8px 16px; font-size: 11px; font-weight: 700; font-family: var(--font); letter-spacing: 1px; border: 1px solid var(--accent); border-radius: 6px; background: transparent; color: var(--accent); cursor: pointer; transition: all .2s; }
    .settings-update-btn:hover { background: rgba(0,217,255,0.1); }
    .settings-changelog { font-size: 11px; color: var(--dim); margin-top: 8px; line-height: 1.5; }
    .update-pill { position: fixed; top: 12px; right: 84px; width: 28px; height: 28px; border-radius: 50%; background: rgba(80,250,123,0.15); border: 1px solid rgba(80,250,123,0.4); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--green); z-index: 60; transition: opacity .2s; }
    .update-pill:hover { opacity: 1; background: rgba(80,250,123,0.25); }
    .update-confirm-overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: center; justify-content: center; background: rgba(6,10,16,0.9); }
    .update-confirm-modal { width: 340px; padding: 24px; background: #0d1520; border: 1px solid var(--border); border-radius: 12px; text-align: center; }
    .update-confirm-title { font-size: 14px; font-weight: 700; color: var(--text-bright); margin-bottom: 6px; }
    .update-confirm-version { font-size: 12px; color: var(--green); margin-bottom: 16px; }
    .update-confirm-btns { display: flex; gap: 8px; justify-content: center; }
    .update-confirm-btn { padding: 8px 20px; font-size: 11px; font-weight: 700; font-family: var(--font); letter-spacing: 1px; border-radius: 6px; cursor: pointer; transition: all .2s; }
    .update-confirm-btn.primary { background: var(--green); color: var(--bg); border: none; }
    .update-confirm-btn.cancel { background: transparent; border: 1px solid var(--border); color: var(--dim); }
    .update-progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; margin-top: 12px; }
    .update-progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .3s; }
    .update-status-text { font-size: 10px; color: var(--dim); margin-top: 6px; }
    #boot-overlay { position: fixed; inset: 0; z-index: 10000; background: var(--bg); display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    #boot-overlay.hidden { opacity: 0; pointer-events: none; }
    #boot-content { text-align: center; }
    #boot-logo { font-size: 48px; font-weight: 700; letter-spacing: 8px; color: var(--accent); text-shadow: 0 0 40px rgba(0,217,255,0.4); margin-bottom: 24px; }
    #boot-lines { font-size: 11px; color: var(--dim); letter-spacing: 2px; text-align: left; display: inline-block; line-height: 2; }
    #boot-cursor { font-size: 14px; color: var(--accent); animation: blink 0.8s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .quit-btn { position: fixed; top: 12px; right: 12px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--dim); background: transparent; border: 1px solid transparent; border-radius: 6px; cursor: pointer; transition: all .2s; z-index: 60; opacity: 0; }
    body:hover .quit-btn { opacity: 1; }
    .quit-btn:hover { color: var(--red); border-color: var(--red); }
    .panel-cog-btn { background: transparent; border: none; color: rgba(255,255,255,0.2); font-size: 11px; cursor: pointer; padding: 0 0 0 4px; line-height: 1; transition: color .2s; vertical-align: middle; }
    .panel-cog-btn:hover { color: var(--accent); }
    .panel-unconfigured { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
    .panel-unconfigured-icon { font-size: 28px; opacity: 0.15; }
    .panel-unconfigured-text { font-size: 11px; color: var(--dim); letter-spacing: 1px; }
    .offline-msg { font-size: 11px; color: var(--dim); font-style: italic; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .page-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); margin-bottom: 6px; cursor: default; }
    .page-row:hover { border-color: rgba(0,217,255,0.3); }
    .page-row.drag-over { border-color: var(--accent); background: rgba(0,217,255,0.06); }
    .page-drag-handle { color: var(--dim); cursor: grab; font-size: 14px; user-select: none; }
    .page-drag-handle:active { cursor: grabbing; }
    .page-name-display { flex: 1; font-size: 12px; color: var(--text); }
    .page-rename-input { flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--accent); color: var(--text-bright); font-size: 12px; font-family: var(--font); outline: none; padding: 0; }
    .page-edit-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 11px; padding: 0 2px; }
    .page-edit-btn:hover { color: var(--accent); }
    .page-panels-info { font-size: 10px; color: var(--dim); margin-top: 2px; }
    .reconfigure-pages { background: transparent; border: 1px solid var(--border); color: var(--dim); border-radius: 6px; padding: 6px 12px; font-size: 11px; font-family: var(--font); cursor: pointer; letter-spacing: 1px; margin-top: 8px; }
    .reconfigure-pages:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>
  <div id="boot-overlay">
    <div id="boot-content">
      <div id="boot-logo">ORBIT</div>
      <pre id="boot-lines"></pre>
      <div id="boot-cursor">_</div>
    </div>
  </div>
  <div id="app"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    const h = React.createElement;
    const { useState, useEffect, useRef, useCallback, useMemo, useContext, createContext } = React;

    // ═══ ERROR BOUNDARY ═══
    class PanelErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(err) { return { hasError: true, error: err }; }
      componentDidCatch(err, info) { console.error('Panel error:', err, info); }
      render() {
        if (this.state.hasError) {
          return h('div', { className: 'panel', style: { justifyContent: 'center', alignItems: 'center' } },
            h('div', { style: { fontSize: '28px', marginBottom: '8px' } }, '⚠️'),
            h('div', { style: { fontSize: '11px', color: 'var(--dim)', textAlign: 'center', padding: '0 12px' } },
              'Panel error — check Settings'),
            h('button', { className: 'settings-save', style: { marginTop: '12px', fontSize: '10px', padding: '4px 10px' },
              onClick: () => this.setState({ hasError: false, error: null }) }, 'Retry')
          );
        }
        return this.props.children;
      }
    }

    // ═══ BOOT ANIMATION ═══
    (function bootAnimation() {
      const lines = ['INITIALISING DISPLAY', 'LOADING INTEGRATIONS', 'CHECKING UPDATES', 'SYSTEM SENSORS OK', 'READY'];
      const el = document.getElementById('boot-lines');
      const overlay = document.getElementById('boot-overlay');
      const MIN_DISPLAY = 3200;
      const startTime = Date.now();
      let i = 0;
      function addLine() {
        if (i < lines.length) {
          el.textContent += (i > 0 ? '\n' : '') + '> ' + lines[i];
          i++;
          setTimeout(addLine, 400 + Math.random() * 300);
        } else {
          const elapsed = Date.now() - startTime;
          const remaining = Math.max(0, MIN_DISPLAY - elapsed);
          setTimeout(() => { overlay.classList.add('hidden'); setTimeout(() => overlay.remove(), 600); }, remaining);
        }
      }
      setTimeout(addLine, 300);
    })();

    // ═══ HELPERS ═══
    function weatherEmoji(code) {
      const c = parseInt(code);
      if (c <= 113) return '☀️'; if (c <= 119) return '⛅'; if (c <= 122) return '☁️';
      if (c <= 143) return '🌫️'; if (c <= 176) return '🌦️'; if (c <= 200) return '⛈️';
      if (c <= 260) return '🌫️'; if (c <= 299) return '🌧️'; if (c <= 399) return '🌧️';
      return '🌦️';
    }
    function getStatColor(pct) { return pct >= 80 ? 'red' : pct >= 60 ? 'amber' : 'green'; }
    function formatBytes(b) { if (b >= 1048576) return (b/1048576).toFixed(1)+' MB/s'; if (b >= 1024) return (b/1024).toFixed(0)+' KB/s'; return Math.round(b)+' B/s'; }
    function formatDuration(s) { if (!s || s < 0) return '0:00'; const hr = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60); if (hr > 0) return hr+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); return m+':'+String(sec).padStart(2,'0'); }
    function haBrightPct(b) { return b != null ? Math.round((b/255)*100) : 0; }
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    // ═══ DEFAULT CONFIG ═══
    const DEFAULT_CONFIG = {
      theme: { accentColor: '#00d9ff', darkMode: true },
      pages: [{ id: 'page1', name: 'Home', panels: [
        {type:'clock',col:1,width:1},{type:'signalrgb',col:2,width:1},{type:'lights',col:3,width:1},
        {type:'nowplaying',col:4,width:1},{type:'system',col:5,width:1},{type:'links',col:6,width:1}
      ]}],
      integrations: {
        weather:{city:'Perth'}, tautulli:{url:'',apiKey:''}, plex:{url:'',token:''},
        homeassistant:{url:'',token:'',lights:[],signalrgbEntity:''},
        sonarr:{url:'',apiKey:''}, radarr:{url:'',apiKey:''}, overseerr:{url:'',apiKey:''},
        nzbget:{url:'',username:'',password:''}, uptimekuma:{url:'',apiKey:''},
        spotify:{clientId:'',clientSecret:''}, jellyfin:{url:'',apiKey:''}
      },
      signalrgbFavorites: [],
      links: [{label:'Dashboard',url:'http://localhost',icon:'🏠'},{label:'GitHub',url:'https://github.com',icon:'💻'},{label:'Google',url:'https://google.com',icon:'🔍'}]
    };

    const SignalRGBContext = createContext({ isOn: false });

    // ═══ OPEN SETTINGS AT SECTION HELPER ═══
    // Used by panel cog buttons to open settings and scroll to a specific integration section
    let _openSettingsRef = null;
    let _switchTabRef = null;
    function openSettingsAt(sectionId) {
      if (_openSettingsRef) _openSettingsRef();
      // Switch to pages tab (where integrations live) then scroll
      if (_switchTabRef) _switchTabRef('pages');
      setTimeout(() => {
        const el = document.getElementById(sectionId);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }

    // ═══ CLOCK PANEL ═══
    function ClockPanel({ config }) {
      const [time, setTime] = useState('');
      const [date, setDate] = useState('');
      const [weather, setWeather] = useState(null);
      useEffect(() => {
        function tick() {
          const now = new Date();
          setTime(String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'));
          setDate(now.toLocaleDateString('en-AU', {weekday:'long',day:'numeric',month:'long',year:'numeric'}));
        }
        tick(); const t = setInterval(tick, 1000); return () => clearInterval(t);
      }, []);
      useEffect(() => {
        const city = config?.integrations?.weather?.city || 'Perth';
        async function fetchWeather() { try { const res = await fetch('https://wttr.in/'+encodeURIComponent(city)+'?format=j1'); setWeather(await res.json()); } catch {} }
        fetchWeather(); const t = setInterval(fetchWeather, 600000); return () => clearInterval(t);
      }, [config?.integrations?.weather?.city]);
      const cur = weather?.current_condition?.[0];
      const forecast = weather?.weather || [];
      return h('div', {className:'panel'},
        h('div', {className:'panel-label'}, 'CLOCK ', h('button', {className:'panel-cog-btn', onClick:()=>openSettingsAt('settings-weather')}, '⚙')),
        h('div', {className:'clock-time'}, time),
        h('div', {className:'clock-date'}, date),
        cur && h(React.Fragment, null,
          h('div', {className:'weather-current'},
            h('span', {className:'weather-icon'}, weatherEmoji(cur.weatherCode)),
            h('span', {className:'weather-temp'}, cur.temp_C + '°')
          ),
          h('div', {className:'weather-desc'}, cur.weatherDesc?.[0]?.value || ''),
          h('div', {className:'weather-extra'},
            h('span', null, 'UV: ', cur.uvIndex || '—'),
            h('span', null, '💧 ', (forecast[0]?.hourly?.[0]?.chanceofrain || '0') + '%')
          ),
          h('div', {className:'weather-summary'}, 'Currently ' + cur.temp_C + '°C and ' + (cur.weatherDesc?.[0]?.value || '').toLowerCase() + '.')
        ),
        forecast.length > 0 && h('div', {className:'weather-strip'},
          forecast.slice(0,7).map((day,i) => {
            const d = new Date(day.date);
            return h('div', {key:i, className:'weather-day'},
              h('span', {className:'weather-day-name'}, i===0?'Today':DAYS[d.getDay()]),
              h('span', {className:'weather-day-icon'}, weatherEmoji(day.hourly?.[4]?.weatherCode||113)),
              h('span', {className:'weather-day-temps'},
                h('span',{className:'weather-hi'}, day.maxtempC+'°'), ' ',
                h('span',{className:'weather-lo'}, day.mintempC+'°')
              )
            );
          })
        )
      );
    }

    // ═══ SIGNALRGB PANEL ═══
    function SignalRGBPanel({ config, onSignalChange }) {
      const [state, setState] = useState(null);
      const [search, setSearch] = useState('');
      const [favorites, setFavorites] = useState(config?.signalrgbFavorites || []);
      // Always use direct SignalRGB API — no HA dependency
      useEffect(() => {
        async function pollDirect() {
          try {
            const r = await window.orbit.fetchSignalRGB();
            if (r && !r.error && r.data) {
              const cur = r.data.currentEffect || r.data.effect;
              const effs = (r.data.effects||[]).map(e => typeof e === 'string' ? e : (e.name||e.id||String(e)));
              setState({ state: r.data.enabled !== false ? 'on' : 'off', attributes: {
                brightness: Math.round((r.data.brightness||100)*2.55), effect: cur?.name||cur||'Unknown', effect_list: effs
              }});
            }
          } catch {}
        }
        pollDirect(); const t = setInterval(pollDirect, 5000); return () => clearInterval(t);
      }, []);
      const isOn = state?.state === 'on';
      const effectName = state?.attributes?.effect || 'No Effect';
      const brightness = haBrightPct(state?.attributes?.brightness);
      const effectList = state?.attributes?.effect_list || [];
      useEffect(() => { if (onSignalChange) onSignalChange(isOn); }, [isOn]);
      const togglePower = async () => { await window.orbit.signalrgbSetEnabled(!isOn); };
      const selectEffect = async (eff) => { await window.orbit.activateEffect(eff); };
      const toggleFav = (eff) => {
        const next = favorites.includes(eff) ? favorites.filter(f=>f!==eff) : [...favorites, eff];
        setFavorites(next);
        if (config) window.orbit.saveConfig({...config, signalrgbFavorites: next});
      };
      const filtered = search.trim() ? effectList.filter(e => e.toLowerCase().includes(search.toLowerCase())) : effectList.slice(0, 50);
      return h('div', {className:'panel'},
        h('div', {className:'panel-label'}, 'SIGNALRGB ', h('button', {className:'panel-cog-btn', onClick:()=>openSettingsAt('settings-signalrgb')}, '⚙')),
        h('div', {className:'effect-name', style:{color:isOn?'var(--accent)':'var(--dim)'}}, effectName),
        h('div', {className:'effect-label'}, isOn?'ACTIVE':'OFF'),
        h('button', {className:'ha-toggle '+(isOn?'on':'off'), onClick:togglePower}, isOn?'ON':'OFF'),
        h('div', {className:'brightness-wrap'},
          h('div', {className:'brightness-bar'}, h('div', {className:'brightness-fill', style:{width:brightness+'%',background:'var(--accent)'}})),
          h('div', {className:'brightness-label'}, brightness+'%')
        ),
        favorites.length > 0 && h('div', {className:'fav-pills'},
          favorites.map(f => h('span', {key:f, className:'fav-pill', onClick:()=>selectEffect(f)}, '⭐ '+f))
        ),
        h('input', {className:'effect-search', type:'text', placeholder:'Search effects...', value:search, onChange:e=>setSearch(e.target.value)}),
        filtered.length > 0
          ? h('div', {className:'effect-list'},
              filtered.map(eff => h('div', {key:eff, className:'effect-option'+(eff===effectName?' active':''), onClick:()=>selectEffect(eff)},
                h('span', {className:'effect-star'+(favorites.includes(eff)?' starred':''), onClick:e=>{e.stopPropagation();toggleFav(eff)}}, '⭐'),
                h('span', null, eff)
              ))
            )
          : effectList.length === 0 && h('div', {style:{fontSize:'10px',color:'var(--dim)',padding:'6px 10px',fontStyle:'italic'}},
              'No effects found — ensure SignalRGB is running'
            )
      );
    }

    // ═══ LIGHTS PANEL ═══
    function LightsPanel({ config }) {
      const { isOn: signalActive } = useContext(SignalRGBContext);
      const [lights, setLights] = useState({});
      const lightEntities = config?.integrations?.homeassistant?.lights || [];
      const haConfigured = config?.integrations?.homeassistant?.url && config?.integrations?.homeassistant?.token;
      useEffect(() => {
        if (!haConfigured || lightEntities.length === 0) return;
        async function poll() {
          const states = {};
          for (const eid of lightEntities) { try { const r = await window.orbit.haGetState(eid); if (!r.error) states[eid] = r; } catch {} }
          setLights(states);
        }
        poll(); const t = setInterval(poll, 15000); return () => clearInterval(t);
      }, [haConfigured, lightEntities.join(',')]);
      const toggleLight = async (eid, on) => { await window.orbit.haCallService('light', on?'turn_off':'turn_on', {entity_id:eid}); };
      const setBrightness = async (eid, pct) => { await window.orbit.haCallService('light', 'turn_on', {entity_id:eid, brightness:Math.round((pct/100)*255)}); };
      if (!haConfigured) return h('div',{className:'panel panel-unconfigured'}, h('div',{className:'panel-label'},'HOME ASSISTANT ', h('button', {className:'panel-cog-btn', onClick:()=>openSettingsAt('settings-ha')}, '⚙')), h('div',{className:'panel-unconfigured-icon'},'💡'), h('div',{className:'panel-unconfigured-text'},'Configure Home Assistant in Settings'));
      return h('div', {className:'panel'},
        h('div', {className:'panel-label'}, 'HOME ASSISTANT ', h('button', {className:'panel-cog-btn', onClick:()=>openSettingsAt('settings-ha')}, '⚙')),
        h('div', {className:'source-badge', style:{marginBottom:'12px'}}, 'HOME ASSISTANT'),
        lightEntities.map(eid => {
          const st = lights[eid]; const isOn = st?.state === 'on'; const bri = haBrightPct(st?.attributes?.brightness);
          const name = st?.attributes?.friendly_name || eid.replace('light.','').replace(/_/g,' ');
          return h('div', {key:eid, className:'light-card', style:signalActive?{opacity:0.7}:{}},
            signalActive && h('div', {className:'light-signalrgb-badge', title:'Controlled by SignalRGB'}, '⚡ SignalRGB active'),
            h('div', {className:'light-header'},
              h('div', {className:'light-dot '+(isOn?'on':'')}),
              h('div', {className:'light-name'}, name),
              h('button', {className:'light-toggle '+(isOn?'on':'off'), onClick:()=>toggleLight(eid,isOn)}, isOn?'ON':'OFF')
            ),
            isOn && h('div', {className:'light-brightness'}, h('input', {type:'range',min:0,max:100,value:bri,onChange:e=>setBrightness(eid,parseInt(e.target.value))}))
          );
        })
      );
    }

    // ═══ NOW PLAYING PANEL ═══
    function NowPlayingPanel({ config }) {
      const [data, setData] = useState(null);
      const [error, setError] = useState(false);
      const tCfg = config?.integrations?.tautulli?.url && config?.integrations?.tautulli?.apiKey;
      useEffect(() => {
        if (!tCfg) return;
        async function poll() { try { const r = await window.orbit.fetchTautulli(); if (r?.error) { setError(true); setData(null); } else { setError(false); setData(r); } } catch { setError(true); } }
        poll(); const t = setInterval(poll, 15000); return () => clearInterval(t);
      }, [tCfg]);
      if (!tCfg) return h('div',{className:'panel panel-unconfigured'}, h('div',{className:'panel-label'},'NOW PLAYING ', h('button', {className:'panel-cog-btn', onClick:()=>openSettingsAt('settings-tautulli')}, '⚙')), h('div',{className:'panel-unconfigured-icon'},'🎬'), h('div',{className:'panel-unconfigured-text'},'Configure Tautulli in Settings'));
      const sessions = data?.response?.data?.sessions || [];
      if (error) return h('div',{className:'panel'}, h('div',{className:'panel-label'},'NOW PLAYING ', h('button', {className:'panel-cog-btn', onClick:()=>openSettingsAt('settings-tautulli')}, '⚙')), h('div',{className:'np-offline pulse'},'TAUTULLI OFFLINE'));
      if (!sessions.length) return h('div',{className:'panel'}, h('div',{className:'panel-label'},'NOW PLAYING ', h('button', {className:'panel-cog-btn', onClick:()=>openSettingsAt('settings-tautulli')}, '⚙')), h('div',{className:'source-badge',style:{marginBottom:'12px'}},'PLEX · TAUTULLI'), h('div',{className:'np-empty'}, h('div',{className:'np-empty-icon'},'🎬'), h('div',{className:'np-empty-text'},'NO ACTIVE STREAMS')));
      return h('div', {className:'panel'},
        h('div', {className:'panel-label'}, 'NOW PLAYING ', h('button', {className:'panel-cog-btn', onClick:()=>openSettingsAt('settings-tautulli')}, '⚙')),
        h('div', {className:'source-badge', style:{marginBottom:'8px'}}, 'PLEX · TAUTULLI'),
        h('div', {className:'np-streams-count'}, sessions.length + ' STREAM' + (sessions.length>1?'S':'')),
        h('div', {className:'np-session-list'},
          sessions.map((s,i) => {
            const title = s.title||s.full_title||'Unknown';
            const sub = s.grandparent_title ? s.grandparent_title+' · S'+s.parent_media_index+'E'+s.media_index : (s.year?String(s.year):'');
            const isTrans = s.transcode_decision === 'transcode';
            const prog = s.progress_percent||0;
            const rem = s.duration && s.view_offset ? Math.max(0,(parseInt(s.duration)-parseInt(s.view_offset))/1000) : 0;
            return h('div', {key:i, className:'np-session'},
              h('div', {className:'np-title'}, title),
              sub && h('div', {className:'np-subtitle'}, sub),
              h('div', {className:'np-progress-wrap'}, h('div', {className:'np-progress-bar'}, h('div', {className:'np-progress-fill', style:{width:prog+'%'}}))),
              h('div', {className:'np-time'}, formatDuration(rem)+' remaining'),
              h('span', {className:'np-badge '+(isTrans?'np-badge-transcode':'np-badge-direct')}, isTrans?'🔄 TRANSCODE':'▶ DIRECT'),
              h('div', {className:'np-meta'}, (s.friendly_name||s.user||'')+(s.stream_video_resolution?' · '+s.stream_video_resolution:'')+(s.player?' · '+s.player:''))
            );
          })
        )
      );
    }

    // ═══ SYSTEM PANEL ═══
    function SystemPanel({ config }) {
      const [fast, setFast] = useState(null);
      const [slow, setSlow] = useState(null);
      const [showPicker, setShowPicker] = useState(false);
      const [cpuSensorIdx, setCpuSensorIdx] = useState(0);
      const [gpuIdx, setGpuIdx] = useState(0);
      const [showDisk, setShowDisk] = useState(false);
      useEffect(() => {
        async function pollFast() { try { const r = await window.orbit.getSysinfoFast(); if (!r.error) setFast(r); } catch {} }
        pollFast(); const t = setInterval(pollFast, 3000); return () => clearInterval(t);
      }, []);
      useEffect(() => {
        async function pollSlow() { try { const r = await window.orbit.getSysinfoSlow({cpuSensorIndex:cpuSensorIdx,gpuControllerIndex:gpuIdx,showDisk}); if (!r.error) setSlow(r); } catch {} }
        pollSlow(); const t = setInterval(pollSlow, 10000); return () => clearInterval(t);
      }, [cpuSensorIdx, gpuIdx, showDisk]);
      const cpuUsage = fast?.cpu?.usage ?? 0;
      const cpuBrand = slow?.cpu?.brand || 'CPU';
      const cpuTemp = slow?.cpu?.temp;
      const gpuUsage = slow?.gpu?.usage ?? 0;
      const gpuModel = slow?.gpu?.model || 'GPU';
      const gpuTemp = slow?.gpu?.temp;
      const ramUsage = fast?.ram?.usage ?? 0;
      const ramUsed = fast?.ram?.usedGB || '0';
      const ramTotal = fast?.ram?.totalGB || '0';
      const txSec = fast?.net?.txSec || 0;
      const rxSec = fast?.net?.rxSec || 0;
      const cpuSensors = slow?.cpu?.sensors || [];
      const gpuList = slow?.gpu?.list || [];
      const diskUsage = slow?.disk?.usage;
      function sysRow(label, info, usage) {
        const c = getStatColor(usage);
        return h('div', {className:'sys-row'},
          h('div', {className:'sys-label'}, label),
          h('div', {className:'sys-bar-wrap'},
            h('div', {className:'sys-info'}, info),
            h('div', {className:'sys-bar'}, h('div', {className:'sys-bar-fill sys-b-'+c, style:{width:usage+'%'}}))
          ),
          h('div', {className:'sys-value sys-c-'+c}, usage+'%')
        );
      }
      return h('div', {className:'panel'},
        h('div', {className:'panel-label'}, h('span',null,'SYSTEM '), h('button', {className:'sys-gear-btn', onClick:()=>setShowPicker(!showPicker)}, '⚙')),
        showPicker && h('div', {className:'sys-picker-panel'},
          cpuSensors.length > 0 && h('div', {className:'sys-picker-row'},
            h('span', {className:'sys-picker-label'}, 'CPU Sensor'),
            h('select', {className:'sys-picker-select', value:cpuSensorIdx, onChange:e=>setCpuSensorIdx(parseInt(e.target.value))},
              cpuSensors.map((s,i) => h('option', {key:i, value:i}, s.name + (s.value != null ? ' ('+s.value+'°C)' : '')))
            )
          ),
          gpuList.length > 0 && h('div', {className:'sys-picker-row'},
            h('span', {className:'sys-picker-label'}, 'GPU'),
            h('select', {className:'sys-picker-select', value:gpuIdx, onChange:e=>setGpuIdx(parseInt(e.target.value))},

          try {
            // Auto-refresh token if expired
            let token = sCfg.accessToken;
            if (sCfg.tokenExpiry && Date.now() > sCfg.tokenExpiry - 60000) {
              const r = await window.orbit.spotifyRefreshToken();
              if (r.accessToken) token = r.accessToken;
            }
            const r = await window.orbit.apiGet('https://api.spotify.com/v1/me/player/currently-playing', { Authorization: 'Bearer ' + token });
            if (r && r.item) setPlayback(r);

          } catch {}

    // ═══ PAGES TAB (Settings) ═══
    function PagesTab({ cfg, setCfg }) {
      const [editingIndex, setEditingIndex] = useState(-1);
      const [editingValue, setEditingValue] = useState('');
      const [dragOverIndex, setDragOverIndex] = useState(-1);

      function startEdit(i, name) {
        setEditingIndex(i);
        setEditingValue(name || 'Page '+(i+1));
      }
      function saveName(i) {
        if (editingValue.trim()) {
          cfg.pages[i].name = editingValue.trim();
          setCfg({...cfg});
        }
        setEditingIndex(-1);
        setEditingValue('');
      }
      function cancelEdit() {
        setEditingIndex(-1);
        setEditingValue('');
      }

      return h('div', null,
        h('div', {className:'settings-section'}, 'PAGES'),
        (cfg.pages||[]).map(function(page, i) {
          return h('div', {
            key: page.id || i,
            className: 'page-row' + (dragOverIndex === i ? ' drag-over' : ''),
            draggable: true,
            onDragStart: function(e) {
              e.dataTransfer.setData('text/plain', String(i));
              e.dataTransfer.effectAllowed = 'move';
            },
            onDragOver: function(e) {
              e.preventDefault();
              e.dataTransfer.dropEffect = 'move';
              setDragOverIndex(i);
            },
            onDragLeave: function() {
              setDragOverIndex(-1);
            },
            onDrop: function(e) {
              e.preventDefault();
              setDragOverIndex(-1);
              var from = Number(e.dataTransfer.getData('text/plain'));
              var to = i;
              if (from === to || isNaN(from)) return;
              var pages = cfg.pages.slice();
              var moved = pages.splice(from, 1)[0];
              pages.splice(to, 0, moved);
              cfg.pages = pages;
              setCfg({...cfg});
            },
            onDragEnd: function() {
              setDragOverIndex(-1);
            }
          },
            h('span', {className:'page-drag-handle'}, '⠿'),
            editingIndex === i
              ? h('input', {
                  className: 'page-rename-input',
                  value: editingValue,
                  autoFocus: true,
                  onChange: function(e) { setEditingValue(e.target.value); },
                  onBlur: function() { saveName(i); },
                  onKeyDown: function(e) {
                    if (e.key === 'Enter') saveName(i);
                    if (e.key === 'Escape') cancelEdit();
                  }
                })
              : h('div', {style:{flex:1}},
                  h('span', {className:'page-name-display'}, page.name || 'Page '+(i+1)),
                  h('div', {className:'page-panels-info'}, (page.panels||[]).map(function(p){return p.type;}).join(', '))
                ),
            h('button', {className:'page-edit-btn', onClick: function() { startEdit(i, page.name); }}, '✏')
          );
        }),
        h('button', {
          className: 'reconfigure-pages',
          onClick: function() {
            if (window.orbit && typeof window.orbit.openSetup === 'function') {
              window.orbit.openSetup();
            }
          }
        }, '↺ Reconfigure Pages')
      );
    }

                  }}),

                    const l=[...(cfg.links||[])]; l[i]={...l[i],url:e.target.value}; setCfg(c=>({...c,links:l}));
                  }}),
                  h('button', {className:'page-delete-btn', onClick:()=>{
                    const l=(cfg.links||[]).filter((_,idx)=>idx!==i); setCfg(c=>({...c,links:l}));
                  }}, '✕')
                )
              ),
              h('button', {className:'settings-save', style:{background:'transparent',border:'1px solid var(--accent)',color:'var(--accent)',marginBottom:'8px'}, onClick:()=>{
                const l=[...(cfg.links||[]),{icon:'🔗',label:'New Link',url:'https://'}]; setCfg(c=>({...c,links:l}));
              }}, '+ ADD LINK')
            ),
            h('button', {className:'settings-save', onClick:save}, 'SAVE'),
            saved && h('div', {className:'settings-saved-msg'}, '✓ Saved')
          )), // close integrations-anchor + pages tab wrapper

          // ── THEME TAB ──
          tab === 'theme' && h('div', null,
            h('div', {className:'settings-section'}, 'THEME'),
            h('div', {className:'settings-label'}, 'PRIMARY COLOR'),
            h('div', {className:'settings-theme-colors'},
              THEME_COLORS.map(tc => h('div', {key:tc.color, className:'settings-color-swatch'+(cfg.theme?.accentColor===tc.color?' active':''), style:{background:tc.color}, onClick:()=>setAccent(tc.color), title:tc.name}))
            ),
            h('div', {style:{marginTop:'16px'}},
              h('div', {className:'settings-label'}, 'DARK MODE'),
              h('div', {style:{fontSize:'11px',color:'var(--dim)'}}, 'Always dark (more themes coming soon)')
            ),
            h('button', {className:'settings-save', onClick:save}, 'SAVE'),
            saved && h('div', {className:'settings-saved-msg'}, '✓ Saved')
          ),

          // ── ABOUT TAB ──
          tab === 'about' && h('div', null,
            h('div', {className:'settings-section'}, 'ABOUT'),
            h('div', {className:'settings-version'}, 'Orbit v0.0.1'),
            h('button', {className:'settings-update-btn', style:{marginTop:'12px'}, onClick:()=>window.orbit.checkUpdate()}, 'Check for Updates'),
            h('div', {className:'settings-changelog'}, 'v0.0.1 — Initial release\n• Multi-page panel system\n• 10 panel types\n• Settings overlay\n• Theme support\n• Auto-updates')
          )
        )
      );
    }

    // ═══ UPDATE PILL ═══
    function UpdatePill() {
      const [update, setUpdate] = useState(null);
      const [showConfirm, setShowConfirm] = useState(false);
      const [downloading, setDownloading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [downloaded, setDownloaded] = useState(false);
      useEffect(() => {
        window.orbit.getPendingUpdate().then(u => { if (u) setUpdate(u); });
        window.orbit.onUpdateAvailable(info => setUpdate(info));
        window.orbit.onUpdateProgress(pct => { setDownloading(true); setProgress(pct); });
        window.orbit.onUpdateDownloaded(() => { setDownloading(false); setDownloaded(true); });
        window.orbit.onUpdateError(() => { setDownloading(false); });
      }, []);
      if (!update && !downloaded) return null;
      if (downloaded) {
        return h('div', {className:'update-pill', onClick:()=>window.orbit.installUpdate(), title:'Restart to update', style:{background:'rgba(80,250,123,0.25)',borderColor:'rgba(80,250,123,0.6)'}}, '⟳');
      }
      return h(React.Fragment, null,
        h('div', {className:'update-pill', onClick:()=>setShowConfirm(true), title:'Update available'}, '↓'),
        showConfirm && h('div', {className:'update-confirm-overlay', onClick:e=>{if(e.target===e.currentTarget&&!downloading)setShowConfirm(false)}},
          h('div', {className:'update-confirm-modal'},
            h('div', {className:'update-confirm-title'}, 'Update Available'),
            h('div', {className:'update-confirm-version'}, 'v'+(update?.version||'?')),
            downloading ? h(React.Fragment, null,
              h('div', {className:'update-progress-bar'}, h('div', {className:'update-progress-fill', style:{width:progress+'%'}})),
              h('div', {className:'update-status-text'}, 'Downloading... '+progress+'%')
            ) : h('div', {className:'update-confirm-btns'},
              h('button', {className:'update-confirm-btn primary', onClick:()=>{setDownloading(true);window.orbit.downloadUpdate();}}, 'Download'),
              h('button', {className:'update-confirm-btn cancel', onClick:()=>setShowConfirm(false)}, 'Later')
            )
          )
        )
      );
    }

    // ═══ INDIVIDUAL MEDIA PANELS ═══
    function SonarrPanel({ config, openSettings }) {
      const sCfg = config?.integrations?.sonarr;
      const configured = sCfg?.url && sCfg?.apiKey;
      const [queue, setQueue] = useState(null);
      const [missing, setMissing] = useState(null);
      useEffect(() => {
        if (!configured) return;
        async function poll() {
          try {
            const [q, m] = await Promise.all([
              window.orbit.apiGet(sCfg.url+'/api/v3/queue', {'X-Api-Key':sCfg.apiKey}),
              window.orbit.apiGet(sCfg.url+'/api/v3/wanted/missing?pageSize=1', {'X-Api-Key':sCfg.apiKey})
            ]);
            if (!q?.error) setQueue(q);
            if (!m?.error) setMissing(m?.totalRecords ?? m?.total ?? 0);
          } catch {}
        }
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [sCfg?.url, sCfg?.apiKey]);
      if (!configured) return h('div',{className:'panel panel-unconfigured'}, h('div',{className:'panel-label'},'SONARR ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-sonarr')},'⚙')), h('div',{className:'panel-unconfigured-icon'},'📺'), h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));
      return h('div',{className:'panel'},
        h('div',{className:'panel-label'},'SONARR ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-sonarr')},'⚙')),
        h('div',{className:'media-stat'}, h('span',{className:'media-stat-label'},'Queue: '), queue?.totalRecords ?? queue?.records?.length ?? '...'),
        h('div',{className:'media-stat'}, h('span',{className:'media-stat-label'},'Missing: '), missing != null ? missing : '...')
      );
    }

    function RadarrPanel({ config, openSettings }) {
      const rCfg = config?.integrations?.radarr;
      const configured = rCfg?.url && rCfg?.apiKey;
      const [queue, setQueue] = useState(null);
      const [missing, setMissing] = useState(null);
      useEffect(() => {
        if (!configured) return;
        async function poll() {
          try {
            const [q, m] = await Promise.all([
              window.orbit.apiGet(rCfg.url+'/api/v3/queue', {'X-Api-Key':rCfg.apiKey}),
              window.orbit.apiGet(rCfg.url+'/api/v3/wanted/missing?pageSize=1', {'X-Api-Key':rCfg.apiKey})
            ]);
            if (!q?.error) setQueue(q);
            if (!m?.error) setMissing(m?.totalRecords ?? m?.total ?? 0);
          } catch {}
        }
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [rCfg?.url, rCfg?.apiKey]);
      if (!configured) return h('div',{className:'panel panel-unconfigured'}, h('div',{className:'panel-label'},'RADARR ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-radarr')},'⚙')), h('div',{className:'panel-unconfigured-icon'},'🎬'), h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));
      return h('div',{className:'panel'},
        h('div',{className:'panel-label'},'RADARR ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-radarr')},'⚙')),
        h('div',{className:'media-stat'}, h('span',{className:'media-stat-label'},'Queue: '), queue?.totalRecords ?? queue?.records?.length ?? '...'),
        h('div',{className:'media-stat'}, h('span',{className:'media-stat-label'},'Missing: '), missing != null ? missing : '...')
      );
    }

    function OverseerrPanel({ config, openSettings }) {
      const oCfg = config?.integrations?.overseerr;
      const configured = oCfg?.url && oCfg?.apiKey;
      const [data, setData] = useState(null);
      useEffect(() => {
        if (!configured) return;
        async function poll() {
          try {
            const r = await window.orbit.apiGet(oCfg.url+'/api/v1/request?take=100&skip=0&sort=added', {'X-Api-Key':oCfg.apiKey});
            if (!r?.error) setData(r);
          } catch {}
        }
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [oCfg?.url, oCfg?.apiKey]);
      if (!configured) return h('div',{className:'panel panel-unconfigured'}, h('div',{className:'panel-label'},'OVERSEERR ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-overseerr')},'⚙')), h('div',{className:'panel-unconfigured-icon'},'🎭'), h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));
      return h('div',{className:'panel'},
        h('div',{className:'panel-label'},'OVERSEERR ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-overseerr')},'⚙')),
        h('div',{className:'media-stat'}, h('span',{className:'media-stat-label'},'Pending: '), data?.results?.filter(r=>r.status===1).length ?? '...'),
        h('div',{className:'media-stat'}, h('span',{className:'media-stat-label'},'Approved: '), data?.results?.filter(r=>r.status===2).length ?? '...')
      );
    }

    function NZBGetPanel({ config, openSettings }) {
      const nCfg = config?.integrations?.nzbget;
      const configured = nCfg?.url && nCfg?.username;
      const [status, setStatus] = useState(null);
      const [queueData, setQueueData] = useState(null);
      useEffect(() => {
        if (!configured) return;
        async function poll() {
          try {
            const auth = btoa(nCfg.username+':'+(nCfg.password||''));
            const [s, q] = await Promise.all([
              window.orbit.apiPost(nCfg.url+'/jsonrpc', JSON.stringify([{method:'status',id:1}]), {Authorization:'Basic '+auth}),
              window.orbit.apiPost(nCfg.url+'/jsonrpc', JSON.stringify([{method:'listgroups',id:2}]), {Authorization:'Basic '+auth})
            ]);
            if (!s?.error) setStatus(s);
            if (!q?.error) setQueueData(q);
          } catch {}
        }
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [nCfg?.url, nCfg?.username]);
      if (!configured) return h('div',{className:'panel panel-unconfigured'}, h('div',{className:'panel-label'},'NZBGET ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-nzbget')},'⚙')), h('div',{className:'panel-unconfigured-icon'},'⬇'), h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));
      return h('div',{className:'panel'},
        h('div',{className:'panel-label'},'NZBGET ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-nzbget')},'⚙')),
        status ? h('div', null,
          h('div',{className:'media-stat'}, '↓ ', ((status[0]?.result?.DownloadRate||0)/1024/1024).toFixed(1), ' MB/s'),
          h('div',{className:'media-stat'}, h('span',{className:'media-stat-label'},'Queue: '), Array.isArray(queueData?.[0]?.result) ? queueData[0].result.length : 0)
        ) : h('div',{className:'media-stat'},'...')
      );
    }

    // ═══ PANEL RENDERER ═══
    function wrap(key, child) {
      return h(PanelErrorBoundary, { key }, child);
    }
    function renderPanel(panelCfg, config, openSettings) {
      const type = panelCfg.type;
      const key = type + '-' + (panelCfg.col || 0);
      switch (type) {
        case 'clock': return wrap(key, h(ClockPanel, {key, config}));
        case 'signalrgb': return null; // Rendered specially in App for context
        case 'lights': return wrap(key, h(LightsPanel, {key, config}));
        case 'nowplaying': return wrap(key, h(NowPlayingPanel, {key, config}));
        case 'system': return wrap(key, h(SystemPanel, {key, config}));
        case 'media': return wrap(key, h(MediaPanel, {key, config, openSettings}));
        case 'sonarr': return wrap(key, h(SonarrPanel, {key, config, openSettings}));
        case 'radarr': return wrap(key, h(RadarrPanel, {key, config, openSettings}));
        case 'overseerr': return wrap(key, h(OverseerrPanel, {key, config, openSettings}));
        case 'nzbget': return wrap(key, h(NZBGetPanel, {key, config, openSettings}));
        case 'uptimekuma': return wrap(key, h(UptimeKumaPanel, {key, config, openSettings}));
        case 'spotify': return wrap(key, h(SpotifyPanel, {key, config, openSettings}));
        case 'links': return wrap(key, h(LinksPanel, {key, config}));
        case 'jellyfin': return wrap(key, h(JellyfinPanel, {key, config, openSettings}));
        default: return wrap(key, h('div', {key, className:'panel panel-unconfigured'}, h('div',{className:'panel-unconfigured-icon'},'📦'), h('div',{className:'panel-unconfigured-text'}, type)));
      }
    }

    // ═══ MAIN APP ═══
    function App() {
      const [config, setConfig] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [showSettings, setShowSettings] = useState(false);
      const [showLeftArrow, setShowLeftArrow] = useState(false);
      const [showRightArrow, setShowRightArrow] = useState(false);
      const [signalIsOn, setSignalIsOn] = useState(false);
      const touchRef = useRef(null);

      // Load config
      useEffect(() => {
        window.orbit.loadConfig().then(cfg => {
          if (cfg) {
            setConfig(cfg);
            if (cfg.theme?.accentColor) document.documentElement.style.setProperty('--accent', cfg.theme.accentColor);
          } else {
            setConfig(DEFAULT_CONFIG);
          }
        });
      }, []);

      const pages = config?.pages || DEFAULT_CONFIG.pages;
      const page = pages[currentPage] || pages[0];
      const panels = page?.panels || [];

      // Keyboard nav
      useEffect(() => {
        function onKey(e) {
          if (e.key === 'ArrowLeft' && currentPage > 0) setCurrentPage(p => p - 1);
          if (e.key === 'ArrowRight' && currentPage < pages.length - 1) setCurrentPage(p => p + 1);
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [currentPage, pages.length]);

      // Mouse hover zones for arrows
      useEffect(() => {
        function onMove(e) {
          setShowLeftArrow(e.clientX < 80 && currentPage > 0);
          setShowRightArrow(e.clientX > window.innerWidth - 80 && currentPage < pages.length - 1);
        }
        function onLeave() { setShowLeftArrow(false); setShowRightArrow(false); }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseleave', onLeave);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseleave', onLeave); };
      }, [currentPage, pages.length]);

      // Touch/swipe
      useEffect(() => {
        function onStart(e) { touchRef.current = e.touches?.[0]?.clientX ?? e.clientX; }
        function onEnd(e) {
          if (touchRef.current == null) return;
          const end = e.changedTouches?.[0]?.clientX ?? e.clientX;
          const delta = end - touchRef.current;
          if (Math.abs(delta) > 50) {
            if (delta > 0 && currentPage > 0) setCurrentPage(p => p - 1);
            if (delta < 0 && currentPage < pages.length - 1) setCurrentPage(p => p + 1);
          }
          touchRef.current = null;
        }
        window.addEventListener('touchstart', onStart);
        window.addEventListener('touchend', onEnd);
        return () => { window.removeEventListener('touchstart', onStart); window.removeEventListener('touchend', onEnd); };
      }, [currentPage, pages.length]);

      if (!config) return null;

      const openSettings = () => setShowSettings(true);
      _openSettingsRef = openSettings;

      // Fill panels to 6 columns
      const renderedPanels = [];
      for (let col = 1; col <= 6; col++) {
        const panelCfg = panels.find(p => p.col === col);
        if (panelCfg) {
          if (panelCfg.type === 'signalrgb') {
            renderedPanels.push(h(SignalRGBPanel, {key:'signalrgb-'+col, config, onSignalChange: setSignalIsOn}));
          } else {
            renderedPanels.push(renderPanel(panelCfg, config, openSettings));
          }
        } else {
          renderedPanels.push(h('div', {key:'empty-'+col, className:'panel'}, h('div',{style:{fontSize:'28px',opacity:0.08}},'+')));
        }
      }

      return h(SignalRGBContext.Provider, {value: {isOn: signalIsOn}},
        h('div', {id:'app'}, ...renderedPanels),

        // Navigation arrows
        pages.length > 1 && h('div', {className:'nav-arrow left'+(showLeftArrow?' visible':''), onClick:()=>setCurrentPage(p=>p-1)}, '‹'),
        pages.length > 1 && h('div', {className:'nav-arrow right'+(showRightArrow?' visible':''), onClick:()=>setCurrentPage(p=>p+1)}, '›'),

        // Page dots
        pages.length > 1 && h('div', {className:'page-dots'},
          h('div', {className:'page-dots-row'},
            pages.map((_,i) => h('div', {key:i, className:'page-dot'+(i===currentPage?' active':''), onClick:()=>setCurrentPage(i)}))
          ),
          h('div', {className:'page-name-label'}, page?.name || '')
        ),

        // Settings gear
        h('button', {className:'settings-gear', onClick:openSettings}, '⚙'),

        // Quit button
        h('div', {className:'quit-btn', onClick:()=>window.close()}, '✕'),

        // Update pill
        h(UpdatePill, null),

        // Settings overlay
        showSettings && h(SettingsOverlay, {config, onClose:()=>setShowSettings(false), onSave:c=>{setConfig(c); if(c.theme?.accentColor) document.documentElement.style.setProperty('--accent',c.theme.accentColor);}})
      );
    }

    // ═══ RENDER ═══
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(h(App, null));
  </script>
</body>
</html>
