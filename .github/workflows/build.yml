name: Build Orbit

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean dist folder
        run: Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue; New-Item -ItemType Directory -Force dist | Out-Null
        shell: pwsh

      - name: Build NSIS installer (${{ matrix.arch }})
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename ARM64 installer to include arch suffix
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $srcName = "OrbitSetup-$version.exe"
          $dstName = "OrbitSetup-$version-arm64.exe"
          Rename-Item "dist\$srcName" $dstName
          Write-Host "Renamed $srcName -> $dstName"

      - name: Generate latest.yml (x64) or latest-arm64.yml (arm64)
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffZ")
          if ("${{ matrix.arch }}" -eq "x64") {
            $exe = Get-ChildItem dist\OrbitSetup-*.exe | Where-Object { $_.Name -notlike '*arm64*' } | Select-Object -First 1
            $outFile = "dist\latest.yml"
          } else {
            $exe = Get-ChildItem dist\OrbitSetup-*-arm64.exe | Select-Object -First 1
            $outFile = "dist\latest-arm64.yml"
          }
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA512).Hash.ToLower()
          $size = $exe.Length
          $name = $exe.Name
          @"
          version: $version
          files:
            - url: $name
              sha512: $hash
              size: $size
          path: $name
          sha512: $hash
          releaseDate: '$date'
          "@ | Set-Content $outFile
          Write-Host "Generated $outFile for $name"

      - name: List build output
        run: ls dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrbitSetup-windows-${{ matrix.arch }}
          path: dist/OrbitSetup-*.exe

      - name: Delete stale assets from release before uploading
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $headers = @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"; "X-GitHub-Api-Version" = "2022-11-28" }
          $rel = Invoke-RestMethod "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tag" -Headers $headers -ErrorAction SilentlyContinue
          if ($rel) {
            foreach ($asset in $rel.assets) {
              if ($asset.name -notmatch "^(latest|OrbitSetup-$($tag.TrimStart('v')))") {
                Write-Host "Deleting stale asset: $($asset.name)"
                Invoke-RestMethod -Method DELETE "https://api.github.com/repos/${{ github.repository }}/releases/assets/$($asset.id)" -Headers $headers | Out-Null
              }
            }
          }

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/OrbitSetup-*.exe
            dist/latest*.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean dist folder
        run: rm -rf dist && mkdir dist

      - name: Build macOS DMG
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        run: ls dist/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrbitSetup-mac
          path: dist/*.dmg

      - name: Delete stale DMG assets from release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          HEADERS=(-H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "X-GitHub-Api-Version: 2022-11-28")
          REL=$(curl -s "${HEADERS[@]}" "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          echo "$REL" | python3 -c "
          import json,sys,urllib.request
          rel=json.load(sys.stdin)
          for a in rel.get('assets',[]):
              if a['name'].endswith('.dmg') and not a['name'].startswith('OrbitSetup-$VERSION'):
                  req=urllib.request.Request(f'https://api.github.com/repos/${{ github.repository }}/releases/assets/{a[\"id\"]}',method='DELETE',headers={'Authorization':'Bearer ${{ secrets.GITHUB_TOKEN }}'})
                  urllib.request.urlopen(req)
                  print('Deleted',a['name'])
          " || true

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clean dist folder
        run: rm -rf dist && mkdir dist

      - name: Build Linux AppImage and deb
        run: npx electron-builder --linux AppImage deb --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        run: ls dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrbitSetup-linux
          path: |
            dist/*.AppImage
            dist/*.deb

      - name: Delete stale Linux assets from release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REL=$(curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG")
          echo "$REL" | python3 -c "
          import json,sys,urllib.request
          rel=json.load(sys.stdin)
          for a in rel.get('assets',[]):
              if (a['name'].endswith('.AppImage') or a['name'].endswith('.deb')) and not a['name'].startswith('OrbitSetup-$VERSION'):
                  req=urllib.request.Request(f'https://api.github.com/repos/${{ github.repository }}/releases/assets/{a[\"id\"]}',method='DELETE',headers={'Authorization':'Bearer ${{ secrets.GITHUB_TOKEN }}'})
                  urllib.request.urlopen(req)
                  print('Deleted',a['name'])
          " || true

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
