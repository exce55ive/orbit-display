<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orbit Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08);
      --accent: #00d9ff; --green: #50fa7b; --amber: #ffc857; --red: #ff5555;
      --dim: rgba(255,255,255,0.35); --text: #c8d6e5; --text-bright: #e8f0f8;
      --font: 'JetBrains Mono', monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
    body { padding: 32px 40px; overflow-y: auto; }
    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 36px; font-weight: 700; color: var(--accent); letter-spacing: 6px; margin-bottom: 6px; text-shadow: 0 0 30px rgba(0,217,255,0.3); }
    .header p { font-size: 12px; color: var(--dim); letter-spacing: 2px; }

    .progress { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 36px; }
    .step-item { display: flex; align-items: center; gap: 8px; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dim); transition: all .3s; }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .step-dot.done { background: var(--green); }
    .step-label { font-size: 11px; letter-spacing: 1.5px; color: var(--dim); text-transform: uppercase; transition: color .3s; }
    .step-label.active { color: var(--accent); }
    .step-label.done { color: var(--green); }
    .step-arrow { color: var(--dim); font-size: 12px; }

    .step { display: none; animation: fadeIn .3s ease; }
    .step.visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .welcome-content { text-align: center; max-width: 520px; margin: 0 auto; padding: 40px 0; }
    .welcome-logo { font-size: 72px; font-weight: 700; color: var(--accent); letter-spacing: 12px; text-shadow: 0 0 60px rgba(0,217,255,0.4); margin-bottom: 24px; }
    .welcome-title { font-size: 20px; font-weight: 600; color: var(--text-bright); margin-bottom: 12px; }
    .welcome-desc { font-size: 13px; color: var(--dim); line-height: 1.8; margin-bottom: 32px; }

    .field-group { margin-bottom: 20px; }
    .field-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
    .field-input { width: 100%; padding: 10px 14px; font-size: 13px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
    .field-input:focus { border-color: var(--accent); }
    .field-hint { font-size: 10px; color: var(--dim); margin-top: 4px; }

    .integration-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
    .integration-title { font-size: 13px; font-weight: 700; color: var(--text-bright); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .integration-title .emoji { font-size: 18px; }

    .complete-content { text-align: center; max-width: 520px; margin: 0 auto; padding: 40px 0; }
    .complete-icon { font-size: 64px; margin-bottom: 16px; }
    .complete-title { font-size: 22px; font-weight: 700; color: var(--green); margin-bottom: 12px; }
    .complete-desc { font-size: 13px; color: var(--dim); line-height: 1.8; margin-bottom: 32px; }

    .btn { padding: 12px 32px; font-size: 13px; font-weight: 700; font-family: var(--font); letter-spacing: 2px; border-radius: 8px; cursor: pointer; transition: all .2s; }
    .btn-primary { background: var(--accent); color: var(--bg); border: none; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: transparent; color: var(--dim); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-success { background: var(--green); color: var(--bg); border: none; }
    .btn-success:hover { opacity: 0.9; }

    .btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

    /* Pages Builder */
    .pages-builder { display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
    .page-list-col { display: flex; flex-direction: column; gap: 6px; }
    .page-list-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
    .page-item { display: flex; align-items: center; gap: 8px; font-family: var(--font); font-size: 13px; padding: 10px 14px; border-radius: 6px; cursor: pointer; background: transparent; border: 1px solid transparent; color: var(--text); transition: all .2s; position: relative; }
    .page-item:hover { background: rgba(255,255,255,0.03); }
    .page-item.selected { background: rgba(0,217,255,0.08); border: 1px solid rgba(0,217,255,0.3); color: var(--accent); }
    .page-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .page-item-name-input { flex: 1; font-family: var(--font); font-size: 13px; background: rgba(255,255,255,0.06); border: 1px solid var(--accent); border-radius: 4px; color: var(--text-bright); padding: 2px 6px; outline: none; }
    .page-item-delete { font-size: 14px; color: var(--dim); cursor: pointer; opacity: 0; transition: opacity .2s; padding: 0 4px; }
    .page-item:hover .page-item-delete { opacity: 1; }
    .page-item-delete:hover { color: var(--red); }
    .page-add-btn { font-family: var(--font); font-size: 12px; color: var(--dim); background: transparent; border: 1px dashed var(--border); border-radius: 6px; padding: 8px 14px; cursor: pointer; transition: all .2s; margin-top: 4px; }
    .page-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    .panels-col { display: flex; flex-direction: column; gap: 16px; }
    .panels-title { font-size: 13px; font-weight: 600; color: var(--text-bright); }
    .panels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .panel-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .2s; user-select: none; }
    .panel-card:hover { border-color: rgba(255,255,255,0.15); }
    .panel-card.selected { border-color: var(--accent); background: rgba(0,217,255,0.06); }
    .panel-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .panel-card-icon { font-size: 18px; flex-shrink: 0; }
    .panel-card-name { font-size: 12px; color: var(--text); }
    .panel-card.selected .panel-card-name { color: var(--accent); }
    .panel-card-check { margin-left: auto; font-size: 14px; color: var(--accent); opacity: 0; transition: opacity .2s; }
    .panel-card.selected .panel-card-check { opacity: 1; }
    .max-hint { font-size: 11px; color: var(--amber); margin-top: 4px; }

    .selected-panels-order { margin-top: 8px; }
    .selected-panels-order-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
    .selected-panel-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); padding: 6px 10px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 4px; }
    .selected-panel-num { color: var(--accent); font-weight: 700; font-size: 11px; min-width: 18px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ORBIT</h1>
    <p>SETUP WIZARD</p>
  </div>

  <div class="progress" id="progress"></div>
  <div id="step-container"></div>

  <script>
    const STEPS = [
      { id: 'welcome', label: 'Welcome' },
      { id: 'integrations', label: 'Integrations' },
      { id: 'pages', label: 'Pages' },
      { id: 'complete', label: 'Complete' }
    ];
    let currentStep = 0;
    let config = {
      theme: { accentColor: '#00d9ff', darkMode: true },
      pages: [{ id: 'page1', name: 'Home', panels: [
        {type:'clock',col:1,width:1},{type:'signalrgb',col:2,width:1},{type:'lights',col:3,width:1},
        {type:'nowplaying',col:4,width:1},{type:'system',col:5,width:1},{type:'links',col:6,width:1}
      ]}],
      integrations: {
        weather:{city:'Perth'}, tautulli:{url:'',apiKey:''}, plex:{url:'',token:''},
        homeassistant:{url:'',token:'',lights:[],signalrgbEntity:''},
        sonarr:{url:'',apiKey:''}, radarr:{url:'',apiKey:''}, overseerr:{url:'',apiKey:''},
        nzbget:{url:'',username:'',password:''}, uptimekuma:{url:'',apiKey:''},
        spotify:{clientId:'',clientSecret:''}, jellyfin:{url:'',apiKey:''}
      },
      signalrgbFavorites: [],
      links: [{label:'Dashboard',url:'http://localhost',icon:'🏠'},{label:'GitHub',url:'https://github.com',icon:'💻'},{label:'Google',url:'https://google.com',icon:'🔍'}]
    };

    // Available panel types
    const PANEL_TYPES = [
      { type: 'clock',      icon: '🕐', name: 'Clock & Weather' },
      { type: 'nowplaying', icon: '▶',  name: 'Now Playing (Plex/Tautulli)' },
      { type: 'lights',     icon: '💡', name: 'Lights (Home Assistant)' },
      { type: 'signalrgb',  icon: '⚡', name: 'SignalRGB' },
      { type: 'system',     icon: '💻', name: 'System Monitor' },
      { type: 'links',      icon: '🔗', name: 'Quick Links' },
      { type: 'sonarr',     icon: '📺', name: 'Sonarr' },
      { type: 'radarr',     icon: '🎬', name: 'Radarr' },
      { type: 'overseerr',  icon: '🎭', name: 'Overseerr' },
      { type: 'nzbget',     icon: '⬇',  name: 'NZBGet' },
      { type: 'uptimekuma', icon: '🔔', name: 'Uptime Kuma' }
    ];
    const MAX_PANELS = 6;

    // Pages builder state — deep clone from config.pages
    let pagesState = JSON.parse(JSON.stringify(config.pages));
    let selectedPageIndex = 0;
    let pageCounter = pagesState.length; // for generating new page IDs

    function renderProgress() {
      const el = document.getElementById('progress');
      el.innerHTML = STEPS.map((s, i) => {
        const dotClass = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
        const labelClass = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
        const arrow = i < STEPS.length - 1 ? '<span class="step-arrow">→</span>' : '';
        return `<div class="step-item"><div class="step-dot ${dotClass}"></div><span class="step-label ${labelClass}">${s.label}</span></div>${arrow}`;
      }).join('');
    }

    function renderStep() {
      const container = document.getElementById('step-container');
      if (currentStep === 0) {
        container.innerHTML = `
          <div class="step visible">
            <div class="welcome-content">
              <div class="welcome-logo">ORBIT</div>
              <div class="welcome-title">Welcome to Orbit</div>
              <div class="welcome-desc">
                A beautiful, modular desktop dashboard for power users.<br>
                Let's get you set up with your integrations.
              </div>
              <div class="btn-row">
                <button class="btn btn-primary" onclick="nextStep()">GET STARTED</button>
              </div>
            </div>
          </div>
        `;
      } else if (currentStep === 1) {
        container.innerHTML = `
          <div class="step visible">
            <div class="two-col">
              <div class="integration-card">
                <div class="integration-title"><span class="emoji">🏠</span> Home Assistant</div>
                <div class="field-group">
                  <div class="field-label">URL</div>
                  <input class="field-input" id="ha-url" placeholder="http://homeassistant.local:8123" value="${config.integrations.homeassistant.url}">
                </div>
                <div class="field-group">
                  <div class="field-label">Long-Lived Access Token</div>
                  <input class="field-input" id="ha-token" placeholder="Your HA token" value="${config.integrations.homeassistant.token}">
                </div>
              </div>
              <div class="integration-card">
                <div class="integration-title"><span class="emoji">🎬</span> Tautulli</div>
                <div class="field-group">
                  <div class="field-label">URL</div>
                  <input class="field-input" id="tau-url" placeholder="http://192.168.1.x:8181" value="${config.integrations.tautulli.url}">
                </div>
                <div class="field-group">
                  <div class="field-label">API Key</div>
                  <input class="field-input" id="tau-key" value="${config.integrations.tautulli.apiKey}">
                </div>
              </div>
              <div class="integration-card">
                <div class="integration-title"><span class="emoji">▶️</span> Plex</div>
                <div class="field-group">
                  <div class="field-label">Server URL</div>
                  <input class="field-input" id="plex-url" placeholder="http://192.168.1.x:32400" value="${config.integrations.plex.url}">
                </div>
                <div class="field-group">
                  <div class="field-label">Plex Token</div>
                  <input class="field-input" id="plex-token" value="${config.integrations.plex.token}">
                </div>
              </div>
              <div class="integration-card">
                <div class="integration-title"><span class="emoji">🌤️</span> Weather</div>
                <div class="field-group">
                  <div class="field-label">City</div>
                  <input class="field-input" id="weather-city" placeholder="Perth" value="${config.integrations.weather.city}">
                  <div class="field-hint">Used for weather display on the clock panel</div>
                </div>
              </div>
            </div>
            <div class="btn-row">
              <button class="btn btn-secondary" onclick="prevStep()">BACK</button>
              <button class="btn btn-primary" onclick="saveAndNext()">NEXT</button>
            </div>
          </div>
        `;
      } else if (currentStep === 2) {
        renderPagesStep(container);
      } else if (currentStep === 3) {
        container.innerHTML = `
          <div class="step visible">
            <div class="complete-content">
              <div class="complete-icon">🚀</div>
              <div class="complete-title">You're Ready!</div>
              <div class="complete-desc">
                Your dashboard is configured and ready to launch.<br>
                You can add more integrations anytime in Settings.
              </div>
              <div class="btn-row">
                <button class="btn btn-secondary" onclick="prevStep()">BACK</button>
                <button class="btn btn-success" onclick="launch()">LAUNCH ORBIT</button>
              </div>
            </div>
          </div>
        `;
      }
    }

    /* ── Pages Builder Step ── */
    function renderPagesStep(container) {
      const page = pagesState[selectedPageIndex];
      const selectedTypes = page.panels.map(p => p.type);
      const atMax = selectedTypes.length >= MAX_PANELS;

      // Page list HTML
      let pageListHtml = pagesState.map((pg, i) => {
        const sel = i === selectedPageIndex ? ' selected' : '';
        const canDelete = pagesState.length > 1;
        const deleteBtn = canDelete
          ? `<span class="page-item-delete" onclick="event.stopPropagation(); deletePage(${i})" title="Delete page">×</span>`
          : '';
        return `<div class="page-item${sel}" onclick="selectPage(${i})">
          <span class="page-item-name" ondblclick="event.stopPropagation(); startRenamePage(${i})">${escHtml(pg.name)}</span>
          ${deleteBtn}
        </div>`;
      }).join('');

      // Panel cards HTML
      let panelCardsHtml = PANEL_TYPES.map(pt => {
        const isSelected = selectedTypes.includes(pt.type);
        const isDisabled = !isSelected && atMax;
        let cls = 'panel-card';
        if (isSelected) cls += ' selected';
        if (isDisabled) cls += ' disabled';
        const onclick = isDisabled ? '' : `onclick="togglePanel('${pt.type}')"`;
        return `<div class="${cls}" ${onclick}>
          <span class="panel-card-icon">${pt.icon}</span>
          <span class="panel-card-name">${pt.name}</span>
          <span class="panel-card-check">✓</span>
        </div>`;
      }).join('');

      // Selected panels order list
      let orderListHtml = '';
      if (selectedTypes.length > 0) {
        const items = page.panels.map((p, i) => {
          const pt = PANEL_TYPES.find(t => t.type === p.type);
          return `<div class="selected-panel-item">
            <span class="selected-panel-num">${i + 1}</span>
            <span>${pt ? pt.icon : ''} ${pt ? pt.name : p.type}</span>
          </div>`;
        }).join('');
        orderListHtml = `
          <div class="selected-panels-order">
            <div class="selected-panels-order-title">Panel Order</div>
            ${items}
          </div>`;
      }

      container.innerHTML = `
        <div class="step visible">
          <div class="pages-builder">
            <div class="page-list-col">
              <div class="page-list-title">Pages</div>
              ${pageListHtml}
              <button class="page-add-btn" onclick="addPage()">+ Add Page</button>
            </div>
            <div class="panels-col">
              <div class="panels-title">Panels on ${escHtml(page.name)}</div>
              <div class="panels-grid">
                ${panelCardsHtml}
              </div>
              ${atMax ? '<div class="max-hint">Max 6 panels per page</div>' : ''}
              ${orderListHtml}
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-secondary" onclick="prevStep()">BACK</button>
            <button class="btn btn-primary" onclick="savePagesAndNext()">NEXT</button>
          </div>
        </div>
      `;
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function selectPage(index) {
      selectedPageIndex = index;
      renderPagesStep(document.getElementById('step-container'));
    }

    function addPage() {
      pageCounter++;
      const newId = 'page' + pageCounter;
      const newName = 'Page ' + pageCounter;
      pagesState.push({ id: newId, name: newName, panels: [] });
      selectedPageIndex = pagesState.length - 1;
      renderPagesStep(document.getElementById('step-container'));
    }

    function deletePage(index) {
      if (pagesState.length <= 1) return;
      pagesState.splice(index, 1);
      if (selectedPageIndex >= pagesState.length) {
        selectedPageIndex = pagesState.length - 1;
      } else if (selectedPageIndex > index) {
        selectedPageIndex--;
      } else if (selectedPageIndex === index) {
        selectedPageIndex = Math.min(index, pagesState.length - 1);
      }
      renderPagesStep(document.getElementById('step-container'));
    }

    function startRenamePage(index) {
      const container = document.getElementById('step-container');
      const pageItems = container.querySelectorAll('.page-item');
      const item = pageItems[index];
      const nameSpan = item.querySelector('.page-item-name');
      const currentName = pagesState[index].name;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'page-item-name-input';
      input.value = currentName;
      nameSpan.replaceWith(input);
      input.focus();
      input.select();

      function finishRename() {
        const newName = input.value.trim() || currentName;
        pagesState[index].name = newName;
        renderPagesStep(document.getElementById('step-container'));
      }

      input.addEventListener('blur', finishRename);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { input.value = currentName; input.blur(); }
      });
    }

    function togglePanel(type) {
      const page = pagesState[selectedPageIndex];
      const idx = page.panels.findIndex(p => p.type === type);
      if (idx !== -1) {
        // Remove panel
        page.panels.splice(idx, 1);
        // Re-assign col values
        page.panels.forEach((p, i) => { p.col = i + 1; });
      } else {
        if (page.panels.length >= MAX_PANELS) return;
        // Add panel at next position
        page.panels.push({ type: type, col: page.panels.length + 1, width: 1 });
      }
      renderPagesStep(document.getElementById('step-container'));
    }

    function savePagesAndNext() {
      // Write pagesState back to config
      config.pages = pagesState.map(pg => ({
        id: pg.id,
        name: pg.name,
        panels: pg.panels.map((p, i) => ({ type: p.type, col: i + 1, width: 1 }))
      }));
      window.orbit.saveConfig(config);
      nextStep();
    }

    function nextStep() { currentStep++; renderProgress(); renderStep(); }
    function prevStep() { currentStep--; renderProgress(); renderStep(); }

    function saveAndNext() {
      config.integrations.homeassistant.url = document.getElementById('ha-url').value.trim();
      config.integrations.homeassistant.token = document.getElementById('ha-token').value.trim();
      config.integrations.tautulli.url = document.getElementById('tau-url').value.trim();
      config.integrations.tautulli.apiKey = document.getElementById('tau-key').value.trim();
      config.integrations.plex.url = document.getElementById('plex-url').value.trim();
      config.integrations.plex.token = document.getElementById('plex-token').value.trim();
      config.integrations.weather.city = document.getElementById('weather-city').value.trim() || 'Perth';
      window.orbit.saveConfig(config);
      nextStep();
    }

    async function launch() {
      await window.orbit.saveConfig(config);
      await window.orbit.setupComplete();
    }

    renderProgress();
    renderStep();
  </script>
</body>
</html>
