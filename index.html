    // ═══ JELLYFIN PANEL ═══
    function JellyfinPanel({ config, openSettings }) {
      const jCfg = config?.integrations?.jellyfin;
      const configured = jCfg?.url && jCfg?.apiKey;
      const [sessions, setSessions] = useState([]);
      const jfTimerRef = useRef(null);
      useEffect(() => {
        if (!configured) return;
        let active = true;
        async function poll() {
          try {
            const r = await window.orbit.apiGet(
              jCfg.url+'/Sessions?ActiveWithinSeconds=300',
              {'X-MediaBrowser-Token': jCfg.apiKey, 'Authorization': 'MediaBrowser Token="'+jCfg.apiKey+'"'}
            );
            if (!active) return;
            const active_sessions = Array.isArray(r) ? r.filter(s => s.NowPlayingItem) : [];
            setSessions(active_sessions);
            // Faster when someone is streaming
            const next = active_sessions.length > 0 ? 5000 : 20000;
            if (jfTimerRef.current) clearTimeout(jfTimerRef.current);
            jfTimerRef.current = setTimeout(poll, next);
          } catch {
            if (jfTimerRef.current) clearTimeout(jfTimerRef.current);
            jfTimerRef.current = setTimeout(poll, 15000);
          }
        }
        poll();
        return () => { active = false; if (jfTimerRef.current) clearTimeout(jfTimerRef.current); };
      }, [configured, jCfg?.url, jCfg?.apiKey]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'JELLYFIN', icon:'🎞', accentColor:'#00A4DC', onSettings:()=>openSettingsAt('settings-jellyfin')}),
        h('div',{className:'panel-unconfigured-icon'},'🎞️'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));

      return h('div', {className: sessions.length === 0 ? 'panel' : 'panel panel-top'},
        h(PanelHeader, {title:'JELLYFIN', icon:'🎞', accentColor:'#00A4DC', onSettings:()=>openSettingsAt('settings-jellyfin')}),
        sessions.length > 0 && h('div', {className:'source-badge', style:{marginBottom:'8px'}}, 'JELLYFIN'),
        sessions.length > 0 && h('div', {className:'np-streams-count'}, sessions.length + ' STREAM' + (sessions.length>1?'S':'')),
        sessions.length === 0
          ? h('div',{className:'np-empty'}, h('div',{className:'np-empty-icon'},'🎞️'), h('div',{className:'np-empty-text'},'NO ACTIVE STREAMS'))
          : h('div', {className:'np-session-list'},
              sessions.map((s,i) => {
                const item = s.NowPlayingItem || {};
                const isEp = item.Type === 'Episode';
                // Show series name as headline, episode as subtitle (reversed from before)
                const title = isEp ? (item.SeriesName || item.Name || 'Unknown') : (item.Name || 'Unknown');
                const epCode = isEp && item.ParentIndexNumber != null
                  ? 'S'+String(item.ParentIndexNumber).padStart(2,'0')+'E'+String(item.IndexNumber||0).padStart(2,'0')
                  : '';
                const sub = isEp
                  ? (epCode ? epCode + (item.Name ? ' · ' + item.Name : '') : item.Name || '')
                  : (item.ProductionYear ? String(item.ProductionYear) : '');
                const pos = s.PlayState?.PositionTicks || 0;
                const dur = item.RunTimeTicks || 0;
                const prog = dur > 0 ? Math.round((pos/dur)*100) : 0;
                const remSec = dur > 0 ? Math.max(0, Math.round((dur-pos)/10000000)) : 0;
                const isTrans = s.TranscodingInfo && s.TranscodingInfo.IsVideoDirect === false;
                const isPaused = s.PlayState?.IsPaused;
                const res = s.TranscodingInfo?.Width
                  ? s.TranscodingInfo.Width+'p'
                  : (item.Width ? item.Width+'p' : '');
                const codec = s.TranscodingInfo?.VideoCodec || item.MediaStreams?.find(m=>m.Type==='Video')?.Codec || '';
                return h('div', {key:i, className:'np-session'},
                  h('div', {className:'np-title', style:{fontSize:'15px'}}, title),
                  sub && h('div', {className:'np-subtitle', style:{fontSize:'13px'}}, sub),
                  h('div', {className:'np-progress-wrap'},
                    h('div', {className:'np-progress-bar'},
                      h('div', {className:'np-progress-fill', style:{width:prog+'%'}}))),
                  remSec > 0 && h('div', {className:'np-time'}, formatDuration(remSec)+' remaining'),
                  h('div', {style:{display:'flex',gap:'6px',flexWrap:'wrap',marginTop:'4px'}},
                    h('span', {className:'np-badge '+(isTrans?'np-badge-transcode':'np-badge-direct')}, isTrans?'🔄 TRANSCODE':'▶ DIRECT'),
                    isPaused && h('span', {className:'np-badge'}, '⏸ PAUSED'),
                    res && h('span', {className:'np-badge np-badge-direct'}, res),
                    codec && h('span', {className:'np-badge'}, codec.toUpperCase())
                  ),
                  h('div', {className:'np-meta'},
                    (s.UserName||'')+(s.DeviceName?' · '+s.DeviceName:''))
                );
              })
            )
      );
    }

    // ═══ PAGES TAB (Settings) ═══
    function PagesTab({ cfg, setCfg }) {
      const [editingIndex, setEditingIndex] = useState(-1);
      const [editingValue, setEditingValue] = useState('');
      const [dragOverIndex, setDragOverIndex] = useState(-1);

      function startEdit(i, name) {
        setEditingIndex(i);
        setEditingValue(name || 'Page '+(i+1));
      }
      function saveName(i) {
        if (editingValue.trim()) {
          cfg.pages[i].name = editingValue.trim();
          setCfg({...cfg});
        }
        setEditingIndex(-1);
        setEditingValue('');
      }
      function cancelEdit() {
        setEditingIndex(-1);
        setEditingValue('');
      }

      return h('div', null,
        h('div', {className:'settings-section'}, 'PAGES'),
        (cfg.pages||[]).map(function(page, i) {
          return h('div', {
            key: page.id || i,
            className: 'page-row' + (dragOverIndex === i ? ' drag-over' : ''),
            draggable: true,
            onDragStart: function(e) {
              e.dataTransfer.setData('text/plain', String(i));
              e.dataTransfer.effectAllowed = 'move';
            },
            onDragOver: function(e) {
              e.preventDefault();
              e.dataTransfer.dropEffect = 'move';
              setDragOverIndex(i);
            },
            onDragLeave: function() {
              setDragOverIndex(-1);
            },
            onDrop: function(e) {
              e.preventDefault();
              setDragOverIndex(-1);
              var from = Number(e.dataTransfer.getData('text/plain'));
              var to = i;
              if (from === to || isNaN(from)) return;
              var pages = cfg.pages.slice();
              var moved = pages.splice(from, 1)[0];
              pages.splice(to, 0, moved);
              cfg.pages = pages;
              setCfg({...cfg});
            },
            onDragEnd: function() {
              setDragOverIndex(-1);
            }
          },
            h('span', {className:'page-drag-handle'}, '⠿'),
            editingIndex === i
              ? h('input', {
                  className: 'page-rename-input',
                  value: editingValue,
                  autoFocus: true,
                  onChange: function(e) { setEditingValue(e.target.value); },
                  onBlur: function() { saveName(i); },
                  onKeyDown: function(e) {
                    if (e.key === 'Enter') saveName(i);
                    if (e.key === 'Escape') cancelEdit();
                  }
                })
              : h('div', {style:{flex:1}},
                  h('span', {className:'page-name-display'}, page.name || 'Page '+(i+1)),
                  h('div', {className:'page-panels-info'}, (page.panels||[]).map(function(p){return p.type;}).join(', '))
                ),
            h('button', {className:'page-edit-btn', onClick: function() { startEdit(i, page.name); }}, '✏')
          );
        }),
        // Panel order reordering within each page
        (cfg.pages||[]).length > 0 && h('div', {style:{marginTop:'16px'}},
          h('div', {className:'settings-section'}, 'PANEL ORDER'),
          h('div', {style:{fontSize:'10px',color:'var(--dim)',marginBottom:'8px'}}, 'Click a page above, then reorder its panels here'),
          (cfg.pages||[]).map(function(page, pageIdx) {
            if (!page.panels || page.panels.length === 0) return null;
            return h('div', {key:page.id||pageIdx, style:{marginBottom:'12px'}},
              h('div', {style:{fontSize:'10px',color:'var(--accent)',marginBottom:'5px',letterSpacing:'1px'}}, (page.name||'Page '+(pageIdx+1)).toUpperCase()),
              page.panels.map(function(panel, pi) {
                const ICONS = {clock:'🕐',tautulli:'▶',nowplaying:'▶',signalrgb:'⚡',lights:'💡',system:'💻',media:'📡',uptimekuma:'🔔',spotify:'🎵',links:'🔗',jellyfin:'🎞️',sonarr:'📺',radarr:'🎬',overseerr:'🎭',nzbget:'⬇',homeassistant:'💡'};
                const NAMES = {clock:'Clock & Weather',tautulli:'Now Playing',nowplaying:'Now Playing',signalrgb:'SignalRGB',lights:'Home Assistant',system:'System Monitor',media:'Media Stack',uptimekuma:'Uptime Kuma',spotify:'Spotify',links:'Quick Links',jellyfin:'Jellyfin',sonarr:'Sonarr',radarr:'Radarr',overseerr:'Overseerr',nzbget:'NZBGet',homeassistant:'Home Assistant'};
                return h('div', {key:pi, style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px',padding:'5px 8px',background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:'4px'}},
                  h('span', {style:{color:'var(--dim)',fontSize:'12px',minWidth:'18px'}},(pi+1)+'.'),
                  h('span', null, (ICONS[panel.type]||'▪')+' '+(NAMES[panel.type]||panel.type)),
                  h('div', {style:{marginLeft:'auto',display:'flex',gap:'4px'}},
                    h('button', {
                      onClick: function() {
                        if (pi <= 0) return;
                        var ps = cfg.pages[pageIdx].panels.slice();
                        var tmp = ps[pi]; ps[pi] = ps[pi-1]; ps[pi-1] = tmp;
                        cfg.pages[pageIdx].panels = ps;
                        setCfg({...cfg});
                      },
                      disabled: pi === 0,
                      style:{background:'none',border:'none',color:'var(--dim)',cursor:'pointer',fontSize:'12px',opacity:pi===0?0.3:1}
                    }, '↑'),
                    h('button', {
                      onClick: function() {
                        if (pi >= page.panels.length - 1) return;
                        var ps = cfg.pages[pageIdx].panels.slice();
                        var tmp = ps[pi]; ps[pi] = ps[pi+1]; ps[pi+1] = tmp;
                        cfg.pages[pageIdx].panels = ps;
                        setCfg({...cfg});
                      },
                      disabled: pi === page.panels.length - 1,
                      style:{background:'none',border:'none',color:'var(--dim)',cursor:'pointer',fontSize:'12px',opacity:pi===page.panels.length-1?0.3:1}
                    }, '↓')
                  )
                );
              })
            );
          })
        ),
        // ── HIDDEN PANELS RESTORE ──
        (function() {
          var vis = cfg.panels || {};
          var allTypes = [];
          for (var pi = 0; pi < (cfg.pages||[]).length; pi++) {
            var pg = cfg.pages[pi];
            var ps = pg.panels || [];
            for (var j = 0; j < ps.length; j++) allTypes.push(ps[j].type);
          }
          var uniqueTypes = allTypes.filter(function(t, i, a) { return a.indexOf(t) === i; });
          var hidden = uniqueTypes.filter(function(t) { return vis[t] === false; });
          if (hidden.length === 0) return null;
          var ICONS = { clock:'\uD83D\uDD50', tautulli:'\u25B6', nowplaying:'\u25B6', signalrgb:'\u26A1', lights:'\uD83D\uDCA1', system:'\uD83D\uDCAA', media:'\uD83D\uDCE1', uptimekuma:'\uD83D\uDD14', spotify:'\uD83C\uDFB5', links:'\uD83D\uDD17', jellyfin:'\uD83C\uDFAE', sonarr:'\uD83D\uDCFA', radarr:'\uD83C\uDFAC', overseerr:'\uD83C\uDFAD', nzbget:'\u2B07', homeassistant:'\uD83D\uDCA1', audio:'\uD83D\uDD0A' };
          var NAMES = { clock:'Clock & Weather', tautulli:'Now Playing', nowplaying:'Now Playing', signalrgb:'SignalRGB', lights:'Home Assistant', system:'System Monitor', media:'Media Stack', uptimekuma:'Uptime Kuma', spotify:'Spotify', links:'Quick Links', jellyfin:'Jellyfin', sonarr:'Sonarr', radarr:'Radarr', overseerr:'Overseerr', nzbget:'NZBGet', homeassistant:'Home Assistant', audio:'Audio Devices' };
          return h('div', { style:{ marginTop:'16px' } },
            h('div', { className:'settings-section', style:{ color:'#ffb400', borderColor:'rgba(255,180,0,0.2)' }}, 'HIDDEN PANELS'),
            hidden.map(function(type) {
              return h('div', { key:type, style:{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'4px', padding:'6px 10px', background:'rgba(255,180,0,0.04)', border:'1px solid rgba(255,180,0,0.15)', borderRadius:'6px' } },
                h('span', null, (ICONS[type]||'\u25AA')+' '+(NAMES[type]||type)),
                h('button', {
                  style:{ marginLeft:'auto', padding:'3px 10px', fontSize:'9px', fontWeight:'700', letterSpacing:'1px', borderRadius:'4px', cursor:'pointer', background:'rgba(255,180,0,0.12)', border:'1px solid rgba(255,180,0,0.3)', color:'#ffb400', fontFamily:'inherit' },
                  onClick: function() {
                    var nc = JSON.parse(JSON.stringify(cfg));
                    nc.panels[type] = true;
                    setCfg(nc);
                    window.orbit.saveConfig(nc);
                  }
                }, 'RESTORE')
              );
            })
          );
        })(),
        h('button', {
          className: 'reconfigure-pages',
          onClick: function() {
            if (window.orbit && typeof window.orbit.openSetup === 'function') {
              window.orbit.openSetup();
            }
          }
        }, '↺ Reconfigure Pages')
      );
    }

    // ═══ SETTINGS OVERLAY ═══
    // ── SYSTEM TAB COMPONENT ────────────────────────────────────────────────
    function SystemTab() {
      const [displays, setDisplays] = useState([]);
      const [currentDisplay, setCurrentDisplay] = useState(null);
      const [resetStage, setResetStage] = useState(0); // 0=idle, 1=confirm, 2=final

      useEffect(() => {
        if (window.orbit && window.orbit.getDisplays) {
          window.orbit.getDisplays().then(list => {
            setDisplays(list || []);
          }).catch(() => {});
        }
        if (window.orbit && window.orbit.loadSettings) {
          window.orbit.loadSettings().then(s => {
            if (s && s.displayId) setCurrentDisplay(s.displayId);
          }).catch(() => {});
        }
      }, []);

      async function handleSelectDisplay(id) {
        setCurrentDisplay(id);
        if (window.orbit && window.orbit.selectDisplay) {
          await window.orbit.selectDisplay(id);
        }
      }

      async function handleReset() {
        if (resetStage === 0) { setResetStage(1); return; }
        if (resetStage === 1) { setResetStage(2); return; }
        // Stage 2 — execute
        if (window.orbit && window.orbit.resetConfig) {
          await window.orbit.resetConfig();
        }
      }

      const resetBtnStyle = {
        marginTop: '8px', padding: '8px 14px', fontFamily: 'var(--font)',
        fontSize: '11px', letterSpacing: '1.5px', fontWeight: '700',
        borderRadius: '6px', cursor: 'pointer', transition: 'all .2s',
        background: resetStage === 2 ? '#ff5555' : 'transparent',
        border: '1px solid ' + (resetStage > 0 ? '#ff5555' : 'rgba(255,255,255,0.15)'),
        color: resetStage > 0 ? '#ff5555' : 'rgba(255,255,255,0.4)',
      };

      const resetLabels = ['RESET SETTINGS', 'ARE YOU SURE?', '⚠ THIS CANNOT BE UNDONE — CONFIRM RESET'];

      return h('div', null,
        // ── Display Switcher ──
        h('div', {className:'settings-section'}, 'DISPLAY'),
        h('div', {className:'settings-label', style:{marginBottom:'8px'}}, 'SELECT TARGET DISPLAY'),
        displays.length === 0
          ? h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,0.3)',letterSpacing:'1px'}}, 'Loading displays...')
          : displays.map(d =>
              h('div', {
                key: d.id,
                onClick: () => handleSelectDisplay(d.id),
                style: {
                  display: 'flex', alignItems: 'center', gap: '10px',
                  padding: '10px 14px', marginBottom: '6px', cursor: 'pointer',
                  borderRadius: '6px', transition: 'all .2s',
                  background: currentDisplay === d.id ? 'rgba(0,217,255,0.06)' : 'rgba(255,255,255,0.02)',
                  border: '1px solid ' + (currentDisplay === d.id ? 'rgba(0,217,255,0.4)' : 'rgba(255,255,255,0.06)'),
                }
              },
                h('div', {style:{
                  width: '10px', height: '10px', borderRadius: '50%', flexShrink: 0,
                  background: currentDisplay === d.id ? 'var(--accent)' : 'rgba(255,255,255,0.15)',
                  boxShadow: currentDisplay === d.id ? '0 0 6px var(--accent)' : 'none'
                }}),
                h('div', null,
                  h('div', {style:{fontSize:'12px',color:'var(--text)',fontWeight:'600'}}, d.label || `Display ${d.id}`),
                  h('div', {style:{fontSize:'10px',color:'rgba(255,255,255,0.3)',letterSpacing:'1px',marginTop:'2px'}},
                    [d.resolution, d.isPrimary ? '· PRIMARY' : ''].filter(Boolean).join(' ')
                  )
                )
              )
            ),
        h('div', {style:{fontSize:'10px',color:'rgba(255,255,255,0.25)',letterSpacing:'1px',marginTop:'6px'}},'Orbit will move to the selected display on next launch. Press Ctrl+D at any time to re-open this picker.'),

        // ── Reset Settings ──
        h('div', {className:'settings-section', style:{marginTop:'28px'}}, 'DANGER ZONE'),
        h('div', {className:'settings-label', style:{marginBottom:'4px'}}, 'RESET ALL SETTINGS'),
        h('div', {style:{fontSize:'11px',color:'rgba(255,255,255,0.3)',letterSpacing:'0.5px',lineHeight:'1.5',marginBottom:'8px'}},
          'Deletes all integrations, pages, and configuration. Orbit will restart and run the setup wizard from scratch. This cannot be undone.'
        ),
        h('button', {style: resetBtnStyle, onClick: handleReset}, resetLabels[resetStage]),
        resetStage > 0 && h('button', {
          onClick: () => setResetStage(0),
          style: {marginTop:'6px',marginLeft:'8px',padding:'8px 12px',fontFamily:'var(--font)',fontSize:'11px',letterSpacing:'1px',borderRadius:'6px',cursor:'pointer',background:'transparent',border:'1px solid rgba(255,255,255,0.1)',color:'rgba(255,255,255,0.3)'}
        }, 'CANCEL')
      );
    }

    function SettingsOverlay({ config, onClose, onSave }) {
      const [tab, setTab] = useState('pages');
      _switchTabRef = setTab; // allow openSettingsAt to switch tabs
      const [cfg, setCfg] = useState(JSON.parse(JSON.stringify(config || DEFAULT_CONFIG)));
      const [saved, setSaved] = useState(false);
      const [expanded, setExpanded] = useState({});
      const toggleExpand = (key) => setExpanded(p => ({...p, [key]: !p[key]}));
      const updateIntegration = (key, field, value) => {
        setCfg(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          if (!next.integrations) next.integrations = {};
          if (!next.integrations[key]) next.integrations[key] = {};
          next.integrations[key][field] = value;
          return next;
        });
      };
      const save = async () => { await window.orbit.saveConfig(cfg); onSave(cfg); setSaved(true); setTimeout(()=>setSaved(false), 2000); };
      const setTheme = (theme) => {
        applyTheme(theme);
        setCfg(prev => ({...prev, theme: {...(prev.theme||{}), themeId: theme.id, accentColor: theme.accent}}));
      };

      // Normalize entity list — handle old string[] and new {entityId,name}[] formats
      function normalizeEntities(lights) {
        if (!Array.isArray(lights)) return [];
        return lights.map(e => typeof e === 'string' ? {entityId:e, name:''} : e);
      }

      // ─── HA ENTITY BROWSER MODAL ────────────────────────────────────────────
      const DOMAIN_ICONS = {light:'💡',switch:'🔌',sensor:'📊',binary_sensor:'🔲',climate:'🌡️',
        media_player:'📺',camera:'📷',cover:'🚪',fan:'💨',vacuum:'🤖',script:'📝',
        automation:'⚙️',scene:'🎬',input_boolean:'🔘',input_select:'📋',person:'👤',
        device_tracker:'📍',sun:'☀️',weather:'🌤️',number:'🔢',select:'📋',button:'🔲'};

      function HAEntityBrowser({ haUrl, haToken, onClose, onAdd }) {
        const [search, setSearch] = useState('');
        const [domain, setDomain] = useState('all');
        const [allEntities, setAllEntities] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [selected, setSelected] = useState(new Set());
        const [domains, setDomains] = useState([]);

        useEffect(() => {
          if (!haUrl || !haToken) { setError('Configure HA URL and token first'); setLoading(false); return; }
          window.orbit.apiGet(haUrl + '/api/states', {'Authorization': 'Bearer ' + haToken}, 20000)
            .then(data => {
              if (data?.error) { setError('Network error: ' + data.error); setLoading(false); return; }
              if (!Array.isArray(data)) {
                // Show the actual HA response to help diagnose
                const detail = typeof data === 'object' && data !== null
                  ? (data.message || data.detail || JSON.stringify(data).slice(0, 120))
                  : String(data).slice(0, 120);
                setError('HA error: ' + detail);
                setLoading(false); return;
              }
              const sorted = [...data].sort((a,b) => a.entity_id.localeCompare(b.entity_id));
              setAllEntities(sorted);
              const d = new Set(sorted.map(e => e.entity_id.split('.')[0]));
              setDomains(['all', ...Array.from(d).sort()]);
              setLoading(false);
            })
            .catch(e => { setError('Failed to reach HA: ' + e.message); setLoading(false); });
        }, [haUrl, haToken]);

        const filtered = allEntities.filter(e => {
          if (domain !== 'all' && e.entity_id.split('.')[0] !== domain) return false;
          if (!search) return true;
          const q = search.toLowerCase();
          return e.entity_id.includes(q) || (e.attributes?.friendly_name||'').toLowerCase().includes(q);
        });

        function toggle(entityId) {
          setSelected(prev => { const n = new Set(prev); n.has(entityId) ? n.delete(entityId) : n.add(entityId); return n; });
        }
        function addSelected() {
          const toAdd = Array.from(selected).map(entityId => {
            const e = allEntities.find(x => x.entity_id === entityId);
            return { entityId, name: e?.attributes?.friendly_name || '' };
          });
          onAdd(toAdd);
          onClose();
        }

        return h('div', {className:'ha-browser-overlay', onClick:e=>{if(e.target===e.currentTarget)onClose();}},
          h('div', {className:'ha-browser-modal'},
            h('div', {className:'ha-browser-header'},
              h('div', {className:'ha-browser-title'}, '🏠 BROWSE ENTITIES'),
              h('button', {className:'settings-close', onClick:onClose}, '✕')
            ),
            loading
              ? h('div', {style:{textAlign:'center',padding:'48px',color:'var(--dim)'}}, '⏳ Loading entities…')
              : error
                ? h('div', {style:{textAlign:'center',padding:'48px',color:'#ff5555',fontSize:'12px'}}, error)
                : h(React.Fragment, null,
                    h('input', {className:'ha-browser-search', placeholder:'Search by name or entity ID…',
                      value:search, onChange:e=>setSearch(e.target.value), autoFocus:true}),
                    h('div', {className:'ha-browser-domains'},
                      domains.map(d => h('button', {key:d, className:'ha-domain-pill'+(domain===d?' active':''), onClick:()=>setDomain(d)},
                        d === 'all' ? 'All ('+allEntities.length+')' : (DOMAIN_ICONS[d]||'·') + ' ' + d
                      ))
                    ),
                    h('div', {className:'ha-browser-count'}, filtered.length + ' entities' + (selected.size ? ' · ' + selected.size + ' selected' : '')),
                    h('div', {className:'ha-browser-list'},
                      filtered.slice(0, 300).map(e => {
                        const isSel = selected.has(e.entity_id);
                        const name = e.attributes?.friendly_name;
                        const dom = e.entity_id.split('.')[0];
                        return h('div', {key:e.entity_id, className:'ha-browser-item'+(isSel?' selected':''), onClick:()=>toggle(e.entity_id)},
                          h('div', {className:'ha-browser-check'}, isSel ? '✓' : ''),
                          h('span', {style:{fontSize:'14px',flexShrink:0}}, DOMAIN_ICONS[dom] || '·'),
                          h('div', {className:'ha-browser-entity-info'},
                            name && h('div', {className:'ha-browser-entity-name'}, name),
                            h('div', {className:'ha-browser-entity-id'}, e.entity_id)
                          ),
                          h('div', {className:'ha-browser-entity-state'}, e.state)
                        );
                      })
                    ),
                    h('div', {className:'ha-browser-footer'},
                      h('button', {className:'ha-browser-add-btn', disabled:selected.size===0, onClick:addSelected},
                        selected.size > 0 ? '+ Add ' + selected.size + ' entit' + (selected.size===1?'y':'ies') : 'Select entities above'
                      )
                    )
                  )
          )
        );
      }

      // ─── HA ENTITIES EDITOR ─────────────────────────────────────────────────
      function HAEntitiesEditor({ integrationKey }) {
        const raw = cfg.integrations?.[integrationKey]?.lights;
        const [entities, setEntities] = useState(normalizeEntities(raw));
        const [showBrowser, setShowBrowser] = useState(false);
        const haUrl = cfg.integrations?.homeassistant?.url || '';
        const haToken = cfg.integrations?.homeassistant?.token || '';

        function commit(next) { setEntities(next); updateIntegration(integrationKey, 'lights', next); }
        function removeEntity(i) { const n=[...entities]; n.splice(i,1); commit(n); }
        function updateName(i, name) { const n=[...entities]; n[i]={...n[i],name}; commit(n); }
        function updateId(i, entityId) { const n=[...entities]; n[i]={...n[i],entityId}; commit(n); }
        function onBrowserAdd(toAdd) {
          const existing = new Set(entities.map(e => e.entityId));
          const fresh = toAdd.filter(e => !existing.has(e.entityId));
          commit([...entities, ...fresh]);
        }

        return h('div', null,
          showBrowser && h(HAEntityBrowser, {haUrl, haToken, onClose:()=>setShowBrowser(false), onAdd:onBrowserAdd}),
          h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}},
            h('div', {className:'settings-label', style:{marginBottom:0}}, 'LIGHT ENTITIES'),
            h('button', {className:'ha-browse-btn', onClick:()=>setShowBrowser(true)}, '🔍 Browse HA')
          ),
          entities.length > 0 && h('div', {style:{marginBottom:'8px'}},
            entities.map((e,i) => h('div', {key:i, style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'4px'}},
              h('input', {className:'settings-input', style:{flex:'2',fontSize:'11px'}, value:e.entityId, placeholder:'light.entity_id', onChange:ev=>updateId(i,ev.target.value)}),
              h('input', {className:'settings-input', style:{flex:'1',fontSize:'11px'}, value:e.name||'', placeholder:'Display name', onChange:ev=>updateName(i,ev.target.value)}),
              h('button', {onClick:()=>removeEntity(i), style:{background:'none',border:'none',color:'#ff5555',cursor:'pointer',fontSize:'16px',padding:'0 4px',flexShrink:0}}, '×')
            ))
          ),
          entities.length === 0 && h('div', {style:{fontSize:'11px',color:'var(--dim)',padding:'10px',textAlign:'center',border:'1px dashed var(--border)',borderRadius:'6px',marginBottom:'8px'}},
            'No entities added. Click Browse HA to search and add.'
          )
        );
      }

      // ─── SERVICES CONFIG SECTION ────────────────────────────────────────────────
      function ServicesConfigSection({ cfg, setCfg }) {
        const [expanded, setExpanded] = React.useState(false);
        const autoServices = React.useMemo(() => {
          const integrations = cfg?.integrations || {};
          const list = [];
          const add = (name, url) => { if (url) list.push({ name, url, auto: true }); };
          add('NZBGet', integrations.nzbget?.url);
          add('Home Assistant', integrations.homeassistant?.url);
          add('Sonarr', integrations.sonarr?.url);
          add('Radarr', integrations.radarr?.url);
          add('Overseerr', integrations.overseerr?.url);
          add('Jellyfin', integrations.jellyfin?.url);
          add('Tautulli', integrations.tautulli?.url);
          return list;
        }, [cfg]);
        const custom = cfg.customServices || [];

        function addCustom() {
          setCfg(c => ({ ...c, customServices: [...(c.customServices || []), { name: '', url: '' }] }));
        }
        function removeCustom(i) {
          setCfg(c => ({ ...c, customServices: (c.customServices || []).filter((_, idx) => idx !== i) }));
        }
        function updateCustom(i, field, val) {
          setCfg(c => {
            const list = [...(c.customServices || [])];
            list[i] = { ...list[i], [field]: val };
            return { ...c, customServices: list };
          });
        }

        return h('div', { className: 'settings-integration' },
          h('div', { className: 'settings-integration-header', onClick: () => setExpanded(e => !e) },
            h('span', null, '📡 Services'),
            h('span', null, expanded ? '▼' : '▶')
          ),
          expanded && h('div', { className: 'settings-integration-body' },
            h('div', { className: 'settings-label', style: { marginBottom: '6px' } }, 'AUTO-DETECTED (from integrations)'),
            autoServices.length === 0
              ? h('div', { style: { fontSize: '11px', color: 'var(--dim)', marginBottom: '12px' } }, 'No integrations configured yet.')
              : autoServices.map((s, i) => h('div', {
                  key: i,
                  style: { display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '4px', fontSize: '12px' }
                },
                  h('span', { style: { width: '8px', height: '8px', borderRadius: '50%', background: 'var(--accent-mid)', flexShrink: 0 } }),
                  h('span', { style: { color: 'var(--text)', flex: 1 } }, s.name),
                  h('span', { style: { color: 'var(--dim)', fontSize: '10px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '180px' } }, s.url)
                )
              ),
            h('div', { className: 'settings-label', style: { marginTop: '12px', marginBottom: '6px' } }, 'CUSTOM SERVICES'),
            custom.map((s, i) => h('div', { key: i, style: { display: 'flex', gap: '6px', alignItems: 'center', marginBottom: '6px' } },
              h('input', { className: 'settings-input', style: { flex: '1', fontSize: '11px' }, placeholder: 'Name', value: s.name || '', onChange: e => updateCustom(i, 'name', e.target.value) }),
              h('input', { className: 'settings-input', style: { flex: '2', fontSize: '11px' }, placeholder: 'http://...', value: s.url || '', onChange: e => updateCustom(i, 'url', e.target.value) }),
              h('button', { onClick: () => removeCustom(i), style: { background: 'none', border: 'none', color: '#ff5555', cursor: 'pointer', fontSize: '16px', padding: '0 4px', flexShrink: 0 } }, '×')
            )),
            h('button', { className: 'settings-save', style: { background: 'transparent', border: '1px solid var(--accent)', color: 'var(--accent)', marginTop: '8px', fontSize: '11px', padding: '6px 12px' }, onClick: addCustom }, '+ Add Service')
          )
        );
      }


      function integrationSection(key, label, emoji, fields) {
        return h('div', {className:'settings-integration'},
          h('div', {className:'settings-integration-header', onClick:()=>toggleExpand(key)},
            h('span', null, emoji+' '+label),
            h('span', null, expanded[key] ? '▼' : '▶')
          ),
          expanded[key] && h('div', {className:'settings-integration-body'},
            fields.map(f => h(React.Fragment, {key:f.field},
              f.type === 'ha-entities'
                ? h(HAEntitiesEditor, {integrationKey:key})
                : f.type === 'checkbox'
                  ? h('label', {style:{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',marginTop:'4px'}},
                      h('input', {type:'checkbox', checked:!!cfg.integrations?.[key]?.[f.field], onChange:e=>updateIntegration(key,f.field,e.target.checked), style:{accentColor:'var(--accent)',width:'16px',height:'16px'}}),
                      h('span', {className:'settings-label', style:{margin:0}}, f.label))
                  : h(React.Fragment, null,
                    h('div', {className:'settings-label'}, f.label),
                    f.type === 'textarea'
                      ? h('textarea', {className:'settings-textarea', value:cfg.integrations?.[key]?.[f.field]||'', onChange:e=>updateIntegration(key,f.field,e.target.value.split('\n').filter(Boolean)), placeholder:f.placeholder||''})
                      : f.type === 'number'
                      ? h('input', {className:'settings-input', type:'number', value:cfg.integrations?.[key]?.[f.field]||'', onChange:e=>updateIntegration(key,f.field,parseInt(e.target.value)||0), placeholder:f.placeholder||''})
                      : h('input', {className:'settings-input', type:f.type||'text', value:cfg.integrations?.[key]?.[f.field]||'', onChange:e=>updateIntegration(key,f.field,e.target.value), placeholder:f.placeholder||''})
                  )
            ))
          )
        );
      }

      return h('div', {className:'settings-overlay', onClick:e=>{if(e.target===e.currentTarget)onClose();}},
        h('div', {className:'settings-panel'},
          h('div', {className:'settings-header'},
            h('div', {className:'settings-title'}, 'SETTINGS'),
            h('button', {className:'settings-close', onClick:onClose}, '✕')
          ),
          h('div', {className:'settings-tabs'},
            ['pages','theme','about','system'].map(t2 =>
              h('button', {key:t2, className:'settings-tab'+(tab===t2?' active':''), onClick:()=>setTab(t2)}, t2)
            )
          ),

          // ── PAGES TAB (includes integration config sections as scroll targets) ──
          tab === 'pages' && h('div', null,
            h(PagesTab, { cfg, setCfg }),
            h('div', {id:'settings-integrations-anchor', style:{marginTop:'16px'}},
            h('div', {id:'settings-weather'}, integrationSection('weather', 'Weather', '🌤️', [{field:'city',label:'CITY',placeholder:'Perth'}])),
            h('div', {id:'settings-tautulli'}, integrationSection('tautulli', 'Tautulli', '🎬', [{field:'url',label:'URL',placeholder:'http://192.168.1.x:8181'},{field:'apiKey',label:'API KEY'}])),
            h('div', {id:'settings-plex'}, integrationSection('plex', 'Plex', '▶️', [{field:'url',label:'SERVER URL',placeholder:'http://192.168.1.x:32400'},{field:'token',label:'PLEX TOKEN'}])),
            h('div', {id:'settings-sonarr'}, integrationSection('sonarr', 'Sonarr', '📺', [{field:'url',label:'URL',placeholder:'http://192.168.1.x:8989'},{field:'apiKey',label:'API KEY'}])),
            h('div', {id:'settings-radarr'}, integrationSection('radarr', 'Radarr', '🎥', [{field:'url',label:'URL',placeholder:'http://192.168.1.x:7878'},{field:'apiKey',label:'API KEY'}])),
            h('div', {id:'settings-overseerr'}, integrationSection('overseerr', 'Overseerr', '📋', [{field:'url',label:'URL',placeholder:'http://192.168.1.x:5055'},{field:'apiKey',label:'API KEY'}])),

    // ═══ UPDATE PILL ═══
    function UpdatePill() {
      const [update, setUpdate] = useState(null);
      const [downloading, setDownloading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [downloaded, setDownloaded] = useState(false);
      useEffect(() => {
        window.orbit.getPendingUpdate().then(u => { if (u) { setUpdate(u); setDownloading(!u.downloaded); if (u.downloaded) setDownloaded(true); } });
        const unsub1 = window.orbit.onUpdateAvailable(info => { setUpdate(info); setDownloading(true); });
        const unsub2 = window.orbit.onUpdateProgress(pct => { setDownloading(true); setProgress(pct); });
        const unsub3 = window.orbit.onUpdateDownloaded(() => { setDownloading(false); setDownloaded(true); });
        const unsub4 = window.orbit.onUpdateError(() => { setDownloading(false); });
        return () => { unsub1(); unsub2(); unsub3(); unsub4(); };
      }, []);
      if (!update && !downloaded) return null;
      if (downloaded) {
        return h('div', {
          className: 'update-pill update-pill-ready',
          onClick: () => window.orbit.installUpdate(),
          title: 'Click to restart and install update'
        },
          h('span', {className:'update-pill-icon'}, '↑'),
          h('span', {className:'update-pill-label'}, 'Restart & Update')
        );
      }
      if (downloading) {
        return h('div', {className:'update-pill update-pill-downloading', title:'Downloading update...'},
          h('span', {className:'update-pill-icon'}, '↓'),
          h('span', {className:'update-pill-label'}, progress > 0 ? `${progress}%` : 'Update…')
        );
      }
      return null;
    }

    function SonarrPanel({ config, openSettings }) {
      const sCfg = config?.integrations?.sonarr;
      const configured = sCfg?.url && sCfg?.apiKey;
      const [seriesMap, setSeriesMap] = useState({});
      const [seriesCount, setSeriesCount] = useState(null);
      const [queue, setQueue] = useState([]);
      const [todayImports, setTodayImports] = useState([]);
      const [calendar, setCalendar] = useState([]);
      const pollRef = useRef(null);

      useEffect(() => {
        if (!configured) return;
        const hdr = {'X-Api-Key': sCfg.apiKey};
        let _sonarrTimer = null;
        let _active = false;
        async function poll() {
          try {
            const todayStr = new Date().toISOString().split('T')[0];
            const futureStr = new Date(Date.now()+4*86400000).toISOString().split('T')[0];
            const [series, hist, cal, q] = await Promise.all([
              window.orbit.apiGet(sCfg.url+'/api/v3/series', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/history?pageSize=50&sortKey=date&sortDir=desc&includeSeries=true&includeEpisode=true', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/calendar?start='+todayStr+'&end='+futureStr+'&unmonitored=false&includeSeries=true', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/queue?pageSize=5&includeSeries=true&includeEpisode=true', hdr)
            ]);
            if (Array.isArray(series)) {
              setSeriesCount(series.length);
              const map = {};
              series.forEach(s => { map[s.id] = s.title; });
              setSeriesMap(map);
            }
            if (Array.isArray(hist?.records)) {
              const imports = hist.records.filter(r => {
                if (r.eventType !== 'downloadFolderImported') return false;
                return new Date(r.date).toISOString().startsWith(todayStr);
              });
              setTodayImports(imports.slice(0,6));
            }
            if (Array.isArray(cal)) setCalendar(cal.slice(0,6));
            if (Array.isArray(q?.records)) {
              const qr = q.records.slice(0,3);
              setQueue(qr);
              _active = qr.length > 0;
            }
          } catch {}
          clearTimeout(_sonarrTimer);
          _sonarrTimer = setTimeout(poll, _active ? 10000 : 30000);
        }
        pollRef.current = poll;
        poll();
        return () => clearTimeout(_sonarrTimer);
      }, [sCfg?.url, sCfg?.apiKey]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'SONARR', icon:'📺', accentColor:'#35C5F4', onSettings:()=>openSettingsAt('settings-sonarr')}),
        h('div',{className:'panel-unconfigured-icon'},'📺'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'}},'Configure in Settings'));

      function dayLabel(dateStr) {
        const diff = Math.round((new Date(dateStr) - new Date(new Date().toDateString())) / 86400000);
        if (diff <= 0) return 'Today'; if (diff === 1) return 'Tomorrow'; return '+'+diff+'d';
      }

      return h('div',{className:'panel panel-top'},
        h(PanelHeader, {title:'SONARR', icon:'📺', accentColor:'#35C5F4', onSettings:()=>openSettingsAt('settings-sonarr')}),
        h('div',{style:{display:'flex',gap:'32px',marginBottom:'14px',justifyContent:'center',width:'100%'}},
          h('div',{style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'LIBRARY'), h('div',{style:{fontSize:'30px',fontWeight:'800',color:'var(--accent)'}}, seriesCount??'…')),
          h('div',{style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'IN QUEUE'), h('div',{style:{fontSize:'30px',fontWeight:'800',color:'var(--text-bright)'}}, queue.length))
        ),
        // Active downloads
        queue.length > 0 && h('div',{style:{marginBottom:'12px'}},
          h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'DOWNLOADING'),
          queue.map((item,i)=>{
            const pct = item.size > 0 ? Math.round((1-(item.sizeLeft/item.size))*100) : 0;
            const seriesTitle = item.series?.title || seriesMap[item.seriesId] || item.title?.split('.')[0] || '?';
            const ep = item.episode ? 'S'+String(item.episode.seasonNumber||0).padStart(2,'0')+'E'+String(item.episode.episodeNumber||0).padStart(2,'0') : '';
            return h('div',{key:i,style:{marginBottom:'8px'}},
              h('div',{style:{fontSize:'12px',color:'var(--text)',marginBottom:'2px',fontWeight:'600'}}, seriesTitle + (ep?' · '+ep:'')),
              h('div',{className:'np-progress-bar'},h('div',{className:'np-progress-fill',style:{width:pct+'%'}})),
              h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}, pct+'%')
            );
          })
        ),
        // Downloaded today
        todayImports.length > 0 && h('div',{style:{marginBottom:'12px'}},
          h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'DOWNLOADED TODAY'),
          todayImports.map((r,i)=>{
            const seriesTitle = r.series?.title || seriesMap[r.seriesId] || '';
            const sn = r.episode?.seasonNumber ?? r.episodeId;
            const en = r.episode?.episodeNumber;
            const epCode = (sn != null && en != null) ? 'S'+String(sn).padStart(2,'0')+'E'+String(en).padStart(2,'0') : '';
            const epTitle = r.episode?.title || '';
            const display = seriesTitle
              ? seriesTitle + (epCode ? ' — '+epCode : '') + (epTitle ? ' · '+epTitle : '')
              : epCode + (epTitle ? ' · '+epTitle : '');
            return h('div',{key:i,style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'5px'}},
              h('span',{style:{color:'#50fa7b',fontSize:'11px',flexShrink:0,marginTop:'1px'}},'✓'),

        // Upcoming calendar — series name prominent
        calendar.length > 0 && h('div',null,

          calendar.map((ep,i)=>{

            const epCode = 'S'+String(ep.seasonNumber||0).padStart(2,'0')+'E'+String(ep.episodeNumber||0).padStart(2,'0');
            const day = dayLabel(ep.airDate||ep.airDateUtc);

            return h('div',{key:i,style:{marginBottom:'7px'}},
              h('div',{style:{display:'flex',gap:'6px',alignItems:'baseline'}},

                h('div',{style:{fontSize:'13px',color:'var(--text)',fontWeight:'600',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, seriesTitle)
              ),
              h('div',{style:{fontSize:'11px',color:'var(--dim)',paddingLeft:'66px'}}, epCode + (ep.title ? ' · '+ep.title : ''))

          })

    }

    function RadarrPanel({ config, openSettings }) {
      const rCfg = config?.integrations?.radarr;

      const [queue, setQueue] = useState([]);

      const [upcoming, setUpcoming] = useState([]);

      useEffect(() => {
        if (!configured) return;
        const hdr = {'X-Api-Key': rCfg.apiKey};
        let _radarrTimer = null;
        let _active = false;
        async function poll() {
          try {
            const todayStr = new Date().toISOString().split('T')[0];
            const futureStr = new Date(Date.now()+90*86400000).toISOString().split('T')[0];
            const [movies, hist, cal, q] = await Promise.all([
              window.orbit.apiGet(rCfg.url+'/api/v3/movie', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/history?pageSize=50&sortKey=date&sortDir=desc&includeMovie=true', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/calendar?start='+todayStr+'&end='+futureStr+'&unmonitored=false', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/queue?pageSize=5&includeMovie=true', hdr)
            ]);
            if (Array.isArray(movies)) {
              setMovieCount(movies.length);
              const map = {};
              movies.forEach(m => { map[m.id] = { title: m.title, year: m.year }; });
              setMovieMap(map);
            }
            if (Array.isArray(hist?.records)) {
              const imports = hist.records.filter(r => {
                if (r.eventType !== 'downloadFolderImported') return false;
                return new Date(r.date).toISOString().startsWith(todayStr);
              });
              setTodayImports(imports.slice(0,5));
            }
            if (Array.isArray(cal)) {
              const now = Date.now();
              const classified = cal.map(m => {
                const cinema = m.inCinemas ? new Date(m.inCinemas) : null;
                const digital = m.digitalRelease ? new Date(m.digitalRelease) : null;
                const physical = m.physicalRelease ? new Date(m.physicalRelease) : null;
                const dates = [cinema, digital, physical].filter(d => d && d.getTime() > now-86400000);
                const earliest = dates.sort((a,b)=>a-b)[0];
                const type = earliest === cinema ? '🎭 CINEMA' : '💾 DOWNLOAD';
                const daysAway = earliest ? Math.ceil((earliest-now)/86400000) : 999;
                return { title:m.title, year:m.year, type, daysAway, hasFile:m.hasFile };
              }).filter(m => !m.hasFile && m.daysAway < 90).sort((a,b)=>a.daysAway-b.daysAway);
              setUpcoming(classified.slice(0,5));
            }
            if (Array.isArray(q?.records)) {
              const qr = q.records.slice(0,3);
              setQueue(qr);
              _active = qr.length > 0;
            }
          } catch {}
          clearTimeout(_radarrTimer);
          _radarrTimer = setTimeout(poll, _active ? 10000 : 30000);
        }
        pollRef.current = poll;
        poll();
        return () => clearTimeout(_radarrTimer);

        h(PanelHeader, {title:'RADARR', icon:'🎬', accentColor:'#FFC230', onSettings:()=>openSettingsAt('settings-radarr')}),
        // Stats
        h('div',{style:{display:'flex',gap:'32px',marginBottom:'14px',justifyContent:'center',width:'100%'}},
          h('div',{style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'LIBRARY'), h('div',{style:{fontSize:'30px',fontWeight:'800',color:'var(--accent)'}}, movieCount??'…')),

        ),

          queue.map((item,i)=>{
            const pct = item.size > 0 ? Math.round((1-(item.sizeLeft/item.size))*100) : 0;
            const title = (item.movie?.title || item.title || '').slice(0,36);
            return h('div',{key:i,style:{marginBottom:'8px'}},
              h('div',{style:{fontSize:'12px',color:'var(--text)',marginBottom:'3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, title),
              h('div',{className:'np-progress-bar'},h('div',{className:'np-progress-fill',style:{width:pct+'%'}})),
              h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}, pct+'%')
            );
          })
        ),
        // Downloaded today
        todayImports.length > 0 && h('div',{style:{marginBottom:'12px'}},
          h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'DOWNLOADED TODAY'),
          todayImports.map((r,i)=>{

    function OverseerrPanel({ config, openSettings }) {
      const oCfg = config?.integrations?.overseerr;
      const configured = oCfg?.url && oCfg?.apiKey;
      const [counts, setCounts] = useState(null);
      const [recent, setRecent] = useState([]);
      const [titles, setTitles] = useState({}); // tmdbId → title string

      useEffect(() => {
        if (!configured) return;
        const headers = {'X-Api-Key': oCfg.apiKey};
        async function poll() {
          try {
            const [c, r] = await Promise.all([
              window.orbit.apiGet(oCfg.url+'/api/v1/request/count', headers),
              window.orbit.apiGet(oCfg.url+'/api/v1/request?take=8&skip=0&sort=added', headers)
            ]);
            if (!c?.error) setCounts(c);
            if (Array.isArray(r?.results)) {
              const items = r.results.slice(0,8);
              setRecent(items);
              // Async-fetch titles for each request
              items.forEach(async (req) => {
                const tmdb = req.media?.tmdbId;
                const type = req.type;
                if (!tmdb || !type) return;
                try {
                  const endpoint = type === 'movie' ? `/api/v1/movie/${tmdb}` : `/api/v1/tv/${tmdb}`;
                  const details = await window.orbit.apiGet(oCfg.url+endpoint, headers);
                  const title = details?.title || details?.name || details?.originalTitle || details?.originalName;

    function NZBGetPanel({ config, openSettings }) {
      const nCfg = config?.integrations?.nzbget;
      const configured = nCfg?.url && nCfg?.username;
      const [status, setStatus] = useState(null);
      const [groups, setGroups] = useState([]);
      const intervalRef = useRef(null);

      useEffect(() => {
        if (!configured) return;
        let active = true;
        async function poll() {
          try {
            const auth = btoa(nCfg.username+':'+(nCfg.password||''));
            const [s, g] = await Promise.all([
              window.orbit.apiPost(nCfg.url+'/jsonrpc', {version:'1.1',method:'status',id:1}, {Authorization:'Basic '+auth}),
              window.orbit.apiPost(nCfg.url+'/jsonrpc', {version:'1.1',method:'listgroups',id:2}, {Authorization:'Basic '+auth})
            ]);
            if (!active) return;
            const st = s?.result ? s.result : null;
            const gr = Array.isArray(g?.result) ? g.result.slice(0,6) : [];
            if (st) setStatus(st);
            setGroups(gr);
            // Adaptive polling: 1.5s when actively downloading, 8s when idle
            const nextInterval = (st && st.DownloadRate > 0 && !st.DownloadPaused) ? 3000 : 8000;
            if (intervalRef.current) clearTimeout(intervalRef.current);
            intervalRef.current = setTimeout(poll, nextInterval);
          } catch {
            if (intervalRef.current) clearTimeout(intervalRef.current);
            intervalRef.current = setTimeout(poll, 10000);
          }
        }
        poll();
        return () => { active = false; if (intervalRef.current) clearTimeout(intervalRef.current); };
      }, [nCfg?.url, nCfg?.username]);
      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'NZBGET', icon:'⬇', accentColor:'#34A853', onSettings:()=>openSettingsAt('settings-nzbget')}),

        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'}},'Configure in Settings'));

          !status
            ? h('div',{style:{fontSize:'13px',color:'var(--dim)',textAlign:'center'}},'Connecting...')
            : h(React.Fragment, null,
                h('div',{style:{display:'flex',gap:'20px',marginBottom: hasQueue ? '14px' : '0',textAlign:'center'}},
                  h('div', null,
                    h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px',letterSpacing:'1px'}},'SPEED'),
                    h('div',{style:{fontSize:'28px',fontWeight:'800',color: paused ? 'var(--dim)' : 'var(--accent)'}}, paused ? 'PAUSED' : rateMBs+' MB/s')
                  ),
                  remMB > 0 && h('div', null,

                    h('div',{style:{fontSize:'22px',fontWeight:'700'}}, remMB > 1024 ? (remMB/1024).toFixed(1)+' GB' : remMB+' MB')
                  )

                  groups.map((g,i)=>{

                    const name = (g.NZBNicename||g.NZBFilename||'Unknown').slice(0,38);
                    const remStr = g.RemainingSizeMB > 1024 ? (g.RemainingSizeMB/1024).toFixed(1)+' GB' : g.RemainingSizeMB+' MB';

    // ═══ SABNZBD PANEL ═══
    function SabnzbdPanel({ config, openSettings }) {
      const sCfg = config?.integrations?.sabnzbd;
      const configured = sCfg?.url && sCfg?.apiKey;
      const [queue, setQueue] = useState(null);
      const [history, setHistory] = useState([]);
      const [serverStats, setServerStats] = useState(null);
      const [error, setError] = useState(null);
      const intervalRef = useRef(null);

      const apiCall = useCallback(async (mode, extra) => {
        const base = sCfg.url.replace(/\/$/, '');
        const url = `${base}/api?apikey=${encodeURIComponent(sCfg.apiKey)}&output=json&mode=${mode}${extra || ''}`;
        return window.orbit.apiGet(url);
      }, [sCfg?.url, sCfg?.apiKey]);

      useEffect(() => {
        if (!configured) return;
        let active = true;
        async function poll() {
          try {
            const [q, st] = await Promise.all([
              apiCall('queue'),
              apiCall('server_stats')
            ]);
            if (!active) return;
            setQueue(q?.queue || null);
            setServerStats(st || null);
            setError(null);
            const speed = parseFloat(q?.queue?.kbpersec || '0');
            const paused = q?.queue?.paused === true;
            const nextInterval = (speed > 10 && !paused) ? 5000 : 30000;
            if (intervalRef.current) clearTimeout(intervalRef.current);
            intervalRef.current = setTimeout(poll, nextInterval);
          } catch (e) {
            if (!active) return;
            setError('SABnzbd unreachable');
            if (intervalRef.current) clearTimeout(intervalRef.current);
            intervalRef.current = setTimeout(poll, 30000);
          }
        }
        poll();
        return () => { active = false; if (intervalRef.current) clearTimeout(intervalRef.current); };
      }, [sCfg?.url, sCfg?.apiKey]);

      async function togglePause() {
        if (!queue) return;
        try {
          await apiCall(queue.paused ? 'resume' : 'pause');
          setQueue(prev => prev ? { ...prev, paused: !prev.paused } : prev);
        } catch {}
      }

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'SABNZBD', icon:'📥', accentColor:'#F5A623', onSettings:()=>openSettingsAt('settings-sabnzbd')}),
        h('div',{className:'panel-unconfigured-icon'},'📥'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'}},'Configure in Settings'));

      if (error && !queue) return h('div',{className:'panel'},
        h(PanelHeader, {title:'SABNZBD', icon:'📥', accentColor:'#F5A623'}),
        h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',flex:1,gap:'12px'}},
          h('div',{style:{fontSize:'13px',color:'#ff5555'}}, error),
          h('button',{onClick:()=>{ setError(null); if(intervalRef.current) clearTimeout(intervalRef.current); intervalRef.current = setTimeout(()=>{},0); },
            style:{padding:'6px 16px',borderRadius:'4px',border:'1px solid rgba(255,85,85,0.4)',background:'rgba(255,85,85,0.1)',color:'#ff5555',cursor:'pointer',fontSize:'11px',fontFamily:'inherit',letterSpacing:'1px'}},'RETRY')));

      const speedKB = parseFloat(queue?.kbpersec || '0');
      const speedMB = (speedKB / 1024).toFixed(1);
      const paused = queue?.paused === true;
      const sizeLeft = queue?.sizeleft || '0 B';
      const eta = queue?.eta || '';
      const slots = (queue?.slots || []).slice(0, 5);
      const hasQueue = slots.length > 0;
      const statusText = paused ? 'Paused' : (speedKB > 10 ? 'Downloading' : 'Idle');
      const statusColor = paused ? 'var(--amber)' : (speedKB > 10 ? '#50fa7b' : 'var(--dim)');
      const totalBytes = serverStats?.total || 0;
      const totalGB = totalBytes > 0 ? (totalBytes / (1024*1024*1024)).toFixed(1) + ' GB' : null;

      return h('div',{className:'panel panel-top'},
        h(PanelHeader, {title:'SABNZBD', icon:'📥', accentColor:'#F5A623'}),
        h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent: hasQueue ? 'flex-start' : 'center',flex:'1',width:'100%'}},
          !queue
            ? h('div',{style:{fontSize:'13px',color:'var(--dim)',textAlign:'center'}},'Connecting...')
            : h(React.Fragment, null,
                h('div',{style:{display:'flex',gap:'16px',marginBottom: hasQueue ? '14px' : '0',textAlign:'center',alignItems:'center'}},
                  h('div', null,
                    h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px',letterSpacing:'1px'}},'SPEED'),
                    h('div',{style:{fontSize:'28px',fontWeight:'800',color: paused ? 'var(--dim)' : 'var(--accent)'}}, paused ? 'PAUSED' : speedMB+' MB/s')
                  ),
                  h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'4px'}},
                    h('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:'3px',fontSize:'9px',fontWeight:'700',letterSpacing:'1px',
                      background: statusText==='Downloading' ? 'rgba(80,250,123,0.15)' : statusText==='Paused' ? 'rgba(255,183,77,0.15)' : 'rgba(255,255,255,0.06)',
                      color: statusColor}}, statusText.toUpperCase()),
                    h('button',{onClick:togglePause, style:{padding:'2px 10px',borderRadius:'3px',border:'1px solid rgba(255,255,255,0.12)',background:'rgba(255,255,255,0.04)',
                      color:'var(--text)',cursor:'pointer',fontSize:'9px',fontFamily:'inherit',letterSpacing:'1px'}}, paused ? '▶ RESUME' : '⏸ PAUSE')
                  )
                ),
                (sizeLeft !== '0 B' && !paused && eta) && h('div',{style:{fontSize:'10px',color:'var(--dim)',marginBottom:'8px',letterSpacing:'0.5px'}}, sizeLeft+' left · ETA '+eta),
                hasQueue && h('div',{style:{width:'100%'}},
                  h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'QUEUE'),
                  slots.map((s,i)=>{
                    const pct = parseInt(s.percentage) || 0;
                    const name = (s.filename||'Unknown').slice(0,38);
                    return h('div',{key:s.nzo_id||i,style:{marginBottom:'10px'}},
                      h('div',{style:{fontSize:'12px',color:'var(--text)',marginBottom:'3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, name),
                      h('div',{className:'np-progress-bar'},h('div',{className:'np-progress-fill',style:{width:pct+'%'}})),
                      h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}, pct+'% · '+s.sizeleft+' left'+(s.timeleft && s.timeleft!=='0:00:00' ? ' · '+s.timeleft : ''))
                    );
