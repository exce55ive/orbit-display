<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https:; media-src 'self' blob:;">
  <meta charset="UTF-8">
  <title>Orbit — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060a10; --bg2: #0a0f1a; --surface: rgba(255,255,255,0.02);
      --border: rgba(255,255,255,0.06); --text: #c8d6e5; --text-bright: #e8f0f8;
      --dim: rgba(255,255,255,0.3); --accent: #00d9ff;
      --accent-dim: rgba(0,217,255,0.06); --accent-bg: rgba(0,217,255,0.11);
      --accent-glow: rgba(0,217,255,0.18); --accent-mid: rgba(0,217,255,0.32);
      --amber: #ffc857; --red: #ff5555; --green: #50fa7b;
      --font: "JetBrains Mono", "Fira Code", monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; user-select: none; cursor: default; }

    /* ── Layout ── */
    #settings-root { display: flex; flex-direction: column; height: 100vh; }
    .settings-titlebar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px 0; flex-shrink: 0; }
    .settings-app-title { font-size: 22px; font-weight: 700; letter-spacing: 4px; color: var(--text-bright); }
    .settings-close-btn { background: none; border: none; color: var(--dim); font-size: 22px; cursor: pointer; font-family: var(--font); padding: 4px 8px; border-radius: 4px; transition: all .2s; line-height: 1; }
    .settings-close-btn:hover { color: var(--red); background: rgba(255,85,85,0.08); }
    .settings-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 24px; flex-shrink: 0; margin-top: 12px; }
    .settings-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--dim); font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 10px 16px; cursor: pointer; transition: all .2s; margin-bottom: -1px; }
    .settings-tab:hover { color: var(--text); }
    .settings-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .settings-body { flex: 1; overflow-y: auto; padding: 24px; }
    .settings-body::-webkit-scrollbar { width: 4px; }
    .settings-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Typography ── */
    .settings-section { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; margin-top: 8px; }
    .settings-label { font-size: 11px; color: var(--dim); letter-spacing: 1.5px; margin-bottom: 4px; text-transform: uppercase; }
    .settings-hint { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 4px; letter-spacing: 0.5px; line-height: 1.5; }

    /* ── Form controls ── */
    .settings-input { width: 100%; padding: 8px 12px; font-size: 12px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; transition: border-color .2s; }
    .settings-input:focus { border-color: var(--accent); }
    .settings-textarea { width: 100%; padding: 8px 12px; font-size: 12px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; resize: vertical; min-height: 60px; }
    .settings-save { padding: 10px 24px; font-size: 12px; font-weight: 700; font-family: var(--font); letter-spacing: 2px; border-radius: 6px; cursor: pointer; background: var(--accent); color: var(--bg); border: none; transition: opacity .2s; margin-top: 16px; }
    .settings-save:hover { opacity: 0.9; }
    .settings-saved-msg { font-size: 12px; color: var(--green); margin-top: 8px; letter-spacing: 1px; }

    /* ── Integration accordion ── */
    .settings-integration { margin-bottom: 6px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .settings-integration-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; font-size: 13px; color: var(--text); transition: background .15s; font-weight: 600; }
    .settings-integration-header:hover { background: rgba(255,255,255,0.03); }
    .settings-integration-body { padding: 12px 16px; border-top: 1px solid var(--border); background: rgba(255,255,255,0.01); display: flex; flex-direction: column; gap: 10px; }

    /* ── Pages tab ── */
    .page-row { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: grab; transition: border-color .15s; }
    .page-row:hover { border-color: rgba(255,255,255,0.12); }
    .page-row.drag-over { border-color: var(--accent); background: var(--accent-bg); }
    .page-drag-handle { color: var(--dim); font-size: 14px; flex-shrink: 0; cursor: grab; }
    .page-name-display { font-size: 13px; color: var(--text); font-weight: 600; }
    .page-panels-info { font-size: 10px; color: var(--dim); letter-spacing: 0.5px; margin-top: 2px; }
    .page-edit-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 2px 4px; flex-shrink: 0; transition: color .15s; }
    .page-edit-btn:hover { color: var(--accent); }
    .page-rename-input { flex: 1; padding: 4px 8px; font-family: var(--font); font-size: 13px; background: rgba(255,255,255,0.06); border: 1px solid var(--accent); border-radius: 4px; color: var(--text-bright); outline: none; }
    .page-delete-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 14px; padding: 2px 4px; flex-shrink: 0; transition: color .15s; }
    .page-delete-btn:hover { color: var(--red); }

    /* ── Theme swatches ── */
    .theme-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .theme-swatch { cursor: pointer; border-radius: 10px; border: 2px solid rgba(255,255,255,0.08); padding: 10px 14px; display: flex; flex-direction: column; gap: 4px; min-width: 80px; transition: all .2s; }
    .theme-swatch.active { box-shadow: 0 0 12px rgba(0,0,0,0.3); }

    /* ── Preferences toggles ── */
    .pref-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .pref-row:last-child { border-bottom: none; }
    .pref-label { font-size: 13px; color: var(--text); font-weight: 600; }
    .pref-hint { font-size: 10px; color: var(--dim); margin-top: 3px; letter-spacing: 0.5px; }
    .pref-toggle-group { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; flex-shrink: 0; }
    .pref-toggle-btn { padding: 7px 16px; font-size: 12px; font-weight: 700; font-family: var(--font); letter-spacing: 1.5px; border: none; background: transparent; color: var(--dim); cursor: pointer; transition: all .2s; }
    .pref-toggle-btn:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .pref-toggle-btn.active { background: var(--accent-bg); color: var(--accent); border-color: var(--accent); }

    /* ── System tab ── */
    .display-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; margin-bottom: 6px; cursor: pointer; border-radius: 6px; transition: all .2s; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); }
    .display-item:hover { border-color: rgba(255,255,255,0.15); }
    .display-item.selected { background: rgba(0,217,255,0.06); border-color: rgba(0,217,255,0.4); }
    .display-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: rgba(255,255,255,0.15); }
    .display-dot.selected { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

    /* ── Danger zone ── */
    .danger-btn { padding: 8px 14px; font-family: var(--font); font-size: 11px; letter-spacing: 1.5px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: all .2s; background: transparent; margin-top: 8px; }

    /* ── About ── */
    .settings-version { font-size: 13px; color: var(--dim); margin-bottom: 8px; }
    .settings-update-btn { padding: 8px 16px; font-size: 12px; font-weight: 700; font-family: var(--font); letter-spacing: 1px; border: 1px solid var(--accent); border-radius: 6px; background: transparent; color: var(--accent); cursor: pointer; transition: all .2s; }
    .settings-update-btn:hover { background: var(--accent-bg); }
    .settings-changelog { font-size: 12px; color: var(--dim); margin-top: 12px; line-height: 1.7; white-space: pre-wrap; }

    /* ── Layouts tab ── */
    .layout-row { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; transition: border-color .15s; }
    .layout-row:hover { border-color: rgba(255,255,255,0.12); }
    .layout-row.active { border-color: var(--accent); background: var(--accent-dim); }
    .layout-row-name { flex: 1; font-size: 13px; color: var(--text); font-weight: 600; }
    .layout-row-badge { font-size: 9px; color: var(--dim); letter-spacing: 1px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 4px; }
    .layout-row-actions { display: flex; gap: 4px; }
    .layout-action-btn { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 13px; padding: 2px 6px; border-radius: 4px; transition: all .15s; font-family: var(--font); }
    .layout-action-btn:hover { color: var(--accent); background: rgba(255,255,255,0.04); }
    .layout-action-btn.danger:hover { color: var(--red); background: rgba(255,85,85,0.08); }
    .layout-rename-input { flex: 1; padding: 4px 8px; font-family: var(--font); font-size: 13px; background: rgba(255,255,255,0.06); border: 1px solid var(--accent); border-radius: 4px; color: var(--text-bright); outline: none; }
    .layout-save-row { display: flex; gap: 8px; margin-top: 12px; }
    .layout-save-input { flex: 1; padding: 8px 12px; font-size: 12px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; transition: border-color .2s; }
    .layout-save-input:focus { border-color: var(--accent); }
    .layout-save-btn { padding: 8px 16px; font-size: 11px; font-weight: 700; font-family: var(--font); letter-spacing: 1.5px; border-radius: 6px; cursor: pointer; background: transparent; border: 1px solid var(--accent); color: var(--accent); transition: all .2s; white-space: nowrap; }
    .layout-save-btn:hover { background: var(--accent-bg); }

    /* ── HA browser ── */
    .ha-browse-btn { padding: 5px 12px; background: var(--accent-bg); border: 1px solid var(--accent-mid); border-radius: 6px; color: var(--accent); cursor: pointer; font-family: var(--font); font-size: 11px; letter-spacing: 0.5px; transition: background .15s; }
    .ha-browse-btn:hover { background: rgba(0,217,255,0.18); }
    .ha-browser-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .ha-browser-modal { background: #0e1724; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; width: 640px; max-height: 78vh; display: flex; flex-direction: column; padding: 24px; }
    .ha-browser-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .ha-browser-title { font-size: 14px; font-weight: 700; letter-spacing: 2px; color: var(--accent); }
    .ha-browser-search { width: 100%; padding: 8px 12px; font-family: var(--font); font-size: 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; margin-bottom: 10px; }
    .ha-browser-search:focus { border-color: var(--accent); }
    .ha-browser-domains { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
    .ha-domain-pill { padding: 3px 10px; font-family: var(--font); font-size: 10px; border-radius: 10px; border: 1px solid var(--border); background: transparent; color: var(--dim); cursor: pointer; transition: all .15s; }
    .ha-domain-pill.active { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
    .ha-browser-count { font-size: 10px; color: var(--dim); margin-bottom: 8px; letter-spacing: 1px; }
    .ha-browser-list { flex: 1; overflow-y: auto; min-height: 200px; max-height: 320px; display: flex; flex-direction: column; gap: 2px; }
    .ha-browser-list::-webkit-scrollbar { width: 4px; }
    .ha-browser-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .ha-browser-item { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 5px; cursor: pointer; transition: background .12s; }
    .ha-browser-item:hover { background: rgba(255,255,255,0.04); }
    .ha-browser-item.selected { background: var(--accent-bg); }
    .ha-browser-check { width: 16px; height: 16px; border-radius: 3px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
    .ha-browser-item.selected .ha-browser-check { background: var(--accent-bg); border-color: var(--accent); }
    .ha-browser-entity-info { flex: 1; min-width: 0; }
    .ha-browser-entity-name { font-size: 12px; color: var(--text); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ha-browser-entity-id { font-size: 10px; color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ha-browser-entity-state { font-size: 10px; color: rgba(255,255,255,0.2); flex-shrink: 0; }
    .ha-browser-footer { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
    .ha-browser-add-btn { width: 100%; padding: 10px; font-family: var(--font); font-size: 12px; font-weight: 700; letter-spacing: 1px; border-radius: 6px; border: 1px solid var(--accent); background: var(--accent-bg); color: var(--accent); cursor: pointer; transition: background .15s; }
    .ha-browser-add-btn:hover:not([disabled]) { background: rgba(0,217,255,0.18); }
    .ha-browser-add-btn[disabled] { opacity: 0.4; cursor: not-allowed; }

    /* ── Sticky save button ── */
    .sticky-save-btn { padding: 7px 18px; font-size: 11px; font-weight: 700; font-family: var(--font); letter-spacing: 1.5px; border-radius: 6px; cursor: pointer; background: var(--accent); color: var(--bg); border: none; transition: all .25s; position: relative; }
    .sticky-save-btn:hover { opacity: 0.9; }
    .sticky-save-btn.saved { background: var(--green); }
    .sticky-save-btn.dirty::after { content: ''; position: absolute; top: -3px; right: -3px; width: 8px; height: 8px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 6px var(--amber); }

    /* ── Panel config inline ── */
    .panel-config-body { padding: 12px 16px; margin-top: 4px; background: rgba(255,255,255,0.015); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; gap: 10px; }
    .panel-configure-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-family: var(--font); font-size: 10px; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; transition: all .15s; opacity: 0.7; }
    .panel-configure-btn:hover { opacity: 1; background: var(--accent-bg); }

    /* ── Panel picker dropdown ── */
    .panel-picker { position: absolute; top: 100%; left: 0; right: 0; z-index: 100; margin-top: 4px; background: var(--bg2); border: 1px solid var(--accent-mid); border-radius: 6px; padding: 8px; max-height: 200px; overflow-y: auto; }
    .panel-picker-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; transition: background .12s; }
    .panel-picker-item:hover { background: var(--accent-bg); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
  </style>
</head>
<body>
<div id="settings-root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
  const { createElement: h, useState, useEffect, useRef, useMemo, useCallback } = React;

  // ── Themes ──────────────────────────────────────────────────────────────────
  const THEMES = [
    { id:'midnight', name:'Midnight', accent:'#00d9ff', bg:'#060a10', bg2:'#0a0f1a', border:'rgba(255,255,255,0.06)', text:'#c8d6e5', textBright:'#e8f0f8', dim:'rgba(255,255,255,0.30)' },
    { id:'carbon',   name:'Carbon',   accent:'#ff4444', bg:'#0d0d0d', bg2:'#161616', border:'rgba(255,255,255,0.07)', text:'#d0cccc', textBright:'#f0eeee', dim:'rgba(255,255,255,0.28)' },
    { id:'nebula',   name:'Nebula',   accent:'#a855f7', bg:'#08050f', bg2:'#0e0a1c', border:'rgba(168,85,247,0.12)', text:'#c4b8e0', textBright:'#e8dcf8', dim:'rgba(200,180,255,0.30)' },
    { id:'forest',   name:'Forest',   accent:'#50fa7b', bg:'#060e08', bg2:'#0a1510', border:'rgba(80,250,123,0.08)',  text:'#b8d4bc', textBright:'#dff0e4', dim:'rgba(180,230,190,0.30)' },
    { id:'ember',    name:'Ember',    accent:'#ff9500', bg:'#0f0a06', bg2:'#180e08', border:'rgba(255,149,0,0.10)',   text:'#d8c4a8', textBright:'#f0dcc0', dim:'rgba(220,180,120,0.30)' },
  ];

  function applyTheme(theme) {
    const r = document.documentElement.style;
    r.setProperty('--bg', theme.bg); r.setProperty('--bg2', theme.bg2);
    r.setProperty('--border', theme.border); r.setProperty('--text', theme.text);
    r.setProperty('--text-bright', theme.textBright); r.setProperty('--dim', theme.dim);
    r.setProperty('--accent', theme.accent);
    document.body.style.background = theme.bg;
    const hex = theme.accent.replace('#','');
    const ar = parseInt(hex.slice(0,2),16), ag = parseInt(hex.slice(2,4),16), ab = parseInt(hex.slice(4,6),16);
    r.setProperty('--accent-dim',  `rgba(${ar},${ag},${ab},0.06)`);
    r.setProperty('--accent-bg',   `rgba(${ar},${ag},${ab},0.11)`);
    r.setProperty('--accent-glow', `rgba(${ar},${ag},${ab},0.20)`);
    r.setProperty('--accent-mid',  `rgba(${ar},${ag},${ab},0.33)`);
  }

  // ── Domain icons ──────────────────────────────────────────────────────────
  const DOMAIN_ICONS = {light:'💡',switch:'🔌',sensor:'📊',binary_sensor:'🔲',climate:'🌡️',
    media_player:'📺',camera:'📷',cover:'🚪',fan:'💨',vacuum:'🤖',script:'📝',
    automation:'⚙️',scene:'🎬',input_boolean:'🔘',input_select:'📋',person:'👤',
    device_tracker:'📍',sun:'☀️',weather:'🌤️',number:'🔢',select:'📋',button:'🔲'};

  // ── HA Entity Browser ─────────────────────────────────────────────────────
  function HAEntityBrowser({ haUrl, haToken, onClose, onAdd }) {
    const [search, setSearch] = useState('');
    const [domain, setDomain] = useState('all');
    const [allEntities, setAllEntities] = useState([]);
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);
    const [selected, setSelected] = useState(new Set());
    const [domains, setDomains] = useState([]);

    useEffect(() => {
      if (!haUrl || !haToken) { setError('Configure HA URL and token first'); setLoading(false); return; }
      window.orbit.apiGet(haUrl + '/api/states', {'Authorization': 'Bearer ' + haToken}, 20000)
        .then(data => {
          if (data?.error) { setError('Network error: ' + data.error); setLoading(false); return; }
          if (!Array.isArray(data)) { setError('HA error: ' + (typeof data === 'object' ? JSON.stringify(data).slice(0,120) : String(data).slice(0,120))); setLoading(false); return; }
          const sorted = [...data].sort((a,b) => a.entity_id.localeCompare(b.entity_id));
          setAllEntities(sorted);
          const d = new Set(sorted.map(e => e.entity_id.split('.')[0]));
          setDomains(['all', ...Array.from(d).sort()]);
          setLoading(false);
        }).catch(e => { setError('Failed: ' + e.message); setLoading(false); });
    }, [haUrl, haToken]);

    const filtered = allEntities.filter(e => {
      if (domain !== 'all' && e.entity_id.split('.')[0] !== domain) return false;
      if (!search) return true;
      const q = search.toLowerCase();
      return e.entity_id.includes(q) || (e.attributes?.friendly_name||'').toLowerCase().includes(q);
    });

    function toggle(entityId) { setSelected(prev => { const n = new Set(prev); n.has(entityId) ? n.delete(entityId) : n.add(entityId); return n; }); }
    function addSelected() {
      onAdd(Array.from(selected).map(entityId => {
        const e = allEntities.find(x => x.entity_id === entityId);
        return { entityId, name: e?.attributes?.friendly_name || '' };
      }));
      onClose();
    }

    return h('div', {className:'ha-browser-overlay', onClick:e=>{if(e.target===e.currentTarget)onClose();}},
      h('div', {className:'ha-browser-modal'},
        h('div', {className:'ha-browser-header'},
          h('div', {className:'ha-browser-title'}, '🏠 BROWSE ENTITIES'),
          h('button', {className:'settings-close-btn', onClick:onClose, style:{fontSize:'18px',padding:'2px 8px'}}, '✕')
        ),
        loading ? h('div', {style:{textAlign:'center',padding:'48px',color:'var(--dim)'}}, '⏳ Loading…')
        : error ? h('div', {style:{textAlign:'center',padding:'48px',color:'#ff5555',fontSize:'12px'}}, error)
        : h(React.Fragment, null,
          h('input', {className:'ha-browser-search', placeholder:'Search…', value:search, onChange:e=>setSearch(e.target.value), autoFocus:true}),

    const [detecting, setDetecting] = useState(false);

    async function detect() {
      setDetecting(true); setDetectMsg(''); setDetectOk(false);
      try {

          const url = result.url || ('http://localhost:' + result.port);
          updateIntegration('signalrgb', 'url', url);

          setDetectOk(true);

          setDetectMsg(result?.error || 'Could not detect SignalRGB');

      setDetecting(false);
    }

    return h('div', null,
      h('div', {className:'settings-label'}, 'URL'),
      h('div', {style:{display:'flex',gap:'6px',alignItems:'center'}},

  // ── Pages Tab ─────────────────────────────────────────────────────────────
  function PagesTab({ cfg, setCfg }) {
    const [editingIndex, setEditingIndex] = useState(-1);

    const [dragOverIndex, setDragOverIndex] = useState(-1);
    const [pickerPage, setPickerPage] = useState(-1);
    const ICONS = {clock:'🕐',tautulli:'▶',nowplaying:'▶',signalrgb:'⚡',lights:'💡',system:'💻',media:'📡',spotify:'🎵',links:'🔗',jellyfin:'🎞️',sonarr:'📺',radarr:'🎬',overseerr:'🎭',nzbget:'⬇',sabnzbd:'📥',homeassistant:'💡',proxmox:'🖥️',docker:'🐳',pihole:'🛡️',truenas:'💾',immich:'📸',speedtest:'🚀',calendar:'📅',network:'🌐',unraid:'🟠',custom:'🌐',weather:'🌤️',services:'📡'};
    const NAMES = {clock:'Clock & Weather',tautulli:'Now Playing',nowplaying:'Now Playing',signalrgb:'SignalRGB',lights:'Home Assistant',system:'System Monitor',media:'Media Stack',spotify:'Spotify',links:'Quick Links',jellyfin:'Jellyfin',sonarr:'Sonarr',radarr:'Radarr',overseerr:'Overseerr',nzbget:'NZBGet',sabnzbd:'SABnzbd',homeassistant:'Home Assistant',proxmox:'Proxmox',docker:'Docker',pihole:'Pi-hole',truenas:'TrueNAS',immich:'Immich',speedtest:'Speedtest',calendar:'Calendar',network:'Network Monitor',unraid:'Unraid',custom:'Custom / Embed',weather:'Weather',services:'Services'};

    function addPage() {
      const name = prompt('Page name:');
      if (!name || !name.trim()) return;
      const newPage = { id: Date.now().toString(), name: name.trim(), panels: [] };
      setCfg(c => ({ ...c, pages: [...(c.pages || []), newPage] }));
    }

    function deletePage(idx) {
      const page = (cfg.pages || [])[idx];
      if (page && page.panels && page.panels.length > 0) {
        if (!confirm('Delete "' + (page.name || 'Page') + '"? It has ' + page.panels.length + ' panel(s).')) return;
      }
      setCfg(c => ({ ...c, pages: (c.pages || []).filter((_, i) => i !== idx) }));
    }

    function removePanel(pageIdx, panelIdx) {
      setCfg(c => {
        const pages = (c.pages || []).map((p, i) => i === pageIdx ? { ...p, panels: p.panels.filter((_, pi) => pi !== panelIdx) } : p);
        return { ...c, pages };
      });
    }

    function movePanel(pageIdx, panelIdx, dir) {
      setCfg(c => {
        const pages = [...(c.pages || [])];
        const panels = [...pages[pageIdx].panels];
        const newIdx = panelIdx + dir;
        if (newIdx < 0 || newIdx >= panels.length) return c;
        const tmp = panels[panelIdx]; panels[panelIdx] = panels[newIdx]; panels[newIdx] = tmp;
        pages[pageIdx] = { ...pages[pageIdx], panels };
        return { ...c, pages };
      });
    }

    function addPanelToPage(pageIdx, type) {
      setCfg(c => {
        const pages = [...(c.pages || [])];
        pages[pageIdx] = { ...pages[pageIdx], panels: [...pages[pageIdx].panels, { type }] };
        return { ...c, pages };
      });
      setPickerPage(-1);
    }

    function getAvailablePanels(pageIdx) {
      const panels = cfg.panels || {};
      const onPage = new Set(((cfg.pages || [])[pageIdx]?.panels || []).map(p => p.type));
      return PANEL_DEFS.filter(p => !p.alias && panels[p.key] !== false && !onPage.has(p.key));
    }

    return h('div', null,
      h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}},
        h('div', {className:'settings-section', style:{margin:0}}, 'PAGES'),
        h('button', {className:'layout-save-btn', onClick:addPage}, '+ ADD PAGE')
      ),

      (cfg.pages||[]).map((page,i) =>
        h('div', {key:page.id||i, style:{marginBottom:'16px'}},
          // Page header row
          h('div', {className:'page-row'+(dragOverIndex===i?' drag-over':''), draggable:true,
            onDragStart:e=>{e.dataTransfer.setData('text/plain',String(i));e.dataTransfer.effectAllowed='move';},
            onDragOver:e=>{e.preventDefault();setDragOverIndex(i);},
            onDragLeave:()=>setDragOverIndex(-1),
            onDragEnd:()=>setDragOverIndex(-1),
            onDrop:e=>{e.preventDefault();setDragOverIndex(-1);const from=Number(e.dataTransfer.getData('text/plain'));if(from===i||isNaN(from))return;const pages=cfg.pages.slice();const moved=pages.splice(from,1)[0];pages.splice(i,0,moved);setCfg({...cfg,pages});}
          },
            h('span', {className:'page-drag-handle'}, '⠿'),
            editingIndex===i
              ? h('input', {className:'page-rename-input', value:editingValue, autoFocus:true,
                  onChange:e=>setEditingValue(e.target.value),
                  onBlur:()=>{if(editingValue.trim()){const pages=[...(cfg.pages||[])];pages[i]={...pages[i],name:editingValue.trim()};setCfg({...cfg,pages});}setEditingIndex(-1);},
                  onKeyDown:e=>{if(e.key==='Enter'){if(editingValue.trim()){const pages=[...(cfg.pages||[])];pages[i]={...pages[i],name:editingValue.trim()};setCfg({...cfg,pages});}setEditingIndex(-1);}if(e.key==='Escape')setEditingIndex(-1);}
                })
              : h('span', {className:'page-name-display', style:{flex:1}}, page.name||'Page '+(i+1)),
            h('button', {className:'page-edit-btn', onClick:()=>{setEditingIndex(i);setEditingValue(page.name||'Page '+(i+1));}}, '✏'),
            h('button', {className:'page-delete-btn', onClick:()=>deletePage(i)}, '✕')
          ),

          // Panels on this page
          h('div', {style:{paddingLeft:'28px',marginTop:'4px'}},
            (page.panels||[]).map((panel,pi) =>
              h('div', {key:pi, style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px',padding:'5px 8px',background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:'4px'}},
                h('span', {style:{fontSize:'14px',width:'20px',textAlign:'center'}}, ICONS[panel.type]||'▪'),
                h('span', {style:{flex:1,fontSize:'12px',color:'var(--text)'}}, NAMES[panel.type]||panel.type),
                h('div', {style:{display:'flex',gap:'2px'}},
                  h('button', {disabled:pi===0, onClick:()=>movePanel(i,pi,-1), style:{background:'none',border:'none',color:'var(--dim)',cursor:'pointer',fontSize:'12px',opacity:pi===0?0.3:1}}, '↑'),
                  h('button', {disabled:pi>=(page.panels||[]).length-1, onClick:()=>movePanel(i,pi,1), style:{background:'none',border:'none',color:'var(--dim)',cursor:'pointer',fontSize:'12px',opacity:pi>=(page.panels||[]).length-1?0.3:1}}, '↓'),
                  h('button', {onClick:()=>removePanel(i,pi), className:'page-delete-btn', style:{fontSize:'13px',marginLeft:'4px'}}, '✕')
                )
              )
            ),

            // Add panel button + picker
            h('div', {style:{marginTop:'6px',position:'relative'}},
              h('button', {style:{background:'none',border:'1px dashed var(--border)',borderRadius:'4px',padding:'5px 10px',color:'var(--dim)',cursor:'pointer',fontSize:'11px',fontFamily:'var(--font)',letterSpacing:'1px',transition:'all .15s'},
                onClick:()=>setPickerPage(pickerPage===i?-1:i)
              }, '+ ADD PANEL'),
              pickerPage===i && h('div', {className:'panel-picker'},
                getAvailablePanels(i).length===0
                  ? h('div', {style:{fontSize:'11px',color:'var(--dim)',textAlign:'center',padding:'8px'}}, 'All enabled panels are on this page')
                  : getAvailablePanels(i).map(p =>
                      h('div', {key:p.key, className:'panel-picker-item', onClick:()=>addPanelToPage(i,p.key)},
                        h('span', {style:{fontSize:'14px',width:'20px',textAlign:'center'}}, p.icon),
                        h('span', {style:{color:'var(--text)'}}, p.label)
                      )
                    )
              )
            )
          )
        )
      ),

      (cfg.pages||[]).length===0 && h('div', {style:{textAlign:'center',padding:'32px',color:'var(--dim)',fontSize:'12px',border:'1px dashed var(--border)',borderRadius:'8px'}},
        'No pages yet. Click "+ Add Page" to get started.'
      )
    );
  }

  // ── Panels Tab (toggles + inline config) ──────────────────────────────────
  function PanelsTab({ cfg, setCfg, updateIntegration }) {
    const panels = cfg.panels || {};
    const [expandedPanels, setExpandedPanels] = useState({});

    function toggle(key) {
      const current = panels[key] !== false;
      const newPanels = { ...(cfg.panels || {}), [key]: !current };
      let newOrder = cfg.panelOrder ? [...cfg.panelOrder] : undefined;
      if (!current && newOrder) {
        newOrder = newOrder.filter(id => id !== key);
        newOrder.push(key);
      }
      setCfg(c => ({ ...c, panels: newPanels, ...(newOrder ? { panelOrder: newOrder } : {}) }));
    }

    function toggleConfig(key) {
      setExpandedPanels(p => ({ ...p, [key]: !p[key] }));
    }

    function hasConfig(key) {
      return PANEL_INTEGRATIONS[key] || SPECIAL_CONFIG_PANELS.has(key);
    }

    function renderFields(integrationKey, fields) {
      return fields.map(f => h(React.Fragment, {key:f.field||f.type},
        f.type === 'ha-entities'
          ? h(HAEntitiesEditor, {integrationKey, cfg, updateIntegration})
          : f.type === 'checkbox'
            ? h('label', {style:{display:'flex',alignItems:'center',gap:'8px',cursor:'pointer',marginTop:'4px'}},
                h('input', {type:'checkbox', checked:!!cfg.integrations?.[integrationKey]?.[f.field], onChange:e=>updateIntegration(integrationKey,f.field,e.target.checked), style:{accentColor:'var(--accent)',width:'16px',height:'16px'}}),
                h('span', {className:'settings-label', style:{margin:0}}, f.label))
            : h(React.Fragment, null,
              h('div', {className:'settings-label'}, f.label),
              f.type === 'password'
                ? h('input', {className:'settings-input', type:'password', value:cfg.integrations?.[integrationKey]?.[f.field]||'', onChange:e=>updateIntegration(integrationKey,f.field,e.target.value), placeholder:f.placeholder||''})
                : f.type === 'number'
                ? h('input', {className:'settings-input', type:'number', value:cfg.integrations?.[integrationKey]?.[f.field]||'', onChange:e=>updateIntegration(integrationKey,f.field,parseInt(e.target.value)||0), placeholder:f.placeholder||''})
                : f.type === 'select'
                ? h('select', {className:'settings-input', value:cfg.integrations?.[integrationKey]?.[f.field]||'', onChange:e=>updateIntegration(integrationKey,f.field,e.target.value)},
                    (f.options||[]).map(o => h('option', {key:o, value:o}, o.charAt(0).toUpperCase()+o.slice(1))))
                : h('input', {className:'settings-input', type:'text', value:cfg.integrations?.[integrationKey]?.[f.field]||'', onChange:e=>updateIntegration(integrationKey,f.field,e.target.value), placeholder:f.placeholder||''})
            )
      ));
    }

    function renderConfigBody(panelKey) {
      // Special panels
      if (panelKey === 'signalrgb') return h(SignalRGBConfigFields, {cfg, updateIntegration});
      if (panelKey === 'services') return h(ServicesConfigFields, {cfg, setCfg});
      if (panelKey === 'calendar') return h(CalendarConfigFields, {cfg, setCfg});
      if (panelKey === 'links') return h(LinksConfigFields, {cfg, setCfg});

      // Standard integration fields
      const integrations = PANEL_INTEGRATIONS[panelKey];

      return h(React.Fragment, null,

          renderFields(intg.key, intg.fields)
        ))

    return h('div', null,
      h('div', {className:'settings-section'}, 'PANEL VISIBILITY'),

  function isBuiltinLayout(key) { return key && key.startsWith('_'); }

  function getAllLayouts(cfg) {
    return { ...BUILTIN_LAYOUTS, ...(cfg?.layouts || {}) };
  }

  function LayoutsTab({ cfg, setCfg }) {
    const [saveName, setSaveName] = useState('');
    const [renaming, setRenaming] = useState(null);
    const [renameVal, setRenameVal] = useState('');
    const [msg, setMsg] = useState('');

    const allLayouts = getAllLayouts(cfg);
    const currentKey = cfg.currentLayout || '_default';

    function flashMsg(text) { setMsg(text); setTimeout(() => setMsg(''), 2000); }

    function saveCurrentAsLayout() {
      const name = saveName.trim();
      if (!name) return;
      const key = name.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
      if (!key || isBuiltinLayout('_' + key)) { flashMsg('Cannot use reserved name'); return; }
      const finalKey = key.startsWith('_') ? key.slice(1) : key;
      const layout = {
        name,
        panelOrder: cfg.panelOrder ? [...cfg.panelOrder] : [...DEFAULT_PANEL_ORDER],
        panels: { ...(cfg.panels || {}) },
        panelCollapsed: { ...(cfg.panelCollapsed || {}) }
      };
      const newLayouts = { ...(cfg.layouts || {}), [finalKey]: layout };
      setCfg(c => ({ ...c, layouts: newLayouts, currentLayout: finalKey }));
      setSaveName('');
      flashMsg('Layout saved');
    }

    function loadLayout(key) {
      const layout = allLayouts[key];
      if (!layout) return;
      setCfg(c => ({
        ...c,
        panelOrder: [...layout.panelOrder],
        panels: { ...layout.panels },
        panelCollapsed: { ...layout.panelCollapsed },
        currentLayout: key
      }));
      flashMsg('Layout loaded');
    }

    function deleteLayout(key) {
      if (isBuiltinLayout(key)) return;
      const newLayouts = { ...(cfg.layouts || {}) };
      delete newLayouts[key];
      const newCurrent = currentKey === key ? '_default' : currentKey;
      if (currentKey === key) {
        const def = BUILTIN_LAYOUTS._default;
        setCfg(c => ({
          ...c, layouts: newLayouts, currentLayout: newCurrent,
          panelOrder: [...def.panelOrder], panels: { ...def.panels }, panelCollapsed: { ...def.panelCollapsed }
        }));
      } else {
        setCfg(c => ({ ...c, layouts: newLayouts, currentLayout: newCurrent }));
      }
      flashMsg('Layout deleted');
    }

    function startRename(key) {
      setRenaming(key);
      setRenameVal(allLayouts[key]?.name || '');
    }

    function commitRename(key) {
      const name = renameVal.trim();
      if (!name || isBuiltinLayout(key)) { setRenaming(null); return; }
      const newLayouts = { ...(cfg.layouts || {}) };
      if (newLayouts[key]) {
        newLayouts[key] = { ...newLayouts[key], name };
      }
      setCfg(c => ({ ...c, layouts: newLayouts }));
      setRenaming(null);
      flashMsg('Layout renamed');
    }

    return h('div', null,
      h('div', {className:'settings-section'}, 'LAYOUTS'),
      h('div', {style:{fontSize:'11px',color:'var(--dim)',marginBottom:'16px',lineHeight:'1.6',letterSpacing:'0.5px'}},
        'Save and switch between different panel arrangements. Layouts capture panel order, visibility, and collapsed state.'
      ),

      Object.entries(allLayouts).map(([key, layout]) => {
        const isActive = key === currentKey;
        const isPreset = isBuiltinLayout(key);
        const isRenaming = renaming === key;

        return h('div', {key, className:'layout-row' + (isActive ? ' active' : '')},
          isRenaming
            ? h('input', {
                className: 'layout-rename-input',
                value: renameVal,
                onChange: e => setRenameVal(e.target.value),
                onKeyDown: e => { if (e.key === 'Enter') commitRename(key); if (e.key === 'Escape') setRenaming(null); },
                autoFocus: true
              })
            : h('span', {className:'layout-row-name'}, (isActive ? '● ' : '') + layout.name),
          isPreset && h('span', {className:'layout-row-badge'}, 'PRESET'),
          h('div', {className:'layout-row-actions'},
            !isActive && h('button', {className:'layout-action-btn', onClick:()=>loadLayout(key), title:'Load layout'}, '↗'),
            !isPreset && !isRenaming && h('button', {className:'layout-action-btn', onClick:()=>startRename(key), title:'Rename'}, '✎'),
            isRenaming && h('button', {className:'layout-action-btn', onClick:()=>commitRename(key), title:'Confirm'}, '✓'),
            !isPreset && !isRenaming && h('button', {className:'layout-action-btn danger', onClick:()=>deleteLayout(key), title:'Delete'}, '✕')
          )
        );
      }),

      h('div', {className:'settings-section', style:{marginTop:'24px'}}, 'SAVE CURRENT LAYOUT'),
      h('div', {className:'layout-save-row'},
        h('input', {
          className: 'layout-save-input',
          placeholder: 'Layout name...',
          value: saveName,
          onChange: e => setSaveName(e.target.value),
          onKeyDown: e => { if (e.key === 'Enter') saveCurrentAsLayout(); }
        }),
        h('button', {className:'layout-save-btn', onClick:saveCurrentAsLayout}, 'SAVE')
      ),

      msg && h('div', {style:{fontSize:'12px',color:'var(--green)',marginTop:'8px',letterSpacing:'1px'}}, msg)
    );
  }

  // ── Main Settings App ─────────────────────────────────────────────────────
  function SettingsApp() {
    const [cfg, setCfg] = useState(null);
    const [tab, setTab] = useState('pages');
    const [saved, setSaved] = useState(false);
    const origRef = useRef(null);

    useEffect(() => {
      window.orbit?.loadConfig().then(c => {
        if (c) {
          setCfg(c);
          origRef.current = JSON.stringify(c);
          const t = THEMES.find(t => t.id === c.theme?.themeId);
          if (t) applyTheme(t);
          else if (c.theme?.accentColor) document.documentElement.style.setProperty('--accent', c.theme.accentColor);
        }
      }).catch(()=>{});
    }, []);

    const dirty = cfg && origRef.current ? JSON.stringify(cfg) !== origRef.current : false;

    const save = async () => {
      await window.orbit?.saveConfig(cfg);
      origRef.current = JSON.stringify(cfg);
      setSaved(true);
      setTimeout(()=>setSaved(false), 1500);
    };

    function updateIntegration(key, field, value) {
      setCfg(prev => {
        const next = JSON.parse(JSON.stringify(prev));
        if (!next.integrations) next.integrations = {};
        if (!next.integrations[key]) next.integrations[key] = {};
        next.integrations[key][field] = value;
        return next;
      });
    }

    const TABS = ['pages','panels','layouts','prefs','theme','system','about'];

    if (!cfg) return h('div', {style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--dim)',fontSize:'12px',letterSpacing:'2px'}}, 'LOADING...');

    return h('div', {id:'settings-root'},
      // Titlebar
      h('div', {className:'settings-titlebar'},
        h('div', {className:'settings-app-title'}, 'ORBIT'),
        h('div', {style:{display:'flex',gap:'10px',alignItems:'center'}},
          h('button', {
            className:'sticky-save-btn'+(saved?' saved':'')+(dirty && !saved?' dirty':''),
            onClick:save
          }, saved ? '✓ Saved' : '💾 Save'),
          h('button', {className:'settings-close-btn', onClick:()=>window.close(), title:'Close'}, '✕')
        )
      ),

      // Tabs
      h('div', {className:'settings-tabs'},
        TABS.map(t => h('button', {key:t, className:'settings-tab'+(tab===t?' active':''), onClick:()=>setTab(t)}, t.toUpperCase()))
      ),

      // Body
      h('div', {className:'settings-body'},

        // ── Pages tab ──
        tab === 'pages' && h(PagesTab, {cfg, setCfg}),

        // ── Panels tab ──
        tab === 'panels' && h(PanelsTab, {cfg, setCfg, updateIntegration}),

        // ── Layouts tab ──
        tab === 'layouts' && h(LayoutsTab, {cfg, setCfg}),

        // ── Prefs tab ──
        tab === 'prefs' && h(PrefsTab, {cfg, setCfg}),

        // ── Theme tab ──
        tab === 'theme' && h('div', null,
          h('div', {className:'settings-section'}, 'THEME'),
          h('div', {className:'settings-label'}, 'SELECT THEME'),
          h('div', {className:'theme-grid'},
            THEMES.map(theme => {
              const isActive = (cfg.theme?.themeId||'midnight') === theme.id;
              return h('div', {key:theme.id, className:'theme-swatch'+(isActive?' active':''), onClick:()=>{applyTheme(theme);setCfg(p=>({...p,theme:{...(p.theme||{}),themeId:theme.id,accentColor:theme.accent}}));},
                style:{border: isActive ? `2px solid ${theme.accent}` : '2px solid rgba(255,255,255,0.08)', background:theme.bg, boxShadow:isActive?`0 0 12px ${theme.accent}44`:'none'}},
                h('div', {style:{width:'24px',height:'24px',borderRadius:'50%',background:theme.accent,marginBottom:'4px',boxShadow:`0 0 8px ${theme.accent}66`}}),
                h('div', {style:{fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:theme.textBright}}, 'ABCD'),
                h('div', {style:{fontSize:'9px',letterSpacing:'1px',color:theme.dim}}, 'EFGH'),
                h('div', {style:{fontSize:'10px',fontWeight:'700',letterSpacing:'1.5px',color:theme.accent,marginTop:'2px'}}, theme.name.toUpperCase())
              );
            })
          )
        ),

        // ── System tab ──
        tab === 'system' && h(SystemTab, {cfg, setCfg}),

        // ── About tab ──
        tab === 'about' && h(AboutTab, null)
      )
    );
  }

  // Boot
  const root = ReactDOM.createRoot(document.getElementById('settings-root'));
  root.render(h(SettingsApp, null));
</script>
</body>
</html>
