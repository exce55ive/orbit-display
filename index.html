    // ═══ NOTIFICATION DEBOUNCE ═══
    const _notifyRecent = {};
    function orbitNotify(title, body) {
      const key = title + '\x00' + body;
      const now = Date.now();
      if (_notifyRecent[key] && now - _notifyRecent[key] < 5000) return;
      _notifyRecent[key] = now;
      window.orbit.notify(title, body);
    }

    // ═══ SPOTLIGHT SEARCH (Ctrl+K / Cmd+K) ═══
    function SpotlightSearch({ config, open, onClose }) {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const inputRef = useRef(null);
      const debounceRef = useRef(null);

      useEffect(() => {
        if (open && inputRef.current) {
          setQuery('');
          setResults([]);
          setTimeout(() => inputRef.current?.focus(), 50);
        }
      }, [open]);

      useEffect(() => {
        if (!open) return;
        function onKey(e) { if (e.key === 'Escape') onClose(); }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [open]);

      function buildIndex() {
        const items = [];
        const panels = config?.panels || {};
        const integrations = config?.integrations || {};
        // Panel types
        const PANEL_DEFS = [
          { type:'clock', name:'Clock', icon:'🕐' }, { type:'weather', name:'Weather', icon:'🌤️' },
          { type:'sonarr', name:'Sonarr', icon:'📺' }, { type:'radarr', name:'Radarr', icon:'🎬' },
          { type:'overseerr', name:'Overseerr', icon:'🎭' }, { type:'nzbget', name:'NZBGet', icon:'📦' },
          { type:'signalrgb', name:'SignalRGB', icon:'⚡' }, { type:'services', name:'Services', icon:'📡' },
          { type:'spotify', name:'Spotify', icon:'🎵' }, { type:'discord', name:'Discord', icon:'💬' },
          { type:'homeassistant', name:'Home Assistant', icon:'🏠' }, { type:'sysmon', name:'System Monitor', icon:'💻' },
          { type:'tautulli', name:'Tautulli', icon:'▶' }, { type:'jellyfin', name:'Jellyfin', icon:'🎞️' },
          { type:'nowplaying', name:'Now Playing', icon:'🎶' }, { type:'lights', name:'Lights', icon:'💡' },
          { type:'system', name:'System', icon:'💻' }, { type:'media', name:'Media', icon:'📺' },
          { type:'uptimekuma', name:'Uptime Kuma', icon:'📡' }, { type:'links', name:'Quick Links', icon:'🔗' },
          { type:'proxmox', name:'Proxmox', icon:'🖥️' }, { type:'docker', name:'Docker', icon:'🐳' },
          { type:'pihole', name:'Pi-hole', icon:'🛡️' }, { type:'truenas', name:'TrueNAS', icon:'💾' },
          { type:'network', name:'Network', icon:'🌐' }, { type:'unraid', name:'Unraid', icon:'🟠' },
          { type:'immich', name:'Immich', icon:'📸' }, { type:'speedtest', name:'Speedtest', icon:'🚀' },
          { type:'calendar', name:'Calendar', icon:'📅' }, { type:'custom', name:'Custom / Iframe', icon:'🌐' }
        ];
        PANEL_DEFS.forEach(p => {
          items.push({ label: p.name, subtitle: 'Jump to panel', icon: p.icon, action: () => { scrollToPanel(p.type); onClose(); } });
          items.push({ label: p.name + ' Settings', subtitle: 'Open settings', icon: '⚙', action: () => { window.orbit.openSettingsWindow(); onClose(); } });
          // Add service URLs
          const iCfg = integrations[p.type];
          if (iCfg?.url) {
            items.push({ label: 'Open ' + p.name, subtitle: iCfg.url, icon: '🔗', action: () => { window.orbit.openExternal(iCfg.url); onClose(); } });
          }
        });
        return items;
      }

      function scrollToPanel(type) {
        const el = document.querySelector('[class*="panel-drag-wrapper"]');
        const panels = document.querySelectorAll('.panel-drag-wrapper');
        for (const p of panels) {
          const inner = p.querySelector('.panel');
          if (inner) {
            const header = inner.querySelector('.panel-header-title');
            if (header && header.textContent.toLowerCase().includes(type.toLowerCase())) {
              p.scrollIntoView({ behavior: 'smooth', block: 'center' });
              p.style.outline = '2px solid var(--accent)';
              p.style.outlineOffset = '4px';
              p.style.transition = 'outline .3s';
              setTimeout(() => { p.style.outline = 'none'; }, 2000);
              return;
            }
          }
        }
      }

      function onInput(val) {
        setQuery(val);
        if (debounceRef.current) clearTimeout(debounceRef.current);
        debounceRef.current = setTimeout(() => {
          if (!val.trim()) { setResults([]); return; }
          const q = val.toLowerCase();
          const allItems = buildIndex();
          const matched = allItems.filter(item =>
            item.label.toLowerCase().includes(q) || (item.subtitle && item.subtitle.toLowerCase().includes(q))
          ).slice(0, 8);
          setResults(matched);
        }, 200);
      }

      if (!open) return null;

      return h('div', {
        className: 'spotlight-overlay',
        onClick: e => { if (e.target === e.currentTarget) onClose(); },
        style: {
          position: 'fixed', top: 0, left: 0, right: 0, bottom: 0,
          background: 'rgba(0,0,0,0.6)', backdropFilter: 'blur(8px)',
          display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
          paddingTop: '20vh', zIndex: 99999,
          animation: 'spotlightFadeIn .15s ease'
        }
      },
        h('div', {
          style: {
            width: '400px', background: 'var(--bg2)', border: '1px solid rgba(255,255,255,0.1)',
            borderRadius: '12px', boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
            overflow: 'hidden'
          }
        },
          h('input', {
            ref: inputRef, type: 'text', value: query,
            onInput: e => onInput(e.target.value),
            placeholder: 'Search panels...',
            style: {
              width: '100%', padding: '16px 20px', background: 'transparent',
              border: 'none', borderBottom: '1px solid rgba(255,255,255,0.06)',
              color: 'var(--text-bright)', fontSize: '16px', fontFamily: 'inherit',
              outline: 'none', boxSizing: 'border-box'
            }
          }),
          results.length > 0 && h('div', { style: { maxHeight: '300px', overflowY: 'auto' } },
            results.map((r, i) => h('div', {
              key: i,
              onClick: r.action,
              style: {
                display: 'flex', alignItems: 'center', gap: '12px',
                padding: '10px 20px', cursor: 'pointer',
                borderBottom: '1px solid rgba(255,255,255,0.04)',
                transition: 'background .15s'
              },
              onMouseEnter: e => e.currentTarget.style.background = 'rgba(255,255,255,0.06)',
              onMouseLeave: e => e.currentTarget.style.background = 'transparent'
            },
              h('span', { style: { fontSize: '16px', width: '24px', textAlign: 'center' } }, r.icon || '📦'),
              h('div', { style: { flex: 1, overflow: 'hidden' } },
                h('div', { style: { fontSize: '13px', color: 'var(--text-bright)', fontWeight: '500' } }, r.label),
                r.subtitle && h('div', { style: { fontSize: '10px', color: 'var(--dim)', marginTop: '1px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, r.subtitle)
              )
            ))
          ),
          query && results.length === 0 && h('div', { style: { padding: '20px', textAlign: 'center', color: 'var(--dim)', fontSize: '13px' } }, 'No results found'),
          !query && h('div', { style: { padding: '12px 20px', textAlign: 'center', color: 'var(--dim)', fontSize: '11px' } }, 'Type to search panels, settings, and services')
        )
      );
    }

    function App() {
      const [config, setConfig] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [showLeftArrow, setShowLeftArrow] = useState(false);
      const [showRightArrow, setShowRightArrow] = useState(false);
      const [signalIsOn, setSignalIsOn] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showWelcome, setShowWelcome] = useState(false);
      const [showSpotlight, setShowSpotlight] = useState(false);
      const [showGallery, setShowGallery] = useState(false);
      const touchRef = useRef(null);
      const dragIdxRef = useRef(null);

      // Load config + start SignalR
      useEffect(() => {
        window.orbit.loadConfig().then(cfg => {
          if (cfg) {
            setConfig(cfg);
            if (isFirstRun(cfg)) setShowWelcome(true);
            { const t = THEMES.find(t => t.id === cfg.theme?.themeId) || (cfg.theme?.accentColor ? null : THEMES[0]); if (t) applyTheme(t); else if (cfg.theme?.accentColor) document.documentElement.style.setProperty('--accent', cfg.theme.accentColor); }
            if (window.orbit.startSignalR && !cfg.demoMode) {
              window.orbit.startSignalR({
                sonarrUrl: cfg.integrations?.sonarr?.url || '',
                sonarrKey: cfg.integrations?.sonarr?.apiKey || '',
                radarrUrl: cfg.integrations?.radarr?.url || '',
                radarrKey: cfg.integrations?.radarr?.apiKey || ''
              });
            }
          } else {
            setConfig(DEFAULT_CONFIG);
            setShowWelcome(true);
          }
        });
        // Listen for config updates from settings window
        const unsub = window.orbit.onConfigUpdated(cfg => {
          if (cfg) {
            setConfig(cfg);
            { const t = THEMES.find(t => t.id === cfg.theme?.themeId) || (cfg.theme?.accentColor ? null : THEMES[0]); if (t) applyTheme(t); else if (cfg.theme?.accentColor) document.documentElement.style.setProperty('--accent', cfg.theme.accentColor); }
          }
        });
        // Reload config when settings window closes
        const unsubSettings = window.orbit.onSettingsClosed(() => {
          window.orbit.loadConfig().then(cfg => {
            if (cfg) {
              setConfig(cfg);
              { const t = THEMES.find(t => t.id === cfg.theme?.themeId) || (cfg.theme?.accentColor ? null : THEMES[0]); if (t) applyTheme(t); else if (cfg.theme?.accentColor) document.documentElement.style.setProperty('--accent', cfg.theme.accentColor); }
            }
          }).catch(() => {});
        });
        return () => { unsub(); unsubSettings(); };
      }, []);

      // ── Toast notifications: Sonarr / Radarr SignalR + NZBGet status ──
      const nzbPrevRef = useRef({});
      useEffect(() => {
        if (!config || config.demoMode) return;
        const notifCfg = config.notifications || { sonarr: true, radarr: true, nzbget: true };

        // Sonarr grab/download events
        const unsubSonarr = (notifCfg.sonarr !== false) ? window.orbit.onSonarrEvent(ev => {
          const name = ev.name || ev.eventType || '';
          if (/grab|download/i.test(name)) {
            const series = ev.series?.title || ev.body?.series?.title || 'Unknown';
            const ep = ev.episodes?.[0] || ev.body?.episodes?.[0];
            const epStr = ep ? ' S' + String(ep.seasonNumber||0).padStart(2,'0') + 'E' + String(ep.episodeNumber||0).padStart(2,'0') : '';
            orbitNotify('Sonarr', series + epStr + (/grab/i.test(name) ? ' grabbed' : ' downloaded'));
          }
        }) : null;

        // Radarr grab/download events
        const unsubRadarr = (notifCfg.radarr !== false) ? window.orbit.onRadarrEvent(ev => {
          const name = ev.name || ev.eventType || '';
          if (/grab|download/i.test(name)) {
            const movie = ev.movie?.title || ev.body?.movie?.title || 'Unknown';
            orbitNotify('Radarr', movie + (/grab/i.test(name) ? ' grabbed' : ' downloaded'));
          }
        }) : null;

        // NZBGet: detect SUCCESS transitions by polling
        let nzbTimer = null;
        const nCfg = config.integrations?.nzbget;
        if (notifCfg.nzbget !== false && nCfg?.url && nCfg?.username) {
          const auth = btoa(nCfg.username + ':' + (nCfg.password || ''));
          async function pollNzb() {
            try {
              const resp = await window.orbit.apiPost(nCfg.url + '/jsonrpc', { version: '1.1', method: 'history', params: [20], id: 99 }, { Authorization: 'Basic ' + auth });
              const items = Array.isArray(resp?.result) ? resp.result : [];
              const prev = nzbPrevRef.current;
              for (const item of items) {
                const id = item.NZBID || item.ID;
                if (!id) continue;
                if (prev[id] && prev[id] !== 'SUCCESS' && item.Status === 'SUCCESS') {
                  orbitNotify('NZBGet', (item.NZBNicename || item.NZBFilename || 'Download') + ' complete');
                }
              }
              const next = {};
              for (const item of items) { const id = item.NZBID || item.ID; if (id) next[id] = item.Status; }
              nzbPrevRef.current = next;
            } catch {}
            nzbTimer = setTimeout(pollNzb, 15000);
          }
          pollNzb();
        }

        return () => {
          if (unsubSonarr) unsubSonarr();
          if (unsubRadarr) unsubRadarr();
          if (nzbTimer) clearTimeout(nzbTimer);
        };
      }, [config?.notifications?.sonarr, config?.notifications?.radarr, config?.notifications?.nzbget,
          config?.integrations?.nzbget?.url, config?.integrations?.nzbget?.username]);

      const pages = config?.pages || DEFAULT_CONFIG.pages;
      const page = pages[currentPage] || pages[0];
      const panels = page?.panels || [];

      // Keyboard nav
      useEffect(() => {
        function onKey(e) {
          if (e.key === 'ArrowLeft' && currentPage > 0) setCurrentPage(p => p - 1);
          if (e.key === 'ArrowRight' && currentPage < pages.length - 1) setCurrentPage(p => p + 1);
          if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); setShowSpotlight(s => !s); }
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [currentPage, pages.length]);

      // Mouse hover zones for arrows (throttled to 100ms)
      useEffect(() => {
        let lastMove = 0;
        function onMove(e) {
          const now = Date.now();
          if (now - lastMove < 100) return;
          lastMove = now;
          setShowLeftArrow(e.clientX < 80 && currentPage > 0);
          setShowRightArrow(e.clientX > window.innerWidth - 80 && currentPage < pages.length - 1);
        }
        function onLeave() { setShowLeftArrow(false); setShowRightArrow(false); }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseleave', onLeave);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseleave', onLeave); };
      }, [currentPage, pages.length]);

      // Touch/swipe
      useEffect(() => {
        function onStart(e) { touchRef.current = e.touches?.[0]?.clientX ?? e.clientX; }
        function onEnd(e) {
          if (touchRef.current == null) return;
          const end = e.changedTouches?.[0]?.clientX ?? e.clientX;
          const delta = end - touchRef.current;
          if (Math.abs(delta) > 50) {
            if (delta > 0 && currentPage > 0) setCurrentPage(p => p - 1);
            if (delta < 0 && currentPage < pages.length - 1) setCurrentPage(p => p + 1);
          }
          touchRef.current = null;
        }
        window.addEventListener('touchstart', onStart);
        window.addEventListener('touchend', onEnd);
        return () => { window.removeEventListener('touchstart', onStart); window.removeEventListener('touchend', onEnd); };
      }, [currentPage, pages.length]);

      if (!config) return null;

      const openSettings = () => window.orbit.openSettingsWindow();
      _openSettingsRef = openSettings;

      // Only render configured and visible panels; grid cols = count of panels (max 6)
      const panelVisibility = config?.panels || {};
      const visiblePanels = [...panels].sort((a, b) => a.col - b.col).filter(p => panelVisibility[p.type] !== false);

      // Apply saved panel order from config.panelOrder (fall back to default)
      const panelOrder = Array.isArray(config?.panelOrder) && config.panelOrder.length > 0
        ? config.panelOrder
        : DEFAULT_PANEL_ORDER;
      const orderMap = {};
      panelOrder.forEach((id, i) => { orderMap[id] = i; });
      const inOrder = [];
      const notInOrder = [];
      for (const p of visiblePanels) {
        if (orderMap[p.type] !== undefined) inOrder.push(p);
        else notInOrder.push(p);
      }
      inOrder.sort((a, b) => orderMap[a.type] - orderMap[b.type]);
      const orderedPanels = [...inOrder, ...notInOrder];

      function clearDragClasses() {
        document.querySelectorAll('.panel-drag-wrapper').forEach(el => el.classList.remove('dragging', 'drag-over-left', 'drag-over-right'));
      }
      function onPanelDragStart(e, idx) {
        dragIdxRef.current = idx;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(idx));
        setTimeout(() => {
          const wrappers = document.querySelectorAll('#app > .panel-drag-wrapper');
          if (wrappers[idx]) wrappers[idx].classList.add('dragging');
        }, 0);
      }
      function onPanelDragEnd() {
        dragIdxRef.current = null;
        clearDragClasses();
      }
      function onPanelDragOver(e, idx) {
        e.preventDefault();
        const from = dragIdxRef.current;
        if (from === null || from === idx) return;
        clearDragClasses();
        const wrappers = document.querySelectorAll('#app > .panel-drag-wrapper');
        if (wrappers[from]) wrappers[from].classList.add('dragging');
        if (wrappers[idx]) wrappers[idx].classList.add(from < idx ? 'drag-over-right' : 'drag-over-left');
      }
      function onPanelDrop(e, idx) {
        e.preventDefault();
        const from = dragIdxRef.current;
        if (from === null || from === idx) return;
        const newOrder = orderedPanels.map(p => p.type);
        const [moved] = newOrder.splice(from, 1);
        newOrder.splice(idx, 0, moved);
        const newCfg = { ...config, panelOrder: newOrder };
        setConfig(newCfg);
        debouncedSaveConfig(newCfg);
        dragIdxRef.current = null;
        clearDragClasses();
      }

      // Collapse state
      const panelCollapsed = config?.panelCollapsed || {};
      function toggleCollapse(type) {
        const newCollapsed = { ...panelCollapsed, [type]: !panelCollapsed[type] };
        const newCfg = { ...config, panelCollapsed: newCollapsed };
        setConfig(newCfg);
        debouncedSaveConfig(newCfg);
      }

      const renderedPanels = [];
      orderedPanels.forEach((panelCfg, idx) => {
        const col = panelCfg.col;
        const isCollapsed = !!panelCollapsed[panelCfg.type];
        const dragProps = {
          draggable: true,
          onDragStart: e => onPanelDragStart(e, idx),
          onDragEnd: onPanelDragEnd,
          onDragOver: e => onPanelDragOver(e, idx),
          onDragLeave: e => { e.currentTarget.classList.remove('drag-over-left', 'drag-over-right'); },
          onDrop: e => onPanelDrop(e, idx),
        };
        const wrapperClass = 'panel-drag-wrapper' + (isCollapsed ? ' collapsed' : '');
        const collapseVal = { collapsed: isCollapsed, onToggleCollapse: () => toggleCollapse(panelCfg.type) };
        if (panelCfg.type === 'signalrgb' && config?.demoMode) {
          const demoSignal = renderDemoPanel('signalrgb');
          renderedPanels.push(h('div', {key:'signalrgb-drag-'+col, className:wrapperClass, ...dragProps},
            h(CollapseContext.Provider, {value: collapseVal},
              h(PanelErrorBoundary, {panelType:'signalrgb'}, demoSignal)
            )
          ));
        } else if (panelCfg.type === 'signalrgb') {
          renderedPanels.push(h('div', {key:'signalrgb-drag-'+col, className:wrapperClass, ...dragProps},
            h(CollapseContext.Provider, {value: collapseVal},
              h(PanelErrorBoundary, {panelType:'signalrgb'}, h(MSignalRGBPanel, {config, onSignalChange: setSignalIsOn}))
            )
          ));
        } else {
          const panel = renderPanel(panelCfg, config, openSettings, setConfig);
          if (panel) {
            renderedPanels.push(h('div', {key:panelCfg.type+'-drag-'+col, className:wrapperClass, ...dragProps},
              h(CollapseContext.Provider, {value: collapseVal}, panel)
            ));
          }
        }
      });
      if (renderedPanels.length === 0) {
        renderedPanels.push(h('div', {key:'empty', className:'panel'}, h('div',{style:{fontSize:'28px',opacity:0.08}},'+' )));
      }
      const visibleCount = orderedPanels.filter(p => !panelCollapsed[p.type]).length;
      const panelCols = Math.min(Math.max(visibleCount, 1), 6);

      return h(SignalRGBContext.Provider, {value: {isOn: signalIsOn}},
        h('div', {id:'app', style:{'--panel-cols': panelCols}}, ...renderedPanels),


        // ── Bottom bar — hard bumper with settings + dots + update ──────────
        h(BottomBar, {pages, currentPage, setCurrentPage, page, openSettings, config, setConfig, onOpenSpotlight: () => setShowSpotlight(true), onOpenGallery: () => setShowGallery(true)}),

        // Add Panel gallery overlay
        showGallery && h(PanelGallery, { config, setConfig, onClose: () => setShowGallery(false) }),




        // Spotlight search overlay
        h(SpotlightSearch, { config, open: showSpotlight, onClose: () => setShowSpotlight(false) }),

        // Welcome overlay (first-run onboarding)
        showWelcome && h(WelcomeOverlay, {
          onOpenSetup: () => {
            setShowWelcome(false);
            const newCfg = { ...(config || DEFAULT_CONFIG), firstRunComplete: true };
            setConfig(newCfg);
            window.orbit.saveConfig(newCfg);
            window.orbit.openSetup();
          },
          onTryDemo: () => {
            setShowWelcome(false);
            const base = config || DEFAULT_CONFIG;
            const demoCfg = { ...base, demoMode: true, firstRunComplete: true,
              pages: [
                { id: 'demo1', name: 'Overview', panels: [
                  {type:'clock',col:1},{type:'nowplaying',col:2},{type:'sonarr',col:3},{type:'nzbget',col:4},{type:'system',col:5},{type:'services',col:6}
                ]},
                { id: 'demo2', name: 'Media', panels: [
                  {type:'radarr',col:1},{type:'overseerr',col:2},{type:'jellyfin',col:3},{type:'spotify',col:4},{type:'signalrgb',col:5},{type:'lights',col:6}
                ]},
                { id: 'demo3', name: 'Infra', panels: [
                  {type:'proxmox',col:1},{type:'docker',col:2},{type:'pihole',col:3},{type:'truenas',col:4},{type:'links',col:5},{type:'clock',col:6}
                ]}
              ]
            };
            setConfig(demoCfg);
            window.orbit.saveConfig(demoCfg);
          },
          onSkip: () => {
            setShowWelcome(false);
            const newCfg = { ...(config || DEFAULT_CONFIG), firstRunComplete: true };
            setConfig(newCfg);
            window.orbit.saveConfig(newCfg);
          }
        }),

      );
    }

    // ═══ RENDER ═══
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(h(App, null));
  </script>
</body>
</html>
