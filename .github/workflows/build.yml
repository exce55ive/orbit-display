name: Build Orbit

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS installer
        run: npx electron-builder --win nsis --x64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Generate latest.yml
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\OrbitSetup-*.exe | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA512).Hash.ToLower()
          $size = $exe.Length
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffZ")
          $name = $exe.Name
          @"
          version: $version
          files:
            - url: $name
              sha512: $hash
              size: $size
          path: $name
          sha512: $hash
          releaseDate: '$date'
          "@ | Set-Content dist\latest.yml

      - name: List build output
        run: ls dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrbitSetup-windows
          path: dist/OrbitSetup-*.exe

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/OrbitSetup-*.exe
            dist/latest.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
