  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {

    html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: var(--font); color: var(--text); -webkit-font-smoothing: antialiased; user-select: none; cursor: default; }

    #app { position: relative; z-index: 1; width: 100vw; height: 100vh; display: grid; grid-template-columns: repeat(var(--panel-cols, 6), 1fr); gap: 0; }
    .panel { height: calc(100vh - 52px); padding: 60px 20px 16px; border-right: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }

    .panel-label { font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 12px; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .panel-drag-handle { cursor: grab; color: rgba(255,255,255,0.12); font-size: 11px; letter-spacing: 1px; transition: color .2s; user-select: none; line-height: 1; }

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    const h = React.createElement;
    const { useState, useEffect, useRef, useCallback, useMemo, useContext, createContext } = React;

    // ═══ ERROR BOUNDARY ═══
    class PanelErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; this._retryTimer = null; }
      static getDerivedStateFromError(err) { return { hasError: true, error: err }; }
      componentDidCatch(err, info) { console.error('Panel error (' + (this.props.panelType || 'unknown') + '):', err, info); this._scheduleRetry(); }
      _scheduleRetry() { clearTimeout(this._retryTimer); this._retryTimer = setTimeout(() => { this.setState({ hasError: false, error: null }); }, 30000); }
      componentWillUnmount() { clearTimeout(this._retryTimer); }
      render() {
        if (this.state.hasError) {
          return h('div', { className: 'panel', style: { justifyContent: 'center', alignItems: 'center', opacity: 0.5 } },
            h('div', { className: 'panel-label' }, '⚠ Service unavailable'),
            h('div', { style: { fontSize: '11px', color: 'var(--dim)', textAlign: 'center', padding: '0 12px', marginTop: '8px' } },
              'Auto-retrying…'),
            h('button', { className: 'settings-save', style: { marginTop: '12px', fontSize: '10px', padding: '4px 10px' },
              onClick: () => { clearTimeout(this._retryTimer); this.setState({ hasError: false, error: null }); } }, 'Retry Now')
          );
        }
        return this.props.children;
      }
    }

    // Safe async wrapper for panel polling — catches IPC/fetch errors and returns fallback
    function useSafeAsync(asyncFn, deps, fallback) {
      const [result, setResult] = useState(fallback);
      const [error, setError] = useState(null);
      const retryRef = useRef(null);
      useEffect(() => {
        let cancelled = false;
        async function run() {
          try {
            const data = await asyncFn();
            if (!cancelled) { setResult(data); setError(null); }
          } catch (e) {
            console.warn('Panel async error:', e);
            if (!cancelled) setError(e);
          }
        }
        run();
        return () => { cancelled = true; };
      }, deps);
      return [result, error];
    }

    // ═══ BOOT ANIMATION ═══
    (function bootAnimation() {
      const lines = ['INITIALISING DISPLAY', 'LOADING INTEGRATIONS', 'CHECKING UPDATES', 'SYSTEM SENSORS OK', 'READY'];
      const el = document.getElementById('boot-lines');
      const overlay = document.getElementById('boot-overlay');
      const MIN_DISPLAY = 3200;
      const startTime = Date.now();
      let i = 0;
      function addLine() {
        if (i < lines.length) {
          el.textContent += (i > 0 ? '\n' : '') + '> ' + lines[i];
          i++;
          setTimeout(addLine, 400 + Math.random() * 300);
        } else {
          const elapsed = Date.now() - startTime;
          const remaining = Math.max(0, MIN_DISPLAY - elapsed);
          setTimeout(() => { overlay.classList.add('hidden'); setTimeout(() => overlay.remove(), 600); }, remaining);
        }
      }
      setTimeout(addLine, 300);
    })();

    // ═══ HELPERS ═══
    function weatherEmoji(code) {
      const c = parseInt(code);
      if (c <= 113) return '☀️'; if (c <= 119) return '⛅'; if (c <= 122) return '☁️';
      if (c <= 143) return '🌫️'; if (c <= 176) return '🌦️'; if (c <= 200) return '⛈️';
      if (c <= 260) return '🌫️'; if (c <= 299) return '🌧️'; if (c <= 399) return '🌧️';
      return '🌦️';
    }
    function getStatColor(pct) { return pct >= 80 ? 'red' : pct >= 60 ? 'amber' : 'green'; }
    function formatBytes(b) { if (b >= 1048576) return (b/1048576).toFixed(1)+' MB/s'; if (b >= 1024) return (b/1024).toFixed(0)+' KB/s'; return Math.round(b)+' B/s'; }
    function formatDuration(s) { if (!s || s < 0) return '0:00'; const hr = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60); if (hr > 0) return hr+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0'); return m+':'+String(sec).padStart(2,'0'); }

    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    // ═══ DEFAULT CONFIG ═══
    const DEFAULT_CONFIG = {
      theme: { accentColor: '#00d9ff', darkMode: true },
      pages: [{ id: 'page1', name: 'Home', panels: [

      'clock','weather','sonarr','radarr','overseerr','nzbget',

    function applyTheme(theme) {
      const r = document.documentElement.style;
      r.setProperty('--bg', theme.bg);

      r.setProperty('--text', theme.text);
      r.setProperty('--text-bright', theme.textBright);

      const ar = parseInt(h.slice(0,2),16), ag = parseInt(h.slice(2,4),16), ab = parseInt(h.slice(4,6),16);

    }

    // ═══ CLOCK PANEL ═══
    function ClockPanel({ config }) {
      const [timeObj, setTimeObj] = useState({str:'', ampm:''});
      const [date, setDate] = useState('');
      const [weather, setWeather] = useState(null);
      const use12h = config?.prefs?.timeFormat === '12h';
      const useFahrenheit = config?.prefs?.tempUnit === 'F';
      function toF(c) { return Math.round(parseFloat(c) * 9/5 + 32); }
      function tempDisp(c) { return useFahrenheit ? toF(c) + '°F' : c + '°C'; }
      function tempVal(c) { return useFahrenheit ? toF(c) + '°' : c + '°'; }
      useEffect(() => {
        function tick() {
          const now = new Date();
          if (use12h) {
            const h = now.getHours();
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            setTimeObj({str: h12 + ':' + String(now.getMinutes()).padStart(2,'0'), ampm});
          } else {
            setTimeObj({str: String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'), ampm:''});
          }
          setDate(now.toLocaleDateString('en-AU', {weekday:'long',day:'numeric',month:'long',year:'numeric'}));
        }
        tick(); const t = setInterval(tick, 1000); return () => clearInterval(t);
      }, [use12h]);
      useEffect(() => {
        const city = config?.integrations?.weather?.city || 'Perth';
        async function fetchWeather() {
          try {
            const res = await fetch('https://wttr.in/'+encodeURIComponent(city)+'?format=j1');
            const raw = await res.json(); const data = raw.data || raw;
            // Extend forecast to 5 days via Open-Meteo using lat/lon from wttr.in response
            try {
              const lat = data.nearest_area?.[0]?.latitude;
              const lon = data.nearest_area?.[0]?.longitude;
              if (lat && lon) {
                const omRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,temperature_2m_min,weather_code&timezone=auto&forecast_days=5`);
                const om = await omRes.json();
                if (om.daily?.time?.length >= 5) {
                  const WMO_EMOJI = { 0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',53:'🌦️',55:'🌧️',61:'🌧️',63:'🌧️',65:'🌧️',71:'❄️',73:'❄️',75:'❄️',77:'🌨️',80:'🌦️',81:'🌧️',82:'⛈️',85:'🌨️',86:'🌨️',95:'⛈️',96:'⛈️',99:'⛈️' };
                  data._omForecast = om.daily.time.map((date, i) => ({
                    date, maxtempC: Math.round(om.daily.temperature_2m_max[i]),
                    mintempC: Math.round(om.daily.temperature_2m_min[i]),
                    _emoji: WMO_EMOJI[om.daily.weather_code[i]] || '🌤️'
                  }));
                }
              }
            } catch {}
            setWeather(data);
          } catch {}
        }
        fetchWeather(); const t = setInterval(fetchWeather, 600000); return () => clearInterval(t);
      }, [config?.integrations?.weather?.city]);
      const cur = weather?.current_condition?.[0];
      const forecast = weather?.weather || [];
      return h('div', {className:'panel'},
        h(PanelHeader, {title:'CLOCK', icon:'🕐', accentColor:'#00D9FF', onSettings:()=>openSettingsAt('settings-weather')}),
        h('div', {className:'clock-time', style:{display:'flex',alignItems:'flex-start',justifyContent:'center',gap:'4px'}},
          timeObj.str,
          timeObj.ampm && h('span', {style:{fontSize:'18px',fontWeight:'600',color:'rgba(255,255,255,0.45)',letterSpacing:'1px',marginTop:'10px',lineHeight:'1'}}, timeObj.ampm)
        ),
        h('div', {className:'clock-date'}, date),
        cur && h(React.Fragment, null,
          h('div', {className:'weather-current'},
            h('span', {className:'weather-icon'}, weatherEmoji(cur.weatherCode)),
            h('span', {className:'weather-temp'}, tempVal(cur.temp_C))
          ),
          h('div', {className:'weather-desc'}, cur.weatherDesc?.[0]?.value || ''),
          h('div', {className:'weather-detail'},
            h('span', null, '🌡 Feels ', tempDisp(cur.FeelsLikeC)),
            h('span', null, '💧 ', cur.humidity + '% humidity'),
            h('span', null, '💨 ', cur.windspeedKmph + ' km/h ' + cur.winddir16Point),
            h('span', null, '☀️ UV ', cur.uvIndex),
            forecast[0] && h('span', null, '🌧 ', (forecast[0]?.hourly?.[4]?.chanceofrain || '0') + '% rain')
          ),
          h('div', {className:'weather-summary'},
            'Currently ' + tempDisp(cur.temp_C) + ' and ' + (cur.weatherDesc?.[0]?.value || '').toLowerCase() +
            '. Feels like ' + tempDisp(cur.FeelsLikeC) + '. ' +
            (forecast[0] ? 'High ' + tempVal(forecast[0].maxtempC) + ', low ' + tempVal(forecast[0].mintempC) + '.' : '')
          )
        ),
        (forecast.length > 0 || weather?._omForecast) && h('div', {className:'weather-strip'},
          (weather?._omForecast || forecast.slice(0,5)).map((day,i) => {
            const d = new Date(day.date);
            const icon = day._emoji || weatherEmoji(day.hourly?.[4]?.weatherCode||113);
            return h('div', {key:i, className:'weather-day'},
              h('span', {className:'weather-day-name'}, i===0?'Today':DAYS[d.getDay()]),
              h('span', {className:'weather-day-icon'}, icon),
              h('span', {className:'weather-day-temps'},
                h('span',{className:'weather-hi'}, useFahrenheit ? toF(day.maxtempC)+'°' : day.maxtempC+'°'), ' ',
                h('span',{className:'weather-lo'}, useFahrenheit ? toF(day.mintempC)+'°' : day.mintempC+'°')
              )
            );
          })
        )
      );
    }

    // ═══ SIGNALRGB PANEL ═══
    function SignalRGBPanel({ config, onSignalChange }) {
      const [state, setState] = useState(null);
      const [search, setSearch] = useState('');
      // Migrate old string favorites → will be replaced with {id,name} objects on next save
      const rawFavs = config?.signalrgbFavorites || [];
      const [favorites, setFavorites] = useState(rawFavs);
      const [error, setError] = useState(null);
      const [localBrightness, setLocalBrightness] = useState(null);
      const brightnessTimer = useRef(null);
      // Always use direct SignalRGB API — no HA dependency
      useEffect(() => {
        async function pollDirect() {
          try {
            const r = await window.orbit.fetchSignalRGB();
            if (r?.error) { setError(r.error); return; }
            if (r && r.data) {
              setError(null);
              // SignalRGB API: r.data.attributes.{name, enabled, global_brightness}
              const attrs = r.data.attributes || {};
              const effectName = attrs.name || (r.data.id || '').replace(/\.html$/i, '') || 'Unknown';
              const isEnabled = attrs.enabled !== false;
              // global_brightness is 0-100; convert to 0-255 for compatibility with haBrightPct()
              const brightness = Math.round(((attrs.global_brightness ?? 100) / 100) * 255);
              // effects are {id, name} objects from IPC
              const effs = (r.data.effects || []);
              setState({ state: isEnabled ? 'on' : 'off', attributes: {
                brightness, effect: effectName, effect_list: effs
              }});
            }
          } catch { setError('Could not connect to SignalRGB'); }
        }
        pollDirect(); const t = setInterval(pollDirect, 5000); return () => clearInterval(t);
      }, []);
      const isOn = state?.state === 'on';
      const effectName = state?.attributes?.effect || 'No Effect';
      const brightness = haBrightPct(state?.attributes?.brightness);
      const effectList = state?.attributes?.effect_list || [];
      // Auto-clean garbled string favorites once we have the real effect list
      useEffect(() => {
        if (!effectList.length || !favorites.length) return;
        // If favorites are old strings that don't match any known effect name, clear them
        const validNames = new Set(effectList.map(e => typeof e === 'string' ? e : e.name));
        const cleaned = favorites.filter(f => {
          const fname = typeof f === 'string' ? f : f.name;
          return validNames.has(fname);
        });
        if (cleaned.length !== favorites.length) {
          setFavorites(cleaned);
          if (config) window.orbit.saveConfig({...config, signalrgbFavorites: cleaned});
        }
      }, [effectList.length]);
      useEffect(() => { if (onSignalChange) onSignalChange(isOn); }, [isOn]);
      const togglePower = async () => { await window.orbit.signalrgbSetEnabled(!isOn); };
      const selectEffect = async (eff) => { await window.orbit.activateEffect(eff); };
      const toggleFav = (eff) => {
        // eff is {id, name}; favorites stored as {id, name}
        const effId = typeof eff === 'string' ? eff : eff.id;
        const isFav = favorites.some(f => (typeof f === 'string' ? f : f.id) === effId);
        const next = isFav ? favorites.filter(f => (typeof f === 'string' ? f : f.id) !== effId) : [...favorites, eff];
        setFavorites(next);
        if (config) window.orbit.saveConfig({...config, signalrgbFavorites: next});
      };
      const getEffName = (e) => typeof e === 'string' ? e : (e.name || e.id || '');
      const getEffId = (e) => typeof e === 'string' ? e : (e.id || e.name || '');
      const isFaved = (e) => favorites.some(f => (typeof f === 'string' ? f : f.id) === getEffId(e));
      const filtered = search.trim()
        ? effectList.filter(e => getEffName(e).toLowerCase().includes(search.toLowerCase()))
        : effectList.slice(0, 50);
      return h('div', {className:'panel'},
        h(PanelHeader, {title:'SIGNALRGB', icon:'⚡', accentColor:'#7B2FBE', onSettings:()=>openSettingsAt('settings-signalrgb')}),
        h('div', {className:'effect-name', style:{color:isOn?'var(--accent)':'var(--dim)'}}, effectName),
        h('div', {className:'effect-label'}, isOn?'ACTIVE':'OFF'),
        h('button', {className:'ha-toggle '+(isOn?'on':'off'), onClick:togglePower}, isOn?'ON':'OFF'),
        h('div', {className:'brightness-wrap'},
          (() => {
            const bVal = localBrightness !== null ? localBrightness : brightness;
            return h('input', {
              type:'range', min:0, max:100, value:bVal,
              style:{width:'100%',height:'4px',WebkitAppearance:'none',appearance:'none',background:`linear-gradient(to right, var(--accent) ${bVal}%, rgba(255,255,255,0.1) ${bVal}%)`,borderRadius:'2px',outline:'none',cursor:'pointer'},
              onInput: e => {
                const val = parseInt(e.target.value);
                setLocalBrightness(val);
                // Debounce API call — send 300ms after user stops dragging
                if (brightnessTimer.current) clearTimeout(brightnessTimer.current);
                brightnessTimer.current = setTimeout(() => {
                  window.orbit.signalrgbSetBrightness(val);
                }, 300);
              }
            });
          })(),
          h('div', {className:'brightness-label'}, (localBrightness !== null ? localBrightness : brightness)+'%')
        ),
        favorites.length > 0 && h('div', {className:'fav-pills'},
          favorites.map((f,i) => {
            const fname = typeof f === 'string' ? f : f.name;
            const fid = typeof f === 'string' ? f : f.id;
            return h('span', {key:fid||i, className:'fav-pill', onClick:()=>selectEffect(fid), title:fname}, '⭐ '+fname);
          })
        ),
        h('input', {className:'effect-search', type:'text', placeholder:'Search effects...', value:search, onChange:e=>setSearch(e.target.value)}),
        filtered.length > 0
          ? h('div', {className:'effect-list'},
              filtered.map(eff => {
                const ename = getEffName(eff);
                const eid = getEffId(eff);
                return h('div', {key:eid, className:'effect-option'+(ename===effectName?' active':''), onClick:()=>selectEffect(eid)},
                  h('span', {className:'effect-star'+(isFaved(eff)?' starred':''), onClick:e=>{e.stopPropagation();toggleFav(eff)}}, '⭐'),
                  h('span', null, ename)
                );
              })
            )
          : error
            ? h('div', {style:{fontSize:'11px', color:'var(--amber)', textAlign:'center', padding:'12px'}},
                h('div', null, error),
                h('button', {
                  onClick: async () => {
                    setError('Scanning ports...');
                    const r = await window.orbit.signalrgbDetectPort();
                    if (r.port) {
                      setError('Found on port ' + r.port + '! Save this in Settings → SignalRGB: http://localhost:' + r.port);
                    } else {
                      setError(r.error || 'Not found. Is SignalRGB running?');
                    }
                  },
                  style:{marginTop:'8px',padding:'5px 12px',background:'var(--accent-bg)',border:'1px solid rgba(0,217,255,0.3)',borderRadius:'6px',color:'var(--accent)',cursor:'pointer',fontFamily:'var(--font)',fontSize:'11px'}
                }, '🔍 Auto-detect port')
              )
            : effectList.length === 0 && h('div', {style:{fontSize:'10px',color:'var(--dim)',padding:'6px 10px',fontStyle:'italic'}},
                'No effects found'
              )
      );
    }

    // ═══ LIGHTS PANEL ═══
    function LightsPanel({ config, onConfigChange }) {
      const { isOn: signalActive } = useContext(SignalRGBContext);
      const [lights, setLights] = useState({});
      // Normalize: handle both old string[] and new {entityId,name}[] formats
      const rawLights = config?.integrations?.homeassistant?.lights || [];
      const lightEntities = rawLights.map(e => typeof e === 'string' ? {entityId:e, name:''} : e);
      const haConfigured = config?.integrations?.homeassistant?.url && config?.integrations?.homeassistant?.token;
      useEffect(() => {
        if (!haConfigured || lightEntities.length === 0) return;
        async function poll() {
          const states = {};
          for (const e of lightEntities) { try { const r = await window.orbit.haGetState(e.entityId); if (!r.error) states[e.entityId] = r; } catch {} }
          setLights(states);
        }
        poll(); const t = setInterval(poll, 15000); return () => clearInterval(t);
      }, [haConfigured, lightEntities.map(e=>e.entityId).join(',')]);
      const toggleLight = async (eid, on) => {
        // Optimistic update — flip immediately so UI responds instantly
        setLights(prev => ({ ...prev, [eid]: { ...prev[eid], state: on ? 'off' : 'on' } }));
        await window.orbit.haCallService('light', on ? 'turn_off' : 'turn_on', { entity_id: eid });
        // Confirm actual state after short delay
        setTimeout(async () => {
          try { const r = await window.orbit.haGetState(eid); if (!r.error) setLights(prev => ({ ...prev, [eid]: r })); } catch {}
        }, 800);
      };
      const setBrightness = async (eid, pct) => {
        // Optimistic update
        setLights(prev => ({ ...prev, [eid]: { ...prev[eid], attributes: { ...prev[eid]?.attributes, brightness: Math.round((pct/100)*255) } } }));
        await window.orbit.haCallService('light', 'turn_on', { entity_id: eid, brightness: Math.round((pct/100)*255) });
      };
      const [editingEid, setEditingEid] = useState(null);
      const [editValue, setEditValue] = useState('');
      // Local entity name overrides — updates immediately on save without waiting for config re-render
      const [localNames, setLocalNames] = useState({});

      const saveEntityName = (eid, newName) => {
        const trimmed = newName.trim();
        // Update local state immediately for instant UI feedback
        setLocalNames(prev => ({ ...prev, [eid]: trimmed }));
        setEditingEid(null);
        // Persist to config (write to .lights to match the key the panel reads)
        const cfg = JSON.parse(JSON.stringify(config));
        const lights = cfg?.integrations?.homeassistant?.lights || [];
        const idx = lights.findIndex(e => (typeof e === 'string' ? e : e.entityId) === eid);
        if (idx >= 0) {
          cfg.integrations.homeassistant.lights[idx] = { entityId: eid, name: trimmed };
        }
        window.orbit.saveConfig(cfg);
        if (onConfigChange) onConfigChange(cfg);
      };

      if (!haConfigured) return h('div',{className:'panel panel-unconfigured'}, h(PanelHeader, {title:'HOME ASSISTANT', icon:'💡', accentColor:'#18BCF2', onSettings:()=>openSettingsAt('settings-ha')}), h('div',{className:'panel-unconfigured-icon'},'💡'), h('div',{className:'panel-unconfigured-text'},'Configure Home Assistant in Settings'));
      return h('div', {className:'panel'},
        h(PanelHeader, {title:'HOME ASSISTANT', icon:'💡', accentColor:'#18BCF2', onSettings:()=>openSettingsAt('settings-ha')}),
        lightEntities.map(({entityId:eid, name:customName}) => {
          const st = lights[eid]; const isOn = st?.state === 'on'; const bri = haBrightPct(st?.attributes?.brightness);
          const haName = st?.attributes?.friendly_name || eid.replace('light.','').replace(/_/g,' ');
          const displayName = localNames[eid] !== undefined ? localNames[eid] : (customName || haName);
          const isEditing = editingEid === eid;
          return h('div', {key:eid, className:'light-card', style:signalActive?{opacity:0.7}:{}},
            signalActive && h('div', {className:'light-signalrgb-badge', title:'Controlled by SignalRGB'}, '⚡ SignalRGB active'),
            h('div', {className:'light-header'},
              h('div', {className:'light-dot '+(isOn?'on':'')}),
              isEditing
                ? h('div', {style:{flex:1,display:'flex',gap:'4px',alignItems:'center'}},
                    h('input', {
                      autoFocus:true,
                      value:editValue,
                      onChange:e=>setEditValue(e.target.value),
                      onKeyDown:e=>{if(e.key==='Enter')saveEntityName(eid,editValue);if(e.key==='Escape')setEditingEid(null);},
                      style:{flex:1,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(0,217,255,0.4)',borderRadius:'4px',color:'var(--text)',fontSize:'11px',padding:'2px 6px',fontFamily:'var(--font)'}
                    }),
                    h('button', {onClick:()=>saveEntityName(eid,editValue), title:'Save', style:{background:'var(--accent-bg)',border:'1px solid rgba(0,217,255,0.3)',borderRadius:'4px',color:'var(--accent)',cursor:'pointer',padding:'2px 6px',fontSize:'11px'}}, '✓'),
                    h('button', {onClick:()=>setEditingEid(null), title:'Cancel', style:{background:'none',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'4px',color:'var(--dim)',cursor:'pointer',padding:'2px 6px',fontSize:'11px'}}, '✕')
                  )
                : h('div', {className:'light-name', style:{display:'flex',alignItems:'center',gap:'4px',flex:1}},
                    h('span', null, displayName),
                    (localNames[eid] !== undefined ? localNames[eid] : customName) && h('span', {title:'Custom name (click ✏️ to edit)', style:{fontSize:'9px',color:'var(--accent-mid)',letterSpacing:'1px'}}, '✦'),
                    h('button', {
                      onClick:()=>{setEditingEid(eid);setEditValue(customName||haName);},
                      title:'Rename entity',
                      style:{background:'none',border:'none',color:'rgba(255,255,255,0.2)',cursor:'pointer',fontSize:'11px',padding:'0 2px',lineHeight:1,opacity:0,transition:'opacity .15s'}
                    }, '✏️')
                  ),
              !isEditing && h('button', {className:'light-toggle '+(isOn?'on':'off'), onClick:()=>toggleLight(eid,isOn)}, isOn?'ON':'OFF')
            ),
            isOn && !isEditing && h('div', {className:'light-brightness'}, h('input', {type:'range',min:0,max:100,value:bri,onChange:e=>setBrightness(eid,parseInt(e.target.value))}))
          );
        })
      );
    }

    function NowPlayingPanel({ config }) {

      return h('div', {className:'panel panel-top'},

    function SystemPanel({ config, onConfigChange }) {

      const [showPicker, setShowPicker] = useState(false);

        pollFast(); const t = setInterval(pollFast, 3000); return () => clearInterval(t);
      }, []);
      useEffect(() => {
        async function pollSlow() { try { const r = await window.orbit.getSysinfoSlow({cpuSensorIndex:cpuSensorIdx,gpuControllerIndex:gpuIdx,showDisk}); if (!r.error) setSlow(r); } catch {} }
        pollSlow(); const t = setInterval(pollSlow, 10000); return () => clearInterval(t);

      const cpuTemp = slow?.cpu?.temp;
      const gpuUsage = slow?.gpu?.usage ?? 0;
      const gpuModel = slow?.gpu?.model || 'GPU';
      const gpuTemp = slow?.gpu?.temp;
      const ramUsage = fast?.ram?.usage ?? 0;
      const ramUsed = fast?.ram?.usedGB || '0';
      const ramTotal = fast?.ram?.totalGB || '0';

      const rxSec = fast?.net?.rxSec || 0;

      const [showCpuPicker, setShowCpuPicker] = useState(false);

      // Auto-select GPU: use saved model name first, then fallback to first Radeon/GeForce

            h('span', {className:'sys-picker-label'}, 'GPU'),

                  cfg.systemPrefs.gpuModel = model;
                  window.orbit.saveConfig(cfg);

          sysRow('GPU', gpuModel + (gpuTemp != null ? ' · '+Math.round(gpuTemp)+'°C' : ''), gpuUsage,

    // ═══ UPTIME KUMA PANEL ═══
    function ServicesPanel({ config }) {
      const [results, setResults] = useState([]);
      const [lastCheck, setLastCheck] = useState(null);

      function buildServiceList(cfg) {
        const integrations = cfg?.integrations || {};
        const services = [];
        const add = (name, url, auth) => { if (url) services.push({ name, url, ...(auth ? {auth} : {}) }); };
        add('Sonarr', integrations.sonarr?.url);
        add('Radarr', integrations.radarr?.url);
        add('Overseerr', integrations.overseerr?.url);
        // NZBGet requires Basic Auth — strip /jsonrpc path (HEAD/GET rejected there), use root URL
        if (integrations.nzbget?.url && integrations.nzbget?.username) {
          const auth = btoa(integrations.nzbget.username + ':' + (integrations.nzbget.password || ''));
          const nzbBase = integrations.nzbget.url.replace(/\/jsonrpc\/?$/i, '');
          add('NZBGet', nzbBase, auth);
        }
        add('Jellyfin', integrations.jellyfin?.url);
        add('Tautulli', integrations.tautulli?.url);
        add('Home Assistant', integrations.homeassistant?.url);
        // Uptime Kuma omitted — ServicesPanel replaces it
        (cfg?.customServices || []).forEach(s => add(s.name, s.url));
        return services;
      }

      useEffect(() => {
        const services = buildServiceList(config);
        if (!services.length) return;
        async function poll() {
          const r = await window.orbit.checkServices(services);
          setResults(r);
          setLastCheck(new Date());

        poll();
        const t = setInterval(poll, 30000);
        return () => clearInterval(t);

      const upCount = results.filter(r => r.status === 'up').length;
      const downCount = results.filter(r => r.status === 'down').length;

                h('div', { style: { textAlign: 'center' } },

                  h('div', { style: { fontSize: '9px', color: 'rgba(255,255,255,0.28)', letterSpacing: '2px', marginTop: '4px' } }, 'UP')

                )

              },

                  h('span', { style: { width: '7px', height: '7px', borderRadius: '50%', background: r.status === 'up' ? '#50fa7b' : '#ff5555', flexShrink: 0, boxShadow: r.status === 'up' ? '0 0 4px #50fa7b' : '0 0 4px #ff5555' } }),

    // ═══ SPOTIFY PANEL ═══
    function SpotifyPanel({ config, openSettings }) {
      const sCfg = config?.integrations?.spotify;
      const configured = sCfg?.clientId && sCfg?.clientSecret;
      const [authorized, setAuthorized] = useState(!!(sCfg?.accessToken));
      const [connecting, setConnecting] = useState(false);
      const [connectErr, setConnectErr] = useState('');
      const [playback, setPlayback] = useState(null);
      const [localMs, setLocalMs] = useState(0);     // locally interpolated progress_ms
      const [noTrans, setNoTrans] = useState(false);  // suppress CSS transition on track change
      const [queue, setQueue] = useState([]);
      const [busy, setBusy] = useState(false);
      const lastTrackId = useRef(null);
      const pollRef = useRef(null);

      async function getToken() {
        const freshCfg = await window.orbit.loadConfig();
        const sp = freshCfg?.integrations?.spotify;
        let token = sp?.accessToken;
        if (!token) return null;
        if (sp?.tokenExpiry && Date.now() > sp.tokenExpiry - 60000) {
          const r = await window.orbit.spotifyRefreshToken();
          if (r.accessToken) token = r.accessToken;
        }
        return token;
      }

      const applyPlayback = (pb) => {
        if (pb && pb.item) {
          const newId = pb.item.id;
          const trackChanged = newId !== lastTrackId.current;
          if (trackChanged) {
            // Instant reset — no CSS backward-crawl animation
            setNoTrans(true);
            setLocalMs(pb.progress_ms || 0);
            setTimeout(() => setNoTrans(false), 50);
            lastTrackId.current = newId;
          } else {
            // Same track — sync to API value (API is authoritative)
            setLocalMs(pb.progress_ms || 0);
          }
          setPlayback(pb);
        } else {
          setPlayback(null);
          setLocalMs(0);
          lastTrackId.current = null;
        }
      };

      // Poll every 5s
      useEffect(() => {
        if (!authorized) return;
        async function poll() {
          try {
            const token = await getToken();
            if (!token) return;
            const [pb, q] = await Promise.all([
              window.orbit.apiGet('https://api.spotify.com/v1/me/player/currently-playing', { Authorization: 'Bearer '+token }),
              window.orbit.apiGet('https://api.spotify.com/v1/me/player/queue', { Authorization: 'Bearer '+token })
            ]);
            applyPlayback(pb);
            if (q && Array.isArray(q.queue)) setQueue(q.queue.slice(0,3));
          } catch {}
        }
        pollRef.current = poll;
        poll();
        const t = setInterval(poll, 5000);
        return () => clearInterval(t);
      }, [authorized]);

      // Local 1s tick — interpolates progress between API polls
      useEffect(() => {
        const t = setInterval(() => {
          setPlayback(pb => {
            if (pb?.is_playing) {
              setLocalMs(ms => Math.min(ms + 1000, pb.item?.duration_ms || ms));
            }
            return pb;
          });
        }, 1000);
        return () => clearInterval(t);
      }, []);

      async function control(method, endpoint) {
        if (busy) return;
        setBusy(true);
        try {
          const token = await getToken();
          if (!token) return;
          const url = 'https://api.spotify.com/v1/me/player/'+endpoint;
          if (method === 'POST') await window.orbit.apiPost(url, {}, { Authorization: 'Bearer '+token });
          else await window.orbit.apiPut(url, {}, { Authorization: 'Bearer '+token });
          // Optimistic update for pause/play
          if (endpoint === 'pause') setPlayback(p => p ? {...p, is_playing:false} : p);
          else if (endpoint === 'play') setPlayback(p => p ? {...p, is_playing:true} : p);
          // For skip/prev: repoll after short delay so new track appears quickly
          else setTimeout(() => { if (pollRef.current) pollRef.current(); }, 700);
        } catch {} finally { setBusy(false); }
      }

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'SPOTIFY', icon:'🎵', accentColor:'#1DB954', onSettings:()=>openSettingsAt('settings-spotify')}),
        h('div',{className:'panel-unconfigured-icon'},'🎵'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));

      if (!authorized) {
        return h('div', {className:'panel'},
          h(PanelHeader, {title:'SPOTIFY', icon:'🎵', accentColor:'#1DB954', onSettings:()=>openSettingsAt('settings-spotify')}),
          h('div', {className:'panel-unconfigured-icon', style:{opacity:0.3,fontSize:'36px',marginBottom:'12px'}}, '🎵'),
          connectErr && h('div', {style:{fontSize:'10px',color:'#ff5555',marginBottom:'8px',textAlign:'center',padding:'0 12px'}}, connectErr),
          h('button', {className:'spotify-connect', disabled:connecting, onClick: async () => {
            setConnecting(true); setConnectErr('');
            const r = await window.orbit.spotifyAuthStart();
            setConnecting(false);
            if (r.error) setConnectErr(r.error);
            else setAuthorized(true);
          }}, connecting ? 'Connecting...' : 'Connect Spotify')
        );
      }

      const track = playback?.item;
      const isPlaying = playback?.is_playing;
      const art = track?.album?.images?.[1]?.url || track?.album?.images?.[0]?.url;
      const prog = (track && localMs && track.duration_ms)
        ? Math.min(100, Math.round((localMs / track.duration_ms) * 100)) : 0;

    // ═══ JELLYFIN PANEL ═══
    function JellyfinPanel({ config, openSettings }) {
      const jCfg = config?.integrations?.jellyfin;
      const configured = jCfg?.url && jCfg?.apiKey;
      const [sessions, setSessions] = useState([]);
      const jfTimerRef = useRef(null);
      useEffect(() => {
        if (!configured) return;
        let active = true;
        async function poll() {
          try {
            const r = await window.orbit.apiGet(
              jCfg.url+'/Sessions?ActiveWithinSeconds=300',
              {'X-MediaBrowser-Token': jCfg.apiKey, 'Authorization': 'MediaBrowser Token="'+jCfg.apiKey+'"'}
            );
            if (!active) return;
            const active_sessions = Array.isArray(r) ? r.filter(s => s.NowPlayingItem) : [];
            setSessions(active_sessions);
            // Faster when someone is streaming
            const next = active_sessions.length > 0 ? 5000 : 20000;
            if (jfTimerRef.current) clearTimeout(jfTimerRef.current);
            jfTimerRef.current = setTimeout(poll, next);
          } catch {
            if (jfTimerRef.current) clearTimeout(jfTimerRef.current);
            jfTimerRef.current = setTimeout(poll, 15000);
          }
        }
        poll();
        return () => { active = false; if (jfTimerRef.current) clearTimeout(jfTimerRef.current); };
      }, [configured, jCfg?.url, jCfg?.apiKey]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'JELLYFIN', icon:'🎞', accentColor:'#00A4DC', onSettings:()=>openSettingsAt('settings-jellyfin')}),
        h('div',{className:'panel-unconfigured-icon'},'🎞️'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));

      return h('div', {className: sessions.length === 0 ? 'panel' : 'panel panel-top'},
        h(PanelHeader, {title:'JELLYFIN', icon:'🎞', accentColor:'#00A4DC', onSettings:()=>openSettingsAt('settings-jellyfin')}),
        sessions.length > 0 && h('div', {className:'source-badge', style:{marginBottom:'8px'}}, 'JELLYFIN'),
        sessions.length > 0 && h('div', {className:'np-streams-count'}, sessions.length + ' STREAM' + (sessions.length>1?'S':'')),
        sessions.length === 0
          ? h('div',{className:'np-empty'}, h('div',{className:'np-empty-icon'},'🎞️'), h('div',{className:'np-empty-text'},'NO ACTIVE STREAMS'))
          : h('div', {className:'np-session-list'},
              sessions.map((s,i) => {
                const item = s.NowPlayingItem || {};
                const isEp = item.Type === 'Episode';
                // Show series name as headline, episode as subtitle (reversed from before)
                const title = isEp ? (item.SeriesName || item.Name || 'Unknown') : (item.Name || 'Unknown');
                const epCode = isEp && item.ParentIndexNumber != null
                  ? 'S'+String(item.ParentIndexNumber).padStart(2,'0')+'E'+String(item.IndexNumber||0).padStart(2,'0')
                  : '';
                const sub = isEp
                  ? (epCode ? epCode + (item.Name ? ' · ' + item.Name : '') : item.Name || '')
                  : (item.ProductionYear ? String(item.ProductionYear) : '');
                const pos = s.PlayState?.PositionTicks || 0;
                const dur = item.RunTimeTicks || 0;
                const prog = dur > 0 ? Math.round((pos/dur)*100) : 0;
                const remSec = dur > 0 ? Math.max(0, Math.round((dur-pos)/10000000)) : 0;
                const isTrans = s.TranscodingInfo && s.TranscodingInfo.IsVideoDirect === false;
                const isPaused = s.PlayState?.IsPaused;
                const res = s.TranscodingInfo?.Width
                  ? s.TranscodingInfo.Width+'p'
                  : (item.Width ? item.Width+'p' : '');
                const codec = s.TranscodingInfo?.VideoCodec || item.MediaStreams?.find(m=>m.Type==='Video')?.Codec || '';
                return h('div', {key:i, className:'np-session'},
                  h('div', {className:'np-title', style:{fontSize:'15px'}}, title),
                  sub && h('div', {className:'np-subtitle', style:{fontSize:'13px'}}, sub),
                  h('div', {className:'np-progress-wrap'},
                    h('div', {className:'np-progress-bar'},
                      h('div', {className:'np-progress-fill', style:{width:prog+'%'}}))),
                  remSec > 0 && h('div', {className:'np-time'}, formatDuration(remSec)+' remaining'),
                  h('div', {style:{display:'flex',gap:'6px',flexWrap:'wrap',marginTop:'4px'}},
                    h('span', {className:'np-badge '+(isTrans?'np-badge-transcode':'np-badge-direct')}, isTrans?'🔄 TRANSCODE':'▶ DIRECT'),
                    isPaused && h('span', {className:'np-badge'}, '⏸ PAUSED'),
                    res && h('span', {className:'np-badge np-badge-direct'}, res),
                    codec && h('span', {className:'np-badge'}, codec.toUpperCase())

                  h('div', {className:'np-meta'},
                    (s.UserName||'')+(s.DeviceName?' · '+s.DeviceName:''))
                );
              })
            )
      );
    }

    // ═══ PAGES TAB (Settings) ═══
    function PagesTab({ cfg, setCfg }) {
      const [editingIndex, setEditingIndex] = useState(-1);
      const [editingValue, setEditingValue] = useState('');
      const [dragOverIndex, setDragOverIndex] = useState(-1);

      function startEdit(i, name) {
        setEditingIndex(i);
        setEditingValue(name || 'Page '+(i+1));
      }
      function saveName(i) {
        if (editingValue.trim()) {
          cfg.pages[i].name = editingValue.trim();
          setCfg({...cfg});
        }
        setEditingIndex(-1);
        setEditingValue('');
      }
      function cancelEdit() {
        setEditingIndex(-1);
        setEditingValue('');
      }

      return h('div', null,
        h('div', {className:'settings-section'}, 'PAGES'),
        (cfg.pages||[]).map(function(page, i) {
          return h('div', {
            key: page.id || i,
            className: 'page-row' + (dragOverIndex === i ? ' drag-over' : ''),
            draggable: true,
            onDragStart: function(e) {
              e.dataTransfer.setData('text/plain', String(i));
              e.dataTransfer.effectAllowed = 'move';
            },
            onDragOver: function(e) {
              e.preventDefault();
              e.dataTransfer.dropEffect = 'move';
              setDragOverIndex(i);
            },
            onDragLeave: function() {
              setDragOverIndex(-1);
            },
            onDrop: function(e) {
              e.preventDefault();
              setDragOverIndex(-1);
              var from = Number(e.dataTransfer.getData('text/plain'));
              var to = i;
              if (from === to || isNaN(from)) return;
              var pages = cfg.pages.slice();
              var moved = pages.splice(from, 1)[0];
              pages.splice(to, 0, moved);
              cfg.pages = pages;
              setCfg({...cfg});
            },
            onDragEnd: function() {
              setDragOverIndex(-1);
            }
          },
            h('span', {className:'page-drag-handle'}, '⠿'),
            editingIndex === i
              ? h('input', {
                  className: 'page-rename-input',
                  value: editingValue,
                  autoFocus: true,
                  onChange: function(e) { setEditingValue(e.target.value); },
                  onBlur: function() { saveName(i); },
                  onKeyDown: function(e) {
                    if (e.key === 'Enter') saveName(i);
                    if (e.key === 'Escape') cancelEdit();
                  }
                })
              : h('div', {style:{flex:1}},
                  h('span', {className:'page-name-display'}, page.name || 'Page '+(i+1)),
                  h('div', {className:'page-panels-info'}, (page.panels||[]).map(function(p){return p.type;}).join(', '))
                ),
            h('button', {className:'page-edit-btn', onClick: function() { startEdit(i, page.name); }}, '✏')
          );
        }),
        // Panel order reordering within each page
        (cfg.pages||[]).length > 0 && h('div', {style:{marginTop:'16px'}},
          h('div', {className:'settings-section'}, 'PANEL ORDER'),
          h('div', {style:{fontSize:'10px',color:'var(--dim)',marginBottom:'8px'}}, 'Click a page above, then reorder its panels here'),
          (cfg.pages||[]).map(function(page, pageIdx) {
            if (!page.panels || page.panels.length === 0) return null;
            return h('div', {key:page.id||pageIdx, style:{marginBottom:'12px'}},
              h('div', {style:{fontSize:'10px',color:'var(--accent)',marginBottom:'5px',letterSpacing:'1px'}}, (page.name||'Page '+(pageIdx+1)).toUpperCase()),
              page.panels.map(function(panel, pi) {
                const ICONS = {clock:'🕐',tautulli:'▶',nowplaying:'▶',signalrgb:'⚡',lights:'💡',system:'💻',media:'📡',uptimekuma:'🔔',spotify:'🎵',links:'🔗',jellyfin:'🎞️',sonarr:'📺',radarr:'🎬',overseerr:'🎭',nzbget:'⬇',homeassistant:'💡'};
                const NAMES = {clock:'Clock & Weather',tautulli:'Now Playing',nowplaying:'Now Playing',signalrgb:'SignalRGB',lights:'Home Assistant',system:'System Monitor',media:'Media Stack',uptimekuma:'Uptime Kuma',spotify:'Spotify',links:'Quick Links',jellyfin:'Jellyfin',sonarr:'Sonarr',radarr:'Radarr',overseerr:'Overseerr',nzbget:'NZBGet',homeassistant:'Home Assistant'};
                return h('div', {key:pi, style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px',padding:'5px 8px',background:'rgba(255,255,255,0.02)',border:'1px solid var(--border)',borderRadius:'4px'}},
                  h('span', {style:{color:'var(--dim)',fontSize:'12px',minWidth:'18px'}},(pi+1)+'.'),
                  h('span', null, (ICONS[panel.type]||'▪')+' '+(NAMES[panel.type]||panel.type)),
                  h('div', {style:{marginLeft:'auto',display:'flex',gap:'4px'}},
                    h('button', {
                      onClick: function() {
                        if (pi <= 0) return;
                        var ps = cfg.pages[pageIdx].panels.slice();
                        var tmp = ps[pi]; ps[pi] = ps[pi-1]; ps[pi-1] = tmp;

                    }, '↑'),

                        cfg.pages[pageIdx].panels = ps;

                  )
                );

            );

        ),

    function SettingsOverlay({ config, onClose, onSave }) {
      const [tab, setTab] = useState('pages');
      _switchTabRef = setTab; // allow openSettingsAt to switch tabs
      const [cfg, setCfg] = useState(JSON.parse(JSON.stringify(config || DEFAULT_CONFIG)));
      const [saved, setSaved] = useState(false);
      const [expanded, setExpanded] = useState({});
      const toggleExpand = (key) => setExpanded(p => ({...p, [key]: !p[key]}));
      const updateIntegration = (key, field, value) => {
        setCfg(prev => {
          const next = JSON.parse(JSON.stringify(prev));
          if (!next.integrations) next.integrations = {};
          if (!next.integrations[key]) next.integrations[key] = {};
          next.integrations[key][field] = value;
          return next;
        });
      };
      const save = async () => { await window.orbit.saveConfig(cfg); onSave(cfg); setSaved(true); setTimeout(()=>setSaved(false), 2000); };
      const setTheme = (theme) => {
        applyTheme(theme);
        setCfg(prev => ({...prev, theme: {...(prev.theme||{}), themeId: theme.id, accentColor: theme.accent}}));
      };

      // Normalize entity list — handle old string[] and new {entityId,name}[] formats
      function normalizeEntities(lights) {
        if (!Array.isArray(lights)) return [];
        return lights.map(e => typeof e === 'string' ? {entityId:e, name:''} : e);
      }

      // ─── HA ENTITY BROWSER MODAL ────────────────────────────────────────────
      const DOMAIN_ICONS = {light:'💡',switch:'🔌',sensor:'📊',binary_sensor:'🔲',climate:'🌡️',
        media_player:'📺',camera:'📷',cover:'🚪',fan:'💨',vacuum:'🤖',script:'📝',
        automation:'⚙️',scene:'🎬',input_boolean:'🔘',input_select:'📋',person:'👤',
        device_tracker:'📍',sun:'☀️',weather:'🌤️',number:'🔢',select:'📋',button:'🔲'};

      function HAEntityBrowser({ haUrl, haToken, onClose, onAdd }) {
        const [search, setSearch] = useState('');
        const [domain, setDomain] = useState('all');
        const [allEntities, setAllEntities] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [selected, setSelected] = useState(new Set());
        const [domains, setDomains] = useState([]);

        useEffect(() => {
          if (!haUrl || !haToken) { setError('Configure HA URL and token first'); setLoading(false); return; }
          window.orbit.apiGet(haUrl + '/api/states', {'Authorization': 'Bearer ' + haToken}, 20000)
            .then(data => {
              if (data?.error) { setError('Network error: ' + data.error); setLoading(false); return; }
              if (!Array.isArray(data)) {
                // Show the actual HA response to help diagnose
                const detail = typeof data === 'object' && data !== null
                  ? (data.message || data.detail || JSON.stringify(data).slice(0, 120))
                  : String(data).slice(0, 120);
                setError('HA error: ' + detail);
                setLoading(false); return;
              }
              const sorted = [...data].sort((a,b) => a.entity_id.localeCompare(b.entity_id));
              setAllEntities(sorted);
              const d = new Set(sorted.map(e => e.entity_id.split('.')[0]));
              setDomains(['all', ...Array.from(d).sort()]);
              setLoading(false);
            })
            .catch(e => { setError('Failed to reach HA: ' + e.message); setLoading(false); });
        }, [haUrl, haToken]);

        const filtered = allEntities.filter(e => {
          if (domain !== 'all' && e.entity_id.split('.')[0] !== domain) return false;
          if (!search) return true;
          const q = search.toLowerCase();
          return e.entity_id.includes(q) || (e.attributes?.friendly_name||'').toLowerCase().includes(q);
        });

        function toggle(entityId) {

          onClose();

      // ─── HA ENTITIES EDITOR ─────────────────────────────────────────────────
      function HAEntitiesEditor({ integrationKey }) {
        const raw = cfg.integrations?.[integrationKey]?.lights;
        const [entities, setEntities] = useState(normalizeEntities(raw));
        const [showBrowser, setShowBrowser] = useState(false);
        const haUrl = cfg.integrations?.homeassistant?.url || '';
        const haToken = cfg.integrations?.homeassistant?.token || '';

        function commit(next) { setEntities(next); updateIntegration(integrationKey, 'lights', next); }
        function removeEntity(i) { const n=[...entities]; n.splice(i,1); commit(n); }
        function updateName(i, name) { const n=[...entities]; n[i]={...n[i],name}; commit(n); }
        function updateId(i, entityId) { const n=[...entities]; n[i]={...n[i],entityId}; commit(n); }
        function onBrowserAdd(toAdd) {
          const existing = new Set(entities.map(e => e.entityId));
          const fresh = toAdd.filter(e => !existing.has(e.entityId));
          commit([...entities, ...fresh]);
        }

        return h('div', null,
          showBrowser && h(HAEntityBrowser, {haUrl, haToken, onClose:()=>setShowBrowser(false), onAdd:onBrowserAdd}),
          h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px'}},
            h('div', {className:'settings-label', style:{marginBottom:0}}, 'LIGHT ENTITIES'),
            h('button', {className:'ha-browse-btn', onClick:()=>setShowBrowser(true)}, '🔍 Browse HA')
          ),
          entities.length > 0 && h('div', {style:{marginBottom:'8px'}},
            entities.map((e,i) => h('div', {key:i, style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'4px'}},

    // ═══ UPDATE PILL ═══
    function UpdatePill() {
      const [update, setUpdate] = useState(null);
      const [downloading, setDownloading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [downloaded, setDownloaded] = useState(false);
      useEffect(() => {
        window.orbit.getPendingUpdate().then(u => { if (u) { setUpdate(u); setDownloading(true); } });
        const unsub1 = window.orbit.onUpdateAvailable(info => { setUpdate(info); setDownloading(true); });
        const unsub2 = window.orbit.onUpdateProgress(pct => { setDownloading(true); setProgress(pct); });
        const unsub3 = window.orbit.onUpdateDownloaded(() => { setDownloading(false); setDownloaded(true); });
        const unsub4 = window.orbit.onUpdateError(() => { setDownloading(false); });
        return () => { unsub1(); unsub2(); unsub3(); unsub4(); };
      }, []);
      if (!update && !downloaded) return null;
      if (downloaded) {
        return h('div', {
          className: 'update-pill update-pill-ready',
          onClick: () => window.orbit.installUpdate(),
          title: 'Click to restart and install update'
        },
          h('span', {className:'update-pill-icon'}, '↑'),
          h('span', {className:'update-pill-label'}, 'Restart & Update')
        );
      }
      if (downloading) {
        return h('div', {className:'update-pill update-pill-downloading', title:'Downloading update...'},
          h('span', {className:'update-pill-icon'}, '↓'),
          h('span', {className:'update-pill-label'}, progress > 0 ? `${progress}%` : 'Update…')
        );
      }
      return null;
    }

    // ═══ INDIVIDUAL MEDIA PANELS ═══

    function SonarrPanel({ config, openSettings }) {
      const sCfg = config?.integrations?.sonarr;
      const configured = sCfg?.url && sCfg?.apiKey;
      const [seriesMap, setSeriesMap] = useState({});
      const [seriesCount, setSeriesCount] = useState(null);
      const [queue, setQueue] = useState([]);
      const [todayImports, setTodayImports] = useState([]);
      const [calendar, setCalendar] = useState([]);
      const pollRef = useRef(null);

      useEffect(() => {
        if (!configured) return;
        const hdr = {'X-Api-Key': sCfg.apiKey};
        let _sonarrTimer = null;
        let _active = false;
        async function poll() {
          try {
            const todayStr = new Date().toISOString().split('T')[0];
            const futureStr = new Date(Date.now()+4*86400000).toISOString().split('T')[0];
            const [series, hist, cal, q] = await Promise.all([
              window.orbit.apiGet(sCfg.url+'/api/v3/series', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/history?pageSize=50&sortKey=date&sortDir=desc&includeSeries=true&includeEpisode=true', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/calendar?start='+todayStr+'&end='+futureStr+'&unmonitored=false&includeSeries=true', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/queue?pageSize=5&includeSeries=true&includeEpisode=true', hdr)
            ]);
            if (Array.isArray(series)) {
              setSeriesCount(series.length);
              const map = {};
              series.forEach(s => { map[s.id] = s.title; });
              setSeriesMap(map);
            }
            if (Array.isArray(hist?.records)) {
              const imports = hist.records.filter(r => {
                if (r.eventType !== 'downloadFolderImported') return false;
                return new Date(r.date).toISOString().startsWith(todayStr);
              });
              setTodayImports(imports.slice(0,6));
            }
            if (Array.isArray(cal)) setCalendar(cal.slice(0,6));
            if (Array.isArray(q?.records)) {
              const qr = q.records.slice(0,3);
              setQueue(qr);
              _active = qr.length > 0;
            }
          } catch {}
          clearTimeout(_sonarrTimer);
          _sonarrTimer = setTimeout(poll, _active ? 10000 : 30000);
        }
        pollRef.current = poll;
        poll();
        return () => clearTimeout(_sonarrTimer);
      }, [sCfg?.url, sCfg?.apiKey]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'SONARR', icon:'📺', accentColor:'#35C5F4', onSettings:()=>openSettingsAt('settings-sonarr')}),
        h('div',{className:'panel-unconfigured-icon'},'📺'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'}},'Configure in Settings'));

      function dayLabel(dateStr) {
        const diff = Math.round((new Date(dateStr) - new Date(new Date().toDateString())) / 86400000);
        if (diff <= 0) return 'Today'; if (diff === 1) return 'Tomorrow'; return '+'+diff+'d';
      }

      return h('div',{className:'panel panel-top'},
        h(PanelHeader, {title:'SONARR', icon:'📺', accentColor:'#35C5F4', onSettings:()=>openSettingsAt('settings-sonarr')}),
        h('div',{style:{display:'flex',gap:'32px',marginBottom:'14px',justifyContent:'center',width:'100%'}},
          h('div',{style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'LIBRARY'), h('div',{style:{fontSize:'30px',fontWeight:'800',color:'var(--accent)'}}, seriesCount??'…')),
          h('div',{style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'IN QUEUE'), h('div',{style:{fontSize:'30px',fontWeight:'800',color:'var(--text-bright)'}}, queue.length))
        ),
        // Active downloads

    function RadarrPanel({ config, openSettings }) {
      const rCfg = config?.integrations?.radarr;
      const configured = rCfg?.url && rCfg?.apiKey;
      const [movieMap, setMovieMap] = useState({});
      const [movieCount, setMovieCount] = useState(null);
      const [queue, setQueue] = useState([]);
      const [todayImports, setTodayImports] = useState([]);
      const [upcoming, setUpcoming] = useState([]);
      const pollRef = useRef(null);

      useEffect(() => {
        if (!configured) return;
        const hdr = {'X-Api-Key': rCfg.apiKey};
        let _radarrTimer = null;
        let _active = false;
        async function poll() {
          try {
            const todayStr = new Date().toISOString().split('T')[0];
            const futureStr = new Date(Date.now()+90*86400000).toISOString().split('T')[0];
            const [movies, hist, cal, q] = await Promise.all([
              window.orbit.apiGet(rCfg.url+'/api/v3/movie', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/history?pageSize=50&sortKey=date&sortDir=desc&includeMovie=true', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/calendar?start='+todayStr+'&end='+futureStr+'&unmonitored=false', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/queue?pageSize=5&includeMovie=true', hdr)
            ]);
            if (Array.isArray(movies)) {
              setMovieCount(movies.length);
              const map = {};
              movies.forEach(m => { map[m.id] = { title: m.title, year: m.year }; });
              setMovieMap(map);
            }
            if (Array.isArray(hist?.records)) {
              const imports = hist.records.filter(r => {
                if (r.eventType !== 'downloadFolderImported') return false;
                return new Date(r.date).toISOString().startsWith(todayStr);
              });
              setTodayImports(imports.slice(0,5));
            }
            if (Array.isArray(cal)) {
              const now = Date.now();
              const classified = cal.map(m => {
                const cinema = m.inCinemas ? new Date(m.inCinemas) : null;
                const digital = m.digitalRelease ? new Date(m.digitalRelease) : null;
                const physical = m.physicalRelease ? new Date(m.physicalRelease) : null;
                const dates = [cinema, digital, physical].filter(d => d && d.getTime() > now-86400000);
                const earliest = dates.sort((a,b)=>a-b)[0];
                const type = earliest === cinema ? '🎭 CINEMA' : '💾 DOWNLOAD';
                const daysAway = earliest ? Math.ceil((earliest-now)/86400000) : 999;
                return { title:m.title, year:m.year, type, daysAway, hasFile:m.hasFile };
              }).filter(m => !m.hasFile && m.daysAway < 90).sort((a,b)=>a.daysAway-b.daysAway);
              setUpcoming(classified.slice(0,5));
            }
            if (Array.isArray(q?.records)) {
              const qr = q.records.slice(0,3);
              setQueue(qr);
              _active = qr.length > 0;
            }
          } catch {}
          clearTimeout(_radarrTimer);
          _radarrTimer = setTimeout(poll, _active ? 10000 : 30000);
        }
        pollRef.current = poll;
        poll();
        return () => clearTimeout(_radarrTimer);
      }, [rCfg?.url, rCfg?.apiKey]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'RADARR', icon:'🎬', accentColor:'#FFC230', onSettings:()=>openSettingsAt('settings-radarr')}),
        h('div',{className:'panel-unconfigured-icon'},'🎬'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'}},'Configure in Settings'));

      return h('div',{className:'panel panel-top'},
        h(PanelHeader, {title:'RADARR', icon:'🎬', accentColor:'#FFC230', onSettings:()=>openSettingsAt('settings-radarr')}),
        // Stats
        h('div',{style:{display:'flex',gap:'32px',marginBottom:'14px',justifyContent:'center',width:'100%'}},
          h('div',{style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'LIBRARY'), h('div',{style:{fontSize:'30px',fontWeight:'800',color:'var(--accent)'}}, movieCount??'…')),
          h('div',{style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'IN QUEUE'), h('div',{style:{fontSize:'30px',fontWeight:'800',color:'var(--text-bright)'}}, queue.length))
        ),
        // Active downloads
        queue.length > 0 && h('div',{style:{marginBottom:'12px'}},
          h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'DOWNLOADING'),
          queue.map((item,i)=>{
            const pct = item.size > 0 ? Math.round((1-(item.sizeLeft/item.size))*100) : 0;
            const title = (item.movie?.title || item.title || '').slice(0,36);
            return h('div',{key:i,style:{marginBottom:'8px'}},
              h('div',{style:{fontSize:'12px',color:'var(--text)',marginBottom:'3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, title),
              h('div',{className:'np-progress-bar'},h('div',{className:'np-progress-fill',style:{width:pct+'%'}})),
              h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}, pct+'%')
            );
          })
        ),
        // Downloaded today
        todayImports.length > 0 && h('div',{style:{marginBottom:'12px'}},
          h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'DOWNLOADED TODAY'),
          todayImports.map((r,i)=>{
            const fromMap = r.movieId ? movieMap[r.movieId] : null;
            const title = r.movie?.title || fromMap?.title || r.movieTitle || '?';
            const year = r.movie?.year || fromMap?.year;
            const display = title + (year ? ' ('+year+')' : '');
            return h('div',{key:i,style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'5px'}},
              h('span',{style:{color:'#50fa7b',fontSize:'11px',flexShrink:0,marginTop:'1px'}},'✓'),
              h('div',{style:{fontSize:'13px',color:'var(--text)',lineHeight:'1.4'}}, display)
            );
          })
        ),
        // Upcoming
        upcoming.length > 0 && h('div',null,
          h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'UPCOMING'),
          upcoming.map((m,i)=>{
            const when = m.daysAway <= 0 ? 'Today' : m.daysAway === 1 ? 'Tomorrow' : 'in '+m.daysAway+'d';
            return h('div',{key:i,style:{display:'flex',gap:'8px',alignItems:'baseline',marginBottom:'5px'}},
              h('span',{style:{fontSize:'10px',color:m.type.includes('CINEMA')?'#ffb86c':'var(--accent)',flexShrink:0,minWidth:'58px'}}, m.type),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontSize:'12px',color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, m.title+(m.year?' ('+m.year+')':'')),
                h('div',{style:{fontSize:'10px',color:'var(--dim)'}}, when)
              )
            );
          })
        )
      );
    }

    function OverseerrPanel({ config, openSettings }) {
      const oCfg = config?.integrations?.overseerr;
      const configured = oCfg?.url && oCfg?.apiKey;
      const [counts, setCounts] = useState(null);
      const [recent, setRecent] = useState([]);
      const [titles, setTitles] = useState({}); // tmdbId → title string

      useEffect(() => {
        if (!configured) return;
        const headers = {'X-Api-Key': oCfg.apiKey};
        async function poll() {
          try {
            const [c, r] = await Promise.all([
              window.orbit.apiGet(oCfg.url+'/api/v1/request/count', headers),
              window.orbit.apiGet(oCfg.url+'/api/v1/request?take=8&skip=0&sort=added', headers)
            ]);
            if (!c?.error) setCounts(c);
            if (Array.isArray(r?.results)) {
              const items = r.results.slice(0,8);
              setRecent(items);
              // Async-fetch titles for each request
              items.forEach(async (req) => {
                const tmdb = req.media?.tmdbId;
                const type = req.type;
                if (!tmdb || !type) return;
                try {
                  const endpoint = type === 'movie' ? `/api/v1/movie/${tmdb}` : `/api/v1/tv/${tmdb}`;
                  const details = await window.orbit.apiGet(oCfg.url+endpoint, headers);
                  const title = details?.title || details?.name || details?.originalTitle || details?.originalName;
                  const year = details?.releaseDate?.slice(0,4) || details?.firstAirDate?.slice(0,4);
                  if (title) setTitles(prev => ({...prev, [tmdb]: title + (year ? ' ('+year+')' : '')}));
                } catch {}
              });
            }
          } catch {}
        }
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [oCfg?.url, oCfg?.apiKey]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'OVERSEERR', icon:'🎯', accentColor:'#7B2FBE', onSettings:()=>openSettingsAt('settings-overseerr')}),

      const statusColor = {1:'#ffb86c',2:'var(--accent)',3:'#ff5555',4:'#8be9fd',5:'#50fa7b'};
      return h('div',{className:'panel panel-top'},
        h(PanelHeader, {title:'OVERSEERR', icon:'🎯', accentColor:'#7B2FBE', onSettings:()=>openSettingsAt('settings-overseerr')}),

          [['TOTAL',counts.total,'var(--text)'],['PENDING',counts.pending,'#ffb86c'],['PROCESSING',counts.processing,'var(--accent)'],['AVAILABLE',counts.available,'#50fa7b']]
            .map(([l,v,c])=>h('div',{key:l},
              h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'3px',letterSpacing:'2px'}},l),
              h('div',{style:{fontSize:'28px',fontWeight:'800',color:c}},v??'…')
            ))
        ),
        recent.length > 0 && h('div', null,
          h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'RECENT REQUESTS'),
          recent.map((req,i)=>{
            const isMovie = req.type==='movie';

            const user = req.requestedBy?.displayName||req.requestedBy?.plexUsername||'?';
            const st = req.status||1;
            return h('div',{key:i,style:{marginBottom:'8px',paddingBottom:'8px',borderBottom:'1px solid rgba(255,255,255,0.06)'}},

                  : h('div',{style:{flex:1,fontSize:'11px',color:'var(--dim)'}}, 'Loading…')
              ),
              h('div',{style:{display:'flex',justifyContent:'space-between',paddingLeft:'20px'}},
                h('span',{style:{fontSize:'11px',color:'var(--dim)'}}, user),
                h('span',{style:{fontSize:'11px',color:statusColor[st]||'var(--dim)',fontWeight:'600'}}, statusLabel[st]||'?')

          })
