name: Build Orbit

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build NSIS installer (${{ matrix.arch }})
        run: npx electron-builder --win nsis --${{ matrix.arch }} --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Rename ARM64 installer to include arch suffix
        if: matrix.arch == 'arm64'
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $src = "dist\OrbitSetup-$version.exe"
          $dst = "dist\OrbitSetup-$version-arm64.exe"
          Rename-Item $src $dst
          Write-Host "Renamed $src -> $dst"

      - name: Generate latest.yml
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\OrbitSetup-*.exe | Where-Object { $_.Name -notlike '*arm64*' } | Select-Object -First 1
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA512).Hash.ToLower()
          $size = $exe.Length
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ss.fffZ")
          $name = $exe.Name
          @"
          version: $version
          files:
            - url: $name
              sha512: $hash
              size: $size
          path: $name
          sha512: $hash
          releaseDate: '$date'
          "@ | Set-Content dist\latest.yml

      - name: List build output
        run: ls dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrbitSetup-windows-${{ matrix.arch }}
          path: dist/OrbitSetup-*.exe

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/OrbitSetup-*.exe
            ${{ matrix.arch == 'x64' && 'dist/latest.yml' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npx electron-builder --mac dmg --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        run: ls dist/

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrbitSetup-mac
          path: dist/*.dmg

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage and deb
        run: npx electron-builder --linux AppImage deb --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List build output
        run: ls dist/

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OrbitSetup-linux
          path: |
            dist/*.AppImage
            dist/*.deb

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.AppImage
            dist/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
