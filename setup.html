<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Orbit Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0f; --surface: rgba(255,255,255,0.03); --border: rgba(255,255,255,0.08);
      --accent: #00d9ff; --green: #50fa7b; --amber: #ffc857; --red: #ff5555;
      --dim: rgba(255,255,255,0.35); --text: #c8d6e5; --text-bright: #e8f0f8;
      --font: 'JetBrains Mono', monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }
    body { padding: 32px 40px; overflow-y: auto; }
    body::-webkit-scrollbar { width: 6px; }
    body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .header { text-align: center; margin-bottom: 32px; }
    .header h1 { font-size: 36px; font-weight: 700; color: var(--accent); letter-spacing: 6px; margin-bottom: 6px; text-shadow: 0 0 30px rgba(0,217,255,0.3); }
    .header p { font-size: 12px; color: var(--dim); letter-spacing: 2px; }

    .progress { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 36px; }
    .step-item { display: flex; align-items: center; gap: 8px; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--dim); transition: all .3s; }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .step-dot.done { background: var(--green); }
    .step-label { font-size: 11px; letter-spacing: 1.5px; color: var(--dim); text-transform: uppercase; transition: color .3s; }
    .step-label.active { color: var(--accent); }
    .step-label.done { color: var(--green); }
    .step-arrow { color: var(--dim); font-size: 12px; }

    .step { display: none; animation: fadeIn .3s ease; }
    .step.visible { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .welcome-content { text-align: center; max-width: 520px; margin: 0 auto; padding: 40px 0; }
    .welcome-logo { font-size: 72px; font-weight: 700; color: var(--accent); letter-spacing: 12px; text-shadow: 0 0 60px rgba(0,217,255,0.4); margin-bottom: 24px; }
    .welcome-title { font-size: 20px; font-weight: 600; color: var(--text-bright); margin-bottom: 12px; }
    .welcome-desc { font-size: 13px; color: var(--dim); line-height: 1.8; margin-bottom: 32px; }

    .field-group { margin-bottom: 20px; }
    .field-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
    .field-input { width: 100%; padding: 10px 14px; font-size: 13px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
    .field-input:focus { border-color: var(--accent); }
    .field-hint { font-size: 10px; color: var(--dim); margin-top: 4px; }

    .integration-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; transition: border-color .2s; }
    .integration-card.enabled { border-color: rgba(0,217,255,0.3); }
    .integration-title { font-size: 13px; font-weight: 700; color: var(--text-bright); margin-bottom: 0; display: flex; align-items: center; gap: 8px; }
    .integration-title .emoji { font-size: 18px; }
    .integration-toggle { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
    .integration-toggle input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }
    .integration-fields { margin-top: 14px; display: none; }
    .integration-fields.visible { display: block; }
    .integration-hint { font-size: 10px; color: var(--amber); margin-top: 4px; font-style: italic; }

    .complete-content { text-align: center; max-width: 520px; margin: 0 auto; padding: 40px 0; }
    .complete-icon { font-size: 64px; margin-bottom: 16px; }
    .complete-title { font-size: 22px; font-weight: 700; color: var(--green); margin-bottom: 12px; }
    .complete-desc { font-size: 13px; color: var(--dim); line-height: 1.8; margin-bottom: 32px; }

    .btn { padding: 12px 32px; font-size: 13px; font-weight: 700; font-family: var(--font); letter-spacing: 2px; border-radius: 8px; cursor: pointer; transition: all .2s; }
    .btn-primary { background: var(--accent); color: var(--bg); border: none; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: transparent; color: var(--dim); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-success { background: var(--green); color: var(--bg); border: none; }
    .btn-success:hover { opacity: 0.9; }

    .btn-row { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

    /* Pages Builder */
    .pages-builder { display: grid; grid-template-columns: 220px 1fr; gap: 24px; }
    .page-list-col { display: flex; flex-direction: column; gap: 6px; }
    .page-list-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
    .page-item { display: flex; align-items: center; gap: 8px; font-family: var(--font); font-size: 13px; padding: 10px 14px; border-radius: 6px; cursor: pointer; background: transparent; border: 1px solid transparent; color: var(--text); transition: all .2s; position: relative; }
    .page-item:hover { background: rgba(255,255,255,0.03); }
    .page-item.selected { background: rgba(0,217,255,0.08); border: 1px solid rgba(0,217,255,0.3); color: var(--accent); }
    .page-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .page-item-name-input { flex: 1; font-family: var(--font); font-size: 13px; background: rgba(255,255,255,0.06); border: 1px solid var(--accent); border-radius: 4px; color: var(--text-bright); padding: 2px 6px; outline: none; }
    .page-item-delete { font-size: 14px; color: var(--dim); cursor: pointer; opacity: 0; transition: opacity .2s; padding: 0 4px; }
    .page-item:hover .page-item-delete { opacity: 1; }
    .page-item-delete:hover { color: var(--red); }
    .page-add-btn { font-family: var(--font); font-size: 12px; color: var(--dim); background: transparent; border: 1px dashed var(--border); border-radius: 6px; padding: 8px 14px; cursor: pointer; transition: all .2s; margin-top: 4px; }
    .page-add-btn:hover { border-color: var(--accent); color: var(--accent); }

    .panels-col { display: flex; flex-direction: column; gap: 16px; }
    .panels-title { font-size: 13px; font-weight: 600; color: var(--text-bright); }
    .panels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
    .panel-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: all .2s; user-select: none; }
    .panel-card:hover { border-color: rgba(255,255,255,0.15); }
    .panel-card.selected { border-color: var(--accent); background: rgba(0,217,255,0.06); }
    .panel-card.disabled { opacity: 0.4; cursor: not-allowed; }
    .panel-card-icon { font-size: 18px; flex-shrink: 0; }
    .panel-card-name { font-size: 12px; color: var(--text); }
    .panel-card.selected .panel-card-name { color: var(--accent); }
    .panel-card-check { margin-left: auto; font-size: 14px; color: var(--accent); opacity: 0; transition: opacity .2s; }
    .panel-card.selected .panel-card-check { opacity: 1; }
    .max-hint { font-size: 11px; color: var(--amber); margin-top: 4px; }

    .selected-panels-order { margin-top: 8px; }
    .selected-panels-order-title { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
    .selected-panel-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text); padding: 8px 12px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 4px; cursor: grab; user-select: none; transition: background .15s; }
    .selected-panel-item:active { cursor: grabbing; }
    .selected-panel-item.drag-over { border-color: var(--accent); background: rgba(0,217,255,0.08); }
    .selected-panel-item.dragging { opacity: 0.4; }
    .drag-handle { color: var(--dim); font-size: 14px; flex-shrink: 0; cursor: grab; }
    .page-item-rename-btn { font-size: 11px; color: var(--dim); background: none; border: none; cursor: pointer; opacity: 0; padding: 0 4px; transition: opacity .2s; }
    .page-item:hover .page-item-rename-btn { opacity: 1; }
    .page-item-rename-btn:hover { color: var(--accent); }
    .selected-panel-num { color: var(--accent); font-weight: 700; font-size: 11px; min-width: 18px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ORBIT</h1>
    <p>SETUP WIZARD</p>
  </div>

  <div class="progress" id="progress"></div>
  <div id="step-container"></div>

  <script>
    const STEPS = [
      { id: 'welcome', label: 'Welcome' },
      { id: 'integrations', label: 'Integrations' },
      { id: 'pages', label: 'Pages' },
      { id: 'complete', label: 'Complete' }
    ];
    let currentStep = 0;
    const DEFAULTS = {
      theme: { accentColor: '#00d9ff', darkMode: true },
      pages: [{ id: 'page1', name: 'Home', panels: [
        {type:'clock',col:1,width:1},{type:'signalrgb',col:2,width:1},{type:'lights',col:3,width:1},
        {type:'nowplaying',col:4,width:1},{type:'system',col:5,width:1},{type:'links',col:6,width:1}
      ]}],
      integrations: {
        weather:{enabled:false, city:'Perth'}, tautulli:{enabled:false, url:'',apiKey:''}, plex:{enabled:false, url:'',token:''},
        homeassistant:{enabled:false, url:'',token:'',lights:[],signalrgbEntity:''},
        signalrgb:{enabled:false, url:'http://localhost:16038'},
        sonarr:{enabled:false, url:'',apiKey:''}, radarr:{enabled:false, url:'',apiKey:''}, overseerr:{enabled:false, url:'',apiKey:''},
        nzbget:{enabled:false, url:'',username:'',password:''}, uptimekuma:{enabled:false, url:'',username:'',password:''},
        spotify:{enabled:false, clientId:'',clientSecret:''}, jellyfin:{enabled:false, url:'',apiKey:''}
      },
      signalrgbFavorites: [],
      links: [{label:'Dashboard',url:'http://localhost',icon:'🏠'},{label:'GitHub',url:'https://github.com',icon:'💻'},{label:'Google',url:'https://google.com',icon:'🔍'}]
    };

    // Deep merge: existing config wins over defaults, preserving all saved fields
    function deepMerge(defaults, saved) {
      if (!saved || typeof saved !== 'object') return defaults;
      const result = Object.assign({}, defaults);
      for (const key of Object.keys(saved)) {
        if (saved[key] && typeof saved[key] === 'object' && !Array.isArray(saved[key])) {
          result[key] = deepMerge(defaults[key] || {}, saved[key]);
        } else if (saved[key] !== undefined && saved[key] !== null) {
          result[key] = saved[key];
        }
      }
      return result;
    }

    // Load existing config and merge with defaults so no data is lost on reconfigure
    let config = Object.assign({}, DEFAULTS);
    if (window.orbit && window.orbit.loadConfig) {
      window.orbit.loadConfig().then(saved => {
        if (saved) {
          config = deepMerge(DEFAULTS, saved);
          // Re-sync pagesState from the loaded config so reconfigure shows existing pages
          if (saved.pages && saved.pages.length > 0) {
            pagesState = JSON.parse(JSON.stringify(config.pages));
            pageCounter = pagesState.length;
            selectedPageIndex = 0;
          }
          render(); // re-render with loaded data
        }
      }).catch(() => {});
    }

    // Available panel types
    const PANEL_TYPES = [
      { type: 'clock',      icon: '🕐', name: 'Clock & Weather' },
      { type: 'nowplaying', icon: '▶',  name: 'Now Playing (Plex/Tautulli)' },
      { type: 'lights',     icon: '💡', name: 'Home Assistant' },
      { type: 'signalrgb',  icon: '⚡', name: 'SignalRGB' },
      { type: 'system',     icon: '💻', name: 'System Monitor' },
      { type: 'links',      icon: '🔗', name: 'Quick Links' },
      { type: 'sonarr',     icon: '📺', name: 'Sonarr' },
      { type: 'radarr',     icon: '🎬', name: 'Radarr' },
      { type: 'overseerr',  icon: '🎭', name: 'Overseerr' },
      { type: 'nzbget',     icon: '⬇',  name: 'NZBGet' },
      { type: 'services',   icon: '📡', name: 'Services' },
      { type: 'spotify',    icon: '🎵', name: 'Spotify' },
      { type: 'jellyfin',   icon: '🎞', name: 'Jellyfin' },
      { type: 'discord',    icon: '💬', name: 'Discord' }
    ];
    const MAX_PANELS = 6;

    // Integration → required fields map for availability check
    const INTEGRATION_REQUIREMENTS = {
      clock:       null,                                    // always available
      system:      null,                                    // always available
      links:       null,                                    // always available
      nowplaying:  (c) => (c.tautulli?.enabled && c.tautulli?.url && c.tautulli?.apiKey) || (c.plex?.enabled && c.plex?.url && c.plex?.token),
      lights:      (c) => c.homeassistant?.enabled && c.homeassistant?.url && c.homeassistant?.token,
      signalrgb:   (c) => c.signalrgb?.enabled && c.signalrgb?.url,
      sonarr:      (c) => c.sonarr?.enabled && c.sonarr?.url && c.sonarr?.apiKey,
      radarr:      (c) => c.radarr?.enabled && c.radarr?.url && c.radarr?.apiKey,
      overseerr:   (c) => c.overseerr?.enabled && c.overseerr?.url && c.overseerr?.apiKey,
      nzbget:      (c) => c.nzbget?.enabled && c.nzbget?.url && c.nzbget?.username,
      uptimekuma:  null,                                    // legacy — always available
      services:    null,                                    // always available
      services:    null,                                    // always available (auto-detects from integrations)
      spotify:     (c) => c.spotify?.enabled && c.spotify?.clientId && c.spotify?.clientSecret,
      jellyfin:    (c) => c.jellyfin?.enabled && c.jellyfin?.url && c.jellyfin?.apiKey,
      discord:     (c) => c.discord?.enabled && c.discord?.clientId,
      media:       (c) => (c.sonarr?.enabled && c.sonarr?.url) || (c.radarr?.enabled && c.radarr?.url),
    };

    function isTypeAvailable(type) {
      const req = INTEGRATION_REQUIREMENTS[type];
      if (req === null || req === undefined) return true; // always available
      return !!req(config.integrations || {});
    }

    // Pages builder state — deep clone from config.pages
    let pagesState = JSON.parse(JSON.stringify(config.pages));
    let selectedPageIndex = 0;
    let pageCounter = pagesState.length; // for generating new page IDs

    function esc(str) { return (str||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function integrationCard(id, title, emoji, fieldsHtml) {
      // Services defaults to enabled if custom services exist (handles configs saved before the enabled flag was added)
      let enabled = config.integrations[id]?.enabled;
      if (id === 'services' && enabled == null) enabled = (config.customServices?.length > 0);
      return `
        <div class="integration-card${enabled ? ' enabled' : ''}" id="card-${id}">
          <label class="integration-toggle">
            <input type="checkbox" data-integration="${id}"${enabled ? ' checked' : ''}>
            <div class="integration-title"><span class="emoji">${emoji}</span> ${title}</div>
          </label>
          <div class="integration-fields${enabled ? ' visible' : ''}" id="${id}-fields">
            ${fieldsHtml}
          </div>
        </div>
      `;
    }

    function renderProgress() {
      const el = document.getElementById('progress');
      el.innerHTML = STEPS.map((s, i) => {
        const dotClass = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
        const labelClass = i < currentStep ? 'done' : i === currentStep ? 'active' : '';
        const arrow = i < STEPS.length - 1 ? '<span class="step-arrow">→</span>' : '';
        return `<div class="step-item"><div class="step-dot ${dotClass}"></div><span class="step-label ${labelClass}">${s.label}</span></div>${arrow}`;
      }).join('');
    }

    function renderStep() {
      const container = document.getElementById('step-container');
      if (currentStep === 0) {
        container.innerHTML = `
          <div class="step visible">
            <div class="welcome-content">
              <div class="welcome-logo">ORBIT</div>
              <div class="welcome-title">Welcome to Orbit</div>
              <div class="welcome-desc">
                A beautiful, modular desktop dashboard for power users.<br>
                Let's get you set up with your integrations.
              </div>
              <div class="btn-row">
                <button class="btn btn-primary" onclick="nextStep()">GET STARTED</button>
              </div>
            </div>
          </div>
        `;
      } else if (currentStep === 1) {
        container.innerHTML = `
          <div class="step visible">
            <div style="font-size:13px;color:var(--dim);margin-bottom:16px;text-align:center;letter-spacing:1px;">Enable the integrations you use. You can always change these later in Settings.</div>
            <div class="two-col">
              ${integrationCard('tautulli', 'Tautulli', '🎬', `
                <div class="field-group"><div class="field-label">URL</div><input class="field-input" id="tau-url" placeholder="http://192.168.1.x:8181" value="${esc(config.integrations.tautulli.url)}"></div>
                <div class="field-group"><div class="field-label">API Key</div><input class="field-input" id="tau-key" value="${esc(config.integrations.tautulli.apiKey)}"></div>
              
                ${testRow('tautulli')}
              `)}
              ${integrationCard('plex', 'Plex', '▶️', `
                <div class="field-group"><div class="field-label">Server URL</div><input class="field-input" id="plex-url" placeholder="http://192.168.1.x:32400" value="${esc(config.integrations.plex.url)}"></div>
                <div class="field-group"><div class="field-label">Plex Token</div><input class="field-input" id="plex-token" value="${esc(config.integrations.plex.token)}"></div>
              
                ${testRow('plex')}
              `)}
              ${integrationCard('weather', 'Weather', '🌤️', `
                <div class="field-group"><div class="field-label">City</div><input class="field-input" id="weather-city" placeholder="Perth" value="${esc(config.integrations.weather.city)}"><div class="field-hint">Used for weather display on the clock panel</div></div>
              
                ${testRow('weather')}
              `)}
              ${integrationCard('signalrgb', 'SignalRGB', '🎮', `
                <div class="field-group"><div class="field-label">URL</div><input class="field-input" id="signalrgb-url" placeholder="http://localhost:16038" value="${esc(config.integrations.signalrgb.url)}"></div>
                ${testRow('signalrgb')}
              `)}
              ${integrationCard('sonarr', 'Sonarr', '📺', `
                <div class="field-group"><div class="field-label">URL</div><input class="field-input" id="sonarr-url" placeholder="http://192.168.1.x:8989" value="${esc(config.integrations.sonarr.url)}"></div>
                <div class="field-group"><div class="field-label">API Key</div><input class="field-input" id="sonarr-key" value="${esc(config.integrations.sonarr.apiKey)}"></div>
              
                ${testRow('sonarr')}
              `)}
              ${integrationCard('radarr', 'Radarr', '🎬', `
                <div class="field-group"><div class="field-label">URL</div><input class="field-input" id="radarr-url" placeholder="http://192.168.1.x:7878" value="${esc(config.integrations.radarr.url)}"></div>
                <div class="field-group"><div class="field-label">API Key</div><input class="field-input" id="radarr-key" value="${esc(config.integrations.radarr.apiKey)}"></div>
              
                ${testRow('radarr')}
              `)}
              ${integrationCard('overseerr', 'Overseerr', '🎭', `
                <div class="field-group"><div class="field-label">URL</div><input class="field-input" id="overseerr-url" placeholder="http://192.168.1.x:5055" value="${esc(config.integrations.overseerr.url)}"></div>
                <div class="field-group"><div class="field-label">API Key</div><input class="field-input" id="overseerr-key" value="${esc(config.integrations.overseerr.apiKey)}"></div>
              
                ${testRow('overseerr')}
              `)}
              ${integrationCard('nzbget', 'NZBGet', '⬇', `
                <div class="field-group"><div class="field-label">URL</div><input class="field-input" id="nzbget-url" placeholder="http://192.168.1.x:6789" value="${esc(config.integrations.nzbget.url)}"></div>
                <div class="field-group"><div class="field-label">Username</div><input class="field-input" id="nzbget-user" value="${esc(config.integrations.nzbget.username)}"></div>
                <div class="field-group"><div class="field-label">Password</div><input class="field-input" id="nzbget-pass" type="password" value="${esc(config.integrations.nzbget.password)}"></div>
              
                ${testRow('nzbget')}
              `)}
              ${integrationCard('jellyfin', 'Jellyfin', '🎵', `
                <div class="field-group"><div class="field-label">URL</div><input class="field-input" id="jellyfin-url" placeholder="http://192.168.1.x:8096" value="${esc(config.integrations.jellyfin.url)}"></div>
                <div class="field-group"><div class="field-label">API Key</div><input class="field-input" id="jellyfin-key" value="${esc(config.integrations.jellyfin.apiKey)}"></div>
              
                ${testRow('jellyfin')}
              `)}
              ${integrationCard('services', 'Services', '📡', `
                <div class="integration-hint">The Services panel pings all configured integration URLs automatically. Add custom services below.</div>
                <div id="custom-services-list">${(config.customServices||[]).map((s,i)=>`
                  <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
                    <input class="field-input" style="flex:1;font-size:11px;" placeholder="Name" value="${esc(s.name||'')}" oninput="updateCustomService(${i},'name',this.value)">
                    <input class="field-input" style="flex:2;font-size:11px;" placeholder="http://..." value="${esc(s.url||'')}" oninput="updateCustomService(${i},'url',this.value)">
                    <button onclick="removeCustomService(${i})" style="background:none;border:none;color:#ff5555;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;">×</button>
                  </div>`).join('')}</div>
                <button onclick="addCustomService()" style="margin-top:4px;padding:6px 14px;background:rgba(0,217,255,0.08);border:1px solid rgba(0,217,255,0.3);border-radius:6px;color:#00d9ff;cursor:pointer;font-family:inherit;font-size:12px;">+ Add Service</button>
              `)}
              ${integrationCard('spotify', 'Spotify', '🎵', `
                <div class="field-group"><div class="field-label">Client ID</div><input class="field-input" id="spotify-id" value="${esc(config.integrations.spotify.clientId)}"></div>
                <div class="field-group"><div class="field-label">Client Secret</div><input class="field-input" id="spotify-secret" value="${esc(config.integrations.spotify.clientSecret)}"></div>

            (key === 'services' && config.customServices?.length > 0);

            cb.checked = true;
            card.classList.add('enabled');
            fields.classList.add('visible');

                <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:6px;">Exce55ive Software</div>
                <div style="font-size:11px;margin-bottom:6px;"><a href="#" onclick="window.orbit.openExternal('https://exce55ive.xyz');return false;" style="color:rgba(255,255,255,0.25);text-decoration:none;">exce55ive.xyz</a></div>
                <div style="font-size:10px;color:rgba(255,255,255,0.18);margin-top:12px;letter-spacing:0.5px;">Auto-updates enabled · <span id="about-update-status">Checking...</span></div>

            </div>
          </div>

    /* ── Pages Builder Step ── */
    function renderPagesStep(container) {
      const page = pagesState[selectedPageIndex];
      const selectedTypes = page.panels.map(p => p.type);
      const atMax = selectedTypes.length >= MAX_PANELS;

      // Page list HTML
      let pageListHtml = pagesState.map((pg, i) => {
        const sel = i === selectedPageIndex ? ' selected' : '';
        const canDelete = pagesState.length > 1;
        const deleteBtn = canDelete
          ? `<span class="page-item-delete" onclick="event.stopPropagation(); deletePage(${i})" title="Delete page">×</span>`
          : '';
        return `<div class="page-item${sel}" onclick="selectPage(${i})">
          <span class="page-item-name">${escHtml(pg.name)}</span>
          <button class="page-item-rename-btn" onclick="event.stopPropagation(); startRenamePage(${i})" title="Rename page">✏️</button>
          ${deleteBtn}
        </div>`;
      }).join('');

      // Panel cards HTML — only show configured/always-available types
      let panelCardsHtml = PANEL_TYPES.filter(pt => isTypeAvailable(pt.type)).map(pt => {
        const isSelected = selectedTypes.includes(pt.type);
        const isDisabled = !isSelected && atMax;
        let cls = 'panel-card';
        if (isSelected) cls += ' selected';
        if (isDisabled) cls += ' disabled';
        const onclick = isDisabled ? '' : `onclick="togglePanel('${pt.type}')"`;
        return `<div class="${cls}" ${onclick}>
          <span class="panel-card-icon">${pt.icon}</span>
          <span class="panel-card-name">${pt.name}</span>
          <span class="panel-card-check">✓</span>
        </div>`;
      }).join('') + (PANEL_TYPES.filter(pt => !isTypeAvailable(pt.type)).length > 0 ? `
        <div style="grid-column:1/-1;font-size:10px;color:rgba(255,255,255,0.2);letter-spacing:1px;text-align:center;padding:6px 0;border-top:1px solid rgba(255,255,255,0.04);margin-top:4px;">
          ${PANEL_TYPES.filter(pt => !isTypeAvailable(pt.type)).length} panels hidden — configure their integrations first
        </div>` : '');

      // Selected panels order list (drag-to-reorder)
      let orderListHtml = '';
      if (selectedTypes.length > 0) {
        const items = page.panels.map((p, i) => {
          const pt = PANEL_TYPES.find(t => t.type === p.type);
          return `<div class="selected-panel-item" draggable="true" data-panel-index="${i}">
            <span class="drag-handle">⠿</span>
            <span class="selected-panel-num" style="color:var(--dim);font-size:10px;min-width:14px">${i + 1}</span>
            <span style="flex:1">${pt ? pt.icon : ''} ${pt ? pt.name : p.type}</span>
            <span style="display:flex;gap:4px">
              <button onclick="movePanelUp(${i})" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0 2px" ${i===0?'disabled':''}>↑</button>
              <button onclick="movePanelDown(${i})" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:12px;padding:0 2px" ${i===page.panels.length-1?'disabled':''}>↓</button>
            </span>
          </div>`;
        }).join('');
        orderListHtml = `
          <div class="selected-panels-order">
            <div class="selected-panels-order-title">Panel Order <span style="font-size:9px;color:var(--dim);font-weight:400;margin-left:6px">drag or use ↑↓</span></div>
            <div id="panel-order-list">${items}</div>
          </div>`;
      }

      container.innerHTML = `
        <div class="step visible">
          <div class="pages-builder">
            <div class="page-list-col">
              <div class="page-list-title">Pages</div>
              ${pageListHtml}
              <button class="page-add-btn" onclick="addPage()">+ Add Page</button>
            </div>
            <div class="panels-col">
              <div class="panels-title">Panels on ${escHtml(page.name)}</div>
              <div class="panels-grid">
                ${panelCardsHtml}
              </div>
              ${atMax ? '<div class="max-hint">Max 6 panels per page</div>' : ''}
              ${orderListHtml}
            </div>
          </div>
          <div class="btn-row">
            <button class="btn btn-secondary" onclick="prevStep()">BACK</button>
            <button class="btn btn-primary" onclick="savePagesAndNext()">NEXT</button>
          </div>
        </div>
      `;
      // Init drag-and-drop after DOM is ready
      setTimeout(initPanelOrderDrag, 0);
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function selectPage(index) {
      selectedPageIndex = index;
      renderPagesStep(document.getElementById('step-container'));
    }

    function addPage() {
      pageCounter++;
      const newId = 'page' + pageCounter;
      const newName = 'Page ' + pageCounter;
      pagesState.push({ id: newId, name: newName, panels: [] });
      selectedPageIndex = pagesState.length - 1;
      renderPagesStep(document.getElementById('step-container'));
    }

    function deletePage(index) {
      if (pagesState.length <= 1) return;
      pagesState.splice(index, 1);
      if (selectedPageIndex >= pagesState.length) {
        selectedPageIndex = pagesState.length - 1;
      } else if (selectedPageIndex > index) {
        selectedPageIndex--;
      } else if (selectedPageIndex === index) {
        selectedPageIndex = Math.min(index, pagesState.length - 1);
      }
      renderPagesStep(document.getElementById('step-container'));
    }

    function startRenamePage(index) {
      const container = document.getElementById('step-container');
      const pageItems = container.querySelectorAll('.page-item');
      const item = pageItems[index];
      const nameSpan = item.querySelector('.page-item-name');
      const currentName = pagesState[index].name;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'page-item-name-input';
      input.value = currentName;
      nameSpan.replaceWith(input);
      input.focus();
      input.select();

      function finishRename() {
        const newName = input.value.trim() || currentName;
        pagesState[index].name = newName;
        renderPagesStep(document.getElementById('step-container'));
      }

      input.addEventListener('blur', finishRename);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { input.blur(); }
        if (e.key === 'Escape') { input.value = currentName; input.blur(); }
      });
    }

    function movePanelUp(i) {
      const page = pagesState[selectedPageIndex];
      if (i <= 0) return;
      [page.panels[i], page.panels[i-1]] = [page.panels[i-1], page.panels[i]];
      renderPagesStep(document.getElementById('step-container'));
    }

    function movePanelDown(i) {
      const page = pagesState[selectedPageIndex];
      if (i >= page.panels.length - 1) return;
      [page.panels[i], page.panels[i+1]] = [page.panels[i+1], page.panels[i]];
      renderPagesStep(document.getElementById('step-container'));
    }

    function initPanelOrderDrag() {
      const list = document.getElementById('panel-order-list');
      if (!list) return;
      let dragIdx = null;
      list.querySelectorAll('.selected-panel-item').forEach(item => {
        item.addEventListener('dragstart', e => {
          dragIdx = parseInt(item.dataset.panelIndex);
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => item.classList.remove('dragging'));
        item.addEventListener('dragover', e => {
          e.preventDefault();
          item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
        item.addEventListener('drop', e => {
          e.preventDefault();
          item.classList.remove('drag-over');
          const dropIdx = parseInt(item.dataset.panelIndex);
          if (dragIdx === null || dragIdx === dropIdx) return;
          const page = pagesState[selectedPageIndex];
          const moved = page.panels.splice(dragIdx, 1)[0];
          page.panels.splice(dropIdx, 0, moved);
          dragIdx = null;
          renderPagesStep(document.getElementById('step-container'));
        });
      });
    }

    function togglePanel(type) {
      const page = pagesState[selectedPageIndex];
      const idx = page.panels.findIndex(p => p.type === type);
      if (idx !== -1) {
        // Remove panel
        page.panels.splice(idx, 1);
        // Re-assign col values
        page.panels.forEach((p, i) => { p.col = i + 1; });
      } else {
        if (page.panels.length >= MAX_PANELS) return;
        // Add panel at next position
        page.panels.push({ type: type, col: page.panels.length + 1, width: 1 });
      }
      renderPagesStep(document.getElementById('step-container'));
    }

    function savePagesAndNext() {
      // Write pagesState back to config
      config.pages = pagesState.map(pg => ({
        id: pg.id,
        name: pg.name,
        panels: pg.panels.map((p, i) => ({ type: p.type, col: i + 1, width: 1 }))
      }));
      window.orbit.saveConfig(config);
      nextStep();
    }

    function nextStep() { currentStep++; renderProgress(); renderStep(); }
    function prevStep() { currentStep--; renderProgress(); renderStep(); }

    function getVal(id) { const el = document.getElementById(id); return el ? el.value.trim() : ''; }
    function isEnabled(key) { const cb = document.querySelector(`input[data-integration="${key}"]`); return cb ? cb.checked : false; }

    // ── Custom Services ──────────────────────────────────────────────────────
    if (!config.customServices) config.customServices = [];

    function renderCustomServices() {
      const list = document.getElementById('custom-svc-list');
      if (!list) return;
      list.innerHTML = config.customServices.map((s, i) => `
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;">
          <div>
            <span style="font-size:12px;color:#c8d6e5;">${s.name}</span>
            <span style="font-size:11px;color:rgba(255,255,255,0.3);margin-left:10px;">${s.url}</span>
          </div>
          <button onclick="removeCustomService(${i})" style="background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:14px;padding:0 4px;" title="Remove">✕</button>
        </div>
      `).join('');
    }

    const LINK_ICONS = ['🔗','🏠','💻','🔍','📺','🎮','📁','⚙','🌐','📊','🎵','🛡','🚀','📡','🔧'];

    function renderLinks() {
      const el = document.getElementById('links-list');
      if (!el) return;
      if (!config.links) config.links = [];
      el.innerHTML = config.links.map((lnk,i) => `
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
          <select onchange="updateLink(${i},'icon',this.value)" style="width:44px;font-size:14px;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 2px;cursor:pointer;text-align:center;">
            ${LINK_ICONS.map(ic=>`<option value="${ic}"${ic===lnk.icon?' selected':''}>${ic}</option>`).join('')}
          </select>
          <input class="field-input" style="flex:1;font-size:11px;" placeholder="Label" value="${(lnk.label||'').replace(/"/g,'&quot;')}" oninput="updateLink(${i},'label',this.value)">
          <input class="field-input" style="flex:2;font-size:11px;" placeholder="URL (e.g. google.com)" value="${(lnk.url||'').replace(/"/g,'&quot;')}" oninput="updateLink(${i},'url',this.value)" onblur="if(this.value&&!/^https?:\\/\\//i.test(this.value))this.value='https://'+this.value,updateLink(${i},'url',this.value)">
          <button onclick="removeLink(${i})" style="background:none;border:none;color:#ff5555;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;">×</button>
        </div>`).join('');
    }

    function addLink() {
      if (!config.links) config.links = [];
      config.links.push({ label: '', url: '', icon: '🔗' });
      renderLinks();
    }

    function removeLink(i) {
      if (!config.links) return;
      config.links.splice(i, 1);
      renderLinks();
    }

    function updateLink(i, field, val) {
      if (!config.links) return;
      if (config.links[i]) config.links[i][field] = val;
    }

    function addCustomService() {
      if (!config.customServices) config.customServices = [];
      config.customServices.push({ name: '', url: '' });
      renderCustomServicesInCard();
    }

    function removeCustomService(i) {
      if (!config.customServices) return;
      config.customServices.splice(i, 1);
      renderCustomServicesInCard();
    }

    function normalizeUrl(url) {
      const u = (url || '').trim();
      if (!u) return u;
      if (/^https?:\/\//i.test(u)) return u;
      return 'https://' + u;
    }

    function updateCustomService(i, field, val) {
      if (!config.customServices) return;
      if (config.customServices[i]) {
        config.customServices[i][field] = field === 'url' ? normalizeUrl(val) : val;
      }
    }

    function renderCustomServicesInCard() {
      const el = document.getElementById('custom-services-list');
      if (!el) return;
      el.innerHTML = (config.customServices||[]).map((s,i) => `
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
          <input class="field-input" style="flex:1;font-size:11px;" placeholder="Name" value="${(s.name||'').replace(/"/g,'&quot;')}" oninput="updateCustomService(${i},'name',this.value)">
          <input class="field-input" style="flex:2;font-size:11px;" placeholder="URL (e.g. nas.local or 192.168.1.x)" value="${(s.url||'').replace(/"/g,'&quot;')}" oninput="updateCustomService(${i},'url',this.value)" onblur="if(this.value)this.value=normalizeUrl(this.value)">
          <button onclick="removeCustomService(${i})" style="background:none;border:none;color:#ff5555;cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;">×</button>
        </div>`).join('');
    }

    async function testSignalRGB() {
      const url = document.getElementById('signalrgb-url')?.value?.trim() || 'http://localhost:16038';
      const resultEl = document.getElementById('signalrgb-test-result');
      if (resultEl) resultEl.textContent = 'Testing...';
      try {
        const r = await window.orbit.apiGet(url + '/api/v1/lighting', {}, 5000);
        if (r && r.status === 'ok') {
          if (resultEl) resultEl.textContent = '✅ Connected! Effect: ' + (r.data?.attributes?.name || 'unknown');
          if (resultEl) resultEl.style.color = '#50fa7b';
        } else if (r && r.error) {
          if (resultEl) { resultEl.textContent = '❌ ' + r.error; resultEl.style.color = '#ff5555'; }
        } else {
          if (resultEl) { resultEl.textContent = '⚠️ Unexpected response'; resultEl.style.color = '#ffb86c'; }
        }
      } catch (e) {
        if (resultEl) { resultEl.textContent = '❌ ' + (e.message || 'Connection failed'); resultEl.style.color = '#ff5555'; }
      }
    }

    function testRow(id) {
      return `<div style="display:flex;gap:8px;align-items:center;margin-top:10px;">
        <button onclick="testIntegration('${id}')" style="padding:5px 12px;background:rgba(0,217,255,0.06);border:1px solid rgba(0,217,255,0.25);border-radius:6px;color:#00d9ff;cursor:pointer;font-family:inherit;font-size:11px;letter-spacing:0.5px;">🔌 Test</button>
        <span id="${id}-test-result" style="font-size:11px;color:rgba(255,255,255,0.4);"></span>
      </div>`;
    }

    async function testIntegration(type) {
      const resultEl = document.getElementById(type + '-test-result');
      if (!resultEl) return;
      resultEl.textContent = '⏳ Testing...';
      resultEl.style.color = 'rgba(255,255,255,0.4)';
      // Read current field values for each type
      const getVal = (id) => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
      const opts = { type };
      if (type === 'signalrgb') opts.url = getVal('signalrgb-url');
      else if (type === 'tautulli') { opts.url = getVal('tau-url'); opts.apiKey = getVal('tau-key'); }
      else if (type === 'plex') { opts.url = getVal('plex-url'); opts.token = getVal('plex-token'); }
      else if (type === 'sonarr') { opts.url = getVal('sonarr-url'); opts.apiKey = getVal('sonarr-key'); }
      else if (type === 'radarr') { opts.url = getVal('radarr-url'); opts.apiKey = getVal('radarr-key'); }
      else if (type === 'overseerr') { opts.url = getVal('overseerr-url'); opts.apiKey = getVal('overseerr-key'); }
      else if (type === 'nzbget') { opts.url = getVal('nzbget-url'); opts.username = getVal('nzbget-user'); opts.password = getVal('nzbget-pass'); }
      else if (type === 'jellyfin') { opts.url = getVal('jellyfin-url'); opts.apiKey = getVal('jellyfin-key'); }
      else if (type === 'homeassistant') { opts.url = getVal('ha-url'); opts.token = getVal('ha-token'); }
      else if (type === 'weather') opts.url = getVal('weather-city');
      else if (type === 'spotify') { opts.clientId = getVal('spotify-id'); opts.clientSecret = getVal('spotify-secret'); }
      else if (type === 'discord') { opts.clientId = getVal('discord-id'); opts.clientSecret = getVal('discord-secret'); }
      try {
        const r = await window.orbit.testIntegration(opts);
        resultEl.textContent = r.ok ? ('✅ ' + r.message) : ('❌ ' + r.message);
        resultEl.style.color = r.ok ? '#4ade80' : '#ff5555';
      } catch(e) {
        resultEl.textContent = '❌ ' + e.message;
        resultEl.style.color = '#ff5555';
      }
    }

    let _discordPickerSlot = null;

    let _discordPickedGuild = null;

    async function browseDiscordServers(slot) {
      _discordPickerSlot = slot;
      _discordPickedGuild = null;
      const picker = document.getElementById('discord-guild-picker');
      if (!picker) return;
      picker.style.display = 'block';
      picker.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--dim);text-align:center;">Loading servers...</div>';
      let guilds = config.integrations.discord?.guilds || [];
      if (!guilds.length) {
        const r = await window.orbit.discordRefreshGuilds();
        if (r.error) { picker.innerHTML = '<div style="padding:12px;font-size:11px;color:#ff5555;">'+r.error+'</div>'; return; }
        guilds = r.guilds || [];
        config.integrations.discord.guilds = guilds;
      }
      if (!guilds.length) { picker.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--dim);text-align:center;">No servers found.</div>'; return; }
      picker.innerHTML = '<div style="padding:6px 12px;font-size:10px;color:var(--dim);letter-spacing:1px;">SELECT SERVER</div>' +
        guilds.map((g, i) => `
        <div onclick="selectDiscordGuildForVoice(${i})" style="padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text);" onmouseover="this.style.background='rgba(88,101,242,0.1)'" onmouseout="this.style.background=''">
          🖥️ ${g.name.replace(/</g,'&lt;')}
        </div>`).join('');
    }

    async function selectDiscordGuildForVoice(guildIndex) {
      const guild = (config.integrations.discord?.guilds || [])[guildIndex];
      if (!guild) return;
      _discordPickedGuild = guild;
      const picker = document.getElementById('discord-guild-picker');
      picker.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--dim);text-align:center;">Fetching voice channels...<br><span style="font-size:10px;color:#5865F2;">Check Discord for an authorization popup → click Authorize</span></div>';
      const r = await window.orbit.discordGetVoiceChannels(guild.id);
      if (!r.error && r.channels?.length) {
        picker.innerHTML = '<div style="padding:6px 12px;font-size:10px;color:var(--dim);letter-spacing:1px;">SELECT VOICE CHANNEL</div>' +
          r.channels.map((ch, i) => `
          <div onclick="selectDiscordVoiceChannel(${i})" style="padding:8px 12px;font-size:12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);color:var(--text);" onmouseover="this.style.background='rgba(88,101,242,0.1)'" onmouseout="this.style.background=''">
            🔊 ${ch.name.replace(/</g,'&lt;')}
          </div>`).join('');
        picker._channels = r.channels;
      } else {
        // RPC fallback — manual channel ID entry
        picker.innerHTML = `
          <div style="padding:10px 12px;">
            <div style="font-size:11px;color:var(--amber);margin-bottom:8px;">${r.error || 'No channels found'}</div>
            <div style="font-size:10px;color:var(--dim);margin-bottom:8px;">Enter voice channel ID manually:<br>In Discord: Settings → Advanced → Enable Developer Mode, then right-click a voice channel → Copy Channel ID</div>
            <div style="display:flex;gap:6px;align-items:center;">
              <input id="discord-manual-ch-id" class="field-input" placeholder="Channel ID (e.g. 1234567890)" style="flex:1;font-size:12px;padding:6px 10px;">
              <input id="discord-manual-ch-name" class="field-input" placeholder="Name (e.g. General)" style="flex:1;font-size:12px;padding:6px 10px;">
            </div>
            <button onclick="selectDiscordManualChannel()" style="margin-top:8px;padding:5px 14px;background:rgba(88,101,242,0.1);border:1px solid rgba(88,101,242,0.4);border-radius:6px;color:#5865F2;cursor:pointer;font-family:inherit;font-size:11px;width:100%;">✓ Use This Channel</button>
          </div>`;
      }
    }

    function selectDiscordManualChannel() {
      const chId = document.getElementById('discord-manual-ch-id')?.value.trim();
      const chName = document.getElementById('discord-manual-ch-name')?.value.trim() || 'Voice';
      if (!chId) return;
      const fakeChannel = { id: chId, name: chName };
      const picker = document.getElementById('discord-guild-picker');
      if (picker) picker._channels = [fakeChannel];
      selectDiscordVoiceChannel(0);
    }

    function selectDiscordVoiceChannel(channelIndex) {
      const picker = document.getElementById('discord-guild-picker');
      const channel = picker?._channels?.[channelIndex];
      const guild = _discordPickedGuild;
      if (!channel || !guild || !_discordPickerSlot) return;
      const voiceObj = { guildId: guild.id, guildName: guild.name, channelId: channel.id, channelName: channel.name };
      config.integrations.discord['favVoice'+_discordPickerSlot] = voiceObj;
      window.orbit.saveConfig(config);
      if (picker) picker.style.display = 'none';
      const displayEl = document.getElementById('discord-fav'+_discordPickerSlot+'-display');
      if (displayEl) {
        displayEl.innerHTML = `<div style="flex:1;font-size:12px;color:var(--text);background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:6px 10px;">🎙️ ${channel.name.replace(/</g,'&lt;')} <span style="color:var(--dim);font-size:10px;">(${guild.name.replace(/</g,'&lt;')})</span></div><button onclick="clearDiscordFav(${_discordPickerSlot})" style="background:none;border:none;color:#ff5555;cursor:pointer;font-size:14px;">×</button>`;
      }
      _discordPickerSlot = null;
      _discordPickedGuild = null;
    }

    function clearDiscordFav(slot) {
      delete config.integrations.discord['favVoice'+slot];
      delete config.integrations.discord['favServer'+slot]; // migrate old key too
      window.orbit.saveConfig(config);
      const displayEl = document.getElementById('discord-fav'+slot+'-display');
      if (displayEl) {
        displayEl.innerHTML = `<button class="ha-browse-btn" onclick="browseDiscordServers(${slot})">🎙️ Pick Voice Channel</button>`;
      }
      const picker = document.getElementById('discord-guild-picker');
      if (picker) picker.style.display = 'none';
    }

    function saveAndNext() {
      // Save enabled state and field values for all integrations
      config.integrations.homeassistant.enabled = isEnabled('homeassistant');
      config.integrations.homeassistant.url = getVal('ha-url');
      config.integrations.homeassistant.token = getVal('ha-token');
      config.integrations.homeassistant.lights = window._haSelectedIds ? Array.from(window._haSelectedIds) : (config.integrations.homeassistant.lights || []);

      config.integrations.tautulli.enabled = isEnabled('tautulli');
      config.integrations.tautulli.url = getVal('tau-url');
      config.integrations.tautulli.apiKey = getVal('tau-key');

      config.integrations.plex.enabled = isEnabled('plex');
      config.integrations.plex.url = getVal('plex-url');
      config.integrations.plex.token = getVal('plex-token');

      config.integrations.weather.enabled = isEnabled('weather');
      config.integrations.weather.city = getVal('weather-city') || 'Perth';

      config.integrations.signalrgb.enabled = isEnabled('signalrgb');
      config.integrations.signalrgb.url = getVal('signalrgb-url') || 'http://localhost:16038';

      config.integrations.sonarr.enabled = isEnabled('sonarr');
      config.integrations.sonarr.url = getVal('sonarr-url');
      config.integrations.sonarr.apiKey = getVal('sonarr-key');

      config.integrations.radarr.enabled = isEnabled('radarr');
      config.integrations.radarr.url = getVal('radarr-url');
      config.integrations.radarr.apiKey = getVal('radarr-key');

      config.integrations.overseerr.enabled = isEnabled('overseerr');
      config.integrations.overseerr.url = getVal('overseerr-url');
      config.integrations.overseerr.apiKey = getVal('overseerr-key');

      config.integrations.nzbget.enabled = isEnabled('nzbget');
      config.integrations.nzbget.url = getVal('nzbget-url');
      config.integrations.nzbget.username = getVal('nzbget-user');
      config.integrations.nzbget.password = getVal('nzbget-pass');

      config.integrations.jellyfin.enabled = isEnabled('jellyfin');
      config.integrations.jellyfin.url = getVal('jellyfin-url');
      config.integrations.jellyfin.apiKey = getVal('jellyfin-key');

      // Services panel enabled state
      if (!config.integrations.services) config.integrations.services = {};
      config.integrations.services.enabled = isEnabled('services');

      // Uptime Kuma removed — use Services panel instead

      config.integrations.spotify.enabled = isEnabled('spotify');
      config.integrations.spotify.clientId = getVal('spotify-id');
      config.integrations.spotify.clientSecret = getVal('spotify-secret');



      if (!config.integrations.discord) config.integrations.discord = {};
      config.integrations.discord.enabled = isEnabled('discord');
      config.integrations.discord.clientId = getVal('discord-id');
      config.integrations.discord.clientSecret = getVal('discord-secret');
      // Voice channels — manual entry (no RPC)
      const vc1id = getVal('discord-vc1-id'), vc1name = getVal('discord-vc1-name');
      const vc2id = getVal('discord-vc2-id'), vc2name = getVal('discord-vc2-name');
      const vc1guild = getVal('discord-vc1-guild');
      const vc2guild = getVal('discord-vc2-guild');
      if (vc1id) config.integrations.discord.favVoice1 = { channelId: vc1id, channelName: vc1name || vc1id, guildId: vc1guild || config.integrations.discord.favVoice1?.guildId || '', guildName: config.integrations.discord.favVoice1?.guildName || '' };
      else delete config.integrations.discord.favVoice1;
      if (vc2id) config.integrations.discord.favVoice2 = { channelId: vc2id, channelName: vc2name || vc2id, guildId: vc2guild || config.integrations.discord.favVoice2?.guildId || '', guildName: config.integrations.discord.favVoice2?.guildName || '' };
      else delete config.integrations.discord.favVoice2;
      // favServer1/2 are set by browseDiscordServers() / clearDiscordFav() directly

      // customServices and links already mutated in-place
      if (!config.customServices) config.customServices = [];
      if (!config.links) config.links = [];
      // Normalize link URLs
      config.links = config.links.map(l => ({
        ...l, url: l.url && !/^https?:\/\//i.test(l.url) ? 'https://'+l.url : l.url
      }));

      window.orbit.saveConfig(config);
      nextStep();
    }

    async function loadAboutInfo() {
      try {
        const v = await window.orbit.getAppVersion();
        const el = document.getElementById('about-version');
        if (el) el.textContent = 'v' + v;
      } catch {}
      try {
        const updateEl = document.getElementById('about-update-status');
        const pending = await window.orbit.getPendingUpdate();
        if (updateEl) updateEl.textContent = pending ? 'Update available — v' + (pending.version||'?') : 'Up to date';
      } catch {}
    }
    // Load about info whenever the complete step renders (called from renderStep)
    const _origRenderStep = typeof renderStep === 'function' ? renderStep : null;

    async function launch() {
      await window.orbit.saveConfig(config);
      await window.orbit.setupComplete();
    }

    renderProgress();
    renderStep();

    // ─── HA Entity Browser ───────────────────────────────────────────────────

    // Inject modal overlay into body
    (function injectHAModal() {
      const overlay = document.createElement('div');
      overlay.id = 'ha-modal-overlay';
      overlay.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;';
      overlay.innerHTML = `
        <div style="background:#111;border:1px solid rgba(255,255,255,0.1);border-radius:12px;width:580px;max-height:80vh;display:flex;flex-direction:column;padding:24px;">
          <div style="font-size:14px;font-weight:700;letter-spacing:2px;color:#00d9ff;margin-bottom:16px;">HA ENTITIES</div>
          <input id="ha-search" placeholder="Search entities..." style="width:100%;box-sizing:border-box;padding:8px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#c8d6e5;font-family:inherit;font-size:12px;margin-bottom:12px;outline:none;">
          <div id="ha-domain-pills" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;"></div>
          <div id="ha-entity-list" style="flex:1;overflow-y:auto;min-height:200px;max-height:350px;"></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.08);">
            <span id="ha-selected-label" style="font-size:11px;color:rgba(255,255,255,0.4);">0 selected</span>
            <div style="display:flex;gap:8px;">
              <button onclick="closeHAModal()" style="padding:8px 16px;background:transparent;border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#c8d6e5;cursor:pointer;font-family:inherit;font-size:12px;">Cancel</button>
              <button onclick="saveHAEntities()" style="padding:8px 16px;background:rgba(0,217,255,0.1);border:1px solid rgba(0,217,255,0.3);border-radius:6px;color:#00d9ff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;">Save Entities</button>
            </div>
          </div>
        </div>`;
      document.body.appendChild(overlay);
    })();

    // Show/hide the Configure Entities button
    function showHABrowseBtn() {
      const url = document.getElementById('ha-url');
      const token = document.getElementById('ha-token');
      const btn = document.getElementById('ha-browse-btn');
      if (btn) btn.style.display = (url && url.value.trim() && token && token.value.trim()) ? 'block' : 'none';
    }

    // HA modal state
    var haAllEntities = [];
    var haSelectedIds = new Set();
    var haActiveDomain = null;

    function renderHAEntities() {
      const searchVal = (document.getElementById('ha-search') ? document.getElementById('ha-search').value : '').toLowerCase();
      const list = document.getElementById('ha-entity-list');
      const label = document.getElementById('ha-selected-label');
      if (!list) return;

      const filtered = haAllEntities.filter(e => {
        if (haActiveDomain && e.domain !== haActiveDomain) return false;
        if (searchVal) {
          const name = (e.attributes && e.attributes.friendly_name ? e.attributes.friendly_name : '').toLowerCase();
          if (!e.entity_id.toLowerCase().includes(searchVal) && !name.includes(searchVal)) return false;
        }
        return true;
      });

      list.innerHTML = '';
      filtered.forEach(e => {
        const friendlyName = e.attributes && e.attributes.friendly_name ? e.attributes.friendly_name : e.entity_id;
        const checked = haSelectedIds.has(e.entity_id) ? 'checked' : '';
        const row = document.createElement('label');
        row.style.cssText = 'display:flex;gap:8px;align-items:center;padding:6px 4px;cursor:pointer;border-radius:4px;';
        row.innerHTML = `<input type="checkbox" data-eid="${e.entity_id}" ${checked} style="flex-shrink:0;accent-color:#00d9ff;">
          <span style="font-size:12px;color:#c8d6e5;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;">${friendlyName}</span>
          <span style="font-size:10px;color:rgba(255,255,255,0.3);flex-shrink:0;">${e.entity_id}</span>`;
        row.querySelector('input').addEventListener('change', function() {
          if (this.checked) haSelectedIds.add(this.dataset.eid);
          else haSelectedIds.delete(this.dataset.eid);
          if (label) label.textContent = haSelectedIds.size + ' selected';
        });
        list.appendChild(row);
      });

      if (label) label.textContent = haSelectedIds.size + ' selected';
    }

    function renderHADomainPills() {
      const pillsEl = document.getElementById('ha-domain-pills');
      if (!pillsEl) return;
      const domains = [...new Set(haAllEntities.map(e => e.domain))].sort();
      pillsEl.innerHTML = '';

      const allPill = document.createElement('button');
      allPill.textContent = 'All';
      allPill.style.cssText = 'padding:4px 10px;border-radius:12px;border:1px solid rgba(0,217,255,0.4);background:' + (haActiveDomain === null ? 'rgba(0,217,255,0.15)' : 'transparent') + ';color:#00d9ff;cursor:pointer;font-family:inherit;font-size:11px;';
      allPill.onclick = () => { haActiveDomain = null; renderHADomainPills(); renderHAEntities(); };
      pillsEl.appendChild(allPill);

      domains.forEach(d => {
        const pill = document.createElement('button');
        pill.textContent = d;
        pill.style.cssText = 'padding:4px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);background:' + (haActiveDomain === d ? 'rgba(255,255,255,0.1)' : 'transparent') + ';color:rgba(255,255,255,0.6);cursor:pointer;font-family:inherit;font-size:11px;';
        pill.onclick = () => { haActiveDomain = d; renderHADomainPills(); renderHAEntities(); };
        pillsEl.appendChild(pill);
      });
    }

    async function openHABrowser() {
      const url = document.getElementById('ha-url') ? document.getElementById('ha-url').value.trim() : '';
      const token = document.getElementById('ha-token') ? document.getElementById('ha-token').value.trim() : '';
      if (!url || !token) { alert('Enter HA URL and token first'); return; }

      const overlay = document.getElementById('ha-modal-overlay');
      if (overlay) { overlay.style.display = 'flex'; }

      const listEl = document.getElementById('ha-entity-list');
      if (listEl) listEl.innerHTML = '<div style="text-align:center;padding:24px;color:rgba(255,255,255,0.4);font-size:12px;">Loading entities…</div>';

      // Pre-populate from existing config
      haSelectedIds = new Set(config.integrations.homeassistant.lights || []);
      window._haSelectedIds = haSelectedIds;
      haActiveDomain = null;

      try {
        const data = await window.orbit.apiGet(url + '/api/states', { 'Authorization': 'Bearer ' + token }, 20000);
        if (Array.isArray(data)) {
          haAllEntities = data.map(e => Object.assign({}, e, { domain: e.entity_id.split('.')[0] }));
        } else {
          haAllEntities = [];
          if (listEl) listEl.innerHTML = '<div style="text-align:center;padding:24px;color:#ff5555;font-size:12px;">Failed to load entities. Check URL and token.</div>';
          return;
        }
      } catch (err) {
        haAllEntities = [];
        if (listEl) listEl.innerHTML = '<div style="text-align:center;padding:24px;color:#ff5555;font-size:12px;">Error: ' + (err.message || 'Request failed') + '</div>';
        return;
      }

      // Wire search
      const searchEl = document.getElementById('ha-search');
      if (searchEl) { searchEl.value = ''; searchEl.oninput = renderHAEntities; }

      renderHADomainPills();
      renderHAEntities();
    }

    function closeHAModal() {
      const overlay = document.getElementById('ha-modal-overlay');
      if (overlay) overlay.style.display = 'none';
    }

    function saveHAEntities() {
      config.integrations.homeassistant.lights = Array.from(haSelectedIds);
      window._haSelectedIds = haSelectedIds;
      const countEl = document.getElementById('ha-selected-count');
      if (countEl) countEl.textContent = haSelectedIds.size > 0 ? haSelectedIds.size + ' entities configured' : '';
      closeHAModal();
    }

  </script>
</body>
