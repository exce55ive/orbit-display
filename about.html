<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Orbit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060a10;
      --text: rgba(255,255,255,0.85);
      --dim: rgba(255,255,255,0.3);
      --dimmer: rgba(255,255,255,0.18);
      --accent: #00d9ff;
      --green: #50FA7B;
      --font: 'Segoe UI', system-ui, sans-serif;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-app-region: drag;
      user-select: none;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 40px 32px;
    }
    .title {
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 6px;
      color: #fff;
      margin-bottom: 10px;
    }
    .tagline {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--dim);
      margin-bottom: 28px;
    }
    .version-pill {
      display: inline-block;
      padding: 6px 20px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 24px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 28px;
      -webkit-app-region: no-drag;
    }
    .brand {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 6px;
    }
    .link {
      font-size: 12px;
      color: rgba(255,255,255,0.28);
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 24px;
      -webkit-app-region: no-drag;
    }
    .link:hover { color: var(--accent); }
    .update-line {
      font-size: 11px;
      color: var(--dimmer);
      letter-spacing: 0.5px;
    }
    .update-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      vertical-align: middle;
    }
    .close-btn {
      position: fixed;
      top: 14px; right: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.2);
      font-size: 18px;
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: color .15s;
    }
    .close-btn:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <button class="close-btn" onclick="window.orbitAbout.close()">✕</button>

  <div class="title">ORBIT</div>
  <div class="tagline">YOUR HOMELAB. ONE SCREEN.</div>

  <div class="version-pill" id="version-text">v—</div>

  <div class="brand">Exce55ive Software</div>
  <a class="link" id="site-link" href="#">exce55ive.xyz</a>

  <div class="update-line">
    <span class="update-dot" id="update-dot"></span>
    <span id="update-status">Checking for updates…</span>
  </div>

  <script>
    async function init() {
      // Version
      try {
        const v = await window.orbitAbout.getVersion();
        document.getElementById('version-text').textContent = 'v' + v;
      } catch {}

      // Update status
      try {
        const pending = await window.orbitAbout.getPendingUpdate();
        const dot = document.getElementById('update-dot');
        const status = document.getElementById('update-status');
        if (pending && pending.version) {
          dot.style.background = '#FFC230';
          status.textContent = 'Update available — v' + pending.version;
        } else {
          dot.style.background = '#50FA7B';
          status.textContent = 'Auto-updates enabled · Up to date';
        }
      } catch {
        document.getElementById('update-dot').style.background = 'rgba(255,255,255,0.2)';
        document.getElementById('update-status').textContent = 'Auto-updates enabled';
      }

      // Website link
      document.getElementById('site-link').addEventListener('click', (e) => {
        e.preventDefault();
        window.orbitAbout.openExternal('https://exce55ive.xyz');
      });
    }

    init();
  </script>
</body>
</html>
