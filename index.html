  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #060a10;
      --bg2: #0a0f1a;
      --surface: rgba(255,255,255,0.02);
      --border: rgba(255,255,255,0.06);
      --text: #c8d6e5;
      --text-bright: #e8f0f8;

      --accent-glow: rgba(0,217,255,0.18);

      --amber: #ffc857;
      --red: #ff5555;
      --green: #50fa7b;
      --font: "JetBrains Mono", "Fira Code", monospace;
    }
    html, body { width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); font-family: var(--font); color: var(--text); -webkit-font-smoothing: antialiased; user-select: none; cursor: default; }
    body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px); }
    #app { position: relative; z-index: 1; width: 100vw; height: 100vh; display: grid; grid-template-columns: repeat(var(--panel-cols, 6), minmax(0, 1fr)); gap: 0; }
    .panel { height: calc(100vh - 52px); padding: 60px 20px 16px; border-right: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
    .panel-drag-wrapper > .panel { height: calc(100vh - 52px); }
    .panel:last-child { border-right: none; }
    .panel-label { font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 12px; position: absolute; top: 14px; left: 50%; transform: translateX(-50%); white-space: nowrap; display: flex; align-items: center; gap: 6px; }
    .panel-drag-handle { cursor: grab; color: rgba(255,255,255,0.12); font-size: 11px; letter-spacing: 1px; transition: color .2s; user-select: none; line-height: 1; }
    .panel-drag-handle:hover { color: rgba(255,255,255,0.35); }
    .panel-drag-handle:active { cursor: grabbing; }
    .panel-drag-wrapper { position: relative; min-width: 0; overflow: hidden; }
    .panel-drag-wrapper > .panel { height: 100%; }
    .panel-drag-wrapper.drag-over-left { box-shadow: inset 3px 0 0 0 var(--accent); }
    .panel-drag-wrapper.drag-over-right { box-shadow: inset -3px 0 0 0 var(--accent); }
    .panel-drag-wrapper.dragging { opacity: 0.35; }
    .source-badge { display: inline-block; padding: 2px 6px; font-size: 11px; font-weight: 700; letter-spacing: 1px; border-radius: 3px; background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-glow); text-transform: uppercase; }
    .clock-time { font-size: 77px; font-weight: 300; color: var(--text-bright); letter-spacing: 3px; line-height: 1; margin-bottom: 6px; text-shadow: 0 0 30px var(--accent-glow); }
    .clock-date { font-size: 14px; font-weight: 500; letter-spacing: 2px; color: rgba(255,255,255,0.35); margin-bottom: 16px; }
    .weather-current { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
    .weather-icon { font-size: 38px; }
    .weather-temp { font-size: 43px; font-weight: 700; color: var(--text-bright); }
    .weather-desc { font-size: 16px; color: var(--text); margin-bottom: 4px; font-weight: 600; }
    .weather-summary { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 12px; max-width: 100%; padding: 0 8px; line-height: 1.5; }
    .weather-detail { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 10px; padding: 0 4px; justify-content: center; }
    .weather-extra { font-size: 13px; color: var(--dim); margin-bottom: 12px; display: flex; gap: 12px; justify-content: center; }
    .weather-strip { display: flex; gap: 4px; width: 100%; padding: 0 4px; overflow: hidden; justify-content: center; flex-shrink: 0; }

    .effect-name { font-size: 43px; font-weight: 700; margin-bottom: 6px; transition: color 2s ease; text-shadow: 0 0 30px currentColor; line-height: 1.1; max-width: 100%; word-wrap: break-word; }
    .effect-label { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.28); margin-bottom: 14px; }
    .brightness-wrap { width: 100%; padding: 0 12px; margin-bottom: 12px; }

    .brightness-fill { height: 100%; border-radius: 2px; transition: width .5s, background 2s; }

    .ha-toggle:hover { border-color: var(--accent); color: var(--accent); }
    .ha-toggle.on { border-color: var(--green); color: var(--green); background: rgba(80,250,123,0.08); }
    .ha-toggle.off { border-color: var(--red); color: var(--red); background: rgba(255,85,85,0.08); }
    .fav-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; padding: 0 8px; width: 100%; justify-content: center; }
    .fav-pill { padding: 2px 7px; font-size: 11px; font-family: var(--font); border-radius: 3px; background: rgba(255,200,87,0.08); border: 1px solid rgba(255,200,87,0.2); color: var(--amber); cursor: pointer; transition: all .15s; white-space: nowrap; }
    .fav-pill:hover { background: rgba(255,200,87,0.2); }
    .effect-search { width: calc(100% - 16px); padding: 6px 10px; font-size: 13px; font-family: var(--font); background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 6px; color: var(--text); outline: none; margin-bottom: 4px; }

    .effect-list::-webkit-scrollbar { width: 3px; }
    .effect-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .effect-option:hover { background: rgba(255,255,255,0.04); }
    .effect-option.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
    .effect-star { cursor: pointer; font-size: 14px; opacity: 0.3; transition: opacity .2s; }
    .effect-star.starred { opacity: 1; color: var(--amber); }
    .effect-star:hover { opacity: 0.8; }
    .light-card { width: 100%; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; transition: border-color .15s; }
    .light-card:hover { border-color: rgba(255,255,255,0.12); }

    .light-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: all .3s; }
    .light-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .light-toggle { padding: 3px 12px; font-size: 12px; font-weight: 700; border: 1px solid var(--border); border-radius: 12px; background: transparent; color: var(--text); cursor: pointer; font-family: var(--font); transition: all .2s; }
    .light-toggle:hover { border-color: var(--accent); }
    .light-toggle.on { border-color: var(--green); color: var(--green); }
    .light-toggle.off { border-color: var(--dim); color: var(--dim); }

    .light-brightness input::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: var(--accent); cursor: pointer; }
    .light-signalrgb-badge { font-size: 12px; color: var(--amber); display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }

    .np-offline { color: var(--amber); font-size: 16px; letter-spacing: 1px; }

    .panel-top { justify-content: flex-start !important; padding-top: 60px !important; padding-bottom: 16px !important; align-items: stretch !important; overflow-y: auto !important; }

    .np-session { width: 100%; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; text-align: left; transition: border-color .15s; }
    .np-session:hover { border-color: rgba(255,255,255,0.12); }
    .np-title { font-size: 17px; font-weight: 700; color: var(--text-bright); margin-bottom: 3px; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .np-subtitle { font-size: 13px; color: var(--text); margin-bottom: 6px; }
    .np-progress-wrap { width: 100%; margin-bottom: 4px; }
    .np-progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
    .panel-header { display:grid; grid-template-columns:1fr auto 1fr; align-items:center; padding:12px 12px 10px; border-bottom:1px solid rgba(255,255,255,0.12); position:absolute; top:0; left:0; right:0; z-index:10; background:var(--bg); overflow:hidden; box-sizing:border-box; }

    .panel-header-cog { background:none; border:none; color:rgba(255,255,255,0.2); cursor:pointer; font-size: 16px; padding:0; line-height:1; transition:color .15s; flex-shrink:0; }
    .panel-header-cog:hover { color:rgba(255,255,255,0.65); }
    .panel-collapse-btn { background:none; border:none; color:rgba(255,255,255,0.15); cursor:pointer; font-size:10px; padding:0 2px; line-height:1; transition:color .2s, transform .2s; flex-shrink:0; display:flex; align-items:center; }
    .panel-collapse-btn:hover { color:rgba(255,255,255,0.45); }

    .panel-drag-wrapper .panel { transition:height .2s ease; overflow:hidden; }

    .np-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 1s linear; }

    .np-time { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
    .np-badge { display: inline-block; padding: 2px 6px; font-size: 11px; font-weight: 700; letter-spacing: 1px; border-radius: 3px; margin-right: 4px; }
    .np-badge-transcode { background: rgba(255,200,87,0.12); color: var(--amber); border: 1px solid rgba(255,200,87,0.2); }
    .np-badge-direct { background: rgba(80,250,123,0.12); color: var(--green); border: 1px solid rgba(80,250,123,0.2); }
    .np-meta { font-size: 12px; color: var(--dim); margin-top: 4px; }

    .sys-stats { width: 100%; display: flex; flex-direction: column; gap: 10px; padding: 0 8px; }

    .sys-label { width: 44px; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.45); flex-shrink: 0; text-align: left; }
    .sys-row-cog { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 12px; padding: 0 2px; opacity: 0.6; line-height: 1; }

    .sys-bar-wrap { flex: 1; display: flex; flex-direction: column; gap: 2px; }

    .sys-c-green { color: var(--green); } .sys-b-green { background: var(--green); }

    .settings-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display: flex; justify-content: flex-end; }

    // ═══ PERFORMANCE HELPERS ═══
    // Stagger initial polls to avoid thundering herd on dashboard load

    function debounce(fn, ms) { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); }; }

    // Manages all panel polling intervals with visibility-aware throttling.

    // by a throttle factor to reduce CPU and network usage.
    const PollScheduler = (() => {

      let _hidden = document.hidden || false;
      const THROTTLE_FACTOR = 6; // 6x slower when hidden (e.g. 5s -> 30s)

      document.addEventListener('visibilitychange', () => {
        _hidden = document.hidden;
        // Reschedule all active intervals with new timing
        for (const [id, entry] of _intervals) {
          if (entry.timer) clearInterval(entry.timer);
          const ms = _hidden ? entry.normalMs * THROTTLE_FACTOR : entry.normalMs;
          entry.timer = setInterval(entry.fn, ms);
        }
      });

        // Register a polling function. Returns a cleanup function.
        // Options: { id, fn, intervalMs, immediate, stagger }
        register({ id, fn, intervalMs, immediate = true, stagger = true }) {
          // Clean up any existing registration with this id
          this.unregister(id);
          const ms = _hidden ? intervalMs * THROTTLE_FACTOR : intervalMs;
          const entry = { fn, normalMs: intervalMs, timer: null, staggerTimer: null };
          _intervals.set(id, entry);

          const start = () => {
            if (immediate) fn();
            entry.timer = setInterval(fn, ms);
          };

          if (stagger) {
            entry.staggerTimer = setTimeout(start, staggerMs());
          } else {
            start();
          }

          return () => this.unregister(id);
        },

        unregister(id) {
          const entry = _intervals.get(id);
          if (entry) {
            if (entry.staggerTimer) clearTimeout(entry.staggerTimer);
            if (entry.timer) clearInterval(entry.timer);
            _intervals.delete(id);
          }
        },

        // Returns true if page is currently hidden
        isHidden() { return _hidden; },

        // Get count of active polls (useful for debugging)
        activeCount() { return _intervals.size; }
      };
    })();

    class PanelErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; this._retryTimer = null; }
      static getDerivedStateFromError(err) { return { hasError: true, error: err }; }
      componentDidCatch(err, info) {

        console.error(msg, info);

        this._scheduleRetry();
      }
      _scheduleRetry() { clearTimeout(this._retryTimer); this._retryTimer = setTimeout(() => { this.setState({ hasError: false, error: null }); }, 30000); }
      componentWillUnmount() { clearTimeout(this._retryTimer); }

      }

    // Safe async wrapper for panel polling — catches IPC/fetch errors and returns fallback
    function useSafeAsync(asyncFn, deps, fallback) {
      const [result, setResult] = useState(fallback);
      const [error, setError] = useState(null);
      const retryRef = useRef(null);
      useEffect(() => {
        let cancelled = false;
        async function run() {
          try {
            const data = await asyncFn();
            if (!cancelled) { setResult(data); setError(null); }
          } catch (e) {
            console.warn('Panel async error:', e);
            if (window.orbit?.log) window.orbit.log.warn('Panel async error: ' + (e?.message || e));
            if (!cancelled) setError(e);
          }
        }
        run();
        return () => { cancelled = true; };
      }, deps);
      return [result, error];
    }

    // Batches rapid config writes (e.g. dragging brightness slider) to reduce file I/O.
    // Calls are coalesced — only the last config within the window is persisted.
    const debouncedSaveConfig = (() => {
      let _timer = null;
      let _pending = null;
      const SAVE_DELAY = 500; // ms

      return function saveConfigDebounced(cfg) {
        _pending = cfg;

        _timer = setTimeout(() => {
          if (_pending) {
            window.orbit.saveConfig(_pending);
            _pending = null;

    // ═══ SIGNALRGB PANEL ═══
    function SignalRGBPanel({ config, onSignalChange }) {
      const [state, setState] = useState(null);

        async function pollDirect() {
          try {
            const r = await window.orbit.fetchSignalRGB();
            if (r?.error) { setError(r.error); return; }
            if (r && r.data) {
              setError(null);
              // SignalRGB API: r.data.attributes.{name, enabled, global_brightness}
              const attrs = r.data.attributes || {};
              const effectName = attrs.name || (r.data.id || '').replace(/\.html$/i, '') || 'Unknown';
              const isEnabled = attrs.enabled !== false;
              // global_brightness is 0-100; convert to 0-255 for compatibility with haBrightPct()
              const brightness = Math.round(((attrs.global_brightness ?? 100) / 100) * 255);
              // effects are {id, name} objects from IPC
              const effs = (r.data.effects || []);
              setState({ state: isEnabled ? 'on' : 'off', attributes: {
                brightness, effect: effectName, effect_list: effs
              }});
            }
          } catch { setError('Could not connect to SignalRGB'); }
        }
        return PollScheduler.register({ id: 'signalrgb-poll', fn: pollDirect, intervalMs: 5000 });
      }, []);
      const isOn = state?.state === 'on';
      const effectName = state?.attributes?.effect || 'No Effect';
      const brightness = haBrightPct(state?.attributes?.brightness);
      const effectList = state?.attributes?.effect_list || [];
      // Auto-clean garbled string favorites once we have the real effect list
      useEffect(() => {
        if (!effectList.length || !favorites.length) return;
        // If favorites are old strings that don't match any known effect name, clear them

          const fname = typeof f === 'string' ? f : f.name;
          return validNames.has(fname);

          setFavorites(cleaned);

      const getEffId = (e) => typeof e === 'string' ? e : (e.id || e.name || '');

    // ═══ LIGHTS PANEL ═══
    function LightsPanel({ config, onConfigChange }) {
      const { isOn: signalActive } = useContext(SignalRGBContext);
      const [lights, setLights] = useState({});
      // Normalize: handle both old string[] and new {entityId,name}[] formats
      const rawLights = config?.integrations?.homeassistant?.lights || [];
      const lightEntities = rawLights.map(e => typeof e === 'string' ? {entityId:e, name:''} : e);
      const haConfigured = config?.integrations?.homeassistant?.url && config?.integrations?.homeassistant?.token;
      const lightEntityIds = lightEntities.map(e=>e.entityId).join(',');
      usePoll('lights-poll', async () => {
        if (!haConfigured || lightEntities.length === 0) return;
        const states = {};
        for (const e of lightEntities) { try { const r = await window.orbit.haGetState(e.entityId); if (!r.error) states[e.entityId] = r; } catch {} }
        setLights(states);
      }, 15000, [haConfigured, lightEntityIds]);
      const toggleLight = async (eid, on) => {
        // Optimistic update — flip immediately so UI responds instantly
        setLights(prev => ({ ...prev, [eid]: { ...prev[eid], state: on ? 'off' : 'on' } }));
        await window.orbit.haCallService('light', on ? 'turn_off' : 'turn_on', { entity_id: eid });
        // Confirm actual state after short delay
        setTimeout(async () => {
          try { const r = await window.orbit.haGetState(eid); if (!r.error) setLights(prev => ({ ...prev, [eid]: r })); } catch {}
        }, 800);
      };
      const setBrightness = async (eid, pct) => {
        // Optimistic update
        setLights(prev => ({ ...prev, [eid]: { ...prev[eid], attributes: { ...prev[eid]?.attributes, brightness: Math.round((pct/100)*255) } } }));
        await window.orbit.haCallService('light', 'turn_on', { entity_id: eid, brightness: Math.round((pct/100)*255) });
      };
      const [editingEid, setEditingEid] = useState(null);
      const [editValue, setEditValue] = useState('');
      // Local entity name overrides — updates immediately on save without waiting for config re-render
      const [localNames, setLocalNames] = useState({});

      const saveEntityName = (eid, newName) => {
        const trimmed = newName.trim();
        // Update local state immediately for instant UI feedback
        setLocalNames(prev => ({ ...prev, [eid]: trimmed }));
        setEditingEid(null);
        // Persist to config (write to .lights to match the key the panel reads)
        const cfg = JSON.parse(JSON.stringify(config));
        const lights = cfg?.integrations?.homeassistant?.lights || [];
        const idx = lights.findIndex(e => (typeof e === 'string' ? e : e.entityId) === eid);
        if (idx >= 0) {
          cfg.integrations.homeassistant.lights[idx] = { entityId: eid, name: trimmed };
        }
        window.orbit.saveConfig(cfg);
        if (onConfigChange) onConfigChange(cfg);
      };

      if (!haConfigured) return h('div',{className:'panel panel-unconfigured'}, h(PanelHeader, {title:'HOME ASSISTANT', icon:'💡', accentColor:'#18BCF2', onSettings:()=>openSettingsAt('settings-ha')}), h('div',{className:'panel-unconfigured-icon'},'💡'), h('div',{className:'panel-unconfigured-text'},'Configure Home Assistant in Settings'));
      return h('div', {className:'panel'},
        h(PanelHeader, {title:'HOME ASSISTANT', icon:'💡', accentColor:'#18BCF2', onSettings:()=>openSettingsAt('settings-ha')}),
        lightEntities.map(({entityId:eid, name:customName}) => {
          const st = lights[eid]; const isOn = st?.state === 'on'; const bri = haBrightPct(st?.attributes?.brightness);
          const haName = st?.attributes?.friendly_name || eid.replace('light.','').replace(/_/g,' ');
          const displayName = localNames[eid] !== undefined ? localNames[eid] : (customName || haName);
          const isEditing = editingEid === eid;
          return h('div', {key:eid, className:'light-card', style:signalActive?{opacity:0.7}:{}},
            signalActive && h('div', {className:'light-signalrgb-badge', title:'Controlled by SignalRGB'}, '⚡ SignalRGB active'),
            h('div', {className:'light-header'},
              h('div', {className:'light-dot '+(isOn?'on':'')}),
              isEditing
                ? h('div', {style:{flex:1,display:'flex',gap:'4px',alignItems:'center'}},
                    h('input', {
                      autoFocus:true,
                      value:editValue,
                      onChange:e=>setEditValue(e.target.value),
                      onKeyDown:e=>{if(e.key==='Enter')saveEntityName(eid,editValue);if(e.key==='Escape')setEditingEid(null);},
                      style:{flex:1,background:'rgba(255,255,255,0.06)',border:'1px solid rgba(0,217,255,0.4)',borderRadius:'4px',color:'var(--text)',fontSize:'11px',padding:'2px 6px',fontFamily:'var(--font)'}
                    }),
                    h('button', {onClick:()=>saveEntityName(eid,editValue), title:'Save', style:{background:'var(--accent-bg)',border:'1px solid rgba(0,217,255,0.3)',borderRadius:'4px',color:'var(--accent)',cursor:'pointer',padding:'2px 6px',fontSize:'11px'}}, '✓'),
                    h('button', {onClick:()=>setEditingEid(null), title:'Cancel', style:{background:'none',border:'1px solid rgba(255,255,255,0.1)',borderRadius:'4px',color:'var(--dim)',cursor:'pointer',padding:'2px 6px',fontSize:'11px'}}, '✕')
                  )
                : h('div', {className:'light-name', style:{display:'flex',alignItems:'center',gap:'4px',flex:1}},
                    h('span', null, displayName),
                    (localNames[eid] !== undefined ? localNames[eid] : customName) && h('span', {title:'Custom name (click ✏️ to edit)', style:{fontSize:'9px',color:'var(--accent-mid)',letterSpacing:'1px'}}, '✦'),
                    h('button', {
                      onClick:()=>{setEditingEid(eid);setEditValue(customName||haName);},
                      title:'Rename entity',
                      style:{background:'none',border:'none',color:'rgba(255,255,255,0.2)',cursor:'pointer',fontSize:'11px',padding:'0 2px',lineHeight:1,opacity:0,transition:'opacity .15s'}
                    }, '✏️')
                  ),
              !isEditing && h('button', {className:'light-toggle '+(isOn?'on':'off'), onClick:()=>toggleLight(eid,isOn)}, isOn?'ON':'OFF')
            ),
            isOn && !isEditing && h('div', {className:'light-brightness'}, h('input', {type:'range',min:0,max:100,value:bri,onChange:e=>setBrightness(eid,parseInt(e.target.value))}))
          );
        })
      );
    }

    // ═══ SYSTEM PANEL ═══
    function SystemPanel({ config, onConfigChange }) {
      const [fast, setFast] = useState(null);
      const [slow, setSlow] = useState(null);
      const [showPicker, setShowPicker] = useState(false);
      const [cpuSensorIdx, setCpuSensorIdx] = useState(0);
      const [gpuIdx, setGpuIdx] = useState(0);
      const [showDisk, setShowDisk] = useState(false);
      // Saved GPU model name — used to restore selection after restart
      const savedGpuModel = config?.systemPrefs?.gpuModel || null;
      usePoll('system-fast', async () => { try { const r = await window.orbit.getSysinfoFast(); if (!r.error) setFast(r); } catch {} }, 5000, []);
      usePoll('system-slow', async () => { try { const r = await window.orbit.getSysinfoSlow({cpuSensorIndex:cpuSensorIdx,gpuControllerIndex:gpuIdx,showDisk}); if (!r.error) setSlow(r); } catch {} }, 30000, [cpuSensorIdx, gpuIdx, showDisk]);
      const cpuUsage = fast?.cpu?.usage ?? 0;
      const cpuBrand = slow?.cpu?.brand || 'CPU';
      const cpuTemp = slow?.cpu?.temp;
      const gpuUsage = slow?.gpu?.usage ?? 0;
      const gpuModel = slow?.gpu?.model || 'GPU';
      const gpuTemp = slow?.gpu?.temp;
      const ramUsage = fast?.ram?.usage ?? 0;
      const ramUsed = fast?.ram?.usedGB || '0';
      const ramTotal = fast?.ram?.totalGB || '0';
      const txSec = fast?.net?.txSec || 0;
      const rxSec = fast?.net?.rxSec || 0;
      const cpuSensors = slow?.cpu?.sensors || [];
      const gpuList = slow?.gpu?.list || [];
      const diskUsage = slow?.disk?.usage;
      const [showCpuPicker, setShowCpuPicker] = useState(false);
      const [showGpuPicker, setShowGpuPicker] = useState(false);

      // Auto-select GPU: use saved model name first, then fallback to first Radeon/GeForce
      useEffect(() => {
        if (!gpuList.length) return;
        if (savedGpuModel) {
          const savedIdx = gpuList.findIndex(g => g.model === savedGpuModel);
          if (savedIdx >= 0 && savedIdx !== gpuIdx) { setGpuIdx(savedIdx); return; }
        }
        // No saved preference — auto-pick first discrete GPU
        const pref = gpuList.findIndex(g => /radeon|geforce|rx\s|rtx\s|gtx\s/i.test(g.model));
        if (pref >= 0 && pref !== gpuIdx) setGpuIdx(pref);
      }, [gpuList.length]);

      function sysRow(label, info, usage, onCog) {
        const c = getStatColor(usage);
        return h('div', {className:'sys-row'},
          h('div', {style:{display:'flex',alignItems:'center',gap:'2px',width:'52px',flexShrink:0}},
            h('div', {className:'sys-label', style:{width:'auto'}}, label),
            onCog && h('button', {className:'sys-row-cog', onClick:onCog}, '⚙')
          ),
          h('div', {className:'sys-bar-wrap'},
            h('div', {className:'sys-info'}, info),
            h('div', {className:'sys-bar'}, h('div', {className:'sys-bar-fill sys-b-'+c, style:{width:usage+'%'}}))
          ),
          h('div', {className:'sys-value sys-c-'+c}, usage+'%')
        );
      }
      return h('div', {className:'panel'},
        h(PanelHeader, {title:'SYSTEM', icon:'💻', accentColor:'#50FA7B', onSettings:()=>setShowPicker(!showPicker)}),
        showPicker && h('div', {className:'sys-picker-panel'},
          h('label', {className:'sys-picker-toggle'},
            h('input', {type:'checkbox', checked:showDisk, onChange:e=>setShowDisk(e.target.checked)}), 'Show Disk'
          )
        ),
        showCpuPicker && cpuSensors.length > 0 && h('div', {className:'sys-picker-panel'},
          h('div', {className:'sys-picker-row'},
            h('span', {className:'sys-picker-label'}, 'CPU Sensor'),
            h('select', {className:'sys-picker-select', value:cpuSensorIdx, onChange:e=>{setCpuSensorIdx(parseInt(e.target.value));setShowCpuPicker(false);}},
              cpuSensors.map((s,i) => h('option', {key:i, value:i}, s.name + (s.value != null ? ' ('+s.value+'°C)' : '')))
            )
          )
        ),
        showGpuPicker && gpuList.length > 0 && h('div', {className:'sys-picker-panel'},
          h('div', {className:'sys-picker-row'},
            h('span', {className:'sys-picker-label'}, 'GPU'),
            h('select', {className:'sys-picker-select', value:gpuIdx, onChange:e=>{
                const idx = parseInt(e.target.value);
                setGpuIdx(idx);
                setShowGpuPicker(false);
                // Persist selected GPU model to config
                const model = gpuList[idx]?.model;
                if (model && onConfigChange) {
                  const cfg = JSON.parse(JSON.stringify(config || {}));
                  if (!cfg.systemPrefs) cfg.systemPrefs = {};
                  cfg.systemPrefs.gpuModel = model;
                  window.orbit.saveConfig(cfg);
                  onConfigChange(cfg);
                }
              }},
              gpuList.map((g,i) => h('option', {key:i, value:i}, g.model))
            )
          )
        ),
        h('div', {className:'sys-stats'},
          sysRow('CPU', cpuBrand + (cpuTemp != null ? ' · '+Math.round(cpuTemp)+'°C' : ''), cpuUsage,
            cpuSensors.length > 1 ? ()=>{ setShowCpuPicker(p=>!p); setShowGpuPicker(false); setShowPicker(false); } : null),
          sysRow('GPU', gpuModel + (gpuTemp != null ? ' · '+Math.round(gpuTemp)+'°C' : ''), gpuUsage,
            gpuList.length > 1 ? ()=>{ setShowGpuPicker(p=>!p); setShowCpuPicker(false); setShowPicker(false); } : null),
          sysRow('RAM', ramUsed+'GB / '+ramTotal+'GB', ramUsage),
          showDisk && diskUsage != null && sysRow('DISK', slow?.disk?.mount || '', diskUsage),
          h('div', {className:'net-row'},
            h('div', {className:'net-label'}, 'NET'),
            h('div', {className:'net-speeds'},
              h('div', {className:'net-speed'}, h('span',{className:'net-speed-label'},'↑ UP'), h('span',{className:'net-speed-value net-up'}, formatBytes(txSec))),
              h('div', {className:'net-speed'}, h('span',{className:'net-speed-label'},'↓ DOWN'), h('span',{className:'net-speed-value net-down'}, formatBytes(rxSec)))
            )
          )
        )
      );
    }

    // ═══ MEDIA PANEL ═══
    function MediaPanel({ config, openSettings }) {
      const [overseerr, setOverseerr] = useState(null);
      const [sonarr, setSonarr] = useState(null);
      const [sonarrMissing, setSonarrMissing] = useState(null);
      const [radarr, setRadarr] = useState(null);

        async function poll() {

          }

                window.orbit.apiGet(sCfg.url+'/api/v3/wanted/missing?pageSize=1', {'X-Api-Key':sCfg.apiKey})
              ]);
              if (!queueResp?.error) setSonarr(queueResp);
              if (!missingResp?.error) setSonarrMissing(missingResp?.totalRecords ?? missingResp?.total ?? 0);
            } catch {}
          }
          if (rCfg?.url && rCfg?.apiKey) {
            try {
              const [queueResp, missingResp] = await Promise.all([
                window.orbit.apiGet(rCfg.url+'/api/v3/queue', {'X-Api-Key':rCfg.apiKey}),
                window.orbit.apiGet(rCfg.url+'/api/v3/wanted/missing?pageSize=1', {'X-Api-Key':rCfg.apiKey})
              ]);
              if (!queueResp?.error) setRadarr(queueResp);
              if (!missingResp?.error) setRadarrMissing(missingResp?.totalRecords ?? missingResp?.total ?? 0);
            } catch {}
          }
          if (nCfg?.url && nCfg?.username) {
            try {
              const auth = btoa(nCfg.username+':'+(nCfg.password||''));

            h('div',{className:'media-stat'}, h('span',{className:'media-stat-label'},'Approved: '), overseerr?.results?.filter(r=>r.status===2).length ?? '...')

    // ═══ UPTIME KUMA PANEL ═══
    function ServicesPanel({ config }) {
      const [results, setResults] = useState([]);
      const [lastCheck, setLastCheck] = useState(null);

      function buildServiceList(cfg) {
        const integrations = cfg?.integrations || {};
        const services = [];
        const add = (name, url, auth) => { if (url) services.push({ name, url, ...(auth ? {auth} : {}) }); };
        add('Sonarr', integrations.sonarr?.url);
        add('Radarr', integrations.radarr?.url);
        add('Overseerr', integrations.overseerr?.url);
        // NZBGet requires Basic Auth — strip /jsonrpc path (HEAD/GET rejected there), use root URL
        if (integrations.nzbget?.url && integrations.nzbget?.username) {
          const auth = btoa(integrations.nzbget.username + ':' + (integrations.nzbget.password || ''));
          const nzbBase = integrations.nzbget.url.replace(/\/jsonrpc\/?$/i, '');
          add('NZBGet', nzbBase, auth);
        }
        add('Jellyfin', integrations.jellyfin?.url);
        add('Tautulli', integrations.tautulli?.url);
        add('Home Assistant', integrations.homeassistant?.url);
        // Uptime Kuma omitted — ServicesPanel replaces it
        (cfg?.customServices || []).forEach(s => add(s.name, s.url));
        return services;
      }

      useEffect(() => {
        const services = buildServiceList(config);
        if (!services.length) return;
        async function poll() {
          const r = await window.orbit.checkServices(services);
          setResults(r);
          setLastCheck(new Date());
        }
        return PollScheduler.register({ id: 'services-poll', fn: poll, intervalMs: 30000 });
      }, [config]);

      const upCount = results.filter(r => r.status === 'up').length;
      const downCount = results.filter(r => r.status === 'down').length;

      return h('div', { className: 'panel' },
        h(PanelHeader, {title:'SERVICES', icon:'📡', accentColor:'#00D9FF'}),
        results.length === 0
          ? h('div', { className: 'panel-unconfigured' },
              h('div', { className: 'panel-unconfigured-icon' }, '📡'),
              h('div', { className: 'panel-unconfigured-text' }, 'Configure services in Setup')
            )
          : h('div', { style: { width: '100%', textAlign: 'left', display: 'flex', flexDirection: 'column', alignItems: 'center' } },

                )

    // ═══ SPOTIFY PANEL ═══
    function SpotifyPanel({ config, openSettings }) {
      const sCfg = config?.integrations?.spotify;
      const configured = sCfg?.clientId && sCfg?.clientSecret;
      const [authorized, setAuthorized] = useState(!!(sCfg?.accessToken));
      const [connecting, setConnecting] = useState(false);
      const [connectErr, setConnectErr] = useState('');
      const [playback, setPlayback] = useState(null);
      const [localMs, setLocalMs] = useState(0);     // locally interpolated progress_ms
      const [noTrans, setNoTrans] = useState(false);  // suppress CSS transition on track change
      const [queue, setQueue] = useState([]);
      const [busy, setBusy] = useState(false);
      const lastTrackId = useRef(null);
      const pollRef = useRef(null);

      async function getToken() {
        const freshCfg = await window.orbit.loadConfig();
        const sp = freshCfg?.integrations?.spotify;
        let token = sp?.accessToken;
        if (!token) return null;
        if (sp?.tokenExpiry && Date.now() > sp.tokenExpiry - 60000) {
          const r = await window.orbit.spotifyRefreshToken();
          if (r.accessToken) token = r.accessToken;
        }
        return token;
      }

      const applyPlayback = (pb) => {
        if (pb && pb.item) {
          const newId = pb.item.id;
          const trackChanged = newId !== lastTrackId.current;
          if (trackChanged) {
            // Instant reset — no CSS backward-crawl animation
            setNoTrans(true);
            setLocalMs(pb.progress_ms || 0);
            setTimeout(() => setNoTrans(false), 50);
            lastTrackId.current = newId;
          } else {
            // Same track — sync to API value (API is authoritative)
            setLocalMs(pb.progress_ms || 0);
          }
          setPlayback(pb);
        } else {
          setPlayback(null);
          setLocalMs(0);
          lastTrackId.current = null;
        }
      };

      // Poll every 5s
      useEffect(() => {
        if (!authorized) return;
        async function poll() {
          try {
            const token = await getToken();
            if (!token) return;
            const [pb, q] = await Promise.all([
              window.orbit.apiGet('https://api.spotify.com/v1/me/player/currently-playing', { Authorization: 'Bearer '+token }),
              window.orbit.apiGet('https://api.spotify.com/v1/me/player/queue', { Authorization: 'Bearer '+token })
            ]);
            applyPlayback(pb);
            if (q && Array.isArray(q.queue)) setQueue(q.queue.slice(0,3));
          } catch {}
        }
        pollRef.current = poll;
        poll();
        const t = setInterval(poll, 5000);
        return () => clearInterval(t);
      }, [authorized]);

      // Local 1s tick — interpolates progress between API polls
      useEffect(() => {
        const t = setInterval(() => {
          setLocalMs(ms => {
            if (!playback?.is_playing) return ms;
            const next = Math.min(ms + 1000, playback.item?.duration_ms || ms);
            // Only update if the displayed second actually changed
            if (Math.floor(next / 1000) === Math.floor(ms / 1000)) return ms;
            return next;
          });
        }, 1000);
        return () => clearInterval(t);
      }, [playback?.is_playing, playback?.item?.duration_ms]);

      async function control(method, endpoint) {
        if (busy) return;
        setBusy(true);
        try {
          const token = await getToken();
          if (!token) return;
          const url = 'https://api.spotify.com/v1/me/player/'+endpoint;
          if (method === 'POST') await window.orbit.apiPost(url, {}, { Authorization: 'Bearer '+token });
          else await window.orbit.apiPut(url, {}, { Authorization: 'Bearer '+token });
          // Optimistic update for pause/play
          if (endpoint === 'pause') setPlayback(p => p ? {...p, is_playing:false} : p);
          else if (endpoint === 'play') setPlayback(p => p ? {...p, is_playing:true} : p);
          // For skip/prev: repoll after short delay so new track appears quickly
          else setTimeout(() => { if (pollRef.current) pollRef.current(); }, 700);
        } catch {} finally { setBusy(false); }
      }

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'SPOTIFY', icon:'🎵', accentColor:'#1DB954', onSettings:()=>openSettingsAt('settings-spotify')}),
        h('div',{className:'panel-unconfigured-icon'},'🎵'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));

      if (!authorized) {
        return h('div', {className:'panel'},
          h(PanelHeader, {title:'SPOTIFY', icon:'🎵', accentColor:'#1DB954', onSettings:()=>openSettingsAt('settings-spotify')}),
          h('div', {className:'panel-unconfigured-icon', style:{opacity:0.3,fontSize:'36px',marginBottom:'12px'}}, '🎵'),
          connectErr && h('div', {style:{fontSize:'10px',color:'#ff5555',marginBottom:'8px',textAlign:'center',padding:'0 12px'}}, connectErr),
          h('button', {className:'spotify-connect', disabled:connecting, onClick: async () => {
            setConnecting(true); setConnectErr('');
            const r = await window.orbit.spotifyAuthStart();
            setConnecting(false);
            if (r.error) setConnectErr(r.error);
            else setAuthorized(true);
          }}, connecting ? 'Connecting...' : 'Connect Spotify')
        );
      }

      const track = playback?.item;
      const isPlaying = playback?.is_playing;
      const art = track?.album?.images?.[1]?.url || track?.album?.images?.[0]?.url;
      const prog = (track && localMs && track.duration_ms)
        ? Math.min(100, Math.round((localMs / track.duration_ms) * 100)) : 0;
      const remSec = track ? Math.max(0, Math.round((track.duration_ms - localMs) / 1000)) : 0;

      return h('div', {className:'panel'},
        h(PanelHeader, {title:'SPOTIFY', icon:'🎵', accentColor:'#1DB954', onSettings:()=>openSettingsAt('settings-spotify')}),
        track ? h(React.Fragment, null,
          // Album art + track info row
          h('div', {style:{display:'flex',gap:'10px',alignItems:'center',marginBottom:'10px'}},
            art && h('img', {src:art, style:{width:'52px',height:'52px',borderRadius:'4px',flexShrink:0,objectFit:'cover'}}),
            h('div', {style:{flex:1,minWidth:0}},
              h('div', {className:'spotify-track', style:{marginBottom:'2px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, track.name),
              h('div', {className:'spotify-artist', style:{whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, track.artists?.map(a=>a.name).join(', ')),
              track.album?.name && h('div', {style:{fontSize:'13px',color:'var(--dim)',marginTop:'2px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, track.album.name)
            )
          ),
          // Progress bar
          h('div', {className:'np-progress-bar', style:{marginBottom:'4px'}},
            h('div', {className:'np-progress-fill'+(noTrans?' no-transition':''), style:{width:prog+'%'}})),
          h('div', {style:{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'var(--dim)',marginBottom:'10px'}},
            h('span', null, formatDuration(Math.round(localMs/1000))),
            h('span', null, '-'+formatDuration(remSec))
          ),
          // Controls
          h('div', {style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'16px',marginBottom:'10px'}},
            h('button', {onClick:()=>control('POST','previous'), disabled:busy, style:{background:'none',border:'none',color:'var(--text)',cursor:'pointer',fontSize:'16px',opacity:busy?0.4:1,padding:'4px'}}, '⏮'),
            h('button', {onClick:()=>control('PUT', isPlaying?'pause':'play'), disabled:busy, style:{background:'var(--accent)',border:'none',color:'#000',cursor:'pointer',fontSize:'14px',borderRadius:'50%',width:'32px',height:'32px',fontWeight:'700',opacity:busy?0.4:1}}, isPlaying ? '⏸' : '▶'),
            h('button', {onClick:()=>control('POST','next'), disabled:busy, style:{background:'none',border:'none',color:'var(--text)',cursor:'pointer',fontSize:'16px',opacity:busy?0.4:1,padding:'4px'}}, '⏭'),
            h('button', {onClick:()=>window.orbit.openExternal('https://open.spotify.com'), style:{background:'none',border:'1px solid var(--border)',color:'var(--dim)',cursor:'pointer',fontSize:'9px',borderRadius:'3px',padding:'3px 6px',marginLeft:'8px'}}, 'OPEN')
          ),
          // Up next
          queue.length > 0 && h('div', null,
            h('div', {style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'6px',letterSpacing:'2px',paddingBottom:'5px',borderBottom:'1px solid rgba(255,255,255,0.06)'}}, 'UP NEXT'),
            queue.map((t2,i)=>h('div',{key:i,style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'3px'}},
              t2.album?.images?.[2]?.url && h('img',{src:t2.album.images[2].url,style:{width:'20px',height:'20px',borderRadius:'2px',flexShrink:0}}),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontSize:'13px',color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},t2.name),
                h('div',{style:{fontSize:'12px',color:'var(--dim)'}},t2.artists?.map(a=>a.name).join(', '))
              )
            ))
          )
        ) : h('div', {className:'np-empty'},
          h('div', {className:'np-empty-icon'}, '🎵'),
          h('div', {className:'np-empty-text'}, 'NOTHING PLAYING'),
          h('button', {onClick:()=>window.orbit.openExternal('https://open.spotify.com'), style:{marginTop:'8px',background:'none',border:'1px solid var(--border)',color:'var(--dim)',cursor:'pointer',fontSize:'10px',borderRadius:'3px',padding:'4px 10px'}}, 'Open Spotify')
        )
      );
    }

    // ═══ LINKS PANEL ═══
    function LinksPanel({ config }) {
