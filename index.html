    function NZBGetPanel({ config, openSettings }) {
      const nCfg = config?.integrations?.nzbget;
      const configured = nCfg?.url && nCfg?.username;
      const [status, setStatus] = useState(null);
      const [groups, setGroups] = useState([]);
      const intervalRef = useRef(null);

      useEffect(() => {
        if (!configured) return;
        let active = true;
        async function poll() {
          try {
            const auth = btoa(nCfg.username+':'+(nCfg.password||''));
            const [s, g] = await Promise.all([
              window.orbit.apiPost(nCfg.url+'/jsonrpc', {version:'1.1',method:'status',id:1}, {Authorization:'Basic '+auth}),
              window.orbit.apiPost(nCfg.url+'/jsonrpc', {version:'1.1',method:'listgroups',id:2}, {Authorization:'Basic '+auth})
            ]);
            if (!active) return;
            const st = s?.result ? s.result : null;
            const gr = Array.isArray(g?.result) ? g.result.slice(0,6) : [];
            if (st) setStatus(st);
            setGroups(gr);
            // Adaptive polling: 1.5s when actively downloading, 8s when idle
            const nextInterval = (st && st.DownloadRate > 0 && !st.DownloadPaused) ? 3000 : 8000;
            if (intervalRef.current) clearTimeout(intervalRef.current);
            intervalRef.current = setTimeout(poll, nextInterval);
          } catch {
            if (intervalRef.current) clearTimeout(intervalRef.current);
            intervalRef.current = setTimeout(poll, 10000);
          }
        }
        poll();
        return () => { active = false; if (intervalRef.current) clearTimeout(intervalRef.current); };
      }, [nCfg?.url, nCfg?.username]);
      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'NZBGET', icon:'⬇', accentColor:'#34A853', onSettings:()=>openSettingsAt('settings-nzbget')}),
        h('div',{className:'panel-unconfigured-icon'},'⬇'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'}},'Configure in Settings'));
      const rateMBs = status ? (status.DownloadRate/1024/1024).toFixed(2) : '0.00';
      const remMB = status ? status.RemainingSizeMB : 0;
      const paused = status?.DownloadPaused;
      const hasQueue = groups.length > 0;
      return h('div',{className:'panel panel-top'},
        h(PanelHeader, {title:'NZBGET', icon:'⬇', accentColor:'#34A853'}),
        // Content wrapper — centers when idle, top-anchors when queue is active
        h('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent: hasQueue ? 'flex-start' : 'center',flex:'1',width:'100%'}},
          !status
            ? h('div',{style:{fontSize:'13px',color:'var(--dim)',textAlign:'center'}},'Connecting...')
            : h(React.Fragment, null,
                h('div',{style:{display:'flex',gap:'20px',marginBottom: hasQueue ? '14px' : '0',textAlign:'center'}},
                  h('div', null,
                    h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px',letterSpacing:'1px'}},'SPEED'),
                    h('div',{style:{fontSize:'28px',fontWeight:'800',color: paused ? 'var(--dim)' : 'var(--accent)'}}, paused ? 'PAUSED' : rateMBs+' MB/s')
                  ),
                  remMB > 0 && h('div', null,
                    h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px',letterSpacing:'1px'}},'REMAINING'),
                    h('div',{style:{fontSize:'22px',fontWeight:'700'}}, remMB > 1024 ? (remMB/1024).toFixed(1)+' GB' : remMB+' MB')
                  )
                ),
                hasQueue && h('div',{style:{width:'100%'}},
                  h('div',{style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',marginBottom:'8px',paddingBottom:'6px',letterSpacing:'2px',borderBottom:'1px solid rgba(255,255,255,0.06)',width:'100%'}},'QUEUE'),
                  groups.map((g,i)=>{
                    const pct = g.FileSizeMB > 0 ? Math.round((1-(g.RemainingSizeMB/g.FileSizeMB))*100) : 0;
                    const name = (g.NZBNicename||g.NZBFilename||'Unknown').slice(0,38);
                    const remStr = g.RemainingSizeMB > 1024 ? (g.RemainingSizeMB/1024).toFixed(1)+' GB' : g.RemainingSizeMB+' MB';
                    return h('div',{key:g.NZBID||i,style:{marginBottom:'10px'}},
                      h('div',{style:{fontSize:'12px',color:'var(--text)',marginBottom:'3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, name),
                      h('div',{className:'np-progress-bar'},h('div',{className:'np-progress-fill',style:{width:pct+'%'}})),
                      h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}, pct+'% · '+remStr+' left')
                    );
                  })
                )
              )
        )
      );
    }

    // ═══ PROXMOX PANEL ═══
    function ProxmoxPanel({ config, openSettings }) {
      const pCfg = config?.integrations?.proxmox;
      const configured = pCfg?.url && pCfg?.tokenId && pCfg?.tokenSecret;
      const [nodeStatus, setNodeStatus] = useState(null);
      const [vms, setVms] = useState([]);
      const [cts, setCts] = useState([]);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!configured) return;
        let timer = null;
        async function poll() {
          try {
            const base = pCfg.url.replace(/\/+$/, '');
            const node = pCfg.node || 'pve';
            const authHdr = { Authorization: 'PVEAPIToken=' + pCfg.tokenId + '=' + pCfg.tokenSecret };
            const fetchOpts = { rejectUnauthorized: false };
            const [status, vmList, ctList] = await Promise.all([
              window.orbit.apiGet(base + '/api2/json/nodes/' + node + '/status', authHdr, 10000, fetchOpts),
              window.orbit.apiGet(base + '/api2/json/nodes/' + node + '/qemu', authHdr, 10000, fetchOpts),
              window.orbit.apiGet(base + '/api2/json/nodes/' + node + '/lxc', authHdr, 10000, fetchOpts)
            ]);
            if (status?.error || vmList?.error || ctList?.error) {
              setError(status?.error || vmList?.error || ctList?.error);
            } else {
              setError(null);
              setNodeStatus(status?.data || status);
              setVms(Array.isArray(vmList?.data) ? vmList.data : (Array.isArray(vmList) ? vmList : []));
              setCts(Array.isArray(ctList?.data) ? ctList.data : (Array.isArray(ctList) ? ctList : []));
            }
          } catch (e) { setError(e.message); }
          timer = setTimeout(poll, 15000);
        }
        poll();
        return () => clearTimeout(timer);
      }, [pCfg?.url, pCfg?.tokenId, pCfg?.tokenSecret, pCfg?.node]);

      if (!configured) return h('div', {className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'PROXMOX', icon:'🖥️', accentColor:'#E57000', onSettings:()=>openSettingsAt('settings-proxmox')}),
        h('div', {className:'panel-unconfigured-icon'}, '🖥️'),
        h('div', {className:'panel-unconfigured-text', style:{cursor:'pointer'}}, 'Configure Proxmox in Settings'));

      const cpuPct = nodeStatus ? (nodeStatus.cpu * 100).toFixed(1) : '…';
      const memPct = nodeStatus ? ((nodeStatus.memory?.used || 0) / (nodeStatus.memory?.total || 1) * 100).toFixed(1) : '…';
      const uptimeSec = nodeStatus?.uptime || 0;
      const uptimeDays = Math.floor(uptimeSec / 86400);
      const uptimeHrs = Math.floor((uptimeSec % 86400) / 3600);
      const uptimeStr = uptimeDays > 0 ? uptimeDays + 'd ' + uptimeHrs + 'h' : uptimeHrs + 'h ' + Math.floor((uptimeSec % 3600) / 60) + 'm';

      const runningVMs = vms.filter(v => v.status === 'running').length;
      const runningCTs = cts.filter(c => c.status === 'running').length;

      const badgeStyle = (running) => ({
        display:'inline-block', padding:'1px 6px', borderRadius:'3px', fontSize:'9px', fontWeight:'700', letterSpacing:'0.5px',
        background: running ? 'rgba(80,250,123,0.15)' : 'rgba(255,85,85,0.15)',
        color: running ? '#50fa7b' : '#ff5555'
      });

      const rowStyle = {display:'flex', justifyContent:'space-between', alignItems:'center', padding:'3px 0', fontSize:'11px', borderBottom:'1px solid rgba(255,255,255,0.04)'};
      const nameStyle = {color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1, marginRight:'8px'};
      const monoStyle = {fontFamily:'var(--font)', fontSize:'11px', color:'var(--dim)', minWidth:'42px', textAlign:'right'};

      function fmtMem(bytes) {
        if (!bytes) return '0';
        if (bytes >= 1073741824) return (bytes/1073741824).toFixed(1)+'G';
        return (bytes/1048576).toFixed(0)+'M';
      }

      function renderRow(item) {
        const isRunning = item.status === 'running';
        const cpu = isRunning ? ((item.cpu||0)*100).toFixed(0)+'%' : '—';
        const mem = isRunning ? fmtMem(item.mem||item.memory||0) : '—';
        return h('div', {key:item.vmid, style:rowStyle},
          h('span', {style:nameStyle}, item.name || 'VM '+item.vmid),
          h('span', {style:badgeStyle(isRunning)}, isRunning ? 'RUN' : 'STOP'),
          h('span', {style:{...monoStyle, marginLeft:'8px'}}, cpu),
          h('span', {style:{...monoStyle, marginLeft:'4px'}}, mem)
        );
      }

      const sectionLabelStyle = {fontSize:'9px', color:'rgba(255,255,255,0.25)', letterSpacing:'2px', marginBottom:'6px', marginTop:'10px', paddingBottom:'4px', borderBottom:'1px solid rgba(255,255,255,0.06)'};

      return h('div', {className:'panel panel-top'},
        h(PanelHeader, {title:'PROXMOX', icon:'🖥️', accentColor:'#E57000', onSettings:()=>openSettingsAt('settings-proxmox')}),
        error && h('div', {style:{fontSize:'11px', color:'var(--red)', marginBottom:'8px'}}, 'Error: '+error),
        // Node stats
        h('div', {style:{display:'flex', gap:'24px', marginBottom:'10px', justifyContent:'center', width:'100%'}},
          h('div', {style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'CPU'), h('div',{style:{fontSize:'26px',fontWeight:'800',color:'var(--accent)'}}, cpuPct+'%')),
          h('div', {style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'RAM'), h('div',{style:{fontSize:'26px',fontWeight:'800',color:'var(--text-bright)'}}, memPct+'%')),
          h('div', {style:{textAlign:'center'}}, h('div',{style:{fontSize:'10px',color:'rgba(255,255,255,0.28)',marginBottom:'4px',letterSpacing:'2px'}},'UPTIME'), h('div',{style:{fontSize:'26px',fontWeight:'800',color:'var(--dim)'}}, uptimeStr))
        ),
        // VMs
        vms.length > 0 && h('div', null,
          h('div', {style:sectionLabelStyle}, 'VIRTUAL MACHINES'),
          vms.sort((a,b) => (b.status==='running'?1:0)-(a.status==='running'?1:0) || (a.name||'').localeCompare(b.name||'')).map(renderRow)
        ),
        // Containers
        cts.length > 0 && h('div', null,
          h('div', {style:sectionLabelStyle}, 'CONTAINERS'),
          cts.sort((a,b) => (b.status==='running'?1:0)-(a.status==='running'?1:0) || (a.name||'').localeCompare(b.name||'')).map(renderRow)
        ),
        // Summary
        h('div', {style:{marginTop:'auto', paddingTop:'10px', fontSize:'10px', color:'var(--dim)', letterSpacing:'1px', textAlign:'center'}},
          runningVMs + ' VM' + (runningVMs !== 1 ? 's' : '') + ' / ' + runningCTs + ' CT' + (runningCTs !== 1 ? 's' : '') + ' running'
        )
      );
    }

    // ═══ DOCKER PANEL ═══
    function DockerPanel({ config, openSettings }) {
      const dCfg = config?.integrations?.docker;
      const configured = dCfg?.host;
      const [containers, setContainers] = useState([]);
      const [error, setError] = useState(null);
      const [stoppedOpen, setStoppedOpen] = useState(false);

      useEffect(() => {
        if (!configured) return;
        let timer = null;
        async function poll() {
          try {
            const proto = dCfg.useTLS ? 'https' : 'http';
            const base = proto + '://' + (dCfg.host || 'localhost') + ':' + (dCfg.port || 2375);
            const listRes = await window.orbit.apiGet(base + '/containers/json?all=true', {}, 10000);
            if (listRes?.error) { setError(listRes.error); timer = setTimeout(poll, 10000); return; }
            const list = Array.isArray(listRes) ? listRes : (Array.isArray(listRes?.data) ? listRes.data : []);
            // Fetch stats for running containers
            const running = list.filter(c => c.State === 'running');
            const statsMap = {};
            await Promise.all(running.map(async c => {
              try {
                const s = await window.orbit.apiGet(base + '/containers/' + c.Id + '/stats?stream=false', {}, 8000);
                if (s && !s.error) statsMap[c.Id] = s.data || s;
              } catch (_) {}
            }));
            setContainers(list.map(c => {
              const st = statsMap[c.Id];
              let cpuPct = 0, memUsage = 0;
              if (st) {
                const cpuDelta = (st.cpu_stats?.cpu_usage?.total_usage || 0) - (st.precpu_stats?.cpu_usage?.total_usage || 0);
                const sysDelta = (st.cpu_stats?.system_cpu_usage || 0) - (st.precpu_stats?.system_cpu_usage || 0);
                const cpuCount = st.cpu_stats?.online_cpus || st.cpu_stats?.cpu_usage?.percpu_usage?.length || 1;
                if (sysDelta > 0) cpuPct = (cpuDelta / sysDelta) * cpuCount * 100;
                memUsage = st.memory_stats?.usage || 0;
              }
              const names = (c.Names || []).map(n => n.replace(/^\//, ''));
              return { id: c.Id, name: names[0] || c.Id.slice(0,12), image: c.Image, state: c.State, status: c.Status, cpuPct, memUsage };
            }));
            setError(null);
          } catch (e) { setError(e.message); }
          timer = setTimeout(poll, 10000);
        }
        poll();
        return () => clearTimeout(timer);
      }, [dCfg?.host, dCfg?.port, dCfg?.useTLS]);

      if (!configured) return h('div', {className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'DOCKER', icon:'🐳', accentColor:'#2496ED', onSettings:()=>openSettingsAt('settings-docker')}),
        h('div', {className:'panel-unconfigured-icon'}, '🐳'),
        h('div', {className:'panel-unconfigured-text'}, 'Not configured'),
        h('div', {style:{fontSize:'10px',color:'var(--dim)',textAlign:'center',marginTop:'8px',lineHeight:'1.6'}},
          'Enable Docker TCP API:', h('br'), h('code', {style:{color:'var(--amber)'}}, '-H tcp://0.0.0.0:2375')));

      function fmtMem(bytes) {
        if (!bytes) return '0';
        if (bytes >= 1073741824) return (bytes/1073741824).toFixed(1)+'G';
        return (bytes/1048576).toFixed(0)+'M';
      }

      const runningList = containers.filter(c => c.state === 'running');
      const stoppedList = containers.filter(c => c.state !== 'running');

      const rowStyle = {display:'flex', alignItems:'center', padding:'3px 0', fontSize:'11px', borderBottom:'1px solid rgba(255,255,255,0.04)', gap:'6px'};
      const nameStyle = {color:'var(--text)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1};
      const monoStyle = {fontFamily:'var(--font)', fontSize:'10px', color:'var(--dim)', minWidth:'38px', textAlign:'right'};

      function renderContainer(c, dimmed) {
        const opacity = dimmed ? 0.4 : 1;
        return h('div', {key:c.id, style:{...rowStyle, opacity}},
          h('span', {style:nameStyle, title:c.image}, c.name),
          !dimmed && h('span', {style:monoStyle}, c.cpuPct.toFixed(1)+'%'),
          !dimmed && h('span', {style:monoStyle}, fmtMem(c.memUsage)),
          h('span', {style:{fontSize:'9px',color:'var(--dim)',minWidth:'60px',textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, c.status)
        );
      }

      return h('div', {className:'panel panel-top'},
        h(PanelHeader, {title:'DOCKER', icon:'🐳', accentColor:'#2496ED', onSettings:()=>openSettingsAt('settings-docker')}),
        error && h('div', {style:{fontSize:'11px', color:'var(--red)', marginBottom:'8px'}}, 'Error: '+error),
        // Running containers
        runningList.length > 0 && h('div', null,
          h('div', {style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',letterSpacing:'2px',marginBottom:'4px',display:'flex',justifyContent:'space-between'}},
            h('span', null, 'NAME'),
            h('span', {style:{display:'flex',gap:'6px'}}, h('span',{style:{minWidth:'38px',textAlign:'right'}},'CPU'), h('span',{style:{minWidth:'38px',textAlign:'right'}},'MEM'), h('span',{style:{minWidth:'60px',textAlign:'right'}},'STATUS'))
          ),
          runningList.map(c => renderContainer(c, false))
        ),
        // Stopped containers (collapsible)
        stoppedList.length > 0 && h('div', {style:{marginTop:'8px'}},
          h('div', {style:{fontSize:'10px',color:'var(--dim)',cursor:'pointer',userSelect:'none',display:'flex',alignItems:'center',gap:'4px'}, onClick:()=>setStoppedOpen(o=>!o)},
            h('span', null, stoppedOpen ? '▼' : '▶'), h('span', null, stoppedList.length + ' stopped')),
          stoppedOpen && stoppedList.map(c => renderContainer(c, true))
        ),
        // Summary
        h('div', {style:{marginTop:'auto', paddingTop:'10px', fontSize:'10px', color:'var(--dim)', letterSpacing:'1px', textAlign:'center'}},
          runningList.length + ' running, ' + stoppedList.length + ' stopped')
      );
    }

    // ═══ PI-HOLE PANEL ═══
    function PiholePanel({ config, openSettings }) {
      const pCfg = config?.integrations?.pihole;
      const configured = pCfg?.url;
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);
      const [apiVersion, setApiVersion] = useState(null);
      const [toggling, setToggling] = useState(false);

      useEffect(() => {
        if (!configured) return;
        let timer = null;
        const base = pCfg.url.replace(/\/+$/, '');
        const key = pCfg.apiKey || '';

        async function poll() {
          try {
            // Try v6 first
            if (apiVersion !== 'v5') {
              const v6 = await window.orbit.apiGet(base + '/api/stats/summary', { 'X-Pi-Hole-Authenticate': key }, 8000);
              if (v6 && !v6.error && (v6.queries !== undefined || v6.dns_queries_today !== undefined)) {
                setApiVersion('v6');
                // v6 may use different field names — normalise
                setData({
                  dns_queries_today: v6.queries?.total ?? v6.dns_queries_today ?? 0,
                  ads_blocked_today: v6.queries?.blocked ?? v6.ads_blocked_today ?? 0,
                  ads_percentage_today: v6.queries?.percent_blocked ?? v6.ads_percentage_today ?? 0,
                  domains_being_blocked: v6.gravity?.domains_being_blocked ?? v6.domains_being_blocked ?? 0,
                  status: v6.status ?? (v6.blocking === 'enabled' ? 'enabled' : v6.blocking === 'disabled' ? 'disabled' : v6.status) ?? 'unknown'
                });
                setError(null);
                timer = setTimeout(poll, 30000);
                return;
              }
            }
            // Fall back to v5
            const v5 = await window.orbit.apiGet(base + '/admin/api.php?summaryRaw&auth=' + key, {}, 8000);
            if (v5 && !v5.error && v5.dns_queries_today !== undefined) {
              setApiVersion('v5');
              setData({
                dns_queries_today: v5.dns_queries_today ?? 0,
                ads_blocked_today: v5.ads_blocked_today ?? 0,
                ads_percentage_today: v5.ads_percentage_today ?? 0,
                domains_being_blocked: v5.domains_being_blocked ?? 0,
                status: v5.status ?? 'unknown'
              });
              setError(null);
            } else {
              setError(v5?.error || 'Unexpected response');
            }
          } catch (e) { setError(e.message); }
          timer = setTimeout(poll, 30000);
        }
        poll();
        return () => clearTimeout(timer);
      }, [pCfg?.url, pCfg?.apiKey]);

      async function toggleBlocking() {
        if (!data || toggling) return;
        setToggling(true);
        const base = pCfg.url.replace(/\/+$/, '');
        const key = pCfg.apiKey || '';
        const wantEnabled = data.status !== 'enabled';
        try {
          if (apiVersion === 'v6') {
            await window.orbit.apiPost(base + '/api/dns/blocking', JSON.stringify({ blocking: wantEnabled }), { 'Content-Type': 'application/json', 'X-Pi-Hole-Authenticate': key });
          } else {
            const action = wantEnabled ? 'enable' : 'disable';
            await window.orbit.apiGet(base + '/admin/api.php?' + action + '&auth=' + key, {}, 8000);
          }
          setData(d => ({ ...d, status: wantEnabled ? 'enabled' : 'disabled' }));
        } catch (e) { setError(e.message); }
        setToggling(false);
      }

      if (!configured) return h('div', {className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'PI-HOLE', icon:'🛡️', accentColor:'#96060C', onSettings:()=>openSettingsAt('settings-pihole')}),
        h('div', {className:'panel-unconfigured-icon'}, '🛡️'),
        h('div', {className:'panel-unconfigured-text'}, 'Not configured'),
        h('div', {style:{fontSize:'10px',color:'var(--dim)',textAlign:'center',marginTop:'8px',lineHeight:'1.6'}},
          'Add your Pi-hole URL and API key', h('br'), 'in Settings → Integrations'));

      const isEnabled = data?.status === 'enabled';
      const blocked = Number(data?.ads_blocked_today || 0);
      const total = Number(data?.dns_queries_today || 0);
      const pct = Number(data?.ads_percentage_today || 0);
      const domains = Number(data?.domains_being_blocked || 0);
      const barPct = total > 0 ? (blocked / total) * 100 : 0;

      const statStyle = {display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',flex:1};
      const statNum = {fontSize:'20px',fontWeight:700,color:'var(--text-bright)',lineHeight:1};
      const statLabel = {fontSize:'9px',color:'var(--dim)',letterSpacing:'1.5px',textTransform:'uppercase'};

      return h('div', {className:'panel'},
        h(PanelHeader, {title:'PI-HOLE', icon:'🛡️', accentColor:'#96060C', onSettings:()=>openSettingsAt('settings-pihole')}),
        error && h('div', {style:{fontSize:'11px', color:'var(--red)', marginBottom:'8px'}}, 'Error: ' + error),
        !data && !error && h('div', {style:{fontSize:'12px',color:'var(--dim)'}}, 'Loading...'),
        data && h(React.Fragment, null,
          // Status + toggle
          h('div', {style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'10px',marginBottom:'16px'}},
            h('span', {style:{fontSize:'11px',fontWeight:600,color: isEnabled ? '#50fa7b' : '#ff5555',letterSpacing:'1px'}},
              isEnabled ? 'ENABLED' : 'DISABLED'),
            h('button', {
              onClick: toggleBlocking,
              disabled: toggling,
              style:{
                padding:'4px 12px',fontSize:'10px',fontWeight:600,letterSpacing:'1px',
                border:'1px solid ' + (isEnabled ? 'rgba(255,85,85,0.4)' : 'rgba(80,250,123,0.4)'),
                background: isEnabled ? 'rgba(255,85,85,0.1)' : 'rgba(80,250,123,0.1)',
                color: isEnabled ? '#ff5555' : '#50fa7b',
                borderRadius:'4px',cursor: toggling ? 'wait' : 'pointer',
                fontFamily:'var(--font)',transition:'all .2s'
              }
            }, toggling ? '...' : (isEnabled ? 'DISABLE' : 'ENABLE'))
          ),
          // Stats row
          h('div', {style:{display:'flex',gap:'8px',width:'100%',marginBottom:'16px'}},
            h('div', {style:statStyle},
              h('span', {style:statNum}, total.toLocaleString()),
              h('span', {style:statLabel}, 'Queries')
            ),
            h('div', {style:statStyle},
              h('span', {style:{...statNum, color:'#ff5555'}}, blocked.toLocaleString()),
              h('span', {style:statLabel}, 'Blocked')
            ),
            h('div', {style:statStyle},
              h('span', {style:{...statNum, color:'var(--amber)'}}, pct.toFixed(1) + '%'),
              h('span', {style:statLabel}, 'Blocked')
            )
          ),
          // Blocked vs allowed bar
          h('div', {style:{width:'100%',marginBottom:'16px'}},
            h('div', {style:{width:'100%',height:'8px',borderRadius:'4px',background:'rgba(255,255,255,0.06)',overflow:'hidden'}},
              h('div', {style:{width: barPct + '%',height:'100%',borderRadius:'4px',background:'linear-gradient(90deg, #ff5555, #ff7979)',transition:'width .5s ease'}})
            ),
            h('div', {style:{display:'flex',justifyContent:'space-between',marginTop:'4px',fontSize:'9px',color:'var(--dim)'}},
              h('span', null, 'Blocked: ' + barPct.toFixed(1) + '%'),
              h('span', null, 'Allowed: ' + (100 - barPct).toFixed(1) + '%')
            )
          ),
          // Domains on blocklist
          h('div', {style:{marginTop:'auto',paddingTop:'10px',fontSize:'10px',color:'var(--dim)',letterSpacing:'1px',textAlign:'center'}},
            domains.toLocaleString() + ' domains on blocklist')
        )
      );
    }

    // ═══ TRUENAS PANEL ═══
    function TrueNASPanel({ config, openSettings }) {
      const tCfg = config?.integrations?.truenas;
      const configured = tCfg?.url;
      const [pools, setPools] = useState([]);
      const [disks, setDisks] = useState([]);
      const [alerts, setAlerts] = useState([]);
      const [sysInfo, setSysInfo] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!configured) return;
        let timer = null;
        async function poll() {
          try {
            const base = tCfg.url.replace(/\/+$/, '');
            const hdrs = { Authorization: 'Bearer ' + (tCfg.apiKey || '') };
            const [poolRes, diskRes, alertRes, infoRes] = await Promise.all([
              window.orbit.apiGet(base + '/api/v2.0/pool', hdrs, 10000),
              window.orbit.apiGet(base + '/api/v2.0/disk', hdrs, 10000),
              window.orbit.apiGet(base + '/api/v2.0/alert/list', hdrs, 10000),
              window.orbit.apiGet(base + '/api/v2.0/system/info', hdrs, 10000)
            ]);
            if (poolRes?.error) { setError(poolRes.error); timer = setTimeout(poll, 60000); return; }
            const poolList = Array.isArray(poolRes) ? poolRes : (Array.isArray(poolRes?.data) ? poolRes.data : []);
            const diskList = Array.isArray(diskRes) ? diskRes : (Array.isArray(diskRes?.data) ? diskRes.data : []);
            const alertList = Array.isArray(alertRes) ? alertRes : (Array.isArray(alertRes?.data) ? alertRes.data : []);
            const info = infoRes?.data || infoRes || {};
            setPools(poolList);
            setDisks(diskList);
            setAlerts(alertList);
            setSysInfo(info);
            setError(null);
          } catch (e) { setError(e.message); }
          timer = setTimeout(poll, 60000);
        }
        poll();
        return () => clearTimeout(timer);
      }, [tCfg?.url, tCfg?.apiKey]);

      if (!configured) return h('div', {className:'panel panel-unconfigured'},
        h(PanelHeader, {title:'TRUENAS', icon:'💾', accentColor:'#0095D5', onSettings:()=>openSettingsAt('settings-truenas')}),
        h('div', {className:'panel-unconfigured-icon'}, '💾'),
        h('div', {className:'panel-unconfigured-text'}, 'Not configured'),
        h('div', {style:{fontSize:'10px',color:'var(--dim)',textAlign:'center',marginTop:'8px',lineHeight:'1.6'}},
          'Add your TrueNAS URL and API key', h('br'), 'in Settings → Integrations'));

      function fmtBytes(bytes) {
        if (!bytes) return '0';
        if (bytes >= 1099511627776) return (bytes/1099511627776).toFixed(1)+' TB';
        if (bytes >= 1073741824) return (bytes/1073741824).toFixed(1)+' GB';
        return (bytes/1048576).toFixed(0)+' MB';
      }

      function fmtUptime(seconds) {
        if (!seconds) return '—';
        const d = Math.floor(seconds / 86400);
        const h = Math.floor((seconds % 86400) / 3600);
        if (d > 0) return d + 'd ' + h + 'h';
        const m = Math.floor((seconds % 3600) / 60);
        return h + 'h ' + m + 'm';
      }

      const statusColor = (s) => {
        const st = (s || '').toUpperCase();
        if (st === 'ONLINE' || st === 'HEALTHY') return '#50fa7b';
        if (st === 'DEGRADED') return 'var(--amber)';
        return '#ff5555';
      };

      const severityColor = (s) => {
        const sv = (s || '').toUpperCase();
        if (sv === 'CRITICAL' || sv === 'ERROR') return '#ff5555';
        if (sv === 'WARNING') return 'var(--amber)';
        return 'var(--dim)';
      };

      const healthyDisks = disks.filter(d => !(d.alerts || []).length);
      const alertDisks = disks.length - healthyDisks.length;
      const recentAlerts = alerts.slice(0, 3);

      const statStyle = {display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',flex:1};
      const statNum = {fontSize:'18px',fontWeight:700,color:'var(--text-bright)',lineHeight:1};
      const statLabel = {fontSize:'9px',color:'var(--dim)',letterSpacing:'1.5px',textTransform:'uppercase'};

      return h('div', {className:'panel'},
        h(PanelHeader, {title:'TRUENAS', icon:'💾', accentColor:'#0095D5', onSettings:()=>openSettingsAt('settings-truenas')}),
        error && h('div', {style:{fontSize:'11px', color:'var(--red)', marginBottom:'8px'}}, 'Error: ' + error),
        !pools.length && !error && h('div', {style:{fontSize:'12px',color:'var(--dim)'}}, 'Loading...'),

        // System info
        sysInfo && h('div', {style:{marginBottom:'12px',fontSize:'10px',color:'var(--dim)',textAlign:'center',lineHeight:'1.6'}},
          sysInfo.hostname && h('div', {style:{fontSize:'12px',color:'var(--text-bright)',fontWeight:600,letterSpacing:'1px'}}, sysInfo.hostname),
          h('span', null, (sysInfo.version || 'TrueNAS')),
          sysInfo.uptime_seconds && h('span', null, ' • up ' + fmtUptime(sysInfo.uptime_seconds))
        ),

        // Pools
        pools.length > 0 && h('div', {style:{marginBottom:'10px'}},
          h('div', {style:{fontSize:'9px',color:'rgba(255,255,255,0.25)',letterSpacing:'2px',marginBottom:'4px'}}, 'POOLS'),
          pools.map((p, i) => {
            const total = p.topology ? (p.size || 0) : 0;
            const used = p.topology ? (p.used || 0) : 0;
            // Some TrueNAS versions use allocated/size on pool object
            const poolTotal = total || p.size || 0;
            const poolUsed = used || p.used || p.allocated || 0;
            const pct = poolTotal > 0 ? (poolUsed / poolTotal) * 100 : 0;
            const free = poolTotal - poolUsed;
            const status = (p.status || p.healthy ? 'ONLINE' : 'UNKNOWN').toUpperCase();
            return h('div', {key:p.name||i, style:{marginBottom:'8px'}},
              h('div', {style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'3px'}},
                h('span', {style:{fontSize:'11px',color:'var(--text)',fontWeight:600}}, p.name),
                h('span', {style:{fontSize:'9px',fontWeight:700,color:statusColor(status),letterSpacing:'1px',padding:'1px 6px',borderRadius:'3px',background:'rgba(255,255,255,0.04)'}}, status)
              ),
              poolTotal > 0 && h('div', null,
                h('div', {style:{width:'100%',height:'6px',borderRadius:'3px',background:'rgba(255,255,255,0.06)',overflow:'hidden',marginBottom:'3px'}},
                  h('div', {style:{width: Math.min(pct,100) + '%',height:'100%',borderRadius:'3px',background: pct > 90 ? '#ff5555' : pct > 75 ? 'var(--amber)' : '#0095D5',transition:'width .5s ease'}})
                ),
                h('div', {style:{display:'flex',justifyContent:'space-between',fontSize:'9px',color:'var(--dim)'}},
                  h('span', null, fmtBytes(poolUsed) + ' / ' + fmtBytes(poolTotal)),
                  h('span', null, fmtBytes(free) + ' free')
                )
              )
            );
          })
        ),

        // Disk summary
        disks.length > 0 && h('div', {style:{display:'flex',gap:'8px',width:'100%',marginBottom:'12px'}},
          h('div', {style:statStyle},

    }

    // ═══ PANEL RENDERER ═══
    function wrap(key, child) {

        case 'system': return wrap(key, h(SystemPanel, {key, config, onConfigChange: setConfig}));

        case 'sonarr': return wrap(key, h(SonarrPanel, {key, config, openSettings}));
        case 'radarr': return wrap(key, h(RadarrPanel, {key, config, openSettings}));
        case 'overseerr': return wrap(key, h(OverseerrPanel, {key, config, openSettings}));
        case 'nzbget': return wrap(key, h(NZBGetPanel, {key, config, openSettings}));
        case 'uptimekuma': return wrap(key, h(ServicesPanel, {key, config}));
        case 'services': return wrap(key, h(ServicesPanel, {key, config}));
        case 'spotify': return wrap(key, h(SpotifyPanel, {key, config, openSettings}));
        case 'links': return wrap(key, h(LinksPanel, {key, config}));
        case 'jellyfin': return wrap(key, h(JellyfinPanel, {key, config, openSettings}));
        case 'proxmox': return wrap(key, h(ProxmoxPanel, {key, config, openSettings}));
        case 'docker': return wrap(key, h(DockerPanel, {key, config, openSettings}));
        case 'pihole': return wrap(key, h(PiholePanel, {key, config, openSettings}));

        default: return wrap(key, h('div', {key, className:'panel panel-unconfigured'}, h('div',{className:'panel-unconfigured-icon'},'📦'), h('div',{className:'panel-unconfigured-text'}, type)));
      }
    }

    // ═══ MAIN APP ═══
    // ── LAYOUT PICKER — top-right dropdown for switching layouts ──

    // ── BOTTOM BAR — bumper strip with settings, page dots, update badge ──
    function BottomBar({ pages, currentPage, setCurrentPage, page, openSettings, config, setConfig }) {
      const [update, setUpdate] = useState(null);
      const [appVersion, setAppVersion] = useState('');
      const [showConfirm, setShowConfirm] = useState(false);
      const [downloading, setDownloading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [downloaded, setDownloaded] = useState(false);

      useEffect(() => {
        window.orbit.getPendingUpdate().then(u => { if (u) setUpdate(u); });
        const unsub1 = window.orbit.onUpdateAvailable(info => setUpdate(info));
        const unsub2 = window.orbit.onUpdateProgress(pct => { setDownloading(true); setProgress(pct); });
        const unsub3 = window.orbit.onUpdateDownloaded(() => { setDownloading(false); setDownloaded(true); });
        const unsub4 = window.orbit.onUpdateError(() => setDownloading(false));
        window.orbit.getAppVersion().then(v => setAppVersion(v)).catch(()=>{});
        return () => { unsub1(); unsub2(); unsub3(); unsub4(); };
      }, []);

      const hasUpdate = update || downloaded;

      return h(React.Fragment, null,
        // The bar
        h('div', {className:'bottom-bar'},
          // Left — theme swatches + settings gear
          h('div', {className:'bottom-bar-left'},

                  const newCfg = {...(config||{}), theme:{...((config||{}).theme||{}), themeId: theme.id, accentColor: theme.accent}};
                  if (setConfig) setConfig(newCfg);
                  window.orbit.saveConfig(newCfg);
                },
                style: {
                  width: '14px', height: '14px', borderRadius: '50%', background: theme.accent,
                  border: isActive ? '2px solid #fff' : '2px solid rgba(255,255,255,0.12)',
                  cursor: 'pointer', padding: 0, flexShrink: 0,
                  boxShadow: isActive ? `0 0 6px ${theme.accent}` : 'none',
                  outline: 'none', marginRight: '3px', transition:'all .2s'
                }
              });
            }),
            h('button', {className:'bottom-gear', onClick:openSettings, title:'Settings'}, '⚙')
          ),

          // Centre — page dots + name (only if multiple pages)
          pages.length > 1 && h('div', {className:'page-dots'},
            h('div', {className:'page-dots-row'},
              pages.map((pg,i) => h('button', {key:i, className:'page-dot'+(i===currentPage?' active':''),
                onClick:()=>setCurrentPage(i), title:pg.name||'Page '+(i+1)}))
            ),
            h('div', {className:'page-name-label'}, page?.name || '')
          ),

          // Right — update badge when available
          h('div', {className:'bottom-bar-right'},

              onClick:()=>window.orbit.openAbout(),
              title:'About Orbit',
              style:{fontSize:'9px',color:'rgba(255,255,255,0.18)',letterSpacing:'1px',cursor:'pointer',marginRight:'8px',fontWeight:'600'}
            }, 'v'+appVersion),
            downloaded && h('button', {className:'bottom-update-btn', onClick:()=>window.orbit.installUpdate(), title:'Restart to install update'}, '⟳ RESTART'),
            !downloaded && update && h('button', {className:'bottom-update-btn', onClick:()=>setShowConfirm(true), title:'Update available'},
              downloading ? progress+'%' : '↓ UPDATE'
            )
          )
        ),

        // Update confirm modal (unchanged logic)
        showConfirm && h('div', {className:'update-confirm-overlay', onClick:e=>{if(e.target===e.currentTarget&&!downloading)setShowConfirm(false)}},
          h('div', {className:'update-confirm-modal'},
            h('div', {className:'update-confirm-title'}, 'Update Available'),
            h('div', {className:'update-confirm-version'}, 'v'+(update?.version||'?')),
            downloading
              ? h(React.Fragment, null,
                  h('div', {className:'update-progress-bar'}, h('div', {className:'update-progress-fill', style:{width:progress+'%'}})),
                  h('div', {className:'update-status-text'}, 'Downloading... '+progress+'%')
                )
              : h('div', {className:'update-confirm-btns'},
                  h('button', {className:'update-confirm-btn primary', onClick:()=>{setDownloading(true);window.orbit.downloadUpdate();}}, 'Download'),
                  h('button', {className:'update-confirm-btn cancel', onClick:()=>setShowConfirm(false)}, 'Later')
                )
          )
        )
      );
    }

    // ═══ WELCOME OVERLAY (first-run onboarding) ═══
    const WELCOME_INTEGRATIONS = [
      { icon: '▶', name: 'Plex / Tautulli' }, { icon: '🎞️', name: 'Jellyfin' },
      { icon: '📺', name: 'Sonarr' }, { icon: '🎬', name: 'Radarr' },
      { icon: '📋', name: 'Overseerr' }, { icon: '📦', name: 'NZBGet' },
      { icon: '⚡', name: 'SignalRGB' }, { icon: '💡', name: 'Home Assistant' },
      { icon: '🎵', name: 'Spotify' }, { icon: '💻', name: 'System Monitor' },
      { icon: '📡', name: 'Services' }, { icon: '🌤️', name: 'Weather' },
    ];

    function WelcomeOverlay({ onOpenSetup, onSkip }) {
      return h('div', { className: 'welcome-overlay' },
        h('div', { className: 'welcome-card' },
          h('div', { className: 'welcome-logo' }, 'ORBIT'),
          h('div', { className: 'welcome-tagline' }, 'Your homelab. One screen.'),
          h('div', { className: 'welcome-integrations' },
            WELCOME_INTEGRATIONS.map(i => h('div', { key: i.name, className: 'welcome-chip' }, i.icon + ' ' + i.name))
          ),
          h('div', null,
            h('button', { className: 'welcome-btn welcome-btn-primary', onClick: onOpenSetup }, 'OPEN SETUP'),
            h('button', { className: 'welcome-btn welcome-btn-skip', onClick: onSkip }, 'SKIP FOR NOW')
          )
        )
      );
    }

    function isFirstRun(cfg) {
      if (!cfg) return true;
      if (cfg.firstRunComplete) return false;
      // Check if any integration has meaningful config
      const ints = cfg.integrations || {};
      for (const key of Object.keys(ints)) {
        const v = ints[key];
        if (v && (v.url || v.apiKey || v.token || v.clientId || v.city)) return false;
      }
      return true;
    }

    // ═══ NOTIFICATION DEBOUNCE ═══
    const _notifyRecent = {};
    function orbitNotify(title, body) {
      const key = title + '\x00' + body;
      const now = Date.now();
      if (_notifyRecent[key] && now - _notifyRecent[key] < 5000) return;
      _notifyRecent[key] = now;
      window.orbit.notify(title, body);
    }

    function App() {
      const [config, setConfig] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [showLeftArrow, setShowLeftArrow] = useState(false);
      const [showRightArrow, setShowRightArrow] = useState(false);
      const [signalIsOn, setSignalIsOn] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [showWelcome, setShowWelcome] = useState(false);
      const touchRef = useRef(null);
      const dragIdxRef = useRef(null);

      // Load config + start SignalR
      useEffect(() => {
        window.orbit.loadConfig().then(cfg => {
          if (cfg) {
            setConfig(cfg);
            if (isFirstRun(cfg)) setShowWelcome(true);
            { const t = THEMES.find(t => t.id === cfg.theme?.themeId) || (cfg.theme?.accentColor ? null : THEMES[0]); if (t) applyTheme(t); else if (cfg.theme?.accentColor) document.documentElement.style.setProperty('--accent', cfg.theme.accentColor); }
            if (window.orbit.startSignalR) {
              window.orbit.startSignalR({
                sonarrUrl: cfg.integrations?.sonarr?.url || '',
                sonarrKey: cfg.integrations?.sonarr?.apiKey || '',
                radarrUrl: cfg.integrations?.radarr?.url || '',
                radarrKey: cfg.integrations?.radarr?.apiKey || ''
              });
            }
          } else {
            setConfig(DEFAULT_CONFIG);
            setShowWelcome(true);
          }
        });
        // Listen for config updates from settings window
        const unsub = window.orbit.onConfigUpdated(cfg => {
          if (cfg) {
            setConfig(cfg);
            { const t = THEMES.find(t => t.id === cfg.theme?.themeId) || (cfg.theme?.accentColor ? null : THEMES[0]); if (t) applyTheme(t); else if (cfg.theme?.accentColor) document.documentElement.style.setProperty('--accent', cfg.theme.accentColor); }
          }
        });
        // Reload config when settings window closes
        const unsubSettings = window.orbit.onSettingsClosed(() => {
          window.orbit.loadConfig().then(cfg => {
            if (cfg) {
              setConfig(cfg);
              { const t = THEMES.find(t => t.id === cfg.theme?.themeId) || (cfg.theme?.accentColor ? null : THEMES[0]); if (t) applyTheme(t); else if (cfg.theme?.accentColor) document.documentElement.style.setProperty('--accent', cfg.theme.accentColor); }
            }
          }).catch(() => {});
        });
        return () => { unsub(); unsubSettings(); };
      }, []);

      // ── Toast notifications: Sonarr / Radarr SignalR + NZBGet status ──
      const nzbPrevRef = useRef({});
      useEffect(() => {
        if (!config) return;
        const notifCfg = config.notifications || { sonarr: true, radarr: true, nzbget: true };

        // Sonarr grab/download events
        const unsubSonarr = (notifCfg.sonarr !== false) ? window.orbit.onSonarrEvent(ev => {
          const name = ev.name || ev.eventType || '';
          if (/grab|download/i.test(name)) {
            const series = ev.series?.title || ev.body?.series?.title || 'Unknown';
            const ep = ev.episodes?.[0] || ev.body?.episodes?.[0];
            const epStr = ep ? ' S' + String(ep.seasonNumber||0).padStart(2,'0') + 'E' + String(ep.episodeNumber||0).padStart(2,'0') : '';
            orbitNotify('Sonarr', series + epStr + (/grab/i.test(name) ? ' grabbed' : ' downloaded'));
          }
        }) : null;

        // Radarr grab/download events
        const unsubRadarr = (notifCfg.radarr !== false) ? window.orbit.onRadarrEvent(ev => {
          const name = ev.name || ev.eventType || '';
          if (/grab|download/i.test(name)) {
            const movie = ev.movie?.title || ev.body?.movie?.title || 'Unknown';
            orbitNotify('Radarr', movie + (/grab/i.test(name) ? ' grabbed' : ' downloaded'));
          }
        }) : null;

        // NZBGet: detect SUCCESS transitions by polling
        let nzbTimer = null;
        const nCfg = config.integrations?.nzbget;
        if (notifCfg.nzbget !== false && nCfg?.url && nCfg?.username) {
          const auth = btoa(nCfg.username + ':' + (nCfg.password || ''));
          async function pollNzb() {
            try {
              const resp = await window.orbit.apiPost(nCfg.url + '/jsonrpc', { version: '1.1', method: 'history', params: [20], id: 99 }, { Authorization: 'Basic ' + auth });
              const items = Array.isArray(resp?.result) ? resp.result : [];
              const prev = nzbPrevRef.current;
              for (const item of items) {
                const id = item.NZBID || item.ID;
                if (!id) continue;
                if (prev[id] && prev[id] !== 'SUCCESS' && item.Status === 'SUCCESS') {
                  orbitNotify('NZBGet', (item.NZBNicename || item.NZBFilename || 'Download') + ' complete');
                }
              }
              const next = {};
              for (const item of items) { const id = item.NZBID || item.ID; if (id) next[id] = item.Status; }
              nzbPrevRef.current = next;
            } catch {}
            nzbTimer = setTimeout(pollNzb, 15000);
          }
          pollNzb();
        }

        return () => {
          if (unsubSonarr) unsubSonarr();
          if (unsubRadarr) unsubRadarr();
          if (nzbTimer) clearTimeout(nzbTimer);
        };
      }, [config?.notifications?.sonarr, config?.notifications?.radarr, config?.notifications?.nzbget,
          config?.integrations?.nzbget?.url, config?.integrations?.nzbget?.username]);

      const pages = config?.pages || DEFAULT_CONFIG.pages;
      const page = pages[currentPage] || pages[0];
      const panels = page?.panels || [];

      // Keyboard nav
      useEffect(() => {
        function onKey(e) {
          if (e.key === 'ArrowLeft' && currentPage > 0) setCurrentPage(p => p - 1);
          if (e.key === 'ArrowRight' && currentPage < pages.length - 1) setCurrentPage(p => p + 1);
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [currentPage, pages.length]);

      // Mouse hover zones for arrows
      useEffect(() => {
        function onMove(e) {
          setShowLeftArrow(e.clientX < 80 && currentPage > 0);
          setShowRightArrow(e.clientX > window.innerWidth - 80 && currentPage < pages.length - 1);
        }
        function onLeave() { setShowLeftArrow(false); setShowRightArrow(false); }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseleave', onLeave);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseleave', onLeave); };
      }, [currentPage, pages.length]);

      // Touch/swipe
      useEffect(() => {
        function onStart(e) { touchRef.current = e.touches?.[0]?.clientX ?? e.clientX; }
        function onEnd(e) {
          if (touchRef.current == null) return;
          const end = e.changedTouches?.[0]?.clientX ?? e.clientX;
          const delta = end - touchRef.current;
          if (Math.abs(delta) > 50) {
            if (delta > 0 && currentPage > 0) setCurrentPage(p => p - 1);
            if (delta < 0 && currentPage < pages.length - 1) setCurrentPage(p => p + 1);
          }
          touchRef.current = null;
        }
        window.addEventListener('touchstart', onStart);
        window.addEventListener('touchend', onEnd);
        return () => { window.removeEventListener('touchstart', onStart); window.removeEventListener('touchend', onEnd); };
      }, [currentPage, pages.length]);

      if (!config) return null;

      const openSettings = () => window.orbit.openSettingsWindow();
      _openSettingsRef = openSettings;

      // Only render configured and visible panels; grid cols = count of panels (max 6)
      const panelVisibility = config?.panels || {};
      const visiblePanels = [...panels].sort((a, b) => a.col - b.col).filter(p => panelVisibility[p.type] !== false);

      // Apply saved panel order from config.panelOrder (fall back to default)
      const panelOrder = Array.isArray(config?.panelOrder) && config.panelOrder.length > 0
        ? config.panelOrder
        : DEFAULT_PANEL_ORDER;
      const orderMap = {};
      panelOrder.forEach((id, i) => { orderMap[id] = i; });
      const inOrder = [];
      const notInOrder = [];
      for (const p of visiblePanels) {
        if (orderMap[p.type] !== undefined) inOrder.push(p);
        else notInOrder.push(p);
      }
      inOrder.sort((a, b) => orderMap[a.type] - orderMap[b.type]);
      const orderedPanels = [...inOrder, ...notInOrder];

      function clearDragClasses() {
        document.querySelectorAll('.panel-drag-wrapper').forEach(el => el.classList.remove('dragging', 'drag-over-left', 'drag-over-right'));
      }
      function onPanelDragStart(e, idx) {
        dragIdxRef.current = idx;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', String(idx));
        setTimeout(() => {
          const wrappers = document.querySelectorAll('#app > .panel-drag-wrapper');
          if (wrappers[idx]) wrappers[idx].classList.add('dragging');
        }, 0);
      }
      function onPanelDragEnd() {
        dragIdxRef.current = null;
        clearDragClasses();
      }
      function onPanelDragOver(e, idx) {
        e.preventDefault();
        const from = dragIdxRef.current;
        if (from === null || from === idx) return;
        clearDragClasses();
        const wrappers = document.querySelectorAll('#app > .panel-drag-wrapper');
        if (wrappers[from]) wrappers[from].classList.add('dragging');
        if (wrappers[idx]) wrappers[idx].classList.add(from < idx ? 'drag-over-right' : 'drag-over-left');
      }
      function onPanelDrop(e, idx) {
        e.preventDefault();
        const from = dragIdxRef.current;
        if (from === null || from === idx) return;
        const newOrder = orderedPanels.map(p => p.type);
        const [moved] = newOrder.splice(from, 1);
        newOrder.splice(idx, 0, moved);
        const newCfg = { ...config, panelOrder: newOrder };
        setConfig(newCfg);
        window.orbit.saveConfig(newCfg);
        dragIdxRef.current = null;
        clearDragClasses();
      }

      // Collapse state
      const panelCollapsed = config?.panelCollapsed || {};
      function toggleCollapse(type) {
        const newCollapsed = { ...panelCollapsed, [type]: !panelCollapsed[type] };
        const newCfg = { ...config, panelCollapsed: newCollapsed };
        setConfig(newCfg);
        window.orbit.saveConfig(newCfg);
      }

      const renderedPanels = [];
      orderedPanels.forEach((panelCfg, idx) => {
        const col = panelCfg.col;
        const isCollapsed = !!panelCollapsed[panelCfg.type];
        const dragProps = {
          draggable: true,
          onDragStart: e => onPanelDragStart(e, idx),
          onDragEnd: onPanelDragEnd,
          onDragOver: e => onPanelDragOver(e, idx),
          onDragLeave: e => { e.currentTarget.classList.remove('drag-over-left', 'drag-over-right'); },
          onDrop: e => onPanelDrop(e, idx),
        };
        const wrapperClass = 'panel-drag-wrapper' + (isCollapsed ? ' collapsed' : '');
        const collapseVal = { collapsed: isCollapsed, onToggleCollapse: () => toggleCollapse(panelCfg.type) };
        if (panelCfg.type === 'signalrgb') {
          renderedPanels.push(h('div', {key:'signalrgb-drag-'+col, className:wrapperClass, ...dragProps},
            h(CollapseContext.Provider, {value: collapseVal},
              h(PanelErrorBoundary, {panelType:'signalrgb'}, h(SignalRGBPanel, {config, onSignalChange: setSignalIsOn}))
            )
          ));
        } else {
          const panel = renderPanel(panelCfg, config, openSettings, setConfig);
          if (panel) {
            renderedPanels.push(h('div', {key:panelCfg.type+'-drag-'+col, className:wrapperClass, ...dragProps},
              h(CollapseContext.Provider, {value: collapseVal}, panel)
            ));
          }
        }
      });
      if (renderedPanels.length === 0) {
        renderedPanels.push(h('div', {key:'empty', className:'panel'}, h('div',{style:{fontSize:'28px',opacity:0.08}},'+' )));
      }
      const panelCols = Math.min(Math.max(renderedPanels.length, 1), 6);

      return h(SignalRGBContext.Provider, {value: {isOn: signalIsOn}},
        h('div', {id:'app', style:{'--panel-cols': panelCols}}, ...renderedPanels),


        // ── Bottom bar — hard bumper with settings + dots + update ──────────
        h(BottomBar, {pages, currentPage, setCurrentPage, page, openSettings, config, setConfig}),



        // Layout picker (top-right, next to quit)
        h(LayoutPicker, {config, setConfig}),

        // Quit button (keep top-right)
        h('div', {className:'quit-btn', onClick:()=>window.close()}, '✕'),

        // Welcome overlay (first-run onboarding)
        showWelcome && h(WelcomeOverlay, {
          onOpenSetup: () => {
            setShowWelcome(false);
            const newCfg = { ...(config || DEFAULT_CONFIG), firstRunComplete: true };
            setConfig(newCfg);
            window.orbit.saveConfig(newCfg);
            window.orbit.openSetup();
          },
          onSkip: () => {
            setShowWelcome(false);
            const newCfg = { ...(config || DEFAULT_CONFIG), firstRunComplete: true };
            setConfig(newCfg);
            window.orbit.saveConfig(newCfg);
          }
        }),

      );
    }

    // ═══ RENDER ═══
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(h(App, null));
  </script>
</body>
</html>
