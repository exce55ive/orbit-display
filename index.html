    // ═══ UPDATE PILL ═══
    function UpdatePill() {
      const [update, setUpdate] = useState(null);
      const [showConfirm, setShowConfirm] = useState(false);
      const [downloading, setDownloading] = useState(false);
      const [progress, setProgress] = useState(0);
      const [downloaded, setDownloaded] = useState(false);
      useEffect(() => {
        window.orbit.getPendingUpdate().then(u => { if (u) setUpdate(u); });
        window.orbit.onUpdateAvailable(info => setUpdate(info));
        window.orbit.onUpdateProgress(pct => { setDownloading(true); setProgress(pct); });
        window.orbit.onUpdateDownloaded(() => { setDownloading(false); setDownloaded(true); });
        window.orbit.onUpdateError(() => { setDownloading(false); });
      }, []);
      if (!update && !downloaded) return null;
      if (downloaded) {
        return h('div', {className:'update-pill', onClick:()=>window.orbit.installUpdate(), title:'Restart to update', style:{background:'rgba(80,250,123,0.25)',borderColor:'rgba(80,250,123,0.6)'}}, '⟳');
      }
      return h(React.Fragment, null,
        h('div', {className:'update-pill', onClick:()=>setShowConfirm(true), title:'Update available'}, '↓'),
        showConfirm && h('div', {className:'update-confirm-overlay', onClick:e=>{if(e.target===e.currentTarget&&!downloading)setShowConfirm(false)}},
          h('div', {className:'update-confirm-modal'},
            h('div', {className:'update-confirm-title'}, 'Update Available'),
            h('div', {className:'update-confirm-version'}, 'v'+(update?.version||'?')),
            downloading ? h(React.Fragment, null,
              h('div', {className:'update-progress-bar'}, h('div', {className:'update-progress-fill', style:{width:progress+'%'}})),
              h('div', {className:'update-status-text'}, 'Downloading... '+progress+'%')
            ) : h('div', {className:'update-confirm-btns'},
              h('button', {className:'update-confirm-btn primary', onClick:()=>{setDownloading(true);window.orbit.downloadUpdate();}}, 'Download'),
              h('button', {className:'update-confirm-btn cancel', onClick:()=>setShowConfirm(false)}, 'Later')
            )
          )
        )
      );
    }

    // ═══ INDIVIDUAL MEDIA PANELS ═══

    function SonarrPanel({ config, openSettings }) {
      const sCfg = config?.integrations?.sonarr;
      const configured = sCfg?.url && sCfg?.apiKey;
      const [seriesMap, setSeriesMap] = useState({});
      const [seriesCount, setSeriesCount] = useState(null);
      const [queue, setQueue] = useState([]);
      const [todayImports, setTodayImports] = useState([]);
      const [calendar, setCalendar] = useState([]);
      const pollRef = useRef(null);

      useEffect(() => {
        if (!configured) return;
        const hdr = {'X-Api-Key': sCfg.apiKey};
        async function poll() {
          try {
            const todayStr = new Date().toISOString().split('T')[0];
            const futureStr = new Date(Date.now()+4*86400000).toISOString().split('T')[0];
            const [series, hist, cal, q] = await Promise.all([
              window.orbit.apiGet(sCfg.url+'/api/v3/series', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/history?pageSize=50&sortKey=date&sortDir=desc&includeSeries=true&includeEpisode=true', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/calendar?start='+todayStr+'&end='+futureStr+'&unmonitored=false&includeSeries=true', hdr),
              window.orbit.apiGet(sCfg.url+'/api/v3/queue?pageSize=5&includeSeries=true&includeEpisode=true', hdr)
            ]);
            if (Array.isArray(series)) {
              setSeriesCount(series.length);
              const map = {};
              series.forEach(s => { map[s.id] = s.title; });
              setSeriesMap(map);
            }
            if (Array.isArray(hist?.records)) {
              const imports = hist.records.filter(r => {
                if (r.eventType !== 'downloadFolderImported') return false;
                return new Date(r.date).toISOString().startsWith(todayStr);
              });
              setTodayImports(imports.slice(0,6));
            }
            if (Array.isArray(cal)) setCalendar(cal.slice(0,6));
            if (Array.isArray(q?.records)) setQueue(q.records.slice(0,3));
          } catch {}
        }
        pollRef.current = poll;
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [sCfg?.url, sCfg?.apiKey]);

      // SignalR push — trigger immediate repoll on grab/import events
      useEffect(() => {
        if (!configured || !window.orbit.onSonarrEvent) return;
        const unsub = window.orbit.onSonarrEvent(() => { if (pollRef.current) pollRef.current(); });
        return unsub;
      }, [configured]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},

            );

          h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'5px',letterSpacing:'1px'}},'DOWNLOADED TODAY'),
          todayImports.map((r,i)=>{

    function RadarrPanel({ config, openSettings }) {
      const rCfg = config?.integrations?.radarr;
      const configured = rCfg?.url && rCfg?.apiKey;
      const [movieMap, setMovieMap] = useState({});
      const [movieCount, setMovieCount] = useState(null);
      const [queue, setQueue] = useState([]);
      const [todayImports, setTodayImports] = useState([]);
      const [upcoming, setUpcoming] = useState([]);
      const pollRef = useRef(null);

      useEffect(() => {
        if (!configured) return;
        const hdr = {'X-Api-Key': rCfg.apiKey};
        async function poll() {
          try {
            const todayStr = new Date().toISOString().split('T')[0];
            const futureStr = new Date(Date.now()+90*86400000).toISOString().split('T')[0];
            const [movies, hist, cal, q] = await Promise.all([
              window.orbit.apiGet(rCfg.url+'/api/v3/movie', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/history?pageSize=50&sortKey=date&sortDir=desc&includeMovie=true', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/calendar?start='+todayStr+'&end='+futureStr+'&unmonitored=false', hdr),
              window.orbit.apiGet(rCfg.url+'/api/v3/queue?pageSize=5&includeMovie=true', hdr)
            ]);
            if (Array.isArray(movies)) {
              setMovieCount(movies.length);
              const map = {};
              movies.forEach(m => { map[m.id] = { title: m.title, year: m.year }; });
              setMovieMap(map);
            }
            if (Array.isArray(hist?.records)) {
              const imports = hist.records.filter(r => {
                if (r.eventType !== 'downloadFolderImported') return false;
                return new Date(r.date).toISOString().startsWith(todayStr);
              });
              setTodayImports(imports.slice(0,5));
            }
            if (Array.isArray(cal)) {
              const now = Date.now();
              const classified = cal.map(m => {
                const cinema = m.inCinemas ? new Date(m.inCinemas) : null;
                const digital = m.digitalRelease ? new Date(m.digitalRelease) : null;
                const physical = m.physicalRelease ? new Date(m.physicalRelease) : null;
                const dates = [cinema, digital, physical].filter(d => d && d.getTime() > now-86400000);
                const earliest = dates.sort((a,b)=>a-b)[0];
                const type = earliest === cinema ? '🎭 CINEMA' : '💾 DOWNLOAD';
                const daysAway = earliest ? Math.ceil((earliest-now)/86400000) : 999;
                return { title:m.title, year:m.year, type, daysAway, hasFile:m.hasFile };
              }).filter(m => !m.hasFile && m.daysAway < 90).sort((a,b)=>a.daysAway-b.daysAway);
              setUpcoming(classified.slice(0,5));
            }
            if (Array.isArray(q?.records)) setQueue(q.records.slice(0,3));
          } catch {}
        }
        pollRef.current = poll;
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [rCfg?.url, rCfg?.apiKey]);

      // SignalR push
      useEffect(() => {
        if (!configured || !window.orbit.onRadarrEvent) return;
        const unsub = window.orbit.onRadarrEvent(() => { if (pollRef.current) pollRef.current(); });
        return unsub;
      }, [configured]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h('div',{className:'panel-label'},'RADARR ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-radarr')},'⚙')),
        h('div',{className:'panel-unconfigured-icon'},'🎬'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'}},'Configure in Settings'));

      return h('div',{className:'panel panel-top'},
        h('div',{className:'panel-label'},'RADARR ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-radarr')},'⚙')),
        // Stats
        h('div',{style:{display:'flex',gap:'20px',marginBottom:'14px'}},
          h('div',null, h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px'}},'LIBRARY'), h('div',{style:{fontSize:'26px',fontWeight:'700',color:'var(--accent)'}}, movieCount??'…')),
          h('div',null, h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px'}},'IN QUEUE'), h('div',{style:{fontSize:'26px',fontWeight:'700'}}, queue.length))
        ),
        // Active downloads
        queue.length > 0 && h('div',{style:{marginBottom:'12px'}},
          h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'5px',letterSpacing:'1px'}},'DOWNLOADING'),
          queue.map((item,i)=>{
            const pct = item.size > 0 ? Math.round((1-(item.sizeLeft/item.size))*100) : 0;
            const title = (item.movie?.title || item.title || '').slice(0,36);
            return h('div',{key:i,style:{marginBottom:'8px'}},
              h('div',{style:{fontSize:'12px',color:'var(--text)',marginBottom:'3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, title),
              h('div',{className:'np-progress-bar'},h('div',{className:'np-progress-fill',style:{width:pct+'%'}})),
              h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}, pct+'%')
            );
          })
        ),
        // Downloaded today
        todayImports.length > 0 && h('div',{style:{marginBottom:'12px'}},
          h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'5px',letterSpacing:'1px'}},'DOWNLOADED TODAY'),
          todayImports.map((r,i)=>{
            const fromMap = r.movieId ? movieMap[r.movieId] : null;
            const title = r.movie?.title || fromMap?.title || r.movieTitle || '?';
            const year = r.movie?.year || fromMap?.year;
            const display = title + (year ? ' ('+year+')' : '');
            return h('div',{key:i,style:{display:'flex',gap:'6px',alignItems:'flex-start',marginBottom:'5px'}},
              h('span',{style:{color:'#50fa7b',fontSize:'11px',flexShrink:0,marginTop:'1px'}},'✓'),
              h('div',{style:{fontSize:'13px',color:'var(--text)',lineHeight:'1.4'}}, display)
            );
          })
        ),
        // Upcoming
        upcoming.length > 0 && h('div',null,
          h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'5px',letterSpacing:'1px'}},'UPCOMING'),
          upcoming.map((m,i)=>{
            const when = m.daysAway <= 0 ? 'Today' : m.daysAway === 1 ? 'Tomorrow' : 'in '+m.daysAway+'d';
            return h('div',{key:i,style:{display:'flex',gap:'8px',alignItems:'baseline',marginBottom:'5px'}},
              h('span',{style:{fontSize:'10px',color:m.type.includes('CINEMA')?'#ffb86c':'var(--accent)',flexShrink:0,minWidth:'58px'}}, m.type),
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{fontSize:'12px',color:'var(--text)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, m.title+(m.year?' ('+m.year+')':'')),
                h('div',{style:{fontSize:'10px',color:'var(--dim)'}}, when)
              )
            );
          })
        )
      );
    }

    function OverseerrPanel({ config, openSettings }) {
      const oCfg = config?.integrations?.overseerr;
      const configured = oCfg?.url && oCfg?.apiKey;

      const [recent, setRecent] = useState([]);
      const [titles, setTitles] = useState({}); // tmdbId → title string

      useEffect(() => {
        if (!configured) return;
        const headers = {'X-Api-Key': oCfg.apiKey};
        async function poll() {
          try {
            const [c, r] = await Promise.all([
              window.orbit.apiGet(oCfg.url+'/api/v1/request/count', headers),
              window.orbit.apiGet(oCfg.url+'/api/v1/request?take=8&skip=0&sort=added', headers)
            ]);
            if (!c?.error) setCounts(c);
            if (Array.isArray(r?.results)) {
              const items = r.results.slice(0,8);
              setRecent(items);
              // Async-fetch titles for each request
              items.forEach(async (req) => {
                const tmdb = req.media?.tmdbId;
                const type = req.type;
                if (!tmdb || !type) return;
                try {
                  const endpoint = type === 'movie' ? `/api/v1/movie/${tmdb}` : `/api/v1/tv/${tmdb}`;
                  const details = await window.orbit.apiGet(oCfg.url+endpoint, headers);
                  const title = details?.title || details?.name || details?.originalTitle || details?.originalName;

                  if (title) setTitles(prev => ({...prev, [tmdb]: title + (year ? ' ('+year+')' : '')}));
                } catch {}
              });
            }

        }

          recent.map((req,i)=>{

    function NZBGetPanel({ config, openSettings }) {
      const nCfg = config?.integrations?.nzbget;
      const configured = nCfg?.url && nCfg?.username;
      const [status, setStatus] = useState(null);
      const [groups, setGroups] = useState([]);
      const intervalRef = useRef(null);

      useEffect(() => {
        if (!configured) return;
        let active = true;
        async function poll() {
          try {
            const auth = btoa(nCfg.username+':'+(nCfg.password||''));
            const [s, g] = await Promise.all([
              window.orbit.apiPost(nCfg.url+'/jsonrpc', JSON.stringify([{method:'status',id:1}]), {Authorization:'Basic '+auth}),
              window.orbit.apiPost(nCfg.url+'/jsonrpc', JSON.stringify([{method:'listgroups',id:2}]), {Authorization:'Basic '+auth})
            ]);
            if (!active) return;
            const st = Array.isArray(s) && s[0]?.result ? s[0].result : null;
            const gr = Array.isArray(g) && Array.isArray(g[0]?.result) ? g[0].result.slice(0,6) : [];
            if (st) setStatus(st);
            setGroups(gr);
            // Adaptive polling: 1.5s when actively downloading, 8s when idle
            const nextInterval = (st && st.DownloadRate > 0 && !st.DownloadPaused) ? 1500 : 8000;
            if (intervalRef.current) clearTimeout(intervalRef.current);
            intervalRef.current = setTimeout(poll, nextInterval);
          } catch {
            if (intervalRef.current) clearTimeout(intervalRef.current);
            intervalRef.current = setTimeout(poll, 10000);
          }
        }
        poll();
        return () => { active = false; if (intervalRef.current) clearTimeout(intervalRef.current); };
      }, [nCfg?.url, nCfg?.username]);
      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h('div',{className:'panel-label'},'NZBGET ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-nzbget')},'⚙')),
        h('div',{className:'panel-unconfigured-icon'},'⬇'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'}},'Configure in Settings'));
      const rateMBs = status ? (status.DownloadRate/1024/1024).toFixed(2) : '0.00';
      const remMB = status ? status.RemainingSizeMB : 0;
      const paused = status?.DownloadPaused;
      return h('div',{className:'panel panel-top'},
        h('div',{className:'panel-label'},'NZBGET ',h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-nzbget')},'⚙')),
        h('div',{style:{display:'flex',gap:'20px',marginBottom:'14px'}},
          h('div', null,
            h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px',letterSpacing:'1px'}},'SPEED'),
            h('div',{style:{fontSize:'28px',fontWeight:'700',color: paused ? 'var(--dim)' : 'var(--accent)'}}, paused ? 'PAUSED' : rateMBs+' MB/s')
          ),
          remMB > 0 && h('div', null,
            h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px',letterSpacing:'1px'}},'REMAINING'),
            h('div',{style:{fontSize:'22px',fontWeight:'700'}}, remMB > 1024 ? (remMB/1024).toFixed(1)+' GB' : remMB+' MB')
          )
        ),
        groups.length > 0 && h('div', null,
          h('div',{style:{fontSize:'11px',color:'var(--dim)',marginBottom:'8px',letterSpacing:'1px'}},'QUEUE'),
          groups.map((g,i)=>{
            const pct = g.FileSizeMB > 0 ? Math.round((1-(g.RemainingSizeMB/g.FileSizeMB))*100) : 0;
            const name = (g.NZBNicename||g.NZBFilename||'Unknown').slice(0,38);
            const remStr = g.RemainingSizeMB > 1024 ? (g.RemainingSizeMB/1024).toFixed(1)+' GB' : g.RemainingSizeMB+' MB';
            return h('div',{key:i,style:{marginBottom:'10px'}},
              h('div',{style:{fontSize:'12px',color:'var(--text)',marginBottom:'3px',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}, name),
              h('div',{className:'np-progress-bar'},h('div',{className:'np-progress-fill',style:{width:pct+'%'}})),
              h('div',{style:{fontSize:'10px',color:'var(--dim)',marginTop:'2px'}}, pct+'% · '+remStr+' left')
            );
          })
        ),
        !status && h('div',{style:{fontSize:'13px',color:'var(--dim)',textAlign:'center',padding:'20px'}},'Connecting...')
      );
    }

    // ═══ GMAIL PANEL ═══
    function GmailPanel({ config, openSettings }) {
      const gCfg = config?.integrations?.gmail;
      const configured = gCfg?.clientId && gCfg?.clientSecret;
      const [authorized, setAuthorized] = useState(!!(gCfg?.accessToken));
      const [connecting, setConnecting] = useState(false);
      const [connectErr, setConnectErr] = useState('');
      const [unreadCount, setUnreadCount] = useState(null);
      const [emails, setEmails] = useState([]);

      async function getToken() {
        const freshCfg = await window.orbit.loadConfig();
        const gm = freshCfg?.integrations?.gmail;
        let token = gm?.accessToken;
        if (!token) return null;
        if (gm?.tokenExpiry && Date.now() > gm.tokenExpiry - 60000) {
          const r = await window.orbit.gmailRefreshToken();
          if (r.accessToken) token = r.accessToken;
          else if (r.error) return null;
        }
        return token;
      }

      useEffect(() => {
        if (!authorized) return;
        async function poll() {
          try {
            const token = await getToken();
            if (!token) { setAuthorized(false); return; }
            const headers = { Authorization: 'Bearer '+token };
            // Get unread count
            const unreadRes = await window.orbit.apiGet('https://gmail.googleapis.com/gmail/v1/users/me/messages?q=is:unread&maxResults=1', headers);
            if (unreadRes && !unreadRes.error) {
              setUnreadCount(unreadRes.resultSizeEstimate || 0);
            }
            // Get last 5 messages
            const listRes = await window.orbit.apiGet('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=5', headers);
            if (listRes && Array.isArray(listRes.messages)) {
              const details = await Promise.all(
                listRes.messages.map(m =>
                  window.orbit.apiGet('https://gmail.googleapis.com/gmail/v1/users/me/messages/'+m.id+'?format=metadata&metadataHeaders=Subject&metadataHeaders=From&metadataHeaders=Date', headers)
                )
              );
              const parsed = details.filter(d => d && !d.error).map(d => {
                const hdrs = d.payload?.headers || [];
                const from = hdrs.find(h2 => h2.name === 'From')?.value || '';
                const subject = hdrs.find(h2 => h2.name === 'Subject')?.value || '(no subject)';
                const date = hdrs.find(h2 => h2.name === 'Date')?.value || '';
                // Extract sender name from "Name <email>" format
                const nameMatch = from.match(/^"?([^"<]+)"?\s*</);
                const senderName = nameMatch ? nameMatch[1].trim() : from.split('@')[0];
                return { senderName, subject, date, snippet: d.snippet || '' };
              });
              setEmails(parsed);
            }
          } catch {}
        }
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [authorized]);

      function timeAgo(dateStr) {
        if (!dateStr) return '';
        const diff = Date.now() - new Date(dateStr).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'now';
        if (mins < 60) return mins + 'm';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h';
        const days = Math.floor(hrs / 24);
        return days + 'd';
      }

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h('div',{className:'panel-label'},'GMAIL ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-gmail')},'⚙')),
        h('div',{className:'panel-unconfigured-icon'},'📧'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));

      if (!authorized) {
        return h('div', {className:'panel'},
          h('div', {className:'panel-label'}, 'GMAIL ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-gmail')},'⚙')),
          h('div', {className:'panel-unconfigured-icon', style:{opacity:0.3,fontSize:'36px',marginBottom:'12px'}}, '📧'),
          connectErr && h('div', {style:{fontSize:'10px',color:'#ff5555',marginBottom:'8px',textAlign:'center',padding:'0 12px'}}, connectErr),
          h('button', {className:'spotify-connect', disabled:connecting, onClick: async () => {
            setConnecting(true); setConnectErr('');
            const r = await window.orbit.gmailAuthStart();
            setConnecting(false);
            if (r.error) setConnectErr(r.error);
            else setAuthorized(true);
          }}, connecting ? 'Connecting...' : 'Connect Gmail')
        );
      }

      return h('div', {className:'panel panel-top'},
        h('div', {className:'panel-label'}, 'GMAIL ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-gmail')},'⚙')),
        h('div', {style:{marginBottom:'16px'}},
          h('div', {style:{fontSize:'11px',color:'var(--dim)',marginBottom:'4px',letterSpacing:'1px'}}, 'UNREAD'),
          h('div', {style:{fontSize:'48px',fontWeight:'700',color: unreadCount > 0 ? 'var(--accent)' : 'var(--dim)'}}, unreadCount != null ? unreadCount : '…')
        ),
        emails.length > 0 && h('div', null,
          h('div', {style:{fontSize:'11px',color:'var(--dim)',marginBottom:'8px',letterSpacing:'1px'}}, 'LATEST'),
          emails.map((em, i) =>
            h('div', {key:i, style:{marginBottom:'10px',paddingBottom:'8px',borderBottom:'1px solid var(--border)',textAlign:'left'}},
              h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'2px'}},
                h('span', {style:{fontSize:'12px',fontWeight:'600',color:'var(--text-bright)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}, em.senderName),
                h('span', {style:{fontSize:'10px',color:'var(--dim)',flexShrink:0,marginLeft:'8px'}}, timeAgo(em.date))
              ),
              h('div', {style:{fontSize:'11px',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, em.subject)
            )
          )
        )
      );
    }

    // ═══ OUTLOOK PANEL ═══
    function OutlookPanel({ config, openSettings }) {
      const oCfg = config?.integrations?.outlook;
      const configured = oCfg?.clientId;
      const [authorized, setAuthorized] = useState(!!(oCfg?.accessToken));
      const [connecting, setConnecting] = useState(false);
      const [connectErr, setConnectErr] = useState('');
      const [unreadCount, setUnreadCount] = useState(null);
      const [emails, setEmails] = useState([]);

      async function getToken() {
        const freshCfg = await window.orbit.loadConfig();
        const ol = freshCfg?.integrations?.outlook;
        let token = ol?.accessToken;
        if (!token) return null;
        if (ol?.tokenExpiry && Date.now() > ol.tokenExpiry - 60000) {
          const r = await window.orbit.outlookRefreshToken();
          if (r.accessToken) token = r.accessToken;
          else if (r.error) return null;
        }
        return token;
      }

      useEffect(() => {
        if (!authorized) return;
        async function poll() {
          try {
            const token = await getToken();
            if (!token) { setAuthorized(false); return; }
            const headers = { Authorization: 'Bearer '+token };
            const res = await window.orbit.apiGet(
              'https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$filter=isRead eq false&$count=true&$top=5&$select=subject,from,receivedDateTime,isRead&$orderby=receivedDateTime desc',
              { ...headers, 'ConsistencyLevel': 'eventual' }
            );
            if (res && !res.error) {
              setUnreadCount(res['@odata.count'] != null ? res['@odata.count'] : (Array.isArray(res.value) ? res.value.length : 0));
              if (Array.isArray(res.value)) {
                setEmails(res.value.slice(0,5).map(m => ({
                  sender: m.from?.emailAddress?.name || m.from?.emailAddress?.address || 'Unknown',
                  subject: m.subject || '(no subject)',
                  received: m.receivedDateTime
                })));
              }
            }
          } catch {}
        }
        poll(); const t = setInterval(poll, 60000); return () => clearInterval(t);
      }, [authorized]);

      function timeAgo(dateStr) {
        if (!dateStr) return '';
        const diff = Date.now() - new Date(dateStr).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return 'now';
        if (mins < 60) return mins + 'm';
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h';
        const days = Math.floor(hrs / 24);
        return days + 'd';
      }

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h('div',{className:'panel-label'},'OUTLOOK ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-outlook')},'⚙')),
        h('div',{className:'panel-unconfigured-icon'},'📬'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));

      if (!authorized) {
        return h('div', {className:'panel'},
          h('div', {className:'panel-label'}, 'OUTLOOK ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-outlook')},'⚙')),
          h('div', {className:'panel-unconfigured-icon', style:{opacity:0.3,fontSize:'36px',marginBottom:'12px'}}, '📬'),
          connectErr && h('div', {style:{fontSize:'10px',color:'#ff5555',marginBottom:'8px',textAlign:'center',padding:'0 12px'}}, connectErr),
          h('button', {className:'spotify-connect', disabled:connecting, onClick: async () => {
            setConnecting(true); setConnectErr('');
            const r = await window.orbit.outlookAuthStart();
            setConnecting(false);
            if (r.error) setConnectErr(r.error);
            else setAuthorized(true);
          }}, connecting ? 'Connecting...' : 'Connect Outlook')
        );
      }

      return h('div', {className:'panel panel-top'},
        h('div', {className:'panel-label'}, 'OUTLOOK ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-outlook')},'⚙')),
        h('div', {style:{marginBottom:'16px'}},
          h('div', {style:{fontSize:'11px',color:'var(--dim)',marginBottom:'4px',letterSpacing:'1px'}}, 'UNREAD'),
          h('div', {style:{fontSize:'48px',fontWeight:'700',color: unreadCount > 0 ? '#4488ff' : 'var(--dim)'}}, unreadCount != null ? unreadCount : '…')
        ),
        emails.length > 0 && h('div', null,
          h('div', {style:{fontSize:'11px',color:'var(--dim)',marginBottom:'8px',letterSpacing:'1px'}}, 'LATEST'),
          emails.map((em, i) =>
            h('div', {key:i, style:{marginBottom:'10px',paddingBottom:'8px',borderBottom:'1px solid var(--border)',textAlign:'left'}},
              h('div', {style:{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'2px'}},
                h('span', {style:{fontSize:'12px',fontWeight:'600',color:'var(--text-bright)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1}}, em.sender),
                h('span', {style:{fontSize:'10px',color:'var(--dim)',flexShrink:0,marginLeft:'8px'}}, timeAgo(em.received))
              ),
              h('div', {style:{fontSize:'11px',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}, em.subject)
            )
          )
        )
      );
    }

    // ═══ DISCORD PANEL ═══
    function DiscordPanel({ config, openSettings }) {
      const dCfg = config?.integrations?.discord;
      const configured = dCfg?.clientId && dCfg?.clientSecret;
      const [authorized, setAuthorized] = useState(!!(dCfg?.accessToken));
      const [connecting, setConnecting] = useState(false);
      const [connectErr, setConnectErr] = useState('');
      const [user, setUser] = useState(dCfg?.user || null);
      const [guildCount, setGuildCount] = useState(dCfg?.guildCount || 0);

      useEffect(() => {
        // Load stored user data from config
        if (dCfg?.user) setUser(dCfg.user);
        if (dCfg?.guildCount != null) setGuildCount(dCfg.guildCount);
      }, [dCfg?.user?.id, dCfg?.guildCount]);

      // Poll guilds periodically to keep count fresh
      useEffect(() => {
        if (!authorized || !dCfg?.accessToken) return;
        async function poll() {
          try {
            const freshCfg = await window.orbit.loadConfig();
            const token = freshCfg?.integrations?.discord?.accessToken;
            if (!token) return;
            const [userRes, guildsRes] = await Promise.all([
              window.orbit.apiGet('https://discord.com/api/users/@me', { Authorization: 'Bearer '+token }),
              window.orbit.apiGet('https://discord.com/api/users/@me/guilds', { Authorization: 'Bearer '+token })
            ]);
            if (userRes && !userRes.error && userRes.id) setUser(userRes);
            if (Array.isArray(guildsRes)) setGuildCount(guildsRes.length);
          } catch {}
        }
        poll(); const t = setInterval(poll, 300000); return () => clearInterval(t);
      }, [authorized]);

      if (!configured) return h('div',{className:'panel panel-unconfigured'},
        h('div',{className:'panel-label'},'DISCORD ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-discord')},'⚙')),
        h('div',{className:'panel-unconfigured-icon'},'💬'),
        h('div',{className:'panel-unconfigured-text',style:{cursor:'pointer'},onClick:openSettings},'Configure in Settings'));

      if (!authorized) {
        return h('div', {className:'panel'},
          h('div', {className:'panel-label'}, 'DISCORD ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-discord')},'⚙')),
          h('div', {className:'panel-unconfigured-icon', style:{opacity:0.3,fontSize:'36px',marginBottom:'12px'}}, '💬'),
          connectErr && h('div', {style:{fontSize:'10px',color:'#ff5555',marginBottom:'8px',textAlign:'center',padding:'0 12px'}}, connectErr),
          h('button', {className:'spotify-connect', style:{borderColor:'#5865F2',color:'#5865F2',background:'rgba(88,101,242,0.08)'}, disabled:connecting, onClick: async () => {
            setConnecting(true); setConnectErr('');
            const r = await window.orbit.discordAuthStart();
            setConnecting(false);
            if (r.error) setConnectErr(r.error);
            else {
              setAuthorized(true);
              if (r.user) setUser(r.user);
              if (r.guildCount != null) setGuildCount(r.guildCount);
            }
          }}, connecting ? 'Connecting...' : 'Connect Discord')
        );
      }

      const avatarUrl = user?.avatar
        ? 'https://cdn.discordapp.com/avatars/'+user.id+'/'+user.avatar+'.png?size=128'
        : 'https://cdn.discordapp.com/embed/avatars/'+(user?.discriminator ? (parseInt(user.discriminator) % 5) : 0)+'.png';
      const displayName = user?.global_name || user?.username || 'Unknown';
      const handle = user?.discriminator && user.discriminator !== '0'
        ? user.username + '#' + user.discriminator
        : '@' + (user?.username || '');

      return h('div', {className:'panel'},
        h('div', {className:'panel-label'}, 'DISCORD ', h('button',{className:'panel-cog-btn',onClick:()=>openSettingsAt('settings-discord')},'⚙')),
        h('img', {src:avatarUrl, style:{width:'52px',height:'52px',borderRadius:'50%',marginBottom:'10px',border:'2px solid rgba(88,101,242,0.4)'}}),
        h('div', {style:{fontSize:'18px',fontWeight:'700',color:'var(--text-bright)',marginBottom:'2px'}}, displayName),
        h('div', {style:{fontSize:'12px',color:'var(--dim)',marginBottom:'16px'}}, handle),
        h('div', {style:{display:'flex',gap:'20px',marginBottom:'20px'}},
          h('div', null,
            h('div', {style:{fontSize:'11px',color:'var(--dim)',marginBottom:'2px',letterSpacing:'1px'}}, 'SERVERS'),
            h('div', {style:{fontSize:'28px',fontWeight:'700',color:'#5865F2'}}, guildCount)
          )
        ),
        h('button', {
          onClick:()=>window.orbit.openExternal('discord://'),
          style:{padding:'8px 20px',fontSize:'12px',fontWeight:'700',fontFamily:'var(--font)',letterSpacing:'1px',border:'2px solid #5865F2',borderRadius:'20px',background:'rgba(88,101,242,0.08)',color:'#5865F2',cursor:'pointer',transition:'all .2s'}
        }, 'Open Discord')
      );
    }

    // ═══ PANEL RENDERER ═══
    function wrap(key, child) {
      return h(PanelErrorBoundary, { key }, child);
    }
    function renderPanel(panelCfg, config, openSettings) {
      const type = panelCfg.type;
      const key = type + '-' + (panelCfg.col || 0);
      switch (type) {
        case 'clock': return wrap(key, h(ClockPanel, {key, config}));
        case 'signalrgb': return null; // Rendered specially in App for context
        case 'lights': return wrap(key, h(LightsPanel, {key, config}));
        case 'nowplaying': return wrap(key, h(NowPlayingPanel, {key, config}));
        case 'system': return wrap(key, h(SystemPanel, {key, config}));
        case 'media': return wrap(key, h(MediaPanel, {key, config, openSettings}));
        case 'sonarr': return wrap(key, h(SonarrPanel, {key, config, openSettings}));
        case 'radarr': return wrap(key, h(RadarrPanel, {key, config, openSettings}));
        case 'overseerr': return wrap(key, h(OverseerrPanel, {key, config, openSettings}));
        case 'nzbget': return wrap(key, h(NZBGetPanel, {key, config, openSettings}));
        case 'uptimekuma': return wrap(key, h(UptimeKumaPanel, {key, config, openSettings}));
        case 'spotify': return wrap(key, h(SpotifyPanel, {key, config, openSettings}));
        case 'links': return wrap(key, h(LinksPanel, {key, config}));
        case 'jellyfin': return wrap(key, h(JellyfinPanel, {key, config, openSettings}));
        case 'gmail': return wrap(key, h(GmailPanel, {key, config, openSettings}));
        case 'outlook': return wrap(key, h(OutlookPanel, {key, config, openSettings}));
        case 'discord': return wrap(key, h(DiscordPanel, {key, config, openSettings}));
        default: return wrap(key, h('div', {key, className:'panel panel-unconfigured'}, h('div',{className:'panel-unconfigured-icon'},'📦'), h('div',{className:'panel-unconfigured-text'}, type)));
      }
    }

    // ═══ MAIN APP ═══
    function App() {
      const [config, setConfig] = useState(null);
      const [currentPage, setCurrentPage] = useState(0);
      const [showSettings, setShowSettings] = useState(false);
      const [showLeftArrow, setShowLeftArrow] = useState(false);
      const [showRightArrow, setShowRightArrow] = useState(false);
      const [signalIsOn, setSignalIsOn] = useState(false);
      const touchRef = useRef(null);

      // Load config + start SignalR
      useEffect(() => {
        window.orbit.loadConfig().then(cfg => {
          if (cfg) {
            setConfig(cfg);
            if (cfg.theme?.accentColor) document.documentElement.style.setProperty('--accent', cfg.theme.accentColor);
            // Start SignalR for real-time Sonarr/Radarr events
            if (window.orbit.startSignalR) {
              window.orbit.startSignalR({
                sonarrUrl: cfg.integrations?.sonarr?.url || '',
                sonarrKey: cfg.integrations?.sonarr?.apiKey || '',
                radarrUrl: cfg.integrations?.radarr?.url || '',
                radarrKey: cfg.integrations?.radarr?.apiKey || ''
              });
            }
          } else {
            setConfig(DEFAULT_CONFIG);
          }
        });
      }, []);

      const pages = config?.pages || DEFAULT_CONFIG.pages;
      const page = pages[currentPage] || pages[0];
      const panels = page?.panels || [];

      // Keyboard nav
      useEffect(() => {
        function onKey(e) {
          if (e.key === 'ArrowLeft' && currentPage > 0) setCurrentPage(p => p - 1);
          if (e.key === 'ArrowRight' && currentPage < pages.length - 1) setCurrentPage(p => p + 1);
        }
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [currentPage, pages.length]);

      // Mouse hover zones for arrows
      useEffect(() => {
        function onMove(e) {
          setShowLeftArrow(e.clientX < 80 && currentPage > 0);
          setShowRightArrow(e.clientX > window.innerWidth - 80 && currentPage < pages.length - 1);
        }
        function onLeave() { setShowLeftArrow(false); setShowRightArrow(false); }
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseleave', onLeave);
        return () => { window.removeEventListener('mousemove', onMove); window.removeEventListener('mouseleave', onLeave); };
      }, [currentPage, pages.length]);

      // Touch/swipe
      useEffect(() => {
        function onStart(e) { touchRef.current = e.touches?.[0]?.clientX ?? e.clientX; }
        function onEnd(e) {
          if (touchRef.current == null) return;
          const end = e.changedTouches?.[0]?.clientX ?? e.clientX;
          const delta = end - touchRef.current;
          if (Math.abs(delta) > 50) {
            if (delta > 0 && currentPage > 0) setCurrentPage(p => p - 1);
            if (delta < 0 && currentPage < pages.length - 1) setCurrentPage(p => p + 1);
          }
          touchRef.current = null;
        }
        window.addEventListener('touchstart', onStart);
        window.addEventListener('touchend', onEnd);
        return () => { window.removeEventListener('touchstart', onStart); window.removeEventListener('touchend', onEnd); };
      }, [currentPage, pages.length]);

      if (!config) return null;

      const openSettings = () => setShowSettings(true);
      _openSettingsRef = openSettings;

      // Fill panels to 6 columns
      const renderedPanels = [];
      for (let col = 1; col <= 6; col++) {
        const panelCfg = panels.find(p => p.col === col);
        if (panelCfg) {
          if (panelCfg.type === 'signalrgb') {
            renderedPanels.push(h(SignalRGBPanel, {key:'signalrgb-'+col, config, onSignalChange: setSignalIsOn}));
          } else {
            renderedPanels.push(renderPanel(panelCfg, config, openSettings));
          }
        } else {
          renderedPanels.push(h('div', {key:'empty-'+col, className:'panel'}, h('div',{style:{fontSize:'28px',opacity:0.08}},'+')));
        }
      }

      return h(SignalRGBContext.Provider, {value: {isOn: signalIsOn}},
        h('div', {id:'app'}, ...renderedPanels),

        // Page dots (swipe / keyboard only — no arrows)
        pages.length > 1 && h('div', {className:'page-dots'},
          h('div', {className:'page-dots-row'},
            pages.map((pg,i) => h('button', {key:i, className:'page-dot'+(i===currentPage?' active':''), onClick:()=>setCurrentPage(i), title:pg.name||'Page '+(i+1)}))
          ),
          h('div', {className:'page-name-label'}, page?.name || '')
        ),

        // Settings gear
        h('button', {className:'settings-gear', onClick:openSettings}, '⚙'),

        // Quit button
        h('div', {className:'quit-btn', onClick:()=>window.close()}, '✕'),

        // Update pill
        h(UpdatePill, null),

        // Settings overlay
        showSettings && h(SettingsOverlay, {config, onClose:()=>setShowSettings(false), onSave:c=>{setConfig(c); if(c.theme?.accentColor) document.documentElement.style.setProperty('--accent',c.theme.accentColor);}})
      );
    }

    // ═══ RENDER ═══
    const root = ReactDOM.createRoot(document.getElementById('app'));
    root.render(h(App, null));
  </script>
</body>
</html>
